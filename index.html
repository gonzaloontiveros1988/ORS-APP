<style>
:root {
  /* ãã Core backgrounds ã deeper terminal feel */
  --bg:     #030609;
  --bg2:    #070d14;
  --card:   #0a1018;
  --card2:  #0e1622;
  --border: #162030;
  --border2:#1c2a3e;

  /* ãã Typography */
  --text:   #c8daf0;
  --sub:    #4a6a8a;
  --muted:  #223040;

  /* ãã Brand accent ã gold */
  --accent:  #e8b830;
  --accent2: #ffd060;

  /* ãã Signal colors */
  --signal:  #00dda0;
  --signal2: #00ff99;
  --watch:   #f0a800;
  --radar:   #3a8fff;
  --no:      #2a3a4a;

  /* ãã Market colors */
  --bull:    #00dda0;
  --bear:    #ff3a55;
  --blue:    #3a8fff;
  --purple:  #a050ff;
  --copper:  #e07040; /* momentum color */
  --cyan:    #00c8e0;

  /* ãã Glow values (for box-shadow) */
  --glow-signal: 0 0 20px rgba(0,221,160,.15), 0 0 40px rgba(0,221,160,.06);
  --glow-watch:  0 0 20px rgba(240,168,0,.12),  0 0 40px rgba(240,168,0,.05);
  --glow-bear:   0 0 20px rgba(255,58,85,.12),  0 0 40px rgba(255,58,85,.05);
  --glow-accent: 0 0 20px rgba(232,184,48,.15), 0 0 40px rgba(232,184,48,.06);
}

/* ãã LIGHT MODE ãããããããããããããããããããããããããããããããã */
body.light {
  --bg:     #f0f4f8;
  --bg2:    #ffffff;
  --card:   #ffffff;
  --card2:  #f5f8fc;
  --border: #dde4ef;
  --border2:#c8d4e8;
  --text:   #0d1f35;
  --sub:    #6b82a0;
  --muted:  #b0c0d4;
  --accent:  #c8960a;
  --accent2: #e0a800;
  --signal:  #00a870;
  --signal2: #00c880;
  --watch:   #c8960a;
  --radar:   #2070d0;
  --no:      #a0b0c4;
  --bull:    #00a870;
  --bear:    #e02040;
  --blue:    #2070d0;
  --purple:  #8040d0;
  --copper:  #c05820;
  --cyan:    #0090a8;
  --glow-signal: none;
  --glow-watch:  none;
  --glow-bear:   none;
  --glow-accent: none;
}
/* ãã BASE RESET ããããããããããããããããããããããããããããããããããããã */
.theme-toggle {
  width:36px;height:36px;border-radius:50%;
  background:var(--card2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;transition:all .2s;flex-shrink:0;
}
.theme-toggle:active{transform:scale(0.9);}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,'SF Pro Display','Inter',system-ui,monospace;
  min-height:100vh;
  font-size:14px;
  transition:background .25s,color .25s;
}
body.light { background:var(--bg); color:var(--text); }
button,input,select,textarea { font-family:inherit; font-size:13px; color:var(--text); }
button { cursor:pointer; border:none; background:none; }

/* ãã LAYOUT ããããããããããããããããããããããããããããããããããããããããã */
#root { min-height:100vh; padding-bottom:80px; }
.wrap { padding:14px 16px; max-width:720px; margin:0 auto; }

/* ãã HEADER ã glassmorphism terminal ããããããããããããããã */
.hdr {
  background:rgba(7,13,20,.85);
  border-bottom:1px solid var(--border);
  padding:12px 18px;
  display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.hdr::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--signal) 70%, transparent 100%);
  opacity:.35;
}
.hdr { position:relative; }
.htitle {
  font-size:15px; font-weight:800;
  color:var(--accent); flex:1;
  letter-spacing:-.4px;
  background:linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hsub { font-size:9px; color:var(--sub); letter-spacing:2.5px; margin-top:2px; text-transform:uppercase; }

/* ãã CARDS ãããããããããããããããããããããããããããããããããããããããããã */
.card {
  background:linear-gradient(145deg, var(--card), var(--card2));
  border-radius:16px; padding:16px;
  border:1px solid var(--border);
  margin-bottom:12px;
  box-shadow:0 4px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.03);
  transition:border-color .2s, box-shadow .2s;
}
body.light .card { box-shadow:0 2px 12px rgba(0,0,0,.08); background:var(--card); }
.card-glow-signal { border-color:var(--signal); box-shadow:var(--glow-signal); }
.card-glow-watch  { border-color:var(--watch);  box-shadow:var(--glow-watch); }
.card-glow-bear   { border-color:var(--bear);   box-shadow:var(--glow-bear); }

/* ãã INPUTS ããããããããããããããããããããããããããããããããããããããããã */
.inp {
  width:100%;
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:10px;
  color:var(--text);
  padding:11px 14px;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.inp:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,184,48,.1); }
textarea.inp { resize:vertical; }

/* ãã BUTTONS ãããããããããããããããããããããããããããããããããããããããã */
.btn { border-radius:10px; padding:9px 14px; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; }
.btn:active { transform:scale(.96); }
.btn-signal { background:rgba(0,221,160,.12); border:1px solid rgba(0,221,160,.4); color:var(--signal); }
.btn-signal:active { background:rgba(0,221,160,.22); }
.btn-watch  { background:rgba(240,168,0,.12);  border:1px solid rgba(240,168,0,.4);  color:var(--watch); }
.btn-blue   { background:rgba(58,143,255,.12);  border:1px solid rgba(58,143,255,.4); color:var(--blue); }
.btn-bear   { background:rgba(255,58,85,.10);   border:1px solid rgba(255,58,85,.3);  color:var(--bear); }
.btn-big { width:100%; padding:14px; font-size:13px; border-radius:14px; font-weight:700; }
.btn-save {
  width:100%;
  background:linear-gradient(135deg, var(--signal), #00b880);
  color:#000; border:none; border-radius:12px;
  padding:14px; font-size:14px; font-weight:800; margin-top:6px;
  box-shadow:0 4px 16px rgba(0,221,160,.25);
}
.btn-save:active { transform:scale(.98); }

/* ãã NAV BOTTOM ã premium ããããããããããããããããããããããããããã */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(7,13,20,.92);
  border-top:1px solid var(--border);
  display:flex; z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.nav-btn {
  flex:1; padding:9px 4px 11px;
  font-size:9px; color:var(--muted);
  text-align:center; cursor:pointer;
  border:none; background:none;
  letter-spacing:.5px;
  transition:color .15s;
  position:relative;
}
.nav-btn.on { color:var(--accent); }
.nav-btn.on::before {
  content:'';
  position:absolute; top:0; left:25%; right:25%; height:2px;
  background:linear-gradient(90deg, var(--accent), var(--signal));
  border-radius:0 0 3px 3px;
}
.nav-icon { font-size:21px; display:block; margin-bottom:2px; }
/* pill */
.pill { font-weight:700; letter-spacing:.3px; }
.stat-val2 { font-size:20px; font-weight:800; margin:2px 0; letter-spacing:-.5px; }

/* ãã TABS ããããããããããããããããããããããããããããããããããããããããããã */
.tabs {
  display:flex;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex:1; background:none; border:none;
  border-bottom:2px solid transparent;
  color:var(--sub); padding:11px 4px;
  font-size:11px; cursor:pointer; font-weight:700;
  transition:all .15s; white-space:nowrap; min-width:60px;
  letter-spacing:.3px;
}
.tab.on { border-bottom-color:var(--accent); color:var(--accent); }

/* ãã PILLS ãããããããããããããããããããããããããããããããããããããããããã */
.pill {
  display:inline-flex; align-items:center; gap:3px;
  border-radius:20px; padding:3px 9px;
  font-size:10px; font-weight:700;
  letter-spacing:.2px;
}

/* ãã ORS TOGGLES ãããããããããããããããããããããããããããããããããããã */
.ors-grid { display:flex; flex-wrap:wrap; gap:8px; }
.ors-btn { padding:8px 13px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; }

/* ãã PROGRESS BARS ãããããããããããããããããããããããããããããããããã */
.bar-track {
  flex:1; height:5px;
  background:var(--border); border-radius:3px; overflow:hidden;
}
.bar-fill { height:100%; border-radius:3px; transition:width .5s cubic-bezier(.4,0,.2,1); }

/* ãã PHASE BADGES ã premium glow ããããããããããããããããããã */
.phase-badge {
  display:inline-flex; align-items:center; gap:5px;
  border-radius:20px; padding:5px 13px;
  font-size:10px; font-weight:800; letter-spacing:.8px;
  text-transform:uppercase;
}
.phase-signal {
  background:rgba(0,221,160,.15);
  border:1.5px solid var(--signal);
  color:var(--signal);
  box-shadow:0 0 10px rgba(0,221,160,.2);
}
.phase-watch {
  background:rgba(240,168,0,.15);
  border:1.5px solid var(--watch);
  color:var(--watch);
  box-shadow:0 0 10px rgba(240,168,0,.15);
}
.phase-radar {
  background:rgba(58,143,255,.12);
  border:1.5px solid var(--radar);
  color:var(--blue);
}
.phase-no {
  background:rgba(42,58,74,.3);
  border:1.5px solid var(--no);
  color:var(--sub);
}

/* Tooltip modal */
.tooltip-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease;}
.tooltip-modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:700px;border-top:1px solid var(--border2);animation:slideUp .2s ease;}
.tooltip-close{float:right;font-size:22px;color:var(--sub);background:none;border:none;cursor:pointer;padding:0 4px;}
.tooltip-title{font-size:16px;font-weight:800;color:var(--accent);margin-bottom:14px;padding-right:30px;}
.tooltip-section{margin-bottom:12px;}
.tooltip-lbl{font-size:9px;color:var(--sub);letter-spacing:2px;font-weight:700;margin-bottom:4px;}
.tooltip-text{font-size:13px;color:var(--text);line-height:1.7;}
.tooltip-seek{background:var(--signal)12;border-left:3px solid var(--signal);border-radius:0 8px 8px 0;padding:8px 12px;}
.tooltip-avoid{background:var(--bear)10;border-left:3px solid var(--bear);border-radius:0 8px 8px 0;padding:8px 12px;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0;}to{transform:none;opacity:1;}}

/* Chart patterns visual */
.pattern-card { border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid; }

/* Live dot */
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--signal); display: inline-block; animation: pulse 2s infinite; margin-right: 4px; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* ãã STAT BOXES ããããããããããããããããããããããããããããããããããããã */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.stat-box2 {
  background:linear-gradient(145deg, var(--card), var(--card2));
  border-radius:14px; padding:13px 12px;
  border:1px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.stat-val2 { font-size:20px; font-weight:800; margin:3px 0; letter-spacing:-.5px; font-variant-numeric:tabular-nums; }
.stat-lbl2 { font-size:8px; color:var(--sub); letter-spacing:2px; text-transform:uppercase; }

/* ãã RANKING CARDS ã premium left border ãããããããããããã */
.rank-card {
  background:linear-gradient(145deg, var(--card), rgba(14,22,34,.8));
  border-radius:16px; padding:14px;
  margin-bottom:10px;
  border:1px solid var(--border);
  border-left:3px solid var(--border);
  position:relative; cursor:pointer;
  transition:border-color .2s, box-shadow .2s, transform .1s;
  box-shadow:0 2px 16px rgba(0,0,0,.3);
}
.rank-card:active { transform:scale(.99); }
.rank-card.phase-signal-card { border-left-color:var(--signal); }
.rank-card.phase-watch-card  { border-left-color:var(--watch); }
.rank-card.phase-radar-card  { border-left-color:var(--radar); }

/* ãã ORS CHECKLIST ãããããããããããããããããããããããããããããããããã */
.ors-check { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.ors-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; font-size:12px; }
.ors-item.on   { background:rgba(0,221,160,.1);  border:1px solid rgba(0,221,160,.3); }
.ors-item.off  { background:rgba(255,58,85,.05); border:1px solid var(--muted); color:var(--sub); }
.ors-item.mand.on  { background:rgba(232,184,48,.1); border:1px solid rgba(232,184,48,.4); color:var(--accent); }
.ors-item.mand.off { background:rgba(255,58,85,.12); border:1px solid rgba(255,58,85,.4); color:var(--bear); }

/* ãã TRADE ROWS ããããããããããããããããããããããããããããããããããããã */
.trade-row {
  background:linear-gradient(145deg, var(--card), var(--card2));
  border-radius:12px; padding:12px 14px;
  margin-bottom:8px;
  border:1px solid var(--border);
  border-left:3px solid;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}

/* ãã ALERT BANNER ããããããããããããããããããããããããããããããããããã */
.alert-banner {
  background:linear-gradient(135deg, rgba(255,58,85,.06), rgba(255,58,85,.14));
  border:1px solid rgba(255,58,85,.35);
  border-radius:14px; padding:13px 16px; margin-bottom:14px;
}

/* ãã METRIC ROWS ãããããããããããããããããããããããããããããããããããã */
.metric-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.metric-row:last-child { border-bottom:none; }

/* ãã FADE ANIMATION ããããããããããããããããããããããããããããããããã */
.fade { animation:fd .2s ease; }
@keyframes fd { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:none;} }

/* ãã TOAST ãããããããããããããããããããããããããããããããããããããããããã */
.toast {
  position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
  background:rgba(14,22,34,.95);
  border:1px solid var(--border2);
  border-radius:12px; padding:10px 22px;
  font-size:12px; font-weight:600;
  z-index:999; pointer-events:none;
  white-space:nowrap;
  transition:opacity .3s;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}

// TECHNICAL INDICATORS
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function calcATR(prices,period){
  if(!prices||prices.length<period+1)return null;
  var trs=[];
  for(var i=1;i<prices.length;i++){
    var h=prices[i].high||prices[i].close,l=prices[i].low||prices[i].close,p=prices[i-1].close;
    trs.push(Math.max(h-l,Math.abs(h-p),Math.abs(l-p)));
  }
  var sum=0;for(var j=trs.length-period;j<trs.length;j++)sum+=trs[j];
  return sum/period;
}
function calcSMA(prices, period) {
  if(!prices||prices.length<period) return null;
  var sum=0;
  for(var i=prices.length-period;i<prices.length;i++) sum+=prices[i].close;
  return parseFloat((sum/period).toFixed(2));
}

function calcEMAValue(prices, period) {
  if(!prices||prices.length<period) return null;
  var k=2/(period+1), ema=prices[0].close;
  for(var i=1;i<prices.length;i++) ema=prices[i].close*k+ema*(1-k);
  return parseFloat(ema.toFixed(2));
}

// ãã VOLUME PROFILE ANCHORED ããããããããããããããããããããããããããã
function calcVolumeProfile(prices, anchorIdx) {
  // anchorIdx: start from this index (default: last 60 days)
  if(!prices||prices.length<10) return null;
  var start = anchorIdx!=null ? anchorIdx : Math.max(0, prices.length-60);
  var slice = prices.slice(start);
  if(slice.length<5) return null;

  // Build price buckets (20 levels)
  var hi=Math.max.apply(null,slice.map(function(p){return p.high||p.close;}));
  var lo=Math.min.apply(null,slice.map(function(p){return p.low||p.close;}));
  var rng=hi-lo; if(rng<0.01) return null;
  var BUCKETS=20;
  var bucketSize=rng/BUCKETS;
  var vol=[];
  for(var i=0;i<BUCKETS;i++) vol.push(0);

  slice.forEach(function(p){
    var v=p.volume||1;
    var cIdx=Math.min(BUCKETS-1,Math.floor(((p.close-lo)/rng)*BUCKETS));
    var hIdx=Math.min(BUCKETS-1,Math.floor(((( p.high||p.close)-lo)/rng)*BUCKETS));
    var lIdx=Math.max(0,Math.floor((((p.low||p.close)-lo)/rng)*BUCKETS));
    // Distribute volume across candle range
    for(var b=lIdx;b<=hIdx;b++) vol[b]+=v/(hIdx-lIdx+1);
  });

  // Find POC (highest volume bucket)
  var maxVol=0, pocIdx=0;
  vol.forEach(function(v,i){if(v>maxVol){maxVol=v;pocIdx=i;}});
  var poc=lo+pocIdx*bucketSize+bucketSize/2;

  // Value Area (70% of total volume)
  var totalVol=vol.reduce(function(a,b){return a+b;},0);
  var target=totalVol*0.70;
  var accum=vol[pocIdx];
  var vahIdx=pocIdx, valIdx=pocIdx;
  while(accum<target&&(vahIdx<BUCKETS-1||valIdx>0)){
    var upVol=vahIdx<BUCKETS-1?vol[vahIdx+1]:0;
    var dnVol=valIdx>0?vol[valIdx-1]:0;
    if(upVol>=dnVol&&vahIdx<BUCKETS-1){vahIdx++;accum+=upVol;}
    else if(valIdx>0){valIdx--;accum+=dnVol;}
    else break;
  }

  return {
    poc: parseFloat(poc.toFixed(2)),
    vah: parseFloat((lo+vahIdx*bucketSize+bucketSize).toFixed(2)),
    val: parseFloat((lo+valIdx*bucketSize).toFixed(2)),
    hi:  parseFloat(hi.toFixed(2)),
    lo:  parseFloat(lo.toFixed(2)),
    vol: vol, bucketSize: bucketSize,
    maxVol: maxVol,
  };
}

function detectRange(prices) {
  // Detects if market is in a sideways range (last 20 days)
  if(!prices||prices.length<20) return null;
  var slice=prices.slice(-20);
  var highs=slice.map(function(p){return p.high||p.close;});
  var lows=slice.map(function(p){return p.low||p.close;});
  var hi=Math.max.apply(null,highs);
  var lo=Math.min.apply(null,lows);
  var last=prices[prices.length-1].close;
  var rngPct=(hi-lo)/lo*100;
  var isRange=rngPct<8; // Less than 8% range = sideways
  var midPct=(last-lo)/(hi-lo); // Where in range is price now (0=bottom, 1=top)
  return {
    isRange: isRange,
    hi: parseFloat(hi.toFixed(2)),
    lo: parseFloat(lo.toFixed(2)),
    rangePct: parseFloat(rngPct.toFixed(1)),
    midPct: parseFloat(midPct.toFixed(2)),
    target: parseFloat(hi.toFixed(2)),  // Range target = top of range
    inBuyZone: midPct<0.3,             // Bottom 30% = buy zone
    inSellZone: midPct>0.7,            // Top 30% = sell zone
  };
}

function detectSLIT(prices) {
  // SLIT ã false breakout detection (Tipo 1, 2, 3)
  if(!prices||prices.length<10) return null;
  var n=prices.length;
  var last=prices[n-1];
  var prev=prices[n-2];
  var prev2=prices[n-3];
  var prev3=prices[n-4];

  var results=[];

  // SLIT Tipo 1 ã Price breaks below recent low then reverses
  var recentLow=Math.min.apply(null,prices.slice(-10,-1).map(function(p){return p.low||p.close;}));
  var brokeDown=(prev.low||prev.close)<recentLow;
  var reversed=last.close>(prev.close+(Math.abs(prev.close-recentLow)*0.5));
  if(brokeDown&&reversed&&last.close>prev.close){
    results.push({type:1,strength:70,
      desc:'SLIT Tipo 1 ã Falso rompimiento bajo mûÙnimo reciente. Stops cazados, precio revierte al alza.',
      signal:'Entrada de alta probabilidad ã el mercado ha cazado stops y ahora sube libre de presiû°n vendedora.'});
  }

  // SLIT Tipo 3 ã False break + strong reversal candle
  var hasReversal=(last.close-last.low)/(( last.high-last.low)||0.001)>0.7; // Strong bull close
  var hadFalseBreak=prev.close<prices[n-5]?.close*0.99&&last.close>prev.close*1.02;
  if(hadFalseBreak&&hasReversal){
    results.push({type:3,strength:85,
      desc:'SLIT Tipo 3 ã Falso rompimiento con vela de reversiû°n fuerte. MûÀximo setup institucional.',
      signal:'SeûÝal de muy alta convicciû°n. Los institucionales han cazado stops y aceleran al alza.'});
  }

  return results.length?{detected:true,patterns:results,strongest:results.reduce(function(a,b){return b.strength>a.strength?b:a;})}:null;
}

function calcFibLevels(prices) {
  // Find swing high and low in last 60 days
  if(!prices||prices.length<20) return null;
  var n=prices.length;
  var slice=prices.slice(Math.max(0,n-60));
  var hi=slice[0].high||slice[0].close, lo=slice[0].low||slice[0].close;
  var hiIdx=0, loIdx=0;
  for(var i=1;i<slice.length;i++){
    var h=slice[i].high||slice[i].close;
    var l=slice[i].low||slice[i].close;
    if(h>hi){hi=h;hiIdx=i;}
    if(l<lo){lo=l;loIdx=i;}
  }
  var rng=hi-lo;
  // Determine if retracing from high or from low
  var isRetrace=loIdx<hiIdx; // low came before high = price went up then retracing
  return {
    hi:hi, lo:lo,
    r236: parseFloat((hi-rng*0.236).toFixed(2)),
    r382: parseFloat((hi-rng*0.382).toFixed(2)),
    r500: parseFloat((hi-rng*0.500).toFixed(2)),
    r618: parseFloat((hi-rng*0.618).toFixed(2)),
    r786: parseFloat((hi-rng*0.786).toFixed(2)),
    isRetrace: isRetrace,
  };
}

function calcPositionSize(capital, riskPct, atr, multiplier, fxRate) {
  // Turtle-ORS: shares = (capital * riskPct) / (multiplier * ATR * fxRate)
  riskPct = riskPct || 0.02;
  multiplier = multiplier || 1.5;
  fxRate = fxRate || 1.08; // EUR to USD approx
  if(!atr||atr<=0) return null;
  var riskEur = capital * riskPct;
  var riskUsd = riskEur * fxRate;
  var shares = Math.floor(riskUsd / (multiplier * atr));
  return {
    shares: shares,
    riskEur: parseFloat(riskEur.toFixed(0)),
    riskUsd: parseFloat(riskUsd.toFixed(0)),
    stopDist: parseFloat((multiplier * atr).toFixed(2)),
    atr: parseFloat(atr.toFixed(2)),
  };
}

function calcRSI(prices,period){
  // Wilder smoothing ã identico a TradingView Pine Script
  if(!prices||prices.length<period+2)return null;
  var gains=[], losses=[], i, d;
  for(i=1;i<prices.length;i++){
    d=prices[i].close-prices[i-1].close;
    gains.push(d>0?d:0);
    losses.push(d<0?-d:0);
  }
  if(gains.length<period)return null;
  // Primera media simple (seed)
  var avgG=0, avgL=0;
  for(i=0;i<period;i++){ avgG+=gains[i]; avgL+=losses[i]; }
  avgG/=period; avgL/=period;
  // Wilder smoothing para el resto
  for(i=period;i<gains.length;i++){
    avgG=(avgG*(period-1)+gains[i])/period;
    avgL=(avgL*(period-1)+losses[i])/period;
  }
  if(avgL===0)return 100;
  var rs=avgG/avgL;
  return parseFloat((100-(100/(1+rs))).toFixed(2));
}
function calcEMA(prices,period){
  if(!prices||prices.length<period)return null;
  var k=2/(period+1),ema=prices[prices.length-period].close;
  for(var i=prices.length-period+1;i<prices.length;i++)ema=prices[i].close*k+ema*(1-k);
  return ema;
}
function calcMomentum(prices){
  if(!prices||prices.length<61)return{m5:0,m20:0,m60:0};
  var last=prices[prices.length-1].close;
  return{
    m5:  prices.length>5  ? parseFloat(((last-prices[prices.length-6].close)/prices[prices.length-6].close*100).toFixed(2)):0,
    m20: parseFloat(((last-prices[prices.length-21].close)/prices[prices.length-21].close*100).toFixed(2)),
    m60: parseFloat(((last-prices[prices.length-61].close)/prices[prices.length-61].close*100).toFixed(2)),
  };
}

// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
// MACD ã Moving Average Convergence Divergence
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function calcMACD(prices, fast, slow, signal) {
  fast=fast||12; slow=slow||26; signal=signal||9;
  if(!prices||prices.length<slow+signal+1) return null;
  var kf=2/(fast+1), ks=2/(slow+1), i;
  // EMA rapida ã arranca desde vela 0
  var emaFast=prices[0].close;
  var emaFastArr=[];
  for(i=1;i<prices.length;i++){
    emaFast=prices[i].close*kf+emaFast*(1-kf);
    emaFastArr.push(emaFast);
  }
  // EMA lenta ã arranca desde vela 0
  var emaSlow=prices[0].close;
  var emaSlowArr=[];
  for(i=1;i<prices.length;i++){
    emaSlow=prices[i].close*ks+emaSlow*(1-ks);
    emaSlowArr.push(emaSlow);
  }
  // Linea MACD = EMA rapida - EMA lenta
  var macdLine=[];
  for(i=slow-2;i<emaFastArr.length;i++){
    macdLine.push(emaFastArr[i]-emaSlowArr[i]);
  }
  if(macdLine.length<signal) return null;
  // Signal line ã EMA de 9 periodos sobre MACD
  var ks2=2/(signal+1);
  var sigVal=macdLine[0];
  var sigArr=[sigVal];
  for(i=1;i<macdLine.length;i++){
    sigVal=macdLine[i]*ks2+sigVal*(1-ks2);
    sigArr.push(sigVal);
  }
  var lastMACD=macdLine[macdLine.length-1];
  var lastSig=sigArr[sigArr.length-1];
  var prevMACD=macdLine[macdLine.length-2];
  var prevSig=sigArr[sigArr.length-2];
  var hist=lastMACD-lastSig;
  var prevHist=prevMACD-prevSig;
  var bullCross=prevMACD<=prevSig&&lastMACD>lastSig;
  var bearCross=prevMACD>=prevSig&&lastMACD<lastSig;
  var bullish=lastMACD>lastSig;
  return{
    macd:+lastMACD.toFixed(4), signal:+lastSig.toFixed(4),
    hist:+hist.toFixed(4), prevHist:+prevHist.toFixed(4),
    bullCross:bullCross, bearCross:bearCross,
    bullish:bullish,
    increasing:hist>prevHist,
    color:bullish?'var(--signal)':'var(--bear)',
  };
}

// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
// WILLIAMS %R ã confirma sobreventa mejor que RSI
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function calcWilliamsR(prices, period) {
  period=period||14;
  if(!prices||prices.length<period) return null;
  var slice=prices.slice(-period);
  var highs=slice.map(function(p){return p.high||p.close;});
  var lows =slice.map(function(p){return p.low ||p.close;});
  var hh=Math.max.apply(null,highs);
  var ll=Math.min.apply(null,lows);
  var last=prices[prices.length-1].close;
  if(hh===ll) return -50;
  var wr=((hh-last)/(hh-ll))*-100;
  return +wr.toFixed(2);
}

// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
// OBV ã On Balance Volume (calculado con datos reales)
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
// ãã MONEY FLOW INDEX ãããããããããããããããããããããããããããããããããã
function calcMFI(prices, period) {
  period = period || 14;
  if(!prices||prices.length<period+1) return null;
  var posFlow=0, negFlow=0;
  for(var i=prices.length-period;i<prices.length;i++){
    var tp=(( prices[i].high||prices[i].close)+(prices[i].low||prices[i].close)+prices[i].close)/3;
    var tpPrev=((prices[i-1].high||prices[i-1].close)+(prices[i-1].low||prices[i-1].close)+prices[i-1].close)/3;
    var vol=prices[i].volume||1;
    var mf=tp*vol;
    if(tp>tpPrev) posFlow+=mf;
    else negFlow+=mf;
  }
  if(negFlow===0) return 100;
  var mfr=posFlow/negFlow;
  var mfi=parseFloat((100-(100/(1+mfr))).toFixed(2));
  return {
    value: mfi,
    bullish: mfi<40,   // oversold = bullish signal
    overbought: mfi>80,
    color: mfi<40?'var(--signal)':mfi>80?'var(--bear)':'var(--sub)',
  };
}

function calcOBV(prices) {
  if(!prices||prices.length<10) return null;
  var hasVol=prices.some(function(p){return p.volume&&p.volume>0;});
  if(!hasVol) return null;

  // Build OBV series (same formula as TradingView)
  var obv=0, obvSeries=[];
  for(var i=1;i<prices.length;i++){
    var vol=prices[i].volume||0;
    if(prices[i].close>prices[i-1].close) obv+=vol;
    else if(prices[i].close<prices[i-1].close) obv-=vol;
    obvSeries.push(obv);
  }
  var n=obvSeries.length;

  // ãã TradingView-compatible OBV trend detection ãã
  // Instead of comparing absolute OBV to its average (which depends on history length),
  // we look at the SLOPE of OBV over recent bars ã same as TradingView
  var period=14; // match TradingView default
  var recentBars=Math.min(period, n);
  var recent=obvSeries.slice(-recentBars);

  // Linear regression slope on recent OBV bars
  var sumX=0,sumY=0,sumXY=0,sumX2=0,nb=recent.length;
  for(var j=0;j<nb;j++){
    sumX+=j; sumY+=recent[j]; sumXY+=j*recent[j]; sumX2+=j*j;
  }
  var slope=(nb*sumXY-sumX*sumY)/(nb*sumX2-sumX*sumX||1);

  // OBV is bullish if slope is positive (rising) over last 14 bars
  var bullish=slope>0;

  // Also check: OBV last 3 bars rising (short-term momentum)
  var rising=n>=3&&obvSeries[n-1]>obvSeries[n-3];

  // Trend over last 20 bars as percentage
  var trend20=n>=20?(obvSeries[n-1]-obvSeries[n-20])/Math.abs(obvSeries[n-20]||1)*100:slope*100;

  return{
    value:obvSeries[n-1],
    avg10:obvSeries.slice(-10).reduce(function(a,b){return a+b;},0)/10,
    bullish:bullish,       // TradingView-compatible: slope-based
    rising:rising,         // Short term: last 3 bars rising
    slope:+slope.toFixed(0),
    trend20:+trend20.toFixed(1),
  };
}

// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
// BACKTESTING ENGINE
// Simula seûÝales ORS en histû°rico de 2 aûÝos
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function runBacktest(sym) {
  var tk=DB.tickers[sym];
  if(!tk||!tk.prices||tk.prices.length<50) return null;
  var prices=tk.prices;
  var results=[], wins=0, losses=0, totalPnl=0;
  var holdDays=3; // swing 1-3 dûÙas ã usamos 3 como promedio

  // Simulate ORS signals across history
  for(var i=30;i<prices.length-holdDays-1;i++){
    var slice=prices.slice(0,i+1);
    var rsi=calcRSI(slice,14);
    var ema=calcEMA(slice,20);
    var last=slice[slice.length-1].close;
    var prev=slice[slice.length-2]?slice[slice.length-2].close:last;
    var macd=calcMACD(slice);
    var wr=calcWilliamsR(slice,14);

    // Simulate ORS-v2 conditions:
    // RSI cruz.30 (was below 30, now above)
    var rsiPrev=calcRSI(slice.slice(0,-1),14);
    var rsiCruz=rsiPrev&&rsiPrev<30&&rsi&&rsi>30;
    var bajoVwap=ema&&last<ema;
    var macdBullish=macd&&macd.bullish;
    var rsiOk=rsi&&rsi>30&&rsi<45;
    var wrOversold=wr&&wr<-70;

    // Score: 4+ conditions = simulated signal
    var condCount=0;
    if(rsiCruz) condCount++;
    if(bajoVwap) condCount++;
    if(macdBullish) condCount++;
    if(rsiOk) condCount++;
    if(wrOversold) condCount++;

    if(condCount>=4&&rsiCruz) { // Must have RSI cruz
      var entryPrice=prices[i+1]?prices[i+1].close:last;
      var exitIdx=Math.min(i+holdDays,prices.length-1);
      var exitPrice=prices[exitIdx].close;
      var pnl=+((exitPrice-entryPrice)/entryPrice*100).toFixed(2);
      var win=pnl>0;
      if(win) wins++; else losses++;
      totalPnl+=pnl;
      results.push({
        date:prices[i].date, entry:+entryPrice.toFixed(2),
        exit:+exitPrice.toFixed(2), pnl:pnl, win:win,
        rsi:rsi?+rsi.toFixed(1):null, conditions:condCount,
      });
    }
  }

  if(!results.length) return null;
  var total=results.length;
  var wr2=Math.round(wins/total*100);
  var avgPnl=+(totalPnl/total).toFixed(2);
  var avgWin=results.filter(function(r){return r.win;}).reduce(function(s,r){return s+r.pnl;},0)/(wins||1);
  var avgLoss=results.filter(function(r){return !r.win;}).reduce(function(s,r){return s+r.pnl;},0)/((total-wins)||1);
  var profitFactor=avgLoss!==0?+(Math.abs(avgWin/avgLoss)).toFixed(2):999;
  var maxDD=0,peak=0,cumPnl=0;
  results.forEach(function(r){
    cumPnl+=r.pnl;
    if(cumPnl>peak)peak=cumPnl;
    var dd=peak-cumPnl;
    if(dd>maxDD)maxDD=dd;
  });

  return{
    total:total, wins:wins, losses:total-wins,
    winRate:wr2, avgPnl:avgPnl,
    avgWin:+avgWin.toFixed(2), avgLoss:+avgLoss.toFixed(2),
    profitFactor:profitFactor,
    maxDrawdown:+maxDD.toFixed(2),
    totalPnl:+totalPnl.toFixed(2),
    recentResults:results.slice(-10),
    allResults:results,
  };
}

// SIGNAL QUALITY SCORE ã 0 to 100
// Combina TODOS los indicadores en un û¤nico nû¤mero de confianza
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function calcSignalQuality(sym) {

  var stoch=calcStochRSI(prices);
  var macd=calcMACD(prices);
  var bb=calcBollinger(prices);
  var wr=calcWilliamsR(prices,14);
  var obv=calcOBV(prices);
  var mfi=calcMFI(prices,14);
  var ema20=calcEMA(prices,20);
  var ema50val=calcEMAValue(prices,50);
  var sma200val=calcSMA(prices,200);

  var rangeData=detectRange(prices);
  var div=detectRSIDivergence(prices);
  var allLvl=detectAllLevels(prices);
  var candles=detectCandlePatterns(prices);
  var slit=detectSLIT(prices);
  var vol=calcVolumeScore(prices);
  // Derived filters
  var last2=prices[prices.length-1].close;
  var aboveSMA200=sma200val&&last2>sma200val;
  var sma200Dist=sma200val?parseFloat(((last2-sma200val)/sma200val*100).toFixed(1)):null;
  var fibProximity=null;
  if(fibLvl){
    var fibPoints=[{l:fibLvl.r618,n:'61.8%'},{l:fibLvl.r500,n:'50%'},{l:fibLvl.r382,n:'38.2%'},{l:fibLvl.r236,n:'23.6%'}];
    for(var fi=0;fi<fibPoints.length;fi++){
      var fdist=Math.abs(last2-fibPoints[fi].l)/last2*100;
      if(fdist<2.0){fibProximity={level:fibPoints[fi].n,price:fibPoints[fi].l,dist:parseFloat(fdist.toFixed(1))};break;}

  }

  // 1. RSI en zona û°ptima (peso 20)
  var rsiGood=rsi!==null&&rsi>=20&&rsi<=40;
  add('RSI en zona ORS (20-40)', rsi!==null?rsi.toFixed(1):'N/A', 20, rsiGood);

  // 2. Stochastic RSI cruce alcista (peso 18)
  var stochGood=stoch&&(stoch.bullCross||stoch.oversold);
  add('Stoch RSI alcista', stoch?'K:'+stoch.k+' D:'+stoch.d:'N/A', 18, stochGood);

  // 3. MACD alcista (peso 15)

  add('MACD alcista e incrementando', macd?'hist:'+macd.hist:'N/A', 15, macdGood);

  // 4. Precio bajo Bollinger o EMA (peso 12)
  var bollGood=bb&&(bb.nearLower||bb.pct<0.4);
  add('Precio zona baja Bollinger', bb?bb.position:'N/A', 12, bollGood);

  // 5. Williams %R sobreventa (peso 10)
  var wrGood=wr!==null&&wr<=-70;
  add('Williams %R sobreventa', wr!==null?wr:'N/A', 10, wrGood);

  // 6. OBV alcista con volumen (peso 10)
  var obvGood=obv&&obv.bullish&&obv.rising;
  add('OBV alcista', obv?'trend:'+obv.trend20+'%':'Sin vol.', 10, obvGood);

  // 7. Soporte cercano (peso 8)
  var supGood=false;
  var allSups=[];
  ['week','short'].forEach(function(tf){if(allLvl[tf])allLvl[tf].supports.forEach(function(s){allSups.push(s);});});
  var nearSup=allSups.filter(function(s){return s.price<last;}).sort(function(a,b){return b.price-a.price;})[0];
  if(nearSup){var d=(last-nearSup.price)/nearSup.price*100;supGood=d<3;}
  add('Soporte inmediato <3%', nearSup?'$'+nearSup.price:'N/A', 8, supGood);

  // 8. Divergencia alcista RSI (peso 8)
  var divGood=div&&div.type==='ALCISTA';
  add('Divergencia RSI alcista', div?div.type:'Sin divergencia', 8, divGood);

  // 9. Vela alcista de reversiû°n (peso 7)
  var bullCandles=candles.filter(function(c){return c.type==='ALCISTA'&&c.strength>=70;});
  add('Vela alcista fuerte', bullCandles.length?bullCandles[0].name:'Sin vela', 7, bullCandles.length>0);

  // 10. Volumen confirmador (peso 7)
  var volGood=vol.ratio>=1.2;
  add('Volumen sobre media', 'û'+vol.ratio, 7, volGood);

  // 11. Contexto mercado no bajista (peso 5)
  var mktGood=MARKET_CTX.trend!=='BEAR';
  add('Mercado general favorable', MARKET_CTX.trend, 5, mktGood);

  var qualityScore=max>0?Math.round(score/max*100):0;
  var grade=qualityScore>=80?'A':qualityScore>=65?'B':qualityScore>=50?'C':qualityScore>=35?'D':'F';

  return{score:qualityScore, grade:grade, gradeColor:gradeColor, label:label, factors:factors, bullFactors:score/10, totalFactors:max/10};
}


// MûÀs sensible que RSI clûÀsico ã perfecciona el timing
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function calcStochRSI(prices, rsiPeriod, stochPeriod, smoothK, smoothD) {
  rsiPeriod  = rsiPeriod  || 14;
  stochPeriod= stochPeriod|| 14;
  smoothK    = smoothK    || 3;
  smoothD    = smoothD    || 3;
  if(!prices || prices.length < rsiPeriod + stochPeriod + smoothK + smoothD) return null;

  // Build RSI series
  var rsiSeries = [];
  for(var i = rsiPeriod; i < prices.length; i++) {
    var slice = prices.slice(i - rsiPeriod, i + 1);
    var rsiVal = calcRSI(slice, rsiPeriod);
    if(rsiVal !== null) rsiSeries.push(rsiVal);
  }
  if(rsiSeries.length < stochPeriod) return null;

  // Stochastic of RSI
  var stochK = [];
  for(var j = stochPeriod - 1; j < rsiSeries.length; j++) {
    var window = rsiSeries.slice(j - stochPeriod + 1, j + 1);
    var hi = Math.max.apply(null, window);
    var lo = Math.min.apply(null, window);
    var k  = hi === lo ? 50 : (rsiSeries[j] - lo) / (hi - lo) * 100;
    stochK.push(k);
  }

  // Smooth K (SMA)
  var smoothedK = [];
  for(var sk = smoothK - 1; sk < stochK.length; sk++) {
    var sum = 0;
    for(var si = 0; si < smoothK; si++) sum += stochK[sk - si];
    smoothedK.push(sum / smoothK);
  }

  // D = SMA of smoothed K
  var smoothedD = [];
  for(var sd = smoothD - 1; sd < smoothedK.length; sd++) {
    var sum2 = 0;
    for(var di = 0; di < smoothD; di++) sum2 += smoothedK[sd - di];
    smoothedD.push(sum2 / smoothD);
  }

  if(!smoothedK.length || !smoothedD.length) return null;

  var kVal = smoothedK[smoothedK.length - 1];
  var dVal = smoothedD[smoothedD.length - 1];
  var kPrev = smoothedK.length > 1 ? smoothedK[smoothedK.length - 2] : kVal;
  var dPrev = smoothedD.length > 1 ? smoothedD[smoothedD.length - 2] : dVal;

  // Cross detection
  var bullCross = kPrev <= dPrev && kVal > dVal && kVal < 20; // K crosses above D in oversold
  var bearCross = kPrev >= dPrev && kVal < dVal && kVal > 80; // K crosses below D in overbought

  return {
    k:         +kVal.toFixed(2),
    d:         +dVal.toFixed(2),
    bullCross: bullCross,   // ã seûÝal de entrada
    bearCross: bearCross,   // ã seûÝal de salida
    oversold:  kVal < 20,
    overbought:kVal > 80,
    zone: kVal < 20 ? 'SOBREVENTA' : kVal > 80 ? 'SOBRECOMPRA' : kVal < 50 ? 'NEUTRAL-BAJO' : 'NEUTRAL-ALTO',
    color: kVal < 20 ? 'var(--signal)' : kVal > 80 ? 'var(--bear)' : 'var(--sub)',
  };
}

// BOLLINGER BANDS
// Soporte/resistencia dinûÀmica ã confirma entradas ORS
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function calcBollinger(prices, period, stdDev) {
  period = period || 20;
  stdDev = stdDev || 2;
  if(!prices || prices.length < period) return null;

  var slice = prices.slice(-period);
  var cls   = slice.map(function(p){ return p.close; });
  var mean  = cls.reduce(function(a,b){ return a+b; },0) / period;
  var variance = cls.reduce(function(s,v){ return s + Math.pow(v-mean,2); },0) / period;
  var std   = Math.sqrt(variance);

  var upper = +(mean + stdDev * std).toFixed(2);
  var lower = +(mean - stdDev * std).toFixed(2);
  var mid   = +mean.toFixed(2);
  var last  = prices[prices.length-1].close;
  var bandwidth = +((upper - lower) / mid * 100).toFixed(2); // % width
  var pct   = upper === lower ? 0.5 : +((last - lower) / (upper - lower)).toFixed(3); // 0=lower, 1=upper

  // Position interpretation
  var position, posColor;
  if(last <= lower * 1.005) {
    position = 'BANDA INFERIOR'; posColor = 'var(--signal)'; // Zona de compra
  } else if(last >= upper * 0.995) {
    position = 'BANDA SUPERIOR'; posColor = 'var(--bear)';   // Zona de venta
  } else if(pct < 0.35) {
    position = 'ZONA BAJA';      posColor = 'var(--watch)';
  } else if(pct > 0.65) {
    position = 'ZONA ALTA';      posColor = 'var(--watch)';
  } else {
    position = 'ZONA MEDIA';     posColor = 'var(--sub)';
  }

  // Squeeze detection (volatility contraction = breakout incoming)
  var squeeze = bandwidth < 5; // Tight bands = big move coming

  return {
    upper:upper, mid:mid, lower:lower,
    bandwidth:bandwidth, pct:pct,
    position:position, posColor:posColor,
    squeeze:squeeze,
    nearLower: last <= lower * 1.015, // Within 1.5% of lower band
    nearUpper: last >= upper * 0.985, // Within 1.5% of upper band
  };
}

// CANDLESTICK PATTERN DETECTION
// ûltimas 3 velas ã confirmadores de reversiû°n
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function detectCandlePatterns(prices) {
  if(!prices || prices.length < 3) return [];
  var candles = [];
  var n = prices.length;
  var p = prices[n-1]; // û¤ltima vela
  var p2 = prices[n-2];
  var p3 = prices[n-3];

  // Necesitamos high/low para velas japonesas
  // Si no hay OHLC usamos aproximaciû°n con close
  function getHL(candle) {
    return {
      o: candle.open  || candle.close * 0.998,
      h: candle.high  || candle.close * 1.005,
      l: candle.low   || candle.close * 0.995,
      c: candle.close,
    };
  }
  var c1 = getHL(p),  c2 = getHL(p2), c3 = getHL(p3);
  var body1 = Math.abs(c1.c - c1.o);
  var body2 = Math.abs(c2.c - c2.o);
  var range1 = c1.h - c1.l || 0.001;
  var range2 = c2.h - c2.l || 0.001;
  var upperWick1 = c1.h - Math.max(c1.c, c1.o);
  var lowerWick1 = Math.min(c1.c, c1.o) - c1.l;
  var isBull1 = c1.c > c1.o;
  var isBear1 = c1.c < c1.o;
  var isBull2 = c2.c > c2.o;
  var isBear2 = c2.c < c2.o;

  // ãã HAMMER (alcista ã cola larga abajo, cuerpo pequeûÝo arriba) ãã
  if(lowerWick1 > body1 * 2 && upperWick1 < body1 * 0.5 && lowerWick1 > range1 * 0.5) {
    candles.push({
      name:'Hammer', emoji:'Þ´', type:'ALCISTA',
      color:'var(--signal)', date:p.date,
      desc:'Cuerpo pequeûÝo con cola inferior larga ã los vendedores intentaron bajar pero los compradores recuperaron el precio',
      signal:'Posible reversiû°n alcista. Confirmar con volumen y seûÝal ORS.',
      strength: 75,
    });
  }

  // ãã SHOOTING STAR (bajista ã cola larga arriba, cuerpo pequeûÝo abajo) ãã
  if(upperWick1 > body1 * 2 && lowerWick1 < body1 * 0.5 && upperWick1 > range1 * 0.5) {
    candles.push({
      name:'Shooting Star', emoji:'ãÙ', type:'BAJISTA',
      color:'var(--bear)', date:p.date,
      desc:'Cuerpo pequeûÝo con cola superior larga ã los compradores empujaron arriba pero los vendedores dominaron',
      signal:'SeûÝal de techo. Vigilar seûÝal de salida y ajustar stop.',
      strength: 75,
    });
  }

  // ãã DOJI (indecisiû°n) ãã
  if(body1 < range1 * 0.1 && range1 > 0) {
    candles.push({
      name:'Doji', emoji:'ã', type:'NEUTRO',
      color:'var(--watch)', date:p.date,
      desc:'Apertura y cierre casi iguales ã indecisiû°n total entre compradores y vendedores',
      signal:'Momento de pausa. La siguiente vela con volumen marcarûÀ la direcciû°n.',
      strength: 60,
    });
  }

  // ãã BULLISH ENGULFING ãã
  if(isBear2 && isBull1 && c1.o < c2.c && c1.c > c2.o) {
    candles.push({
      name:'Engulfing Alcista', emoji:'Þ₤ÿ¡', type:'ALCISTA',
      color:'var(--signal)', date:p.date,
      desc:'Vela alcista que envuelve completamente la bajista anterior ã inversiû°n fuerte del control',
      signal:'Uno de los patrones de reversiû°n mûÀs fiables. SeûÝal de entrada si hay volumen.',
      strength: 85,
    });
  }

  // ãã BEARISH ENGULFING ãã
  if(isBull2 && isBear1 && c1.o > c2.c && c1.c < c2.o) {
    candles.push({
      name:'Engulfing Bajista', emoji:'Þ₤ÿ¡', type:'BAJISTA',
      color:'var(--bear)', date:p.date,
      desc:'Vela bajista que envuelve completamente la alcista anterior ã los vendedores tomaron control',
      signal:'SeûÝal de distribuciû°n. Vigilar salida o ajustar stop inmediatamente.',
      strength: 85,
    });
  }

  // ãã MORNING STAR (3 velas ã reversiû°n alcista fuerte) ãã
  var c3body = Math.abs(c3.c - c3.o);
  var c3bear = c3.c < c3.o;
  if(c3bear && body2 < c3body * 0.4 && isBull1 && c1.c > (c3.o + c3.c) / 2) {
    candles.push({
      name:'Morning Star', emoji:'Þ', type:'ALCISTA',
      color:'var(--signal)', date:p3.date + ' ã ' + p.date,
      desc:'Patrû°n de 3 velas: gran bajista + vela pequeûÝa de indecisiû°n + gran alcista',
      signal:'Patrû°n de reversiû°n muy fiable. Alta probabilidad de rebote sostenido.',
      strength: 90,
    });
  }

  // ãã EVENING STAR (3 velas ã reversiû°n bajista fuerte) ãã
  var c3bull = c3.c > c3.o;
  if(c3bull && body2 < c3body * 0.4 && isBear1 && c1.c < (c3.o + c3.c) / 2) {
    candles.push({
      name:'Evening Star', emoji:'Þ', type:'BAJISTA',

      signal:'SeûÝal de techo importante. Considerar salida parcial.',
      strength: 90,

  // ãã MARUBOZU ALCISTA (sin mechas ã convicciû°n total) ãã
  if(isBull1 && body1 > range1 * 0.9 && body1 > 0) {
    candles.push({
      name:'Marubozu Alcista', emoji:'Þ', type:'ALCISTA',
      color:'var(--signal)', date:p.date,
      desc:'Vela alcista sin mechas ã los compradores dominaron todo el dûÙa sin retroceso',
      signal:'Fuerte convicciû°n compradora. Momento de momentum favorable.',
      strength: 70,
    });
  }

  return candles;
}

function detectLvlsForPeriod(prices,w){
  if(prices.length<w*2+1)return{supports:[],resistances:[]};
  var cls=[],i,j;
  for(i=0;i<prices.length;i++)cls.push(prices[i].close);
  var raw=[];
  for(i=w;i<cls.length-w;i++){
    var sl=cls.slice(i-w,i+w+1),mn=Math.min.apply(null,sl),mx=Math.max.apply(null,sl);
    if(cls[i]===mn)raw.push({price:cls[i],type:'support'});
    if(cls[i]===mx)raw.push({price:cls[i],type:'resistance'});
  }
  var used=[],merged=[];
  for(i=0;i<raw.length;i++){
    if(used.indexOf(i)>=0)continue;
    var grp=[raw[i]];
    for(j=i+1;j<raw.length;j++){
      if(used.indexOf(j)<0&&Math.abs(raw[j].price-raw[i].price)/raw[i].price<0.025){grp.push(raw[j]);used.push(j);}
    }
    var avg=0;for(var g=0;g<grp.length;g++)avg+=grp[g].price;
    merged.push({price:parseFloat((avg/grp.length).toFixed(2)),type:raw[i].type,strength:grp.length});
  }
  var sup=[],res=[];
  for(i=0;i<merged.length;i++){if(merged[i].type==='support')sup.push(merged[i]);else res.push(merged[i]);}
  sup.sort(function(a,b){return b.strength-a.strength;});
  res.sort(function(a,b){return b.strength-a.strength;});
  return{supports:sup.slice(0,4),resistances:res.slice(0,4)};
}
function detectAllLevels(prices){
  return{
    week:   detectLvlsForPeriod(prices.slice(-7),   2),
    short:  detectLvlsForPeriod(prices.slice(-20),  3),
    mid:    detectLvlsForPeriod(prices.slice(-60),  5),
    long:   detectLvlsForPeriod(prices.slice(-120), 8),
  };
}
function detectLevels(prices){return detectLvlsForPeriod(prices,8);}
function detectRanges(prices){
  if(prices.length<20)return[];
  var ranges=[],w=15,i;
  for(i=0;i<prices.length-w;i++){
    var sl=prices.slice(i,i+w),cls=sl.map(function(p){return p.close;});
    var hi=Math.max.apply(null,cls),lo=Math.min.apply(null,cls);
    if((hi-lo)/lo*100<8)ranges.push({start:prices[i].date,end:prices[i+w-1].date,hi:+hi.toFixed(2),lo:+lo.toFixed(2)});
  }
  return ranges.slice(0,5);
}

// MOMENTUM EXHAUSTION METER
// Mide cuûÀnto "combustible" queda en la subida actual
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function calcMomentumExhaustion(sym) {
  var tk = DB.tickers[sym];
  if (!tk || !tk.prices || tk.prices.length < 30) return null;
  var prices = tk.prices;
  var q = MKT[sym];
  var last = q ? q.price : prices[prices.length-1].close;
  var rsi = calcRSI(prices, 14);
  var stoch = calcStochRSI(prices);
  var bb = calcBollinger(prices);
  var ema20 = calcEMA(prices, 20);
  var macd = calcMACD(prices);
  var vol = calcVolumeScore(prices);
  var mom = calcMomentum(prices);
  var div = detectRSIDivergence(prices);

  var exhaustion = 0; // 0=fresh, 100=exhausted
  var signals = [];
  var fuel = 100; // remaining upside fuel

  // 1. RSI sobrecompra (peso 25)
  if (rsi !== null) {
    if (rsi > 80)      { exhaustion += 25; signals.push({label:'RSI extremo ('+rsi.toFixed(1)+')', weight:25, type:'bear'}); }
    else if (rsi > 70) { exhaustion += 18; signals.push({label:'RSI sobrecomprado ('+rsi.toFixed(1)+')', weight:18, type:'bear'}); }
    else if (rsi > 60) { exhaustion += 8;  signals.push({label:'RSI alto ('+rsi.toFixed(1)+')', weight:8, type:'warn'}); }
    else if (rsi < 40) { exhaustion -= 10; } // still room to go up
  }

  // 2. Stochastic RSI overbought (peso 20)
  if (stoch) {
    if (stoch.bearCross)       { exhaustion += 22; signals.push({label:'Stoch RSI cruce bajista', weight:22, type:'bear'}); }
    else if (stoch.overbought) { exhaustion += 15; signals.push({label:'Stoch RSI sobrecomprado (K:'+stoch.k+')', weight:15, type:'bear'}); }
  }

  // 3. Precio cerca banda superior Bollinger (peso 20)
  if (bb) {
    if (bb.nearUpper)    { exhaustion += 20; signals.push({label:'Precio en banda superior BB ($'+bb.upper+')', weight:20, type:'bear'}); }
    else if (bb.pct > 0.75) { exhaustion += 10; signals.push({label:'Precio zona alta Bollinger ('+Math.round(bb.pct*100)+'%)', weight:10, type:'warn'}); }
  }

  // 4. Extensiû°n sobre EMA20 (peso 15)
  if (ema20 && last) {
    var extPct = (last - ema20) / ema20 * 100;
    if (extPct > 12)     { exhaustion += 15; signals.push({label:'Extendido '+extPct.toFixed(1)+'% sobre EMA20', weight:15, type:'bear'}); }
    else if (extPct > 7) { exhaustion += 8;  signals.push({label:'Extendido '+extPct.toFixed(1)+'% sobre EMA20', weight:8, type:'warn'}); }
    else if (extPct < 0) { exhaustion -= 8; } // below EMA, room to go
  }

  // 5. Volumen decreciente en subida (peso 10)
  if (vol && mom.m5 > 0 && vol.ratio < 0.8) {
    exhaustion += 12;
    signals.push({label:'Subida con volumen bajo (û'+vol.ratio+')', weight:12, type:'warn'});
  }

  // 6. MACD histograma decreciente (peso 10)
  if (macd && macd.bullish && !macd.increasing) {
    exhaustion += 10;
    signals.push({label:'MACD histograma decrece ã impulso pierde fuerza', weight:10, type:'warn'});
  }

  // 7. Divergencia bajista RSI (peso 15)
  if (div && div.type === 'BAJISTA') {
    exhaustion += 15;
    signals.push({label:'Divergencia RSI bajista detectada', weight:15, type:'bear'});
  }

  exhaustion = Math.max(0, Math.min(100, exhaustion));
  fuel = 100 - exhaustion;

  // Verdict
  var verdict, verdictColor, action;
  if (exhaustion >= 70) {
    verdict = 'ÞÇ SUBIDA AGOTADA'; verdictColor = 'var(--bear)';
    action = 'Considerar venta o ajuste de stop. Riesgo de correcciû°n alto.';
  } else if (exhaustion >= 45) {
    verdict = 'ÞÀ SEûALES DE CANSANCIO'; verdictColor = 'var(--watch)';
    action = 'Subir stop loss al break-even o a û¤ltimo soporte. Vigilar vela de reversiû°n.';
  } else if (exhaustion >= 25) {
    verdict = 'Þ  MOMENTUM REDUCIENDO'; verdictColor = '#f0804a';
    action = 'Posiciû°n segura por ahora. Preparar stop trailing.';
  } else {
    verdict = 'ÞÂ MOMENTUM ACTIVO'; verdictColor = 'var(--signal)';
    action = 'Subida con fuerza. Mantener posiciû°n y dejar correr.';
  }

  return {
    exhaustion: exhaustion, fuel: fuel,
    verdict: verdict, verdictColor: verdictColor,
    action: action, signals: signals,
  };
}

function calcVolumeScore(prices){
  if(!prices||prices.length<21)return{score:50,ratio:1,label:'Sin datos'};
  var vols=prices.map(function(p){return p.volume||0;});
  var avg20=vols.slice(-21,-1).reduce(function(a,b){return a+b;},0)/20;
  var lastVol=vols[vols.length-1];
  if(!avg20||!lastVol)return{score:50,ratio:1,label:'Sin datos de volumen'};
  var ratio=+(lastVol/avg20).toFixed(2);
  var score=ratio>=2?90:ratio>=1.5?75:ratio>=1?55:ratio>=0.7?40:25;
  var label=ratio>=2?'Muy alto (û'+ratio+')':ratio>=1.5?'Alto (û'+ratio+')':ratio>=1?'Normal (û'+ratio+')':'Bajo (û'+ratio+')';
  return{score:score,ratio:ratio,label:label};
}

  var rsi2=calcRSI(prices.slice(0,n-15+l2.idx+1),14);

}

// FULL ANALYSIS ENGINE

function analyzeSymbol(sym){

  var hhhl=null;

  var ctx=50,ctxReasons=[],ctxBlockers=[];

  var orsCtx=0,orsReasons=[],orsBlockers=[];

  if(mom.m20>=-8&&mom.m20<=8){momScore=80;orsReasons.push('Momentum 20d controlado ('+mom.m20+'%)');}
  else if(mom.m20>8&&mom.m20<=20){momScore=40;}
  else if(mom.m20<-8&&mom.m20>=-20){momScore=50;orsReasons.push('Pullback 20d ('+mom.m20+'%) ã posible rebote');}
  orsCtx+=momScore*0.15;

  // ãã MACD BONUS ãããããããããããããããããããããããããããããããããããããããã
  if(macd){
    if(macd.bullCross){orsCtx=Math.min(100,orsCtx+18);orsReasons.push('MACD cruce alcista ('+macd.macd.toFixed(3)+')');}
    else if(macd.bullish&&macd.increasing){orsCtx=Math.min(100,orsCtx+10);orsReasons.push('MACD alcista e incrementando');}
    else if(macd.bearCross){orsCtx=Math.max(0,orsCtx-12);orsBlockers.push('MACD cruce bajista');}
  }

  // ãã WILLIAMS %R BONUS ããããããããããããããããããããããããããããããããã
  if(williamsR!==null){
    if(williamsR<=-80){orsCtx=Math.min(100,orsCtx+15);orsReasons.push('Williams %R extremo ('+williamsR+') ã sobreventa fuerte');}
    else if(williamsR<=-70){orsCtx=Math.min(100,orsCtx+8);orsReasons.push('Williams %R en sobreventa ('+williamsR+')');}
    else if(williamsR>=-20){orsCtx=Math.max(0,orsCtx-10);orsBlockers.push('Williams %R sobrecomprado ('+williamsR+')');}
  }

  // ãã OBV CONFIRMATION ãããããããããããããããããããããããããããããããããã
  if(obv){
    if(obv.bullish&&obv.rising){orsCtx=Math.min(100,orsCtx+12);orsReasons.push('OBV alcista ã acumulaciû°n institucional');}
    else if(!obv.bullish){orsCtx=Math.max(0,orsCtx-8);orsBlockers.push('OBV bajista ã distribuciû°n en curso');}
  }

  // ãã DIVERGENCE BONUS ãããããããããããããããããããããããããããããããããã
  if(divergence){
    if(divergence.type==='ALCISTA'){orsCtx=Math.min(100,orsCtx+15);orsReasons.push('Divergencia RSI alcista ã agotamiento bajista');}
    else if(divergence.type==='BAJISTA'){orsCtx=Math.max(0,orsCtx-12);orsBlockers.push('Divergencia RSI bajista ã agotamiento alcista');}
  }
  var stochBonus=0;
  if(stochRsi){
    if(stochRsi.bullCross){
      stochBonus=25;orsReasons.push('ãÙ Stoch RSI: cruce alcista en sobreventa (K:'+stochRsi.k+' D:'+stochRsi.d+')');
    } else if(stochRsi.oversold){
      stochBonus=15;orsReasons.push('Stoch RSI en sobreventa ('+stochRsi.k+') ã timing de entrada');
    } else if(stochRsi.bearCross||stochRsi.overbought){
      stochBonus=-10;orsBlockers.push('Stoch RSI sobrecomprado ('+stochRsi.k+')');
    }
  }
  orsCtx=Math.min(100,orsCtx+stochBonus);

  // ãã BOLLINGER BANDS BONUS ããããããããããããããããããããããããããããã
  var bollBonus=0;
  if(bollinger){
    if(bollinger.nearLower){
      bollBonus=20;orsReasons.push('Precio en banda inferior Bollinger ($'+bollinger.lower+') ã zona de rebote');
    } else if(bollinger.nearUpper){
      bollBonus=-15;orsBlockers.push('Precio en banda superior Bollinger ($'+bollinger.upper+') ã sobreextendido');
    }
    if(bollinger.squeeze){
      orsReasons.push('Squeeze Bollinger ã breakout inminente, preparar entrada');
    }
  }
  var bullCandles=candles.filter(function(c){return c.type==='ALCISTA';});
  var bearCandles=candles.filter(function(c){return c.type==='BAJISTA';});
  if(bullCandles.length){
    var strongest=bullCandles.reduce(function(a,b){return b.strength>a.strength?b:a;});
    orsCtx=Math.min(100,orsCtx+Math.round(strongest.strength*0.15));
    orsReasons.push(strongest.emoji+' Vela '+strongest.name+' ('+strongest.date+')');
  }
  if(bearCandles.length){
    var strongestB=bearCandles.reduce(function(a,b){return b.strength>a.strength?b:a;});
    orsCtx=Math.max(0,orsCtx-Math.round(strongestB.strength*0.1));
    orsBlockers.push(strongestB.emoji+' Vela bajista: '+strongestB.name);
  }

  // ãã SLIT BONUS ã False breakout reversal ãããããããããããã
  if(slit&&slit.detected){
    var slitStr=slit.strongest.strength;
    orsCtx=Math.min(100,orsCtx+Math.round(slitStr*0.18));
    orsReasons.push('ãÀ SLIT Tipo '+slit.strongest.type+' detectado ã '+slit.strongest.desc.slice(0,60));
  }

  // ãã MFI BONUS ãããããããããããããããããããããããããããããããããããããã
  if(mfi&&mfi.bullish){
    orsCtx=Math.min(100,orsCtx+8);
    orsReasons.push('MFI en sobreventa ('+mfi.value+') ã acumulaciû°n institucional confirmada');
  }
  if(mfi&&mfi.overbought){
    orsCtx=Math.max(0,orsCtx-10);
    orsBlockers.push('MFI sobrecomprado ('+mfi.value+') ã flujo monetario agotado');
  }

  // ãã EARNINGS RISK FILTER ãããããããããããããããããããããããããããããã
  if(earnings.risk){
    orsCtx=Math.max(0,orsCtx-20);
    ctx=Math.max(0,ctx-15);
    orsBlockers.push('ã ÿ¡ EARNINGS en '+earnings.daysAway+' dûÙas ('+earnings.date+') ã riesgo elevado');
  }

  orsCtx=Math.round(Math.max(0,Math.min(100,orsCtx)));
  if(activeBearish.length) orsCtx=Math.max(0,orsCtx-20);

  // ãã PHASE CLASSIFICATION ãããããããããããããããããããããããããããããã
  // ãã UNIFIED SCORE: ORSû60% + CTXû40% ãããããããããããããã
  var unifiedScore=Math.round(orsCtx*0.6+ctx*0.4);

  // Phase ã same logic both tabs now use unifiedScore
  var phase;
  if(unifiedScore>=65&&orsCtx>=60&&!activeBearish.length&&rsi!==null&&rsi<=45){
    phase=PHASES.SIGNAL;
  } else if(unifiedScore>=50&&!activeBearish.length){
    phase=PHASES.WATCH;
  } else if(unifiedScore>=30){
    phase=PHASES.RADAR;
  } else {
    phase=PHASES.NO;
  }

  // oppScore = unifiedScore for consistent ranking across all tabs
  var oppScore=unifiedScore;
  if(activeBearish.length) oppScore=Math.max(0,oppScore-20);
  if(wr!==null&&trades.length>=3) oppScore=Math.round(oppScore*0.9+wr*0.1);

  // Apply market context filter
  if(MARKET_CTX.loaded){
    oppScore=Math.round(oppScore*MARKET_CTX.filter);
    if(MARKET_CTX.trend==='BEAR'&&phase.key==='SIGNAL') phase=PHASES.WATCH;
  }

  return{
    sym:sym, phase:phase, oppScore:oppScore,
    ctx:ctx, orsCtx:orsCtx, unifiedScore:unifiedScore,
    rsi:rsi!==null?+rsi.toFixed(1):null, rsiScore:rsiScore, rsiLabel:rsiLabel, rsiColor:rsiColor,
    ema20:ema20?+ema20.toFixed(2):null, emaLabel:emaLabel, emaColor:emaColor,
    ema50:ema50val?+ema50val.toFixed(2):null,
    sma200:sma200val?+sma200val.toFixed(2):null,
    aboveSMA200:aboveSMA200,
    sma200Dist:sma200Dist,
    fib:fibLvl,

    vp:calcVolumeProfile(prices),
    atr:atr?+atr.toFixed(2):null, atrPct:atrPct?+atrPct.toFixed(2):null, range:rangeData,
    macd:macd, williamsR:williamsR, obv:obv, mfi:mfi, divergence:divergence,
    mom:mom, closestSup:closestSup, minSupDist:minSupDist<999?+minSupDist.toFixed(1):null,
    allLvl:allLvl, patterns:patterns,
    stochRsi:stochRsi, bollinger:bollinger, candles:candles, slit:slit, earnings:earnings,
    activeBullish:activeBullish, activeBearish:activeBearish,
    orsReasons:orsReasons, orsBlockers:orsBlockers, ctxBlockers:ctxBlockers,
    wr:wr, trades:trades.length, last:last, using15:using15, bars15:bars15count, hhhl:hhhl, gap:gapData,
    mfi:mfi, slit:slit,

    aboveSMA200:aboveSMA200,
    sma200Dist:sma200Dist,
    fib:fibLvl,
    fibProximity:fibProximity,
    unifiedScore:unifiedScore,
  };
}

function getRanking(){
  return Object.keys(DB.tickers).map(function(sym){return analyzeSymbol(sym);})
    .filter(function(a){return a!==null;})
    .sort(function(a,b){

      return b.oppScore-a.oppScore;
    });
}

// ãã ALPACA DATA FUNCTIONS ããããããããããããããããããããããããããããã
// Reemplaza Yahoo Finance con datos en tiempo real de Alpaca

function fetchAlpacaDaily(sym, cb) {
  // Histû°rico diario desde Alpaca (~2 aûÝos)
  // Servidor devuelve { sym, bars:[], count } ã bars tiene open/high/low/close reales
  fetch(PROXY+'/alpaca/bars/daily?sym='+sym+'&limit=504')
    .then(function(r){return r.json();})
    .then(function(d){
      // Servidor devuelve d.bars (no d.prices)
      var bars = d.bars || d.prices || [];
      if(!bars.length){
        fetchYahooFallback(sym,'2y',cb);
        return;
      }
      // Normalizar: bars ya tienen {date, open, high, low, close, volume, vwap}
      var prices = bars.map(function(b){
        return {
          date:   b.date,
          open:   parseFloat((b.open||b.close||0).toFixed(2)),
          high:   parseFloat((b.high||b.close||0).toFixed(2)),
          low:    parseFloat((b.low||b.close||0).toFixed(2)),
          close:  parseFloat((b.close||0).toFixed(2)),
          volume: b.volume||0,
        };
      }).filter(function(p){ return p.close > 0; });
      if(!prices.length){ fetchYahooFallback(sym,'2y',cb); return; }
      // Construir quote desde û¤ltima barra
      var last = prices[prices.length-1];
      var prev = prices.length>1 ? prices[prices.length-2] : last;
      var chg = last.close - prev.close;
      var chgPct = prev.close ? chg/prev.close*100 : 0;
      var quote = {
        price:     last.close,
        open:      last.open,
        high:      last.high,
        low:       last.low,
        change:    parseFloat(chg.toFixed(2)),
        changePct: parseFloat(chgPct.toFixed(2)),
        volume:    last.volume,
        source:    'alpaca',
      };
      cb(prices, quote);
    })
    .catch(function(e){ fetchYahooFallback(sym,'2y',cb); });
}

function fetchAlpacaSnapshots(syms, cb) {
  // Precios en tiempo real de mû¤ltiples sûÙmbolos
  var symStr=syms.join(',');
  fetch(PROXY+'/alpaca/snapshots?syms='+symStr)
    .then(function(r){return r.json();})
    .then(function(d){cb(d);})
    .catch(function(){cb({});});
}

// Yahoo como fallback (por si Alpaca falla)
function parseYahoo(d){
  var res=d&&d.chart&&d.chart.result&&d.chart.result[0];if(!res)return null;
  var ts=res.timestamp,q0=res.indicators.quote[0],meta=res.meta;
  var prices=[];
  for(var i=0;i<ts.length;i++){
    if(!q0.close[i])continue;
    var dt=new Date(ts[i]*1000);
    prices.push({date:dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2),open:q0.open?+q0.open[i].toFixed(2):q0.close[i],close:+q0.close[i].toFixed(2),high:q0.high[i]||q0.close[i],low:q0.low[i]||q0.close[i],volume:q0.volume?q0.volume[i]:0});
  }
  var cp=meta.regularMarketPrice||q0.close[q0.close.length-1];
  var pc=meta.chartPreviousClose||meta.previousClose||q0.close[q0.close.length-2]||cp;
  var chg=cp-pc,chgPct=pc?chg/pc*100:0;
  // Sanity filter: Yahoo a veces da datos corruptos con cambios imposibles (>15% en un dia normal)
  if(Math.abs(chgPct)>15){chg=0;chgPct=0;}
  return{prices:prices,quote:{price:+cp.toFixed(2),change:+chg.toFixed(2),changePct:+chgPct.toFixed(2),high:meta.regularMarketDayHigh||cp,low:meta.regularMarketDayLow||cp,source:'yahoo'}};
}
function fetchYahooFallback(sym,range,cb){
  fetch(PROXY+'/yahoo?sym='+sym+'&range='+range)
    .then(function(r){return r.json();})
    .then(function(d){var p=parseYahoo(d);if(!p||!p.prices.length){cb(null);return;}cb(p.prices,p.quote);})
    .catch(function(){cb(null);});
}
// Alias para compatibilidad con cû°digo existente
function fetchYahoo(sym,range,cb){
  if(range==='2y'||range==='1y'){
    fetchAlpacaDaily(sym,cb);
  } else {
    fetchYahooFallback(sym,range,cb);
  }
}

// ãã INTRADAY 15min DATA ããããããããããããããããããããããããããããããã
var INTRADAY = {}; // sym -> {prices15, ts}

function fetchIntraday(sym, cb) {
  var now = Date.now();
  var cached = INTRADAY[sym];
  // Cache 3 minutos en horario de mercado
  if (cached && now - cached.ts < 3*60*1000) { if(cb) cb(cached.prices15); return; }
  // Usar Alpaca para datos 15min reales via proxy
  (function(){
    var startD=new Date(); startD.setDate(startD.getDate()-7);
    var startStr=startD.toISOString().split('T')[0];
    return fetch(PROXY+'/alpaca/bars/15min?sym='+encodeURIComponent(sym)+'&limit=200&start='+startStr);
  }())
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){
      var bars = d.bars || [];
      if (!bars.length) {
        // Fallback Yahoo
        fetch(PROXY+'/yahoo?sym='+sym+'&range=5d&interval=15m')
          .then(function(r2){return r2.json();})
          .then(function(d2){
            var res=d2&&d2.chart&&d2.chart.result&&d2.chart.result[0];
            if(!res){cb(null);return;}
            var ts=res.timestamp,q0=res.indicators.quote[0];
            var prices15=[];
            for(var i=0;i<ts.length;i++){
              if(!q0.close[i])continue;
              var dt=new Date(ts[i]*1000);
              prices15.push({date:dt.toISOString().slice(0,16).replace('T',' '),open:q0.open?+q0.open[i].toFixed(2):q0.close[i],close:+q0.close[i].toFixed(2),high:q0.high[i]||q0.close[i],low:q0.low[i]||q0.close[i],volume:q0.volume?q0.volume[i]:0});
            }
            INTRADAY[sym]={prices15:prices15,ts:now,source:'yahoo'};
            cb(prices15);
          }).catch(function(){cb(null);});
        return;
      }
      INTRADAY[sym] = { prices15: bars, ts: now, source: 'alpaca' };
      cb(bars);
    })
    .catch(function(){cb(null);});
}
function loadQuotes(){
  var syms=Object.keys(DB.tickers);
  if(!syms.length)return;
  // Alpaca snapshots: todos los precios en UNA sola peticiû°n (mûÀs rûÀpido y eficiente)
  fetchAlpacaSnapshots(syms, function(data){
    var updated=false;
    syms.forEach(function(sym){
      if(data[sym]){
        MKT[sym]=data[sym];
        updated=true;
      }
    });
    if(updated) render();
    // Si algû¤n ticker no vino en el snapshot, fallback individual
    syms.forEach(function(sym){

        fetchYahooFallback(sym,'5d',function(prices,q){if(q){MKT[sym]=q;render();}});
      }
    });
  });
}

function callClaude(prompt,sys,cb){
  // Key is stored securely in Render proxy env variable
  // Never expose key in client-side code
  fetch(PROXY+'/claude',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,system:sys,messages:[{role:'user',content:prompt}]})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.error){cb('Error: '+d.error.message);return;}
    if(d.type==='error'){cb('Error: '+(d.error?d.error.message:JSON.stringify(d).slice(0,100)));return;}
    var txt='';
    if(d.content)for(var i=0;i<d.content.length;i++)if(d.content[i].text)txt+=d.content[i].text;
    cb(txt||'Sin respuesta.');
  })
  .catch(function(e){cb('Error conexion proxy: '+e.message);});
}

function sendTG(msg, cb){
  // Route through our Render proxy to avoid browser CORS blocks
  fetch(PROXY+'/telegram', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token: TG_TOK, chat_id: TG_CHAT, text: msg})

}

// EXIT SIGNAL SYSTEM
// Basado en: RSI>70 bajando, Divergencia RSI, OBV bajista,
// MACD cruce bajista, precio cerca de resistencia
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function calcExitSignal(sym, entryPrice) {
  var tk = DB.tickers[sym];
  if (!tk || !tk.prices || tk.prices.length < 20) return null;
  var prices = tk.prices;
  var n = prices.length;
  var last = MKT[sym] ? MKT[sym].price : prices[n-1].close;
  var rsi = calcRSI(prices, 14);
  var mom = calcMomentum(prices);
  var allLvl = detectAllLevels(prices);
  var atr = calcATR(prices, 14);
  var signals = [];
  var score = 0;

  // 1. RSI > 70 ã alerta
  if (rsi !== null && rsi > 70) {
    score += 25;
    signals.push({label:'RSI > 70 bajando', weight:'ã ÿ¡ Alerta', color:'var(--watch)', detail:'RSI actual: '+rsi.toFixed(1)});
  } else if (rsi !== null && rsi > 65) {
    score += 12;
    signals.push({label:'RSI acercûÀndose a sobrecompra', weight:'Þ Vigilar', color:'var(--blue)', detail:'RSI: '+rsi.toFixed(1)+' ã cerca de zona peligrosa'});
  }

  // 2. Divergencia RSI (precio sube pero RSI baja en û¤ltimas 10 velas)
  if (n >= 15) {
    var cls10 = prices.slice(n-10).map(function(p){return p.close;});
    var rsiRecent = calcRSI(prices.slice(0, n-5), 14);
    var priceTrend = cls10[cls10.length-1] - cls10[0];
    var rsiTrend = rsi !== null && rsiRecent !== null ? rsi - rsiRecent : 0;
    if (priceTrend > 0 && rsiTrend < -3) {
      score += 30;
      signals.push({label:'Divergencia RSI bajista', weight:'ÞÇ Fuerte', color:'var(--bear)', detail:'Precio subiendo pero RSI bajando ã seûÝal de agotamiento'});
    }
  }

  // 3. Momentum 5d negativo mientras posiciû°n en beneficio
  if (entryPrice && last > entryPrice && mom.m5 < -1.5) {
    score += 20;
    signals.push({label:'Momentum 5d girando negativo', weight:'ÞÇ Fuerte', color:'var(--bear)', detail:'Corto plazo debilitûÀndose ('+mom.m5+'%) con posiciû°n en beneficio'});
  }

  // 4. Precio cerca de resistencia corto plazo (dentro del 2%)
  var allRes = [];
  ['week','short','mid'].forEach(function(tf){
    if(allLvl[tf]) allLvl[tf].resistances.forEach(function(r){ allRes.push(r); });
  });
  allRes.forEach(function(r){
    var distPct = (r.price - last) / last * 100;
    if (distPct >= 0 && distPct < 2) {
      score += 25;
      signals.push({label:'Resistencia cercana', weight:'ÞÇ Confirma', color:'var(--bear)', detail:'$'+r.price+' a solo '+distPct.toFixed(1)+'% (û'+r.strength+' toques previos)'});
    }
  });

  // 5. Patrû°n de techo (doble techo o bandera bajista activos)
  var patterns = detectPatterns(prices);
  patterns.filter(function(p){
    return p.isActive && (p.type==='DOBLE TECHO'||p.type==='BANDERA BAJISTA'||p.type==='RUPTURA BAJISTA');
  }).forEach(function(p){
    score += 20;
    signals.push({label:'Patrû°n: '+p.type, weight:'ÞÇ Confirma', color:'var(--bear)', detail:p.desc});
  });

  // 6. P&L actual si hay precio de entrada
  var pnlActual = entryPrice ? pnlPct(entryPrice, last) : null;

  // Nivel de urgencia
  var urgency, urgencyColor, urgencyLabel;
  if (score >= 60) {
    urgency = 'SALIR_AHORA'; urgencyColor = 'var(--bear)';
    urgencyLabel = 'ÞÇ SALIR AHORA ã '+score+'pts coinciden';
  } else if (score >= 35) {
    urgency = 'AJUSTAR_STOP'; urgencyColor = 'var(--watch)';
    urgencyLabel = 'ÞÀ AJUSTAR STOP ã '+score+'pts coinciden';
  } else if (score >= 15) {
    urgency = 'VIGILAR_SALIDA'; urgencyColor = 'var(--blue)';
    urgencyLabel = 'Þç VIGILAR SALIDA ã '+score+'pts';
  } else {
    urgency = 'MANTENER'; urgencyColor = 'var(--signal)';
    urgencyLabel = 'ÞÂ MANTENER POSICIûN';
  }

  // Trailing stop sugerido (basado en ATR)
  var trailingStop = null;
  if (atr && last) {
    trailingStop = parseFloat((last - atr * 1.2).toFixed(2));
  }

  return {
    score: score, urgency: urgency,
    urgencyLabel: urgencyLabel, urgencyColor: urgencyColor,
    signals: signals, pnlActual: pnlActual,
    trailingStop: trailingStop, last: last, rsi: rsi,
  };
}

function checkExits(){
  var openTrades=DB.journal.filter(function(t){return t.status==='open'||t.result==='OPEN';});
  openTrades.forEach(function(t){
    var key=t.ticker+'_exit_'+new Date().toDateString()+'_'+t.id;
    if(TG_SENT[key])return;
    var exitSig=calcExitSignal(t.ticker,t.entry);
    if(!exitSig)return;
    if(exitSig.urgency==='SALIR_AHORA'||exitSig.urgency==='AJUSTAR_STOP'){
      TG_SENT[key]=true;
      sendExitAlert(t.ticker,exitSig,t.entry);
    }
  });
}

function calcStops(sym,entry,qty){
  var tk=DB.tickers[sym];if(!tk||!tk.prices||tk.prices.length<15)return[];
  var atr=calcATR(tk.prices,14),allLvl=detectAllLevels(tk.prices),stops=[];
  if(atr){var s=+(entry-atr*1.5).toFixed(2);stops.push({label:'ATR û1.5',stop:s,pct:+((entry-s)/entry*100).toFixed(2),reason:'Volatilidad diaria real del ticker'});}
  var allSups=[];
  ['week','short','mid'].forEach(function(tf){if(allLvl[tf])allLvl[tf].supports.forEach(function(s){allSups.push(s);});});
  var below=allSups.filter(function(s){return s.price<entry*0.999;});
  if(below.length){below.sort(function(a,b){return b.price-a.price;});var ns=below[0],ss=+(ns.price*0.99).toFixed(2);stops.push({label:'Bajo soporte',stop:ss,pct:+((entry-ss)/entry*100).toFixed(2),reason:'Justo bajo soporte $'+ns.price+' (û'+ns.strength+')'});}
  if(qty>0){var riskEur=11480*0.02,rs=+(entry-riskEur/qty/0.92).toFixed(2);if(rs>0)stops.push({label:'Riesgo 2% capital',stop:rs,pct:+((entry-rs)/entry*100).toFixed(2),reason:'MûÀximo ~ã˜'+Math.round(riskEur)+' de pûˋrdida'});}
  stops.sort(function(a,b){return b.stop-a.stop;});
  return stops;
}
function calcTargets(entry,stop){
  var risk=entry-stop,targets=[];
  [[1.5,'Cerrar 50% posiciû°n'],[2,'Subir stop a breakeven'],[3,'Cerrar posiciû°n restante']].forEach(function(t){
    targets.push({label:'R/R 1:'+t[0],price:+(entry+risk*t[0]).toFixed(2),rr:'1:'+t[0],action:t[1]});
  });
  return targets;
}

    if(!CHART_STATE[sym].range||CHART_STATE[sym].range==='1D') CHART_STATE[sym].range='3M';
    render();
  }
}
function setCRange(sym, rng) {

  render();
}

// ãã SVG CANDLESTICK CHART v2 ã Full indicators ãããããããã
function renderCandleChart(prices, tf, levels, trades) {
  var n = prices.length;
  if (n < 2) return '<div class="empty">Sin datos</div>';
  var isDark = !document.body.classList.contains('light');
  var colBull = isDark ? '#00e5a0' : '#00a870';
  var colBear = isDark ? '#ff4560' : '#e02040';
  var colGrid = isDark ? 'rgba(30,45,69,.5)' : 'rgba(200,212,232,.6)';
  var colText = isDark ? '#2a3f5a' : '#8090a8';
  var colBg   = isDark ? '#0b0f1a' : '#f8fafc';

  // More candles for better context
  var maxC = tf==='15M'?130:tf==='1H'?80:Math.min(n,100);
  var display = prices.slice(-maxC);
  var nd = display.length;

  // Price range with padding
  var highs = display.map(function(p){return p.high||p.close;});
  var lows  = display.map(function(p){return p.low||p.close;});
  var hi = Math.max.apply(null,highs);
  var lo = Math.min.apply(null,lows);
  var pad = (hi-lo)*0.08;
  hi+=pad; lo-=pad;
  var rng = hi-lo||1;

  var W=420, H=220, padL=4, padR=56, padT=14, padB=28;
  var cw=W-padL-padR, ch=H-padT-padB;
  var cw2=cw/nd, bodyW=Math.max(1,cw2*0.72);

  function xOf(i){return padL+(i+0.5)*cw2;}
  function yOf(v){return padT+(1-(v-lo)/rng)*ch;}

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;background:'+colBg+';border-radius:10px;overflow:visible" xmlns="http://www.w3.org/2000/svg">';

  for(var gi=0;gi<=4;gi++){

    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="'+colGrid+'" stroke-width="0.7"/>';
    svg+='<text x="'+(W-padR+3)+'" y="'+(gy+3.5)+'" font-size="7.5" fill="'+colText+'" font-family="monospace">$'+gv+'</text>';

  // ãã MOVING AVERAGES ãããããããããããããããããããããããããããããããã

    }

  }

  if(nd>=9)  drawMA(9,  '#f0c040');        // EMA9  ã gold

  // ãã ICHIMOKU ããããããããããããããããããããããããããããããããããããã
  // Only draw if user enabled it (DB.showIchimoku) and enough data

    // Tenkan-Sen (9 periods)

      var lo2=Math.min.apply(null,sl.map(function(p){return p.low||p.close;}));

    var tenkan=[],kijun=[],senkouA=[],senkouB=[];

  // ãã VOLUME PROFILE (right side histogram) ãããããããã
  var vp=calcVolumeProfile(display);

  display.forEach(function(candle,i){

// ãã CANDLE READER ã AI-style market narrative ããããããããã
function renderCandleReader(prices, sym) {

  var h=last.high||last.close*1.002;
  var l=last.low||last.close*0.998;
  var c=last.close;
  var body=Math.abs(c-o);
  var range=h-l||0.001;
  var isBull=c>=o;
  var bodyPct=Math.round(body/range*100);
  var upperWick=h-Math.max(c,o);
  var lowerWick=Math.min(c,o)-l;
  var upperPct=Math.round(upperWick/range*100);
  var lowerPct=Math.round(lowerWick/range*100);
  var chg=prev.close?((c-prev.close)/prev.close*100):0;
  var prevBull=prev.close>=(prev.open||prev.close);
  var prevChg=prev2.close?((prev.close-prev2.close)/prev2.close*100):0;

  // Pattern detection
  var pattern='';var patternCol='var(--sub)';var patternEmoji='Þ';
  var signal='';var signalCol='var(--sub)';

  // Doji
