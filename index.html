function drawChart(id,prices,levels,trades,h){
  h=h||200;
  setTimeout(function(){
    var canvas=document.getElementById(id);if(!canvas||prices.length<2)return;
    var dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||300;
    canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+'px';
    var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    var cls=prices.map(function(p){return p.close;});
    var mn=Math.min.apply(null,cls)*0.997,mx=Math.max.apply(null,cls)*1.003,rng=mx-mn;
    var pd={t:12,r:58,b:8,l:4},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b;
    function xOf(i){return pd.l+(i/(cls.length-1))*cw;}
    function yOf(v){return pd.t+(1-(v-mn)/rng)*ch;}
    // Grid
    ctx.strokeStyle='rgba(30,45,69,0.5)';ctx.lineWidth=1;ctx.setLineDash([]);
    [0,.33,.66,1].forEach(function(p){
      var y=pd.t+p*ch;ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(w-pd.r,y);ctx.stroke();
      ctx.fillStyle='#2a3f5a';ctx.font='9px monospace';
      ctx.fillText('$'+(mn+(1-p)*rng).toFixed(0),w-pd.r+2,y+3);
    });
    // Short term SR highlighted
    if(levels){
      (levels.supports||[]).forEach(function(s){
        ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(0,229,160,0.5)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(pd.l,yOf(s.price));ctx.lineTo(w-pd.r,yOf(s.price));ctx.stroke();
        ctx.fillStyle='#00e5a0';ctx.font='bold 9px monospace';ctx.fillText('S$'+s.price,w-pd.r+2,yOf(s.price)+3);
      });
      (levels.resistances||[]).forEach(function(r){
        ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(255,69,96,0.5)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(pd.l,yOf(r.price));ctx.lineTo(w-pd.r,yOf(r.price));ctx.stroke();
        ctx.fillStyle='#ff4560';ctx.font='bold 9px monospace';ctx.fillText('R$'+r.price,w-pd.r+2,yOf(r.price)+3);
      });
    }
    // Trade entries
    if(trades)trades.forEach(function(t){
      if(t.entry>mn&&t.entry<mx){
        ctx.setLineDash([2,5]);
        ctx.strokeStyle=(t.result==='WIN'||t.result==='OPEN'?'#00e5a0':'#ff4560')+'60';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pd.l,yOf(t.entry));ctx.lineTo(w-pd.r,yOf(t.entry));ctx.stroke();
      }
    });
    // Area fill
    ctx.setLineDash([]);
    var grad=ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,'rgba(240,192,64,0.15)');grad.addColorStop(1,'rgba(240,192,64,0)');
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(cls[0]));
    for(var i=1;i<cls.length;i++)ctx.lineTo(xOf(i),yOf(cls[i]));
    ctx.lineTo(xOf(cls.length-1),ch+pd.t);ctx.lineTo(xOf(0),ch+pd.t);
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // Price line
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(cls[0]));
    for(var j=1;j<cls.length;j++)ctx.lineTo(xOf(j),yOf(cls[j]));

function drawMini(id,prices,color){
  color=color||'#f0c040';
  setTimeout(function(){
    var canvas=document.getElementById(id);if(!canvas||prices.length<2)return;
    var dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||200;
    canvas.width=w*dpr;canvas.height=44*dpr;
    var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    var end=prices.slice(-80),cls=end.map(function(p){return p.close;});
    var mn=Math.min.apply(null,cls),mx=Math.max.apply(null,cls),rng=mx-mn||1;
    // Fill
    var grad=ctx.createLinearGradient(0,0,0,44);
    grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'00');
    ctx.beginPath();ctx.moveTo(0,44-(cls[0]-mn)/rng*40);
    for(var i=1;i<cls.length;i++)ctx.lineTo(i/(cls.length-1)*w,44-(cls[i]-mn)/rng*40);
    ctx.lineTo(w,44);ctx.lineTo(0,44);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // Line
    ctx.beginPath();ctx.moveTo(0,44-(cls[0]-mn)/rng*40);
    for(var j=1;j<cls.length;j++)ctx.lineTo(j/(cls.length-1)*w,44-(cls[j]-mn)/rng*40);
    ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.stroke();
  },80);
}

function scoreRing(score,color,size){

// RSI Gauge (arc)
function rsiGauge(rsi){
  if(rsi===null)return'';
  var zones=[{from:0,to:20,col:'#ff4560',lbl:'Extremo'},{from:20,to:35,col:'#00e5a0',lbl:'ORS'},{from:35,to:50,col:'#f0c040',lbl:'Bueno'},{from:50,to:65,col:'#4a9eff',lbl:'Neutral'},{from:65,to:80,col:'#f0804040',lbl:'Cuidado'},{from:80,to:100,col:'#ff4560',lbl:'OB'}];
  var w=200,h=110,cx=w/2,cy=h-10,r=85;
  var svg='<svg width="100%" viewBox="0 0 '+w+' '+h+'" style="display:block">';
  // Arc zones
  zones.forEach(function(z){
    var a1=(z.from/100)*Math.PI,a2=(z.to/100)*Math.PI;
    var x1=cx-r*Math.cos(a1),y1=cy-r*Math.sin(a1);
    var x2=cx-r*Math.cos(a2),y2=cy-r*Math.sin(a2);
    var ir=68,x3=cx-ir*Math.cos(a2),y3=cy-ir*Math.sin(a2),x4=cx-ir*Math.cos(a1),y4=cy-ir*Math.sin(a1);
    svg+='<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 0 1 '+x2+' '+y2+' L '+x3+' '+y3+' A '+ir+' '+ir+' 0 0 0 '+x4+' '+y4+' Z" fill="'+z.col+'" opacity="0.7"/>';
  });
  // Needle
  var ang=(rsi/100)*Math.PI;
  var nx=cx-80*Math.cos(ang),ny=cy-80*Math.sin(ang);
  svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+nx+'" y2="'+ny+'" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round"/>';
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#f0c040"/>';
  // Labels
  svg+='<text x="8" y="'+h+'" fill="#ff4560" font-size="9" font-family="monospace">0</text>';
  svg+='<text x="'+(w/2-8)+'" y="18" fill="#00e5a0" font-size="9" font-family="monospace">50</text>';
  svg+='<text x="'+(w-16)+'" y="'+h+'" fill="#ff4560" font-size="9" font-family="monospace">100</text>';
  // RSI value
  svg+='<text x="'+cx+'" y="'+(cy-12)+'" fill="#f0c040" font-size="18" font-weight="bold" font-family="monospace" text-anchor="middle">'+rsi.toFixed(1)+'</text>';
  svg+='</svg>';
  return svg;
}

function loadJournalFromServer(){
  if(JOURNAL_LOADING) return;
  JOURNAL_LOADING = true;
  fetch(PROXY+'/trades/decisions?limit=200')
    .then(function(r){return r.json();})
    .then(function(data){
      JOURNAL_LOADING = false;
      if(data && data.decisions && data.decisions.length){
        JOURNAL_SERVER_DATA = data.decisions;
      } else {
        JOURNAL_SERVER_DATA = [];
      }
      if(VIEW==='journal') render();
    })
    .catch(function(){
      JOURNAL_LOADING = false;
      JOURNAL_SERVER_DATA = [];
      if(VIEW==='journal') render();
    });
}

window.analyzeAllTrades = function(){
  var trades = JOURNAL_SERVER_DATA || [];
  var pending = trades.filter(function(t){
    var id = t.id || (t.sym+'_'+(t.date||''));
    return !JOURNAL_AI_NOTES[id];
  });
  if(!pending.length){toast('ã Todos los trades ya tienen anûÀlisis IA',3000);return;}
  toast('ÞÏ  Analizando '+pending.length+' trades... puede tardar unos minutos', 5000);
  var idx = 0;
  function next(){
    if(idx>=pending.length) return;
    var t = pending[idx++];
    analyzeTradeWithAI(t, function(){ setTimeout(next, 1200); });
  }
  next();
};

function renderJournal(){
  // Si no hemos cargado datos del servidor, cargarlos
  if(JOURNAL_SERVER_DATA === null && !JOURNAL_LOADING){
    loadJournalFromServer();
  }

  // Combinar server + local, server primero
  var serverTrades = JOURNAL_SERVER_DATA || [];
  var localTrades = DB.journal || [];

  // Normalizar server trades para mKey
  var allTrades = [];
  serverTrades.forEach(function(t){
    allTrades.push({_src:'server', _t:t, date:(t.date||'').slice(0,10)});
  });
  // Local trades que NO estûˋn duplicados por sym+date en server
  var serverKeys = {};
  serverTrades.forEach(function(t){serverKeys[(t.sym||'')+'_'+(t.date||'').slice(0,10)]=1;});
  localTrades.forEach(function(t){
    var k=(t.ticker||'')+'_'+(t.date||'');
    if(!serverKeys[k]) allTrades.push({_src:'local', _t:t, date:t.date||''});
  });

  var byMonth={};
  allTrades.forEach(function(w){var k=mKey(w.date);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(w);});
  var months=Object.keys(byMonth).sort().reverse();

  var extraBtns = '<div style="display:flex;gap:6px">';

  if(serverTrades.length){
    var sWins=serverTrades.filter(function(t){return t.result==='WIN';}).length;
    var sLosses=serverTrades.filter(function(t){return t.result==='LOSS';}).length;
    var sPnl=serverTrades.reduce(function(s,t){return s+(t.pnlEur||0);},0);
    var sWR=serverTrades.length?Math.round(sWins/serverTrades.length*100):0;

    html+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:'+wColor(sWR)+'">'+sWR+'%</div><div style="font-size:9px;color:var(--sub)">WIN RATE</div></div>';
    html+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:'+(sPnl>=0?'var(--bull)':'var(--bear)')+'">'+(sPnl>=0?'+':'')+Math.round(sPnl)+'ã˜</div><div style="font-size:9px;color:var(--sub)">P&L REAL</div></div>';
    html+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--sub)">'+sWins+'/'+sLosses+'</div><div style="font-size:9px;color:var(--sub)">W/L</div></div>';

  }

  } else {
    months.forEach(function(mk){

      if(mOpen) html+=mkPill(mOpen+' abiert'+(mOpen>1?'as':'a'),'var(--watch)');

      html+='</div></div>';

      var revWraps=[].concat(mWraps).reverse();
      revWraps.forEach(function(w){
        html+=renderJournalTrade(w._t, w._src==='server');
      });
      html+='</div>';
    });
  }
  html+='</div>'+nav();
  return html;
}

function _newsUpdatePanels(items){

      if(!NEWS_IMPACT_CACHE[s])NEWS_IMPACT_CACHE[s]={scoreImpact:0,topNews:[],ts:0};
      var age=Date.now()-new Date(n.created_at).getTime();
      if(age<86400000){
        NEWS_IMPACT_CACHE[s].scoreImpact=Math.max(-20,Math.min(20,(NEWS_IMPACT_CACHE[s].scoreImpact||0)+(n.scoreImpact||0)));
        NEWS_IMPACT_CACHE[s].ts=Date.now();

function loadNews(sym){
  if(NEWS_LOADING)return;
  NEWS_LOADING=true;
  // Usar los candidatos MOM si existen, o watchlist, o defaults
  var momData=JSON.parse(localStorage.getItem('mom_scan_data')||'null');
  var symsArr=[];
  if(sym&&sym!=='ALL'){
    symsArr=[sym];
  } else if(momData&&momData.length){
    symsArr=momData.slice(0,12).map(function(x){return x.sym;});
  } else {
    var wlKeys=Object.keys(DB.tickers).slice(0,10);
    symsArr=wlKeys.length?wlKeys:['NVDA','AMD','MSFT','AVGO','TSLA','META','AAPL','GOOGL','TSM','HCA'];
  }
  var syms=symsArr.join(',');
  var loadingHtml='<div style="text-align:center;padding:20px;color:var(--sub)"><div style="font-size:24px;margin-bottom:8px">ÞÀ</div><div style="font-size:12px">Cargando noticias...</div></div>';
  var p1=document.getElementById('news-panel');if(p1)p1.innerHTML=loadingHtml;
  var p2=document.getElementById('home-news-panel');if(p2)p2.innerHTML=loadingHtml;

  // Intentar Alpaca news primero
  fetch(PROXY+'/alpaca/news?syms='+encodeURIComponent(syms)+'&limit=30')
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){
      NEWS_LOADING=false;
      var items=Array.isArray(d)?d:(d.news||d.items||[]);
      if(!items.length)throw new Error('empty');
      _newsUpdatePanels(items);
    })
    .catch(function(e){
      // Fallback: intentar endpoint alternativo /news/headlines
      fetch(PROXY+'/news/headlines?syms='+encodeURIComponent(syms))
        .then(function(r2){return r2.json();})
        .then(function(d2){
          NEWS_LOADING=false;
          var items=Array.isArray(d2)?d2:(d2.news||d2.items||[]);
          if(items.length){_newsUpdatePanels(items);}
          else {_newsShowError('Sin noticias disponibles ahora. El mercado puede estar cerrado.');}
        })
        .catch(function(){
          NEWS_LOADING=false;
          _newsShowError('Proxy no disponible. Verifica que Render estûÀ activo en ors-proxy-jet6.onrender.com');
        });
    });
}

function timeAgo(dateStr){
  var d=new Date(dateStr);var now=Date.now();
  var diff=Math.floor((now-d)/1000);
  if(diff<60)return diff+'s';
  if(diff<3600)return Math.floor(diff/60)+'min';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
}

function startModule(modId){
  loadDuoState();
  var done=DUOLINGO_STATE.completed[modId]||0;
  var mod=DUO_MODULES.filter(function(m){return m.id===modId;})[0];
  if(!mod)return;
  DUO_QUIZ_STATE={module:modId,lessonIdx:done>=mod.lessons.length?0:done,answered:false,selectedOpt:null};
  render();
}

function selectDuoAnswer(optIdx){
  if(DUO_QUIZ_STATE.answered)return;
  loadDuoState();
  DUO_QUIZ_STATE.selectedOpt=optIdx;
  DUO_QUIZ_STATE.answered=true;
  var mod=DUO_MODULES.filter(function(m){return m.id===DUO_QUIZ_STATE.module;})[0];
  var lesson=mod.lessons[DUO_QUIZ_STATE.lessonIdx];
  var correct=optIdx===lesson.ans;
  if(correct){
    DUOLINGO_STATE.xp+=10;
    // Check trophies
    if(DUOLINGO_STATE.xp>=10&&DUOLINGO_STATE.trophies.indexOf('first_lesson')<0){
      DUOLINGO_STATE.trophies.push('first_lesson');
      setTimeout(function(){showAchievement({icon:'ÞË',name:'Primera lecciû°n',desc:'Completaste tu primera pregunta'});},500);
    }
    if(DUOLINGO_STATE.xp>=500&&DUOLINGO_STATE.trophies.indexOf('xp_500')<0){
      DUOLINGO_STATE.trophies.push('xp_500');
      setTimeout(function(){showAchievement({icon:'Þ',name:'500 XP',desc:'ôÀExperto en formaciû°n!'});},500);
    }
  } else {
    DUOLINGO_STATE.hearts=Math.max(0,DUOLINGO_STATE.hearts-1);
  }
  saveDuoState();
  render();
}

// Motor de backtest completo con los 4 niveles de auto-exit
function runFullBacktest(prices, capital, riskPct, entryDate) {
  if(!prices || prices.length < 60) return null;
  var results = [], equity = capital;
  var maxPositions = 4;

  for(var i = 50; i < prices.length - 5; i++) {
    var slice = prices.slice(0, i+1);
    var rsi = calcRSI(slice, 14);
    var rsiPrev = calcRSI(slice.slice(0,-1), 14);
    var ema = calcEMA(slice, 20);
    var macd = calcMACD(slice);
    var obv = calcOBV(slice);
    var atr = calcATR(slice, 14);
    var sma200 = calcSMA(slice, 200);
    var last = slice[slice.length-1].close;

    // Filtro de fecha si se especifica
    if(entryDate && prices[i].date < entryDate) continue;

    // ORS-v2 condiciones reales (igual que TradingView)
    var rsiCruz  = rsiPrev !== null && rsiPrev < 30 && rsi !== null && rsi >= 30;
    var rsiOk    = rsi !== null && rsi >= 20 && rsi <= 45;
    var bajoVwap = ema && last < ema;
    var obvOk    = obv && obv.bullish && obv.rising;  // OBLIGATORIO
    var macdBull = macd && macd.bullish;

    var condCount = (rsiOk?1:0) + (rsiCruz?1:0) + (bajoVwap?1:0) + (macdBull?1:0) + (obvOk?1:0);
    var validSignal = condCount >= 4 && obvOk && rsiCruz;

    if(!validSignal) continue;
    // Evitar seûÝales muy seguidas (min 5 dûÙas entre entradas)
    if(results.length && prices[i].date <= results[results.length-1].exitDate) continue;

    // Position sizing: ATRû1.5 stop, 2% riesgo
    var entryPrice = prices[i+1] ? prices[i+1].close : last;
    if(!atr || !entryPrice) continue;
    var stopPrice  = parseFloat((entryPrice - atr * 1.5).toFixed(2));
    var riskPerShare = entryPrice - stopPrice;
    if(riskPerShare <= 0) continue;
    var riskUSD    = equity * riskPct * 1.08;  // USD desde EUR
    var qty        = Math.max(1, Math.floor(riskUSD / riskPerShare));

    // SMA200 filter: reducir qty 50% si bajo SMA200
    var aboveSMA200 = sma200 && entryPrice > sma200;
    if(!aboveSMA200) qty = Math.max(1, Math.floor(qty * 0.5));

    // Target R:R 2:1
    var target = parseFloat((entryPrice + riskPerShare * 2).toFixed(2));

    // Simular los 4 niveles de auto-exit barra a barra
    var exitPrice = null, exitReason = '', partialDone = false;
    var maxPrice = entryPrice, partialPnl = 0;

    for(var j = i+1; j < Math.min(i+20, prices.length); j++) {
      var bar    = prices[j];
      var hiBar  = bar.high  || bar.close;
      var loBar  = bar.low   || bar.close;
      var clBar  = bar.close;

      // Actualizar mûÀximo
      if(hiBar > maxPrice) maxPrice = hiBar;

      // NIVEL 1: Stop loss
      if(loBar <= stopPrice) {
        if(!partialDone) {
          exitPrice  = stopPrice;
          exitReason = 'N1 Stop $'+stopPrice;
        } else {
          // 50% ya vendido en target, el resto golpea stop (breakeven)
          exitPrice  = stopPrice;
          exitReason = 'N1+N2 Stop BE';
        }
        break;
      }

      // NIVEL 2: Target ã venta 50%
      if(!partialDone && hiBar >= target) {
        partialDone = true;
        partialPnl  = (target - entryPrice) * Math.floor(qty*0.5);
        // Stop sube a breakeven
        stopPrice   = parseFloat((entryPrice * 1.002).toFixed(2));
        exitReason  = 'N2 Target 50%';
        // Seguir simulando el 50% restante
        continue;
      }

      // NIVEL 3: OBV + MACD bajista (solo despuûˋs de venta parcial)
      if(partialDone && j >= i+3) {
        var sl3  = prices.slice(0, j+1);
        var o3   = calcOBV(sl3);
        var m3   = calcMACD(sl3);
        var r3   = calcRSI(sl3, 14);
        var bearCount = (o3&&!o3.bullish?1:0) + (m3&&m3.bearCross?1:0) + (r3&&r3>68?1:0);
        if(bearCount >= 2) {
          exitPrice  = clBar;
          exitReason = 'N3 OBV+MACD bajista';
          break;
        }
      }

      // NIVEL 4: Trailing stop 4% desde mûÀximo
      if(partialDone) {
        var trail = parseFloat((maxPrice * 0.96).toFixed(2));
        if(loBar <= trail) {
          exitPrice  = trail;
          exitReason = 'N4 Trailing 4%';
          break;
        }
      }

      // Salida por tiempo mûÀximo (10 dûÙas)
      if(j === Math.min(i+10, prices.length-1)) {
        exitPrice  = clBar;
        exitReason = 'Tiempo mûÀx';
        break;
      }
    }

    if(!exitPrice) continue;

    // Calcular P&L total
    var remainQty = partialDone ? Math.ceil(qty*0.5) : qty;
    var totalPnlUSD = partialPnl + (exitPrice - entryPrice) * remainQty;
    var totalPnlPct = parseFloat(((exitPrice - entryPrice) / entryPrice * 100).toFixed(2));
    var totalPnlEur = parseFloat((totalPnlUSD / 1.08).toFixed(0));
    var win = totalPnlUSD > 0;

    // Actualizar capital compuesto
    equity = parseFloat((equity + totalPnlEur).toFixed(2));

    results.push({
      date:       prices[i].date,
      exitDate:   prices[Math.min(i+10, prices.length-1)].date,
      entry:      +entryPrice.toFixed(2),
      exit:       +exitPrice.toFixed(2),
      stop:       +stopPrice.toFixed(2),
      target:     +target.toFixed(2),
      qty:        qty,
      pnlPct:     totalPnlPct,
      pnlEur:     totalPnlEur,
      win:        win,
      reason:     exitReason,
      partial:    partialDone,
      score:      condCount,
      aboveSMA200:aboveSMA200,
      capitalAfter: equity,
    });
  }
  return results;
}

var BT_MULTI_RESULTS = null;
var BT_MULTI_RUNNING = false;
var BT_MULTI_PROGRESS = 0;

function runMultiBacktest(mode) {
  if(BT_MULTI_RUNNING) return;
  BT_MULTI_RUNNING = true;
  BT_MULTI_PROGRESS = 0;
  BT_MULTI_RESULTS = null;
  render();

  // Usar tickers del watchlist + SP500_POOL top 20
  var tickers = Object.keys(DB.tickers);
  // AûÝadir SP500_POOL que no estûˋn ya
  SP500_POOL.slice(0,20).forEach(function(s){ if(tickers.indexOf(s)<0) tickers.push(s); });

  var capital0 = (DB.settings && DB.settings.capital) ? parseFloat(DB.settings.capital) : 11480;
  var riskPct  = (DB.settings && DB.settings.riskPct) ? parseFloat(DB.settings.riskPct)/100 : 0.02;

  // Fecha inicio segû¤n modo
  var startDate = null;
  if(mode === 'week') {
    var d = new Date(); d.setDate(d.getDate()-14);
    startDate = d.toISOString().slice(0,10);
  } else {
    // Desde mayo 2024
    startDate = '2024-05-01';
  }

  var allTrades = [], tickerStats = [], done = 0;
  var total = tickers.length;

  function processNext(idx) {
    if(idx >= tickers.length) {
      // Ordenar por fecha y calcular capital compuesto global
      allTrades.sort(function(a,b){ return a.date < b.date ? -1 : 1; });
      var capitalEvo = [capital0];
      var runningCapital = capital0;
      allTrades.forEach(function(t){
        runningCapital = parseFloat((runningCapital + t.pnlEur).toFixed(2));
        t.capitalAfter = runningCapital;
        capitalEvo.push(runningCapital);
      });

      var wins = allTrades.filter(function(t){return t.win;}).length;
      var losses = allTrades.length - wins;
      var totalEur = parseFloat((runningCapital - capital0).toFixed(0));
      var winRate = allTrades.length ? Math.round(wins/allTrades.length*100) : 0;
      var avgWin = wins ? allTrades.filter(function(t){return t.win;}).reduce(function(s,t){return s+t.pnlEur;},0)/wins : 0;
      var avgLoss = losses ? allTrades.filter(function(t){return !t.win;}).reduce(function(s,t){return s+t.pnlEur;},0)/losses : 0;
      var pf = avgLoss !== 0 ? Math.abs(avgWin/avgLoss) : 999;

      // Max drawdown en EUR
      var peak = capital0, maxDD = 0;
      capitalEvo.forEach(function(c){ if(c>peak)peak=c; var dd=peak-c; if(dd>maxDD)maxDD=dd; });

      // Stats por ticker
      var byTicker = {};
      allTrades.forEach(function(t){
        if(!byTicker[t.sym]) byTicker[t.sym]={sym:t.sym,trades:0,wins:0,pnlEur:0};
        byTicker[t.sym].trades++;
        if(t.win) byTicker[t.sym].wins++;
        byTicker[t.sym].pnlEur += t.pnlEur;
      });
      var tickerArr = Object.values(byTicker).sort(function(a,b){return b.pnlEur-a.pnlEur;});

      BT_MULTI_RESULTS = {
        mode: mode,
        startDate: startDate,
        capital0: capital0,
        capitalFinal: runningCapital,
        totalEur: totalEur,
        totalPct: parseFloat(((runningCapital-capital0)/capital0*100).toFixed(1)),
        trades: allTrades.length,
        wins: wins, losses: losses,
        winRate: winRate,
        avgWin: parseFloat(avgWin.toFixed(0)),
        avgLoss: parseFloat(avgLoss.toFixed(0)),
        profitFactor: parseFloat(pf.toFixed(2)),
        maxDD: parseFloat(maxDD.toFixed(0)),
        capitalEvo: capitalEvo,
        allTrades: allTrades,
        byTicker: tickerArr,
      };
      BT_MULTI_RUNNING = false;
      render();
      return;
    }

    var sym = tickers[idx];
    BT_MULTI_PROGRESS = Math.round(idx/total*100);
    if(idx % 5 === 0) render(); // Update progress every 5 tickers

    // Usar datos ya cargados en DB si existen
    var tk = DB.tickers[sym];
    if(tk && tk.prices && tk.prices.length >= 60) {
      var trades = runFullBacktest(tk.prices, capital0, riskPct, startDate);
      if(trades && trades.length) {
        trades.forEach(function(t){ t.sym = sym; allTrades.push(t); });
      }
      setTimeout(function(){ processNext(idx+1); }, 0);
    } else {
      // Fetch datos del proxy
      fetch(PROXY+'/alpaca/bars/daily?sym='+sym+'&limit=504')
        .then(function(r){return r.json();})
        .then(function(d){
          if(d && d.prices && d.prices.length >= 60) {
            var trades = runFullBacktest(d.prices, capital0, riskPct, startDate);
            if(trades && trades.length) {
              trades.forEach(function(t){ t.sym = sym; allTrades.push(t); });
            }
          }
          setTimeout(function(){ processNext(idx+1); }, 50);
        })
        .catch(function(){ setTimeout(function(){ processNext(idx+1); }, 50); });
    }
  }
  processNext(0);
}

    function xOf2(i){return pd2.l+(i/(data.length-1||1))*cw2;}
    function yOf2(v){return pd2.t+(1-(v-mn2)/rng2)*ch2;}
    // Grid
    ctx2.strokeStyle='rgba(30,45,69,0.4)'; ctx2.lineWidth=1;
    [0,0.5,1].forEach(function(p){

    ctx2.lineTo(xOf2(data.length-1),ch2+pd2.t); ctx2.lineTo(xOf2(0),ch2+pd2.t);
    ctx2.closePath(); ctx2.fillStyle=grad2; ctx2.fill();
    // Line
    ctx2.beginPath(); ctx2.moveTo(xOf2(0),yOf2(data[0]));
    for(var k2=1;k2<data.length;k2++) ctx2.lineTo(xOf2(k2),yOf2(data[k2]));

        ctx3.strokeStyle=pts[pts.length-1]>=0?'#00e5a0':'#ff4560'; ctx3.lineWidth=1.5; ctx3.stroke();

// ãã AUTO-JOURNAL ã Registro automûÀtico desde Alpaca ãã
function autoJournalEntry(params) {
  // params: {type, ticker, price, qty, stop, notes, orderId, conditions}
  // type: 'BUY' | 'SELL' | 'STOP_HIT' | 'STOP_MOVED' | 'TARGET_HIT'
  var db = loadDB();
  if (!db.journal) db.journal = [];
  var now = new Date();
  var dateStr = now.getFullYear() + '-' + ('0'+(now.getMonth()+1)).slice(-2) + '-' + ('0'+now.getDate()).slice(-2);
  var timeStr = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);

  if (params.type === 'BUY') {
    var trade = {
      id:         'ALP_' + Date.now(),
      ticker:     params.ticker,
      date:       dateStr + ' ' + timeStr,
      entry:      params.price,
      qty:        params.qty,
      stop:       params.stop || null,
      result:     'OPEN',
      status:     'open',
      source:     'alpaca_auto',
      orderId:    params.orderId || null,
      notes:      'ÞÊ Auto-entrada Alpaca ôñ ' + (params.notes || ''),
      conditions: params.conditions || {rsi30:false,rsiCruz:false,bajoVwap:false,obvAlcista:false,macdAlcista:false},
    };
    db.journal.push(trade);
    saveDB(db);
    toast('Þ Trade registrado en Diario: COMPRA ' + params.ticker, 4000);
    return trade.id;
  }

  if (params.type === 'SELL' || params.type === 'STOP_HIT' || params.type === 'TARGET_HIT') {
    // Find open trade for this ticker
    var openIdx = -1;
    for (var i = db.journal.length - 1; i >= 0; i--) {
      if (db.journal[i].ticker === params.ticker && (db.journal[i].status === 'open' || db.journal[i].result === 'OPEN')) {
        openIdx = i; break;
      }
    }
    if (openIdx >= 0) {
      var t = db.journal[openIdx];
      t.exit    = params.price;
      t.status  = 'closed';
      t.dateExit = dateStr + ' ' + timeStr;
      var pnl = t.entry ? ((params.price - t.entry) / t.entry * 100) : 0;
      t.result  = pnl >= 0 ? 'WIN' : 'LOSS';
      t.notes   = (t.notes || '') + ' | ÞÊ Auto-cierre: ' + params.type + ' @ $' + params.price;
      db.journal[openIdx] = t;
      saveDB(db);
      var emoji = params.type === 'STOP_HIT' ? 'ÞÀ' : params.type === 'TARGET_HIT' ? 'Þ₤' : 'ÞÊ';
      toast(emoji + ' Diario actualizado: ' + params.type + ' ' + params.ticker + ' ' + (pnl>=0?'+':'') + pnl.toFixed(2) + '%', 5000);
      checkAchievements();
    }
    return openIdx >= 0 ? db.journal[openIdx].id : null;
  }

  if (params.type === 'STOP_MOVED') {
    var openIdx2 = -1;
    for (var j = db.journal.length - 1; j >= 0; j--) {
      if (db.journal[j].ticker === params.ticker && (db.journal[j].status === 'open' || db.journal[j].result === 'OPEN')) {
        openIdx2 = j; break;
      }
    }
    if (openIdx2 >= 0) {
      var prevStop = db.journal[openIdx2].stop;
      db.journal[openIdx2].stop = params.price;
      db.journal[openIdx2].notes = (db.journal[openIdx2].notes || '') + ' | Þ¥ Stop movido: $' + prevStop + 'ã$' + params.price + ' @ ' + timeStr;
      saveDB(db);
      toast('Þ¥ Stop actualizado en Diario: ' + params.ticker + ' $' + prevStop + 'ã$' + params.price, 4000);
    }
  }
}

// Sync Alpaca positions to journal on startup
function syncAlpacaToJournal() {
  fetch(PROXY + '/alpaca/positions')
    .then(function(r) { return r.json(); })
    .then(function(positions) {
      if (!Array.isArray(positions)) return;
      var db = loadDB();
      if (!db.journal) db.journal = [];
      positions.forEach(function(p) {
        var sym = p.symbol;
        var alreadyOpen = db.journal.some(function(t) {
          return t.ticker === sym && (t.status === 'open' || t.result === 'OPEN');
        });
        if (!alreadyOpen && p.qty && parseFloat(p.qty) > 0) {
          var entry = parseFloat(p.avg_entry_price);
          var trade = {
            id:      'SYNC_' + sym + '_' + Date.now(),
            ticker:  sym,
            date:    new Date().toISOString().slice(0,10),
            entry:   entry,
            qty:     parseFloat(p.qty),
            result:  'OPEN',
            status:  'open',
            source:  'alpaca_sync',
            notes:   'Þ Sincronizado desde Alpaca',
            conditions: {rsi30:false,rsiCruz:false,bajoVwap:false,obvAlcista:true,macdAlcista:false},
          };
          db.journal.push(trade);
          console.log('Synced from Alpaca:', sym);

      });
      saveDB(db);
    })
    .catch(function() {});
}

// AUTO-EXIT ENGINE ã 4 NIVELES
// Nivel 1: Stop loss fijo
// Nivel 2: Venta parcial en target + mover stop a breakeven
// Nivel 3: Salida por seûÝal ORS inversa (OBV bajista + MACD cruce)
// Nivel 4: Trailing stop de seguridad desde mûÀximo
// ããããããããããããããããããããããããããããããããããããããããããããããããããããããã
var EXIT_CHECKING = {};

function setExitRule(sym, rule) {
  if(!DB.exitRules) DB.exitRules = {};
  if(!DB.exitRules[sym]) DB.exitRules[sym] = {};
  DB.exitRules[sym] = {
    stop: rule.stop || null,
    target: rule.target || null,
    trailingPct: rule.trailingPct || 4,
    partialDone: rule.partialDone || false,
    maxPrice: rule.maxPrice || rule.entryPrice || null,
    entryPrice: rule.entryPrice || null,
    qty: rule.qty || null,
    active: true
  };
  persist();
}

function executeAutoSell(sym, qty, reason, isPartial) {
  if(!qty || qty <= 0) return;
  var label = isPartial ? 'VENTA PARCIAL' : 'VENTA TOTAL';
  fetch(PROXY+'/alpaca/order', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({symbol: sym, qty: qty, side: 'sell', type: 'market', tif: 'day'})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.id){
      var msg = 'ÞÊ AUTO-EXIT '+label+'\n'
        +'Þ '+sym+' ã '+qty+' acciones\n'
        +'Þ Motivo: '+reason+'\n'
        +'Þ Orden: '+d.id.slice(0,8);
      sendTG(msg);
      toast('ÞÊ '+label+' '+sym+' ('+reason+')', 8000);
      autoJournalEntry({type:'SELL', ticker:sym, price:MKT[sym]?MKT[sym].price:0, qty:qty, orderId:d.id, notes:'Auto-exit: '+reason});
    } else {
      sendTG('ã ÿ¡ Auto-exit FALLIDO ã '+sym+'\nError: '+(d.message||'desconocido'));
      toast('ã Auto-exit fallido: '+(d.message||'error'), 6000);
    }
  })
  .catch(function(e){
    sendTG('ã ÿ¡ Auto-exit ERROR ã '+sym+'\n'+e.message);
  });
}

function checkExitLevels(sym, currentPrice, prices15) {
  if(EXIT_CHECKING[sym]) return;
  var rule = DB.exitRules && DB.exitRules[sym];
  if(!rule || !rule.active) return;
  EXIT_CHECKING[sym] = true;

  try {
    var qty = rule.qty || 0;
    if(!qty) { EXIT_CHECKING[sym]=false; return; }

    // Actualizar precio mûÀximo para trailing stop
    if(currentPrice && (!rule.maxPrice || currentPrice > rule.maxPrice)) {
      rule.maxPrice = currentPrice;
      DB.exitRules[sym].maxPrice = currentPrice;
      persist();
    }

    // ãã NIVEL 1: Stop loss fijo ãããããããããããããããããããããããããã
    if(rule.stop && currentPrice <= rule.stop) {
      var stopQty = rule.partialDone ? Math.ceil(qty * 0.5) : qty;
      executeAutoSell(sym, stopQty, 'Stop loss $'+rule.stop, false);
      DB.exitRules[sym].active = false;
      persist();
      EXIT_CHECKING[sym]=false;
      return;
    }

    // ãã NIVEL 2: Venta parcial en target ãããããããããããããããã
    if(rule.target && !rule.partialDone && currentPrice >= rule.target) {
      var partialQty = Math.floor(qty * 0.5);
      if(partialQty >= 1) {
        executeAutoSell(sym, partialQty, 'Target alcanzado $'+rule.target+' ã venta 50%', true);
        DB.exitRules[sym].partialDone = true;
        // Mover stop a breakeven
        DB.exitRules[sym].stop = rule.entryPrice;
        persist();
        sendTG('ÞÀ Stop movido a breakeven $'+rule.entryPrice+' en '+sym);
        toast('ã 50% vendido en target. Stop ã breakeven $'+rule.entryPrice, 7000);
      }
      EXIT_CHECKING[sym]=false;
      return;
    }

    // ãã NIVEL 3: SeûÝal ORS inversa (solo si hay 50% restante) ãã
    if(rule.partialDone && prices15 && prices15.length >= 30) {
      var exitObv = calcOBV(prices15);
      var exitMacd = calcMACD(prices15);
      var exitRsi = calcRSI(prices15, 14);
      var obvBear = exitObv && !exitObv.bullish;
      var macdBear = exitMacd && exitMacd.bearCross;
      var rsiBear = exitRsi && exitRsi > 68;
      var bearSignals = (obvBear ? 1 : 0) + (macdBear ? 1 : 0) + (rsiBear ? 1 : 0);
      if(bearSignals >= 2) {
        var remainQty = Math.ceil(qty * 0.5);
        var reasons = [];
        if(obvBear) reasons.push('OBV bajista');
        if(macdBear) reasons.push('MACD cruce bajista');
        if(rsiBear) reasons.push('RSI sobrecomprado');
        executeAutoSell(sym, remainQty, reasons.join(' + '), false);
        DB.exitRules[sym].active = false;
        persist();
        EXIT_CHECKING[sym]=false;
        return;
      }
    }

    // ãã NIVEL 4: Trailing stop desde mûÀximo ããããããããããããã
    if(rule.maxPrice && rule.partialDone) {
      var trailPct = rule.trailingPct || 4;
      var trailStop = rule.maxPrice * (1 - trailPct / 100);
      if(currentPrice <= trailStop) {
        var trailQty = Math.ceil(qty * 0.5);
        executeAutoSell(sym, trailQty, 'Trailing stop '+trailPct+'% desde mûÀximo $'+rule.maxPrice.toFixed(2), false);
        DB.exitRules[sym].active = false;
        persist();
        EXIT_CHECKING[sym]=false;
        return;
      }
    }

  } catch(e) {
    console.log('Exit check error '+sym+': '+e.message);
  }
  EXIT_CHECKING[sym] = false;
}

// Monitor cada 3 minutos ã verifica todas las posiciones activas
setInterval(function(){
  if(!DB.exitRules) return;
  var syms = Object.keys(DB.exitRules);
  syms.forEach(function(sym){
    var rule = DB.exitRules[sym];

function runWeeklyScan(){
  toast('ÞÙ Escaneando '+SP500_POOL.length+' tickers... (~30 seg)', 5000);
  var results=[];
  var done=0;
  var total=Math.min(SP500_POOL.length, 80);
  var pool=SP500_POOL.slice(0,total);

  // Batch fetch snapshots (all at once via Alpaca)
  var symStr=pool.join(',');
  fetch(PROXY+'/alpaca/snapshots?syms='+symStr)
    .then(function(r){return r.json();})
    .then(function(snapshots){
      // For each ticker with snapshot, do quick ORS analysis
      var symsWithData=Object.keys(snapshots);
      var batchDone=0;
      symsWithData.forEach(function(sym){
        // Quick score from snapshot data only (price change + momentum)
        var snap=snapshots[sym];
        var chg=snap.changePct||0;
        var vol=snap.volume||0;
        // Quick score heuristic (without full price history)
        var quickScore=50;
        if(chg<-3&&chg>-12) quickScore+=20; // RSI likely oversold
        if(chg<-1&&chg>-5) quickScore+=10;  // Mild pullback
        if(chg>5) quickScore-=15;            // Already ran ã less likely to rebuy
        // Check if already in watchlist
        var inWL=!!DB.tickers[sym];
        var phase=quickScore>=65?'SIGNAL':quickScore>=50?'WATCH':'RADAR';
        results.push({sym:sym, score:quickScore, phase:phase, chg:chg, inWL:inWL, price:snap.price});
      });

      // Sort by score
      results.sort(function(a,b){return b.score-a.score;});
      var top30=results.slice(0,30);

      // Save to localStorage
      localStorage.setItem('ors_weekly_scan', JSON.stringify(top30));
      var dateStr=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
      localStorage.setItem('ors_scan_date', 'Scan '+dateStr);

      toast('ã Top 30 encontrados ôñ '+top30.filter(function(t){return t.phase==='SIGNAL';}).length+' seûÝales activas', 4000);
      render();
    })
    .catch(function(e){
      toast('ã Error en scan: '+e.message, 4000);
      // Fallback ã use watchlist analysis
      var wlResults=Object.keys(DB.tickers).map(function(sym){
        var a=analyzeSymbol(sym);
        return a?{sym:sym,score:a.unifiedScore||a.oppScore,phase:a.phase.key,chg:0,inWL:true}:null;
      }).filter(Boolean);
      wlResults.sort(function(a,b){return b.score-a.score;});
      localStorage.setItem('ors_weekly_scan', JSON.stringify(wlResults));
      localStorage.setItem('ors_scan_date', 'Watchlist');
      render();
    });
}

function drawEquityCurve(canvasId, trades){
  setTimeout(function(){
    var canvas = document.getElementById(canvasId);
    if(!canvas) return;
    var dpr = window.devicePixelRatio||1;
    var W = canvas.offsetWidth||340, H = 160;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.height = H+'px';
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Build equity curve
    var equity = [0], cumPnl = 0;
    var closed = trades.filter(function(t){return t.pnlEur!=null;});
    closed.forEach(function(t){ cumPnl += (t.pnlEur||0); equity.push(cumPnl); });
    if(equity.length < 2){ ctx.fillStyle='rgba(74,106,138,.3)'; ctx.font='12px -apple-system'; ctx.fillText('Sin trades cerrados aû¤n',W/2-70,H/2); return; }

    var mn=Math.min.apply(null,equity), mx=Math.max.apply(null,equity), rng=mx-mn||1;
    var pd={t:16,r:12,b:24,l:52};
    var cw=W-pd.l-pd.r, ch=H-pd.t-pd.b;
    function xOf(i){return pd.l+(i/(equity.length-1))*cw;}
    function yOf(v){return pd.t+(1-(v-mn)/rng)*ch;}

    // Grid lines
    ctx.strokeStyle='rgba(22,32,48,.8)'; ctx.lineWidth=1; ctx.setLineDash([2,4]);
    [0,.25,.5,.75,1].forEach(function(f){
      var y=pd.t+f*ch;
      ctx.beginPath(); ctx.moveTo(pd.l,y); ctx.lineTo(W-pd.r,y); ctx.stroke();
      var val=mx-f*(mx-mn);
      ctx.fillStyle='rgba(74,106,138,.7)'; ctx.font='9px -apple-system';
      ctx.textAlign='right'; ctx.fillText((val>=0?'+':'')+Math.round(val)+'ã˜',pd.l-4,y+3);
    });
    ctx.setLineDash([]);

    // Zero line
    if(mn<0&&mx>0){
      ctx.strokeStyle='rgba(200,218,240,.15)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pd.l,yOf(0)); ctx.lineTo(W-pd.r,yOf(0)); ctx.stroke();
    }

    // Area fill
    var finalPnl=equity[equity.length-1];
    var grad=ctx.createLinearGradient(0,0,0,H);
    if(finalPnl>=0){
      grad.addColorStop(0,'rgba(0,221,160,.3)'); grad.addColorStop(1,'rgba(0,221,160,.02)');
    } else {
      grad.addColorStop(0,'rgba(255,58,85,.02)'); grad.addColorStop(1,'rgba(255,58,85,.3)');
    }
    ctx.beginPath(); ctx.moveTo(xOf(0),yOf(equity[0]));
    for(var i=1;i<equity.length;i++) ctx.lineTo(xOf(i),yOf(equity[i]));
    ctx.lineTo(xOf(equity.length-1),H-pd.b+pd.t); ctx.lineTo(xOf(0),H-pd.b+pd.t);
    ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

    // Line
    ctx.beginPath(); ctx.moveTo(xOf(0),yOf(equity[0]));
    for(var j=1;j<equity.length;j++) ctx.lineTo(xOf(j),yOf(equity[j]));
    ctx.strokeStyle=finalPnl>=0?'#00dda0':'#ff3a55'; ctx.lineWidth=2.5; ctx.stroke();

    // Last point dot
    var lx=xOf(equity.length-1), ly=yOf(equity[equity.length-1]);
    ctx.beginPath(); ctx.arc(lx,ly,4,0,Math.PI*2);
    ctx.fillStyle=finalPnl>=0?'#00dda0':'#ff3a55'; ctx.fill();
    ctx.strokeStyle=finalPnl>=0?'rgba(0,221,160,.3)':'rgba(255,58,85,.3)';
    ctx.lineWidth=6; ctx.stroke();

    // X axis labels
    ctx.fillStyle='rgba(74,106,138,.7)'; ctx.font='9px -apple-system'; ctx.textAlign='center';
    var step=Math.max(1,Math.floor(equity.length/5));
    for(var k=0;k<equity.length;k+=step){
      ctx.fillText('#'+(k+1),xOf(k),H-4);
    }
  }, 80);
}

var _lwcInstance = null; // singleton chart

function _lwcEMA(data, period){
  var k=2/(period+1), out=[], prev=null;
  for(var i=0;i<data.length;i++){
    if(i<period-1){out.push(null);continue;}
    if(prev===null){var s=0;for(var j=i-period+1;j<=i;j++)s+=data[j].close;prev=s/period;}
    else{prev=data[i].close*k+prev*(1-k);}
    out.push(prev);
  }
  return out;
}

function initLWChart(container, tk, levels, trades, sym){
  if(_lwcInstance){try{_lwcInstance.remove();}catch(e){}_lwcInstance=null;}
  container.innerHTML='';

  // Always dark terminal background like professional platforms
  var bg='#040810';
  var gridCol='rgba(18,28,44,.9)';
  var textCol='#4a6a8a';
  var borderC='#0e1a28';

  var chart=LightweightCharts.createChart(container,{
    width:container.clientWidth||350,
    height:360,
    layout:{background:{type:'Solid',color:bg},textColor:textCol,fontSize:10,fontFamily:'-apple-system,SF Pro,Inter,monospace'},
    grid:{vertLines:{color:gridCol,style:1},horzLines:{color:gridCol,style:1}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'rgba(200,218,240,.3)',labelBackgroundColor:'#0e1a28'},horzLine:{color:'rgba(200,218,240,.3)',labelBackgroundColor:'#0e1a28'}},
    rightPriceScale:{
      borderColor:borderC,
      textColor:textCol,
      scaleMargins:{top:0.06,bottom:0.22},
      minimumWidth:60,
    },
    leftPriceScale:{visible:false},
    timeScale:{borderColor:borderC,timeVisible:true,secondsVisible:false,barSpacing:6,fixLeftEdge:false,fixRightEdge:false},
    handleScroll:true,
    handleScale:true,
    localization:{priceFormatter:function(p){return '$'+p.toFixed(2);}},
  });
  _lwcInstance=chart;

  var resizeObs=new ResizeObserver(function(entries){
    if(_lwcInstance&&entries[0]){var w=entries[0].contentRect.width;if(w>0)_lwcInstance.applyOptions({width:w});}
  });
  resizeObs.observe(container);

  // ãã Candlestick series ããããããããããããããããããããããããããããã
  var candles=chart.addCandlestickSeries({
    upColor:'#00dda0',downColor:'#ff3a55',
    borderUpColor:'#00dda0',borderDownColor:'#ff3a55',
    wickUpColor:'#00cc90',wickDownColor:'#ee2244',
  });

  var prices=tk.prices||[];
  // CRITICAL FIX: use (p.open != null && p.open > 0) not p.open||p.close which breaks when open=0
  var data=prices.map(function(p){
    var t=p.date?Math.floor(new Date(p.date).getTime()/1000):0;
    var o=(p.open!=null&&p.open>0)?+p.open:+p.close;
    var h=(p.high!=null&&p.high>0)?+p.high:Math.max(o,+p.close);
    var l=(p.low!=null&&p.low>0)?+p.low:Math.min(o,+p.close);
    var c=+p.close;
    return{time:t,open:o,high:h,low:l,close:c};
  }).filter(function(d){return d.time>0&&d.close>0;});
  data.sort(function(a,b){return a.time-b.time;});
  var seen={};data=data.filter(function(d){if(seen[d.time])return false;seen[d.time]=1;return true;});
  if(!data.length)return;
  candles.setData(data);

  // ãã Volume ããããããããããããããããããããããããããããããããããããããããã
  var volS=chart.addHistogramSeries({
    color:'rgba(58,143,255,.15)',
    priceFormat:{type:'volume'},
    priceScaleId:'vol',
    scaleMargins:{top:0.82,bottom:0},
  });
  var volData=data.map(function(d,i){
    var col=i>0&&d.close>=data[i-1].close?'rgba(0,221,160,.2)':'rgba(255,58,85,.18)';
    return{time:d.time,value:prices[i]?prices[i].volume||0:0,color:col};
  });
  volS.setData(volData);

  // ãã EMA50 (blue) ããããããããããããããããããããããããããããããããããã
  var ema50vals=_lwcEMA(data,50);
  if(ema50vals.some(function(v){return v!==null;})){
    var e50s=chart.addLineSeries({color:'#3a8fff',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
    e50s.setData(data.map(function(d,i){return ema50vals[i]!==null?{time:d.time,value:ema50vals[i]}:null;}).filter(Boolean));
  }

  // ãã SMA200 (gold dashed) ããããããããããããããããããããããããããã
  if(data.length>=200){
    var s200s=chart.addLineSeries({color:'#e8b830',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:false});
    var s200d=[];
    for(var si=199;si<data.length;si++){
      var sum=0;for(var sj=si-199;sj<=si;sj++)sum+=data[sj].close;
      s200d.push({time:data[si].time,value:sum/200});
    }
    s200s.setData(s200d);
  }

  // ãã Fibonacci levels ããããããããããããããããããããããããããããããã
  if(data.length>20){
    // Calculate fib from last 60 bars swing high/low
    var fibWindow=data.slice(-60);
    var fibHigh=Math.max.apply(null,fibWindow.map(function(d){return d.high;}));
    var fibLow=Math.min.apply(null,fibWindow.map(function(d){return d.low;}));
    var fibRange=fibHigh-fibLow;
    if(fibRange>0){
      var fibLevels=[
        {r:0.236,color:'rgba(160,80,255,.5)',lbl:'Fib 23.6%'},
        {r:0.382,color:'rgba(58,143,255,.5)',lbl:'Fib 38.2%'},
        {r:0.5,  color:'rgba(200,218,240,.35)',lbl:'Fib 50%'},
        {r:0.618,color:'rgba(232,184,48,.6)',lbl:'Fib 61.8% ã'},
        {r:0.786,color:'rgba(0,221,160,.4)',lbl:'Fib 78.6%'},
      ];
      fibLevels.forEach(function(fl){
        var price=fibHigh-(fibRange*fl.r);
        try{
          candles.createPriceLine({
            price:price,
            color:fl.color,
            lineWidth:1,
            lineStyle:LightweightCharts.LineStyle.Dotted,
            axisLabelVisible:false,
            title:'',
          });
        }catch(e){}
      });
    }
  }

  // ãã Support/Resistance ãããããããããããããããããããããããããããã
  if(levels){
    (levels.supports||[]).slice(0,3).forEach(function(s){
      try{candles.createPriceLine({price:+s.price,color:'rgba(0,221,160,.5)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:false,title:''});}catch(e){}
    });
    (levels.resistances||[]).slice(0,3).forEach(function(r){
      try{candles.createPriceLine({price:+r.price,color:'rgba(255,58,85,.5)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:false,title:''});}catch(e){}
    });
  }

  // ãã Trade entry markers ããããããããããããããããããããããããããã
  if(trades&&trades.length){
    var markers=[];
    trades.forEach(function(t){
      var et=t.date?Math.floor(new Date(t.date).getTime()/1000):0;
      if(et>0&&t.entry){
        markers.push({time:et,position:'belowBar',color:'#3a8fff',shape:'arrowUp',text:'ãÑ $'+t.entry});
        if(t.exit){
          var xt=Math.floor(new Date(t.date).getTime()/1000)+86400;
          markers.push({time:xt,position:'aboveBar',color:t.result==='WIN'?'#00dda0':'#ff3a55',shape:'arrowDown',text:'ã $'+t.exit});
        }
      }
    });
    if(markers.length){markers.sort(function(a,b){return a.time-b.time;});candles.setMarkers(markers);}
  }

  chart.timeScale().fitContent();

  // ãã OHLC Tooltip ããããããããããããããããããããããããããããããããã
  var tooltip=document.createElement('div');
  tooltip.style.cssText='position:absolute;top:6px;left:8px;z-index:20;background:rgba(4,8,16,.92);border:1px solid #0e1a28;border-radius:8px;padding:7px 11px;font-size:11px;font-family:-apple-system,monospace;pointer-events:none;backdrop-filter:blur(16px);min-width:180px;display:none;';
  container.style.position='relative';
  container.appendChild(tooltip);

  chart.subscribeCrosshairMove(function(param){
    if(!param||!param.time){tooltip.style.display='none';return;}
    var d=param.seriesData.get(candles);
    if(!d){tooltip.style.display='none';return;}
    tooltip.style.display='block';
    var chg=d.open?((d.close-d.open)/d.open*100).toFixed(2):0;
    var col=d.close>=d.open?'#00dda0':'#ff3a55';
    var chgPct=d.open?Math.abs((d.high-d.low)/d.open*100).toFixed(1):0;
    var dt=new Date(param.time*1000);
    var ds=dt.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'});
    tooltip.innerHTML=
      '<div style="color:#4a6a8a;font-size:9px;margin-bottom:5px;letter-spacing:1px">'+ds+'  <span style="color:'+col+';font-weight:700">'+(chg>=0?'+':'')+chg+'%</span>  <span style="color:#223040">Range '+chgPct+'%</span></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px">'
      +'<div><div style="font-size:8px;color:#4a6a8a;margin-bottom:1px">OPEN</div><div style="font-weight:700;font-size:12px">$'+d.open.toFixed(2)+'</div></div>'
      +'<div><div style="font-size:8px;color:#00dda0;margin-bottom:1px">HIGH</div><div style="font-weight:700;font-size:12px;color:#00dda0">$'+d.high.toFixed(2)+'</div></div>'
      +'<div><div style="font-size:8px;color:#ff3a55;margin-bottom:1px">LOW</div><div style="font-weight:700;font-size:12px;color:#ff3a55">$'+d.low.toFixed(2)+'</div></div>'
      +'<div><div style="font-size:8px;color:'+col+';margin-bottom:1px">CLOSE</div><div style="font-weight:700;font-size:12px;color:'+col+'">$'+d.close.toFixed(2)+'</div></div>'
      +'</div>';
  });
}

    else if(VIEW==='duolingo')html=renderDuolingo();

    else if(VIEW==='backtest') html=renderBacktest();

  }catch(e){html='<div style="padding:20px;color:var(--bear);font-size:12px">Error: '+e.message+'<br><button onclick="VIEW=\'home\';render()" style="color:var(--accent);margin-top:10px">ã Inicio</button></div>';}
  root.innerHTML=html;
  // Draw charts
  if(VIEW==='home')Object.keys(DB.tickers).forEach(function(sym){var tk=DB.tickers[sym];if(tk.prices&&tk.prices.length>1){var a=analyzeSymbol(sym);var col=a?a.phase.color.replace('var(','').replace(')',''):'#f0c040';drawMini('mini-'+sym,tk.prices,col);}});
  if(VIEW==='dashboard'&&DASH_DATA&&DASH_DATA.length){
    var closed=DASH_DATA.filter(function(t){return t.result==='WIN'||t.result==='LOSS';});
    if(closed.length>1) drawEquityCurve('eq-curve', closed);
  }
  if(VIEW==='ticker'&&TAB==='chart'){
    setTimeout(function(){
      var tk=DB.tickers[TICKER];
      if(!tk)return;
      var a2=analyzeSymbol(TICKER);
      var shortL=a2&&a2.allLvl?a2.allLvl.short:{supports:[],resistances:[]};
      var tkT=DB.journal.filter(function(t){return t.ticker===TICKER;});
      // Try LWC first, fallback to SVG
      var lwcEl=document.getElementById('lwc-chart');
      if(lwcEl&&typeof LightweightCharts!=='undefined'){
        initLWChart(lwcEl, tk, shortL, tkT, TICKER);
      } else if(lwcEl){
        // Fallback SVG if LWC not loaded
        var a3=analyzeSymbol(TICKER);
        var tf=CHART_STATE[TICKER]&&CHART_STATE[TICKER].tf||'1D';
        lwcEl.innerHTML=renderCandleChart(tk.prices||[], tf, shortL, tkT);
      }
    },80);
  }
  // Draw equity curve for backtest
  if(VIEW==='backtest'&&TICKER){
    var bt2=runBacktest(TICKER);
    if(bt2&&bt2.allResults.length){
      setTimeout(function(){
        var canvas=document.getElementById('bt-chart');if(!canvas)return;
        var dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||300,h=120;
        canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+'px';
        var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
        var equity=[0],cumPnl=0;
        bt2.allResults.forEach(function(r){cumPnl+=r.pnl;equity.push(cumPnl);});
        var mn=Math.min.apply(null,equity),mx=Math.max.apply(null,equity),rng=mx-mn||1;
        var pd={t:10,r:10,b:10,l:10},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b;
        function xOf(i){return pd.l+(i/(equity.length-1))*cw;}
        function yOf(v){return pd.t+(1-(v-mn)/rng)*ch;}
        // Zero line
        ctx.setLineDash([2,4]);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pd.l,yOf(0));ctx.lineTo(w-pd.r,yOf(0));ctx.stroke();
        // Area
        ctx.setLineDash([]);
        var grad=ctx.createLinearGradient(0,0,0,h);
        grad.addColorStop(0,cumPnl>=0?'rgba(0,229,160,0.3)':'rgba(255,69,96,0.3)');
        grad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath();ctx.moveTo(xOf(0),yOf(equity[0]));
        for(var i=1;i<equity.length;i++)ctx.lineTo(xOf(i),yOf(equity[i]));
        ctx.lineTo(xOf(equity.length-1),ch+pd.t);ctx.lineTo(xOf(0),ch+pd.t);
        ctx.closePath();ctx.fillStyle=grad;ctx.fill();
        // Line
        ctx.beginPath();ctx.moveTo(xOf(0),yOf(equity[0]));
        for(var j=1;j<equity.length;j++)ctx.lineTo(xOf(j),yOf(equity[j]));
        ctx.strokeStyle=cumPnl>=0?'#00e5a0':'#ff4560';ctx.lineWidth=2;ctx.stroke();
      },80);
    }
  }
}

window.closeAtStop=function(id){
  var t=DB.journal.filter(function(x){return x.id===id;})[0];
  if(!t||!t.stop)return;
  var idx=DB.journal.findIndex(function(x){return x.id===id;});
  if(idx>=0){
    var pnlUSD=(t.stop-t.entry)*(t.qty||1);
    var pnlEUR=Math.round(pnlUSD/1.08);
    DB.journal[idx].exit=t.stop;
    DB.journal[idx].status='closed';
    DB.journal[idx].result='LOSS';
    DB.journal[idx].notes=(DB.journal[idx].notes||'')+' | Þ Stop saltado @ $'+t.stop+' P&L: '+pnlEUR+'ã˜';
  }
  persist();
  toast('Þ '+t.ticker+' ã Stop saltado @ $'+t.stop+' registrado');
  render();
};
window.closePosition=function(id){
  var t=DB.journal.filter(function(x){return x.id===id;})[0];
  if(!t)return;
  var curPrice=MKT[t.ticker]?MKT[t.ticker].price:0;
  var suggestedExit=curPrice?curPrice.toFixed(2):(t.stop||'');
  var exitPrice=window.prompt('Cerrar '+t.ticker+' @ entrada $'+t.entry+'  ã  Precio salida:', suggestedExit);
  if(!exitPrice) return; // cancelled
  exitPrice=parseFloat(exitPrice);
  if(isNaN(exitPrice)){toast('Precio no vûÀlido');return;}
  var qty=t.qty||1;
  var pnlUSD=(exitPrice-t.entry)*qty;
  var pnlEUR=Math.round(pnlUSD/1.08);
  var result=exitPrice>=t.entry?'WIN':'LOSS';
  // Update the trade in journal
  var idx=DB.journal.findIndex(function(x){return x.id===id;});
  if(idx>=0){
    DB.journal[idx].exit=exitPrice;
    DB.journal[idx].status='closed';
    DB.journal[idx].result=result;
    DB.journal[idx].notes=(DB.journal[idx].notes||'')+(exitPrice<=t.stop?' | Þ Stop saltado':'| ã Cierre manual')+' @ $'+exitPrice+' P&L: '+(pnlEUR>=0?'+':'')+pnlEUR+'ã˜';
  }
  persist();
  toast((result==='WIN'?'ã ':'Þ ')+t.ticker+' cerrado @ $'+exitPrice+' ôñ P&L: '+(pnlEUR>=0?'+':'')+pnlEUR+'ã˜');
  render();
};

window.loadIntraday=function(sym){
  if(INTRADAY[sym]&&Date.now()-INTRADAY[sym].ts<3*60*1000){
    render();
    return;
  }
  // Show loading state without full re-render
  var chartEl=document.getElementById('chart-loading-'+sym);
  if(chartEl) chartEl.style.display='block';
  fetchIntraday(sym,function(prices15){
    if(prices15&&prices15.length){
      INTRADAY[sym]={prices15:prices15,ts:Date.now(),source:'alpaca'};
      console.log('15min loaded: '+sym+' ('+prices15.length+' bars)');
    } else {
      console.log('15min: no data for '+sym);
    }
    render();
    // Draw 15min chart after render
    setTimeout(function(){
      if(!prices15||!prices15.length)return;
      var canvas=document.getElementById('chart-15m');
      if(!canvas)return;
      var dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||300,h=160;
      canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+'px';
      var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
      var cls=prices15.map(function(p){return p.close;});
      var mn=Math.min.apply(null,cls)*0.997,mx=Math.max.apply(null,cls)*1.003,rng=mx-mn||1;
      var pd={t:8,r:52,b:8,l:4},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b;
      function xOf(i){return pd.l+(i/(cls.length-1))*cw;}
      function yOf(v){return pd.t+(1-(v-mn)/rng)*ch;}
      // Grid lines
      ctx.strokeStyle='rgba(30,45,69,0.4)';ctx.lineWidth=1;ctx.setLineDash([]);
      [0,0.5,1].forEach(function(p){
        var y=pd.t+p*ch;ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(w-pd.r,y);ctx.stroke();
        ctx.fillStyle='#3a4f6a';ctx.font='9px monospace';
        ctx.fillText('$'+(mn+(1-p)*rng).toFixed(0),w-pd.r+2,y+3);
      });
      // Color area green/red based on direction
      var startP=cls[0],endP=cls[cls.length-1];
      var areaCol=endP>=startP?'rgba(0,229,160,':'rgba(255,69,96,';
      var grad=ctx.createLinearGradient(0,0,0,h);
      grad.addColorStop(0,areaCol+'0.2)');grad.addColorStop(1,areaCol+'0)');
      ctx.beginPath();ctx.moveTo(xOf(0),yOf(cls[0]));
      for(var i=1;i<cls.length;i++)ctx.lineTo(xOf(i),yOf(cls[i]));
      ctx.lineTo(xOf(cls.length-1),ch+pd.t);ctx.lineTo(xOf(0),ch+pd.t);
      ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      // Price line
      ctx.beginPath();ctx.moveTo(xOf(0),yOf(cls[0]));
      for(var j=1;j<cls.length;j++)ctx.lineTo(xOf(j),yOf(cls[j]));
      ctx.strokeStyle=endP>=startP?'#00e5a0':'#ff4560';ctx.lineWidth=1.5;ctx.stroke();
    },100);
  });
};

  if(!suggEl) return;
  if(!_homeSearch||_homeSearch.length<1){suggEl.innerHTML='';return;}
  var syms=Object.keys(DB.tickers);
