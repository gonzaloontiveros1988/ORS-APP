// FULL ANALYSIS ENGINE
// ═══════════════════════════════════════════════════════
function analyzeSymbol(sym){
  var tk=DB.tickers[sym];
  if(!tk||!tk.prices||tk.prices.length<20)return null;

  // ── USE 15MIN DATA IF AVAILABLE (matches TradingView) ──
  var _i15=INTRADAY[sym];
  var prices15=_i15&&_i15.prices15&&_i15.prices15.length>=30?_i15.prices15:null;
  var prices=prices15||tk.prices; // Prefer 15min over daily
  var using15=!!prices15;
  var bars15count=_i15&&_i15.prices15?_i15.prices15.length:0;

  // ── HH/HL Detection (Higher Highs/Higher Lows = healthy uptrend) ──
  var hhhl=null;
  if(n>=6){
    var _h6=prices.slice(-6);
    var _highs=_h6.map(function(p){return p.high||p.close;});
    var _lows=_h6.map(function(p){return p.low||p.close;});
    var _hhC=0,_hlC=0;
    for(var _hh=1;_hh<_highs.length;_hh++){if(_highs[_hh]>_highs[_hh-1])_hhC++;}
    for(var _hl=1;_hl<_lows.length;_hl++){if(_lows[_hl]>_lows[_hl-1])_hlC++;}
    hhhl={hh:_hhC,hl:_hlC,bullish:_hhC>=3&&_hlC>=3,trending:_hhC>=2||_hlC>=2};
  }

  // ── Gap Detection ──────────────────────────────────
  var gapData=null;
  if(n>=2){
    var _prevClose=prices[n-2].close;
    var _todayOpen=prices[n-1].open||prices[n-1].close;
    var _gapPct=_prevClose>0?(_todayOpen-_prevClose)/_prevClose*100:0;
    var _avgVol=prices.slice(-20).reduce(function(s,p){return s+(p.volume||0);},0)/20;
    var _todayVol=prices[n-1].volume||0;
    var _volRatio=_avgVol>0?_todayVol/_avgVol:1;
    gapData={
      pct:+_gapPct.toFixed(2),
      bullish:_gapPct>1.5&&_volRatio>=1.5,  // Gap >1.5% + Vol >1.5x
      extreme:_gapPct>3&&_volRatio>=2,       // Gap >3% + Vol >2x = momentum extreme
      volRatio:+_volRatio.toFixed(1),
    };
  }
  var n=prices.length;
  var q=MKT[sym];
  var last=q?q.price:prices[n-1].close;
  var rsi=calcRSI(prices,14);
  var ema20=calcEMA(prices,20);
  var ema50val=calcEMAValue(prices,50);
  var sma200val=calcSMA(prices,200);
  var fibLvl=calcFibLevels(prices);
  var atr=calcATR(prices,14);
  var mom=calcMomentum(prices);
  var macd=calcMACD(prices);
  var williamsR=calcWilliamsR(prices,14);
  var obv=calcOBV(prices);
 
  var mfi=calcMFI(prices,14);
  var rangeData=detectRange(prices);
  var vp=calcVolumeProfile(prices); // Derived: SMA200 filter + Fibonacci proximity
  var aboveSMA200=sma200val&&last>sma200val;
  var sma200Dist=sma200val?parseFloat(((last-sma200val)/sma200val*100).toFixed(1)):null;
  var fibProximity=null;
  if(fibLvl){
    var fibPts=[{l:fibLvl.r618,n:'61.8%'},{l:fibLvl.r500,n:'50%'},{l:fibLvl.r382,n:'38.2%'},{l:fibLvl.r236,n:'23.6%'}];
    for(var fpi=0;fpi<fibPts.length;fpi++){
      var fpd=Math.abs(last-fibPts[fpi].l)/last*100;
      if(fpd<2.0){fibProximity={level:fibPts[fpi].n,price:fibPts[fpi].l,dist:parseFloat(fpd.toFixed(1))};break;}
    }
  }
  var allLvl=detectAllLevels(prices);
  var patterns=detectPatterns(prices);
  var stochRsi=calcStochRSI(prices);
  var bollinger=calcBollinger(prices);
  var candles=detectCandlePatterns(prices);
  var slit=detectSLIT(prices);
  var earnings=checkEarningsRisk(sym);
  var divergence=detectRSIDivergence(prices);
  var trades=DB.journal.filter(function(t){return t.ticker===sym;});
  var wr=trades.length?Math.round(trades.filter(function(t){return t.result==='WIN'||t.result==='OPEN';}).length/trades.length*100):null;

  // ── CONTEXT SCORE (technical quality, 0-100) ─────────
  var ctx=50,ctxReasons=[],ctxBlockers=[];

  // Volatilidad
  var atrPct=atr&&last?atr/last*100:null;
  var volatScore=atrPct?atrPct<1.2?90:atrPct<1.8?75:atrPct<2.5?58:atrPct<3.5?38:20:50;

  // Rangos
  var rangeScore=tk.ranges&&tk.ranges.length>2?80:tk.ranges&&tk.ranges.length>0?60:35;

  // Niveles S/R
  var srScore=0;
  var allSups=[],allRes=[];
  ['week','short','mid'].forEach(function(tf){
    if(allLvl[tf]){allLvl[tf].supports.forEach(function(s){allSups.push(s);});allLvl[tf].resistances.forEach(function(r){allRes.push(r);});}
  });
  srScore=allSups.length>=2&&allRes.length>=2?85:allSups.length>=1||allRes.length>=1?60:30;

  ctx=Math.round(volatScore*0.3+rangeScore*0.25+srScore*0.25+50*0.2);

  // Patrones bajistas activos — bloqueador fuerte
  var activeBearish=patterns.filter(function(p){return p.isActive&&['DOBLE TECHO','BANDERA BAJISTA','TRIÁNGULO DESCENDENTE','RUPTURA BAJISTA'].indexOf(p.type)>=0;});
  var activeBullish=patterns.filter(function(p){return p.isActive&&['DOBLE SUELO','BANDERA ALCISTA','TRIÁNGULO ASCENDENTE','RUPTURA ALCISTA','RANGO LATERAL'].indexOf(p.type)>=0;});
  if(activeBullish.length) ctx=Math.min(100,ctx+15);
  if(activeBearish.length){ctx=Math.max(0,ctx-25);ctxBlockers.push('Patrón bajista activo: '+activeBearish[0].type);}

  // Momentum extremo
  if(mom.m20>25){ctx=Math.max(0,ctx-10);ctxBlockers.push('Momentum muy extendido (+'+mom.m20+'%)');}
  if(mom.m20<-25){ctx=Math.max(0,ctx-10);ctxBlockers.push('Caída fuerte 20d ('+mom.m20+'%)');}

  // ── ORS SIGNAL CHECK (0-100) ─────────────────────────
  var orsCtx=0,orsReasons=[],orsBlockers=[];

  // Modo Tendencia — relax RSI criteria when above SMA200
  var modoTendencia=DB&&DB.settings&&DB.settings.modoTendencia;
  var modoNoticia=DB&&DB.settings&&DB.settings.modoNoticia;
  var rsiZoneLo=modoTendencia&&aboveSMA200?45:25;
  var rsiZoneHi=modoTendencia&&aboveSMA200?65:42;

  // RSI — criterio principal
  var rsiScore=0,rsiLabel='',rsiColor='var(--sub)';
  if(rsi!==null){
    if(rsi>=rsiZoneLo&&rsi<=rsiZoneHi+10){rsiScore=100;rsiLabel=modoTendencia?'TENDENCIA':'ÓPTIMO';rsiColor='var(--signal)';orsReasons.push('RSI en zona óptima ORS ('+rsi.toFixed(1)+')');}
    else if(rsi>=20&&rsi<=42){rsiScore=70;rsiLabel='BUENO';rsiColor='var(--watch)';orsReasons.push('RSI en zona rebote ('+rsi.toFixed(1)+')');}
    else if(rsi>=42&&rsi<=55){rsiScore=30;rsiLabel='ESPERAR';rsiColor='var(--sub)';}
    else if(rsi>65){rsiScore=0;rsiLabel='ALTO';rsiColor='var(--bear)';orsBlockers.push('RSI sobrecomprado ('+rsi.toFixed(1)+') — esperar corrección');}
    else if(rsi<20){rsiScore=40;rsiLabel='MUY BAJO';rsiColor='var(--watch)';}
    else{rsiScore=15;rsiLabel='NEUTRAL';rsiColor='var(--sub)';}
  }
  orsCtx+=rsiScore*0.40;

  // Precio vs EMA20
  var emaScore=0,emaLabel='',emaColor='var(--sub)';
  if(ema20&&last){
    if(last<ema20){emaScore=80;emaLabel='BAJO EMA';emaColor='var(--signal)';orsReasons.push('Precio bajo EMA20 — zona mean reversion');}
    else if(last<ema20*1.02){emaScore=50;emaLabel='EN EMA';emaColor='var(--watch)';}
    else{emaScore=20;emaLabel='SOBRE EMA';emaColor='var(--bear)';orsBlockers.push('Precio extendido sobre EMA20');}
  }
  orsCtx+=emaScore*0.20;

  // Soporte cercano
  var supScore=0,closestSup=null,minSupDist=999;
  allSups.forEach(function(s){var d=(last-s.price)/s.price*100;if(d>=-0.5&&d<minSupDist){minSupDist=d;closestSup=s;}});
  if(closestSup){
    if(minSupDist<1.5){supScore=90;orsReasons.push('Sobre soporte inmediato $'+closestSup.price+' (+'+minSupDist.toFixed(1)+'%)');}
    else if(minSupDist<3){supScore=60;orsReasons.push('Acercándose soporte $'+closestSup.price+' ('+minSupDist.toFixed(1)+'%)');}
    else if(minSupDist<6){supScore=30;}
  }
  orsCtx+=supScore*0.25;

  // Momentum controlado
  var momScore=0;
  if(mom.m20>=-8&&mom.m20<=8){momScore=80;orsReasons.push('Momentum 20d controlado ('+mom.m20+'%)');}
  else if(mom.m20>8&&mom.m20<=20){momScore=40;}
  else if(mom.m20<-8&&mom.m20>=-20){momScore=50;orsReasons.push('Pullback 20d ('+mom.m20+'%) — posible rebote');}
  orsCtx+=momScore*0.15;

  // ── MACD BONUS ────────────────────────────────────────
  if(macd){
    if(macd.bullCross){orsCtx=Math.min(100,orsCtx+18);orsReasons.push('MACD cruce alcista ('+macd.macd.toFixed(3)+')');}
    else if(macd.bullish&&macd.increasing){orsCtx=Math.min(100,orsCtx+10);orsReasons.push('MACD alcista e incrementando');}
    else if(macd.bearCross){orsCtx=Math.max(0,orsCtx-12);orsBlockers.push('MACD cruce bajista');}
  }

  // ── WILLIAMS %R BONUS ─────────────────────────────────
  if(williamsR!==null){
    if(williamsR<=-80){orsCtx=Math.min(100,orsCtx+15);orsReasons.push('Williams %R extremo ('+williamsR+') — sobreventa fuerte');}
    else if(williamsR<=-70){orsCtx=Math.min(100,orsCtx+8);orsReasons.push('Williams %R en sobreventa ('+williamsR+')');}
    else if(williamsR>=-20){orsCtx=Math.max(0,orsCtx-10);orsBlockers.push('Williams %R sobrecomprado ('+williamsR+')');}
  }

  // ── OBV CONFIRMATION ──────────────────────────────────
  if(obv){
    if(obv.bullish&&obv.rising){orsCtx=Math.min(100,orsCtx+12);orsReasons.push('OBV alcista — acumulación institucional');}
    else if(!obv.bullish){orsCtx=Math.max(0,orsCtx-8);orsBlockers.push('OBV bajista — distribución en curso');}
  }

  // ── DIVERGENCE BONUS ──────────────────────────────────
  if(divergence){
    if(divergence.type==='ALCISTA'){orsCtx=Math.min(100,orsCtx+15);orsReasons.push('Divergencia RSI alcista — agotamiento bajista');}
    else if(divergence.type==='BAJISTA'){orsCtx=Math.max(0,orsCtx-12);orsBlockers.push('Divergencia RSI bajista — agotamiento alcista');}
  }
  var stochBonus=0;
  if(stochRsi){
    if(stochRsi.bullCross){
      stochBonus=25;orsReasons.push('⭐ Stoch RSI: cruce alcista en sobreventa (K:'+stochRsi.k+' D:'+stochRsi.d+')');
    } else if(stochRsi.oversold){
      stochBonus=15;orsReasons.push('Stoch RSI en sobreventa ('+stochRsi.k+') — timing de entrada');
    } else if(stochRsi.bearCross||stochRsi.overbought){
      stochBonus=-10;orsBlockers.push('Stoch RSI sobrecomprado ('+stochRsi.k+')');
    }
  }
  orsCtx=Math.min(100,orsCtx+stochBonus);

  // ── BOLLINGER BANDS BONUS ─────────────────────────────
  var bollBonus=0;
  if(bollinger){
    if(bollinger.nearLower){
      bollBonus=20;orsReasons.push('Precio en banda inferior Bollinger ($'+bollinger.lower+') — zona de rebote');
    } else if(bollinger.nearUpper){
      bollBonus=-15;orsBlockers.push('Precio en banda superior Bollinger ($'+bollinger.upper+') — sobreextendido');
    }
    if(bollinger.squeeze){
      orsReasons.push('Squeeze Bollinger — breakout inminente, preparar entrada');
    }
  }
  var bullCandles=candles.filter(function(c){return c.type==='ALCISTA';});
  var bearCandles=candles.filter(function(c){return c.type==='BAJISTA';});
  if(bullCandles.length){
    var strongest=bullCandles.reduce(function(a,b){return b.strength>a.strength?b:a;});
    orsCtx=Math.min(100,orsCtx+Math.round(strongest.strength*0.15));
    orsReasons.push(strongest.emoji+' Vela '+strongest.name+' ('+strongest.date+')');
  }
  if(bearCandles.length){
    var strongestB=bearCandles.reduce(function(a,b){return b.strength>a.strength?b:a;});
    orsCtx=Math.max(0,orsCtx-Math.round(strongestB.strength*0.1));
    orsBlockers.push(strongestB.emoji+' Vela bajista: '+strongestB.name);
  }

  // ── SLIT BONUS — False breakout reversal ────────────
  if(slit&&slit.detected){
    var slitStr=slit.strongest.strength;
    orsCtx=Math.min(100,orsCtx+Math.round(slitStr*0.18));
    orsReasons.push('⚡ SLIT Tipo '+slit.strongest.type+' detectado — '+slit.strongest.desc.slice(0,60));
  }

  // ── MFI BONUS ──────────────────────────────────────
  if(mfi&&mfi.bullish){
    orsCtx=Math.min(100,orsCtx+8);
    orsReasons.push('MFI en sobreventa ('+mfi.value+') — acumulación institucional confirmada');
  }
  if(mfi&&mfi.overbought){
    orsCtx=Math.max(0,orsCtx-10);
    orsBlockers.push('MFI sobrecomprado ('+mfi.value+') — flujo monetario agotado');
  }

  // ── EARNINGS RISK FILTER ──────────────────────────────
  if(earnings.risk){
    orsCtx=Math.max(0,orsCtx-20);
    ctx=Math.max(0,ctx-15);
    orsBlockers.push('⚠️ EARNINGS en '+earnings.daysAway+' días ('+earnings.date+') — riesgo elevado');
  }

  orsCtx=Math.round(Math.max(0,Math.min(100,orsCtx)));
  if(activeBearish.length) orsCtx=Math.max(0,orsCtx-20);

  // ── PHASE CLASSIFICATION ──────────────────────────────
  // ── UNIFIED SCORE: ORS×60% + CTX×40% ──────────────
  var unifiedScore=Math.round(orsCtx*0.6+ctx*0.4);

  // Phase — same logic both tabs now use unifiedScore
  var phase;
  if(unifiedScore>=65&&orsCtx>=60&&!activeBearish.length&&rsi!==null&&rsi<=45){
    phase=PHASES.SIGNAL;
  } else if(unifiedScore>=50&&!activeBearish.length){
    phase=PHASES.WATCH;
  } else if(unifiedScore>=30){
    phase=PHASES.RADAR;
  } else {
    phase=PHASES.NO;
  }

  // oppScore = unifiedScore for consistent ranking across all tabs
  var oppScore=unifiedScore;
  if(activeBearish.length) oppScore=Math.max(0,oppScore-20);
  if(wr!==null&&trades.length>=3) oppScore=Math.round(oppScore*0.9+wr*0.1);

  // Apply market context filter
  if(MARKET_CTX.loaded){
    oppScore=Math.round(oppScore*MARKET_CTX.filter);
    if(MARKET_CTX.trend==='BEAR'&&phase.key==='SIGNAL') phase=PHASES.WATCH;
  }

  return{
    sym:sym, phase:phase, oppScore:oppScore,
    ctx:ctx, orsCtx:orsCtx, unifiedScore:unifiedScore,
    rsi:rsi!==null?+rsi.toFixed(1):null, rsiScore:rsiScore, rsiLabel:rsiLabel, rsiColor:rsiColor,
    ema20:ema20?+ema20.toFixed(2):null, emaLabel:emaLabel, emaColor:emaColor,
    ema50:ema50val?+ema50val.toFixed(2):null,
    sma200:sma200val?+sma200val.toFixed(2):null,
    aboveSMA200:aboveSMA200,
    sma200Dist:sma200Dist,
    fib:fibLvl,
    fibProximity:fibProximity,
    vp:calcVolumeProfile(prices),
    atr:atr?+atr.toFixed(2):null, atrPct:atrPct?+atrPct.toFixed(2):null, range:rangeData,
    macd:macd, williamsR:williamsR, obv:obv, mfi:mfi, divergence:divergence,
    mom:mom, closestSup:closestSup, minSupDist:minSupDist<999?+minSupDist.toFixed(1):null,
    allLvl:allLvl, patterns:patterns,
    stochRsi:stochRsi, bollinger:bollinger, candles:candles, slit:slit, earnings:earnings,
    activeBullish:activeBullish, activeBearish:activeBearish,
    orsReasons:orsReasons, orsBlockers:orsBlockers, ctxBlockers:ctxBlockers,
    wr:wr, trades:trades.length, last:last, using15:using15, bars15:bars15count, hhhl:hhhl, gap:gapData,
    mfi:mfi, slit:slit,
    range:rangeData,
    vp:vp,
    ema50:ema50val?+ema50val.toFixed(2):null,
    sma200:sma200val?+sma200val.toFixed(2):null,
    aboveSMA200:aboveSMA200,
    sma200Dist:sma200Dist,
    fib:fibLvl,
    fibProximity:fibProximity,
    unifiedScore:unifiedScore,
  };
}

function getRanking(){
  return Object.keys(DB.tickers).map(function(sym){return analyzeSymbol(sym);})
    .filter(function(a){return a!==null;})
    .sort(function(a,b){
      // Sort: SIGNAL first, then by oppScore
      var po={SIGNAL:4,WATCH:3,RADAR:2,NO:1};
      if(po[b.phase.key]!==po[a.phase.key]) return po[b.phase.key]-po[a.phase.key];
      return b.oppScore-a.oppScore;
    });
}

// ── ALPACA DATA FUNCTIONS ─────────────────────────────
// Reemplaza Yahoo Finance con datos en tiempo real de Alpaca

function fetchAlpacaDaily(sym, cb) {
  // Histórico diario desde Alpaca (~2 años)
  // Servidor devuelve { sym, bars:[], count } — bars tiene open/high/low/close reales
  fetch(PROXY+'/alpaca/bars/daily?sym='+sym+'&limit=504')
    .then(function(r){return r.json();})
    .then(function(d){
      // Servidor devuelve d.bars (no d.prices)
      var bars = d.bars || d.prices || [];
      if(!bars.length){
        fetchYahooFallback(sym,'2y',cb);
        return;
      }
      // Normalizar: bars ya tienen {date, open, high, low, close, volume, vwap}
      var prices = bars.map(function(b){
        return {
          date:   b.date,
          open:   parseFloat((b.open||b.close||0).toFixed(2)),
          high:   parseFloat((b.high||b.close||0).toFixed(2)),
          low:    parseFloat((b.low||b.close||0).toFixed(2)),
          close:  parseFloat((b.close||0).toFixed(2)),
          volume: b.volume||0,
        };
      }).filter(function(p){ return p.close > 0; });
      if(!prices.length){ fetchYahooFallback(sym,'2y',cb); return; }
      // Construir quote desde última barra
      var last = prices[prices.length-1];
      var prev = prices.length>1 ? prices[prices.length-2] : last;
      var chg = last.close - prev.close;
      var chgPct = prev.close ? chg/prev.close*100 : 0;
      var quote = {
        price:     last.close,
        open:      last.open,
        high:      last.high,
        low:       last.low,
        change:    parseFloat(chg.toFixed(2)),
        changePct: parseFloat(chgPct.toFixed(2)),
        volume:    last.volume,
        source:    'alpaca',
      };
      cb(prices, quote);
    })
    .catch(function(e){ fetchYahooFallback(sym,'2y',cb); });
}

function fetchAlpacaSnapshots(syms, cb) {
  // Precios en tiempo real de múltiples símbolos
  var symStr=syms.join(',');
  fetch(PROXY+'/alpaca/snapshots?syms='+symStr)
    .then(function(r){return r.json();})
    .then(function(d){cb(d);})
    .catch(function(){cb({});});
}

// Yahoo como fallback (por si Alpaca falla)
function parseYahoo(d){
  var res=d&&d.chart&&d.chart.result&&d.chart.result[0];if(!res)return null;
  var ts=res.timestamp,q0=res.indicators.quote[0],meta=res.meta;
  var prices=[];
  for(var i=0;i<ts.length;i++){
    if(!q0.close[i])continue;
    var dt=new Date(ts[i]*1000);
    prices.push({date:dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2),open:q0.open?+q0.open[i].toFixed(2):q0.close[i],close:+q0.close[i].toFixed(2),high:q0.high[i]||q0.close[i],low:q0.low[i]||q0.close[i],volume:q0.volume?q0.volume[i]:0});
  }
  var cp=meta.regularMarketPrice||q0.close[q0.close.length-1];
  var pc=meta.chartPreviousClose||meta.previousClose||q0.close[q0.close.length-2]||cp;
  var chg=cp-pc,chgPct=pc?chg/pc*100:0;
  // Sanity filter: Yahoo a veces da datos corruptos con cambios imposibles (>15% en un dia normal)
  if(Math.abs(chgPct)>15){chg=0;chgPct=0;}
  return{prices:prices,quote:{price:+cp.toFixed(2),change:+chg.toFixed(2),changePct:+chgPct.toFixed(2),high:meta.regularMarketDayHigh||cp,low:meta.regularMarketDayLow||cp,source:'yahoo'}};
}
function fetchYahooFallback(sym,range,cb){
  fetch(PROXY+'/yahoo?sym='+sym+'&range='+range)
    .then(function(r){return r.json();})
    .then(function(d){var p=parseYahoo(d);if(!p||!p.prices.length){cb(null);return;}cb(p.prices,p.quote);})
    .catch(function(){cb(null);});
}

// ── INTRADAY 15min DATA ───────────────────────────────
var INTRADAY = {}; // sym -> {prices15, ts}

function fetchIntraday(sym, cb) {
  var now = Date.now();
  var cached = INTRADAY[sym];
  // Cache 3 minutos en horario de mercado
  if (cached && now - cached.ts < 3*60*1000) { if(cb) cb(cached.prices15); return; }
  // Usar Alpaca para datos 15min reales via proxy
  (function(){
    var startD=new Date(); startD.setDate(startD.getDate()-7);
    var startStr=startD.toISOString().split('T')[0];
    return fetch(PROXY+'/alpaca/bars/15min?sym='+encodeURIComponent(sym)+'&limit=200&start='+startStr);
  }())
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){
      var bars = d.bars || [];
      if (!bars.length) {
        // Fallback Yahoo
        fetch(PROXY+'/yahoo?sym='+sym+'&range=5d&interval=15m')
          .then(function(r2){return r2.json();})
          .then(function(d2){
            var res=d2&&d2.chart&&d2.chart.result&&d2.chart.result[0];
            if(!res){cb(null);return;}
            var ts=res.timestamp,q0=res.indicators.quote[0];
            var prices15=[];
            for(var i=0;i<ts.length;i++){
              if(!q0.close[i])continue;
              var dt=new Date(ts[i]*1000);
              prices15.push({date:dt.toISOString().slice(0,16).replace('T',' '),open:q0.open?+q0.open[i].toFixed(2):q0.close[i],close:+q0.close[i].toFixed(2),high:q0.high[i]||q0.close[i],low:q0.low[i]||q0.close[i],volume:q0.volume?q0.volume[i]:0});
            }
            INTRADAY[sym]={prices15:prices15,ts:now,source:'yahoo'};
            cb(prices15);
          }).catch(function(){cb(null);});
        return;
      }
      INTRADAY[sym] = { prices15: bars, ts: now, source: 'alpaca' };
      cb(bars);
    })
    .catch(function(){cb(null);});
}
function loadQuotes(){
  var syms=Object.keys(DB.tickers);
  if(!syms.length)return;
  // Alpaca snapshots: todos los precios en UNA sola petición (más rápido y eficiente)
  fetchAlpacaSnapshots(syms, function(data){
    var updated=false;
    syms.forEach(function(sym){
      if(data[sym]){
        MKT[sym]=data[sym];
        updated=true;
      }
    });
    if(updated) render();
    // Si algún ticker no vino en el snapshot, fallback individual
    syms.forEach(function(sym){
      if(!MKT[sym]){
        fetchYahooFallback(sym,'5d',function(prices,q){if(q){MKT[sym]=q;render();}});
      }
    });
  });
}

// Actualización automática de precios cada 60s en horario de mercado
function startAutoRefresh(){
  setInterval(function(){
    var now=new Date();
    var h=now.getUTCHours();
    var m=now.getUTCMinutes();
    var day=now.getUTCDay();
    // Mercado US: lun-vie 13:30-20:00 UTC
    var isMarketHours=day>=1&&day<=5&&((h===13&&m>=30)||h>13)&&h<20;
    if(isMarketHours&&Object.keys(DB.tickers).length) loadQuotes();
  }, 60*1000);
}
startAutoRefresh();

// EXIT SIGNAL SYSTEM
// Basado en: RSI>70 bajando, Divergencia RSI, OBV bajista,
// MACD cruce bajista, precio cerca de resistencia
// ═══════════════════════════════════════════════════════
function calcExitSignal(sym, entryPrice) {
  var tk = DB.tickers[sym];
  if (!tk || !tk.prices || tk.prices.length < 20) return null;
  var prices = tk.prices;
  var n = prices.length;
  var last = MKT[sym] ? MKT[sym].price : prices[n-1].close;
  var rsi = calcRSI(prices, 14);
  var mom = calcMomentum(prices);
  var allLvl = detectAllLevels(prices);
  var atr = calcATR(prices, 14);
  var signals = [];
  var score = 0;

  // 1. RSI > 70 — alerta
  if (rsi !== null && rsi > 70) {
    score += 25;
    signals.push({label:'RSI > 70 bajando', weight:'⚠️ Alerta', color:'var(--watch)', detail:'RSI actual: '+rsi.toFixed(1)});
  } else if (rsi !== null && rsi > 65) {
    score += 12;
    signals.push({label:'RSI acercándose a sobrecompra', weight:'🔍 Vigilar', color:'var(--blue)', detail:'RSI: '+rsi.toFixed(1)+' — cerca de zona peligrosa'});
  }

  // 2. Divergencia RSI (precio sube pero RSI baja en últimas 10 velas)
  if (n >= 15) {
    var cls10 = prices.slice(n-10).map(function(p){return p.close;});
    var rsiRecent = calcRSI(prices.slice(0, n-5), 14);
    var priceTrend = cls10[cls10.length-1] - cls10[0];
    var rsiTrend = rsi !== null && rsiRecent !== null ? rsi - rsiRecent : 0;
    if (priceTrend > 0 && rsiTrend < -3) {
      score += 30;
      signals.push({label:'Divergencia RSI bajista', weight:'🔴 Fuerte', color:'var(--bear)', detail:'Precio subiendo pero RSI bajando — señal de agotamiento'});
    }
  }

  // 3. Momentum 5d negativo mientras posición en beneficio
  if (entryPrice && last > entryPrice && mom.m5 < -1.5) {
    score += 20;
    signals.push({label:'Momentum 5d girando negativo', weight:'🔴 Fuerte', color:'var(--bear)', detail:'Corto plazo debilitándose ('+mom.m5+'%) con posición en beneficio'});
  }

  // 4. Precio cerca de resistencia corto plazo (dentro del 2%)
  var allRes = [];
  ['week','short','mid'].forEach(function(tf){
    if(allLvl[tf]) allLvl[tf].resistances.forEach(function(r){ allRes.push(r); });
  });
  allRes.forEach(function(r){
    var distPct = (r.price - last) / last * 100;
    if (distPct >= 0 && distPct < 2) {
      score += 25;
      signals.push({label:'Resistencia cercana', weight:'🔴 Confirma', color:'var(--bear)', detail:'$'+r.price+' a solo '+distPct.toFixed(1)+'% (×'+r.strength+' toques previos)'});
    }
  });

  // 5. Patrón de techo (doble techo o bandera bajista activos)
  var patterns = detectPatterns(prices);
  patterns.filter(function(p){
    return p.isActive && (p.type==='DOBLE TECHO'||p.type==='BANDERA BAJISTA'||p.type==='RUPTURA BAJISTA');
  }).forEach(function(p){
    score += 20;
    signals.push({label:'Patrón: '+p.type, weight:'🔴 Confirma', color:'var(--bear)', detail:p.desc});
  });

  // 6. P&L actual si hay precio de entrada
  var pnlActual = entryPrice ? pnlPct(entryPrice, last) : null;

  // Nivel de urgencia
  var urgency, urgencyColor, urgencyLabel;
  if (score >= 60) {
    urgency = 'SALIR_AHORA'; urgencyColor = 'var(--bear)';
    urgencyLabel = '🔴 SALIR AHORA — '+score+'pts coinciden';
  } else if (score >= 35) {
    urgency = 'AJUSTAR_STOP'; urgencyColor = 'var(--watch)';
    urgencyLabel = '🟡 AJUSTAR STOP — '+score+'pts coinciden';
  } else if (score >= 15) {
    urgency = 'VIGILAR_SALIDA'; urgencyColor = 'var(--blue)';
    urgencyLabel = '🔵 VIGILAR SALIDA — '+score+'pts';
  } else {
    urgency = 'MANTENER'; urgencyColor = 'var(--signal)';
    urgencyLabel = '🟢 MANTENER POSICIÓN';
  }

  // Trailing stop sugerido (basado en ATR)
  var trailingStop = null;
  if (atr && last) {
    trailingStop = parseFloat((last - atr * 1.2).toFixed(2));
  }

  return {
    score: score, urgency: urgency,
    urgencyLabel: urgencyLabel, urgencyColor: urgencyColor,
    signals: signals, pnlActual: pnlActual,
    trailingStop: trailingStop, last: last, rsi: rsi,
  };
}

function sendExitAlert(sym, exitSignal, entryPrice) {
  var msg = '🔴 <b>SEÑAL DE SALIDA — '+sym+'</b>\n\n';
  msg += '💰 Precio actual: <b>$'+exitSignal.last.toFixed(2)+'</b>\n';
  if (exitSignal.pnlActual !== null) msg += '📊 P&L: <b>'+(exitSignal.pnlActual>=0?'+':'')+exitSignal.pnlActual+'%</b>\n';
  msg += '⚡ '+exitSignal.urgencyLabel+'\n\n';
  exitSignal.signals.forEach(function(s){ msg += s.weight+' '+s.label+'\n'; });
  if (exitSignal.trailingStop) msg += '\n🛡 Trailing stop sugerido: <b>$'+exitSignal.trailingStop+'</b>';
  msg += '\n\n⚠️ Señal calculada con datos Alpaca en tiempo real';
  sendTG(msg);
  toast('📱 Alerta de salida enviada — '+sym);
}

function checkExits(){
  var openTrades=DB.journal.filter(function(t){return t.status==='open'||t.result==='OPEN';});
  openTrades.forEach(function(t){
    var key=t.ticker+'_exit_'+new Date().toDateString()+'_'+t.id;
    if(TG_SENT[key])return;
    var exitSig=calcExitSignal(t.ticker,t.entry);
    if(!exitSig)return;
    if(exitSig.urgency==='SALIR_AHORA'||exitSig.urgency==='AJUSTAR_STOP'){
      TG_SENT[key]=true;
      sendExitAlert(t.ticker,exitSig,t.entry);
    }
  });
}

function calcStops(sym,entry,qty){
  var tk=DB.tickers[sym];if(!tk||!tk.prices||tk.prices.length<15)return[];
  var atr=calcATR(tk.prices,14),allLvl=detectAllLevels(tk.prices),stops=[];
  if(atr){var s=+(entry-atr*1.5).toFixed(2);stops.push({label:'ATR ×1.5',stop:s,pct:+((entry-s)/entry*100).toFixed(2),reason:'Volatilidad diaria real del ticker'});}
  var allSups=[];
  ['week','short','mid'].forEach(function(tf){if(allLvl[tf])allLvl[tf].supports.forEach(function(s){allSups.push(s);});});
  var below=allSups.filter(function(s){return s.price<entry*0.999;});
  if(below.length){below.sort(function(a,b){return b.price-a.price;});var ns=below[0],ss=+(ns.price*0.99).toFixed(2);stops.push({label:'Bajo soporte',stop:ss,pct:+((entry-ss)/entry*100).toFixed(2),reason:'Justo bajo soporte $'+ns.price+' (×'+ns.strength+')'});}
  if(qty>0){var riskEur=11480*0.02,rs=+(entry-riskEur/qty/0.92).toFixed(2);if(rs>0)stops.push({label:'Riesgo 2% capital',stop:rs,pct:+((entry-rs)/entry*100).toFixed(2),reason:'Máximo ~€'+Math.round(riskEur)+' de pérdida'});}
  stops.sort(function(a,b){return b.stop-a.stop;});
  return stops;
}
function calcTargets(entry,stop){
  var risk=entry-stop,targets=[];
  [[1.5,'Cerrar 50% posición'],[2,'Subir stop a breakeven'],[3,'Cerrar posición restante']].forEach(function(t){
    targets.push({label:'R/R 1:'+t[0],price:+(entry+risk*t[0]).toFixed(2),rr:'1:'+t[0],action:t[1]});
  });
  return targets;
}

function renderChartInterpretation(prices, tf, a, lp){
  if(!prices||prices.length<5||!a) return '';
  var last=prices[prices.length-1];
  var prev=prices[prices.length-2];
  var chgPct=prev.close?((last.close-prev.close)/prev.close*100):0;

  // Determine what the chart indicators suggest
  var signals=[];
  var bullish=0, bearish=0;

  // SMA200
  if(a.sma200){
    if(lp>a.sma200){bullish++;signals.push({icon:'✅',col:'var(--signal)',text:'Precio sobre SMA200 ($'+a.sma200+') — tendencia macro alcista. Los institucionales ven esto como terreno comprador.'});}
    else{bearish++;signals.push({icon:'⚠️',col:'var(--bear)',text:'Precio bajo SMA200 ($'+a.sma200+') — tendencia macro bajista. Riesgo elevado para compras.'});}
  }
  // EMA50
  if(a.ema50){
    if(lp<a.ema50){bullish++;signals.push({icon:'🎯',col:'var(--signal)',text:'Precio bajo EMA50 ($'+a.ema50+') — objetivo natural de subida. Es el Target T1 del sistema ORS-v2.'});}
    else{signals.push({icon:'📊',col:'var(--sub)',text:'Precio sobre EMA50 ($'+a.ema50+') — ya ha alcanzado target T1. Buscar siguiente resistencia.'});}
  }
  // RSI
  if(a.rsi){
    if(a.rsi<30){bullish++;signals.push({icon:'⚡',col:'var(--signal)',text:'RSI '+a.rsi+' — SOBREVENTA. El precio ha caído demasiado rápido. Alta probabilidad de rebote técnico.'});}
    else if(a.rsi>70){bearish++;signals.push({icon:'🔴',col:'var(--bear)',text:'RSI '+a.rsi+' — SOBRECOMPRA. El precio ha subido demasiado rápido. Riesgo de corrección.'});}
    else if(a.rsi>=58&&a.rsi<=68){signals.push({icon:'🚀',col:'var(--blue)',text:'RSI '+a.rsi+' — ZONA MOMENTUM. Tendencia alcista activa. Compatible con Módulo Momentum.'});}
    else{signals.push({icon:'📊',col:'var(--sub)',text:'RSI '+a.rsi+' — zona neutra. Sin señal extrema en este momento.'});}
  }
  // Fibonacci
  if(a.fibProximity){
    bullish++;
    signals.push({icon:'📐',col:'var(--purple)',text:'Fibonacci '+a.fibProximity.level+' en $'+a.fibProximity.price+' — soporte matemático clave. El precio está exactamente donde históricamente rebota.'});
  }
  // Volume Profile
  if(a.vp&&lp){
    if(lp<a.vp.val){bullish++;signals.push({icon:'📊',col:'var(--signal)',text:'Precio bajo VAL ($'+a.vp.val+') del Perfil de Volumen. Hay dinero institucional acumulado arriba. El POC en $'+a.vp.poc+' actúa como imán.'});}
    else if(lp>a.vp.vah){bearish++;signals.push({icon:'📊',col:'var(--bear)',text:'Precio sobre VAH ($'+a.vp.vah+') — zona de resistencia con mucho volumen negociado. El precio puede encontrar rechazo aquí.'});}
    else{signals.push({icon:'📊',col:'var(--blue)',text:'Precio en Value Area (entre $'+a.vp.val+' y $'+a.vp.vah+'). Zona de equilibrio. El POC en $'+a.vp.poc+' es el precio más negociado.'});}
  }
  // SLIT
  if(a.slit&&a.slit.detected){
    bullish++;
    signals.push({icon:'⚡',col:'var(--accent)',text:'SLIT detectado — falso rompimiento. Los stops han sido cazados y el precio puede moverse con fuerza. El dinero inteligente aprovechó para acumular.'});
  }
  // Range
  if(a.range&&a.range.isRange){
    signals.push({icon:'↔️',col:'var(--sub)',text:'Mercado en rango ('+a.range.rangePct+'%). El precio oscila entre $'+a.range.lo+' y $'+a.range.hi+'. Comprar cerca del suelo, vender cerca del techo.'});
  }

  // Trend line interpretation
  var trend=chgPct>0?'alcista':'bajista';
  var trendCol=chgPct>0?'var(--signal)':'var(--bear)';

  var html='<div class="card" style="margin-bottom:12px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html+='<div class="sec-hdr" style="margin:0">📖 INTERPRETACIÓN DEL GRÁFICO</div>';
  html+='<div style="font-size:11px;font-weight:700;color:'+trendCol+'">'+( chgPct>=0?'+':'')+chgPct.toFixed(2)+'% tendencia '+trend+'</div>';
  html+='</div>';

  // Overall signal
  var overallCol=bullish>bearish?'var(--signal)':bearish>bullish?'var(--bear)':'var(--watch)';
  var overallTxt=bullish>bearish?'CONTEXTO ALCISTA — las líneas del gráfico apuntan a oportunidad de compra':bearish>bullish?'CONTEXTO BAJISTA — esperar mejor momento de entrada':'CONTEXTO NEUTRO — mercado indeciso';
  html+='<div style="background:'+overallCol.replace('var(','').replace(')','')+'12;border:1px solid '+overallCol.replace('var(','').replace(')','')+'30;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;font-weight:700;color:'+overallCol+'">';
  html+=overallTxt;
  html+='</div>';

  // Individual signals
  signals.forEach(function(s){
    html+='<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">';
    html+='<span style="font-size:14px;flex-shrink:0">'+s.icon+'</span>';
    html+='<div style="font-size:11px;color:var(--text);line-height:1.6">'+s.text+'</div>';
    html+='</div>';
  });

  // What operation to expect
  var opType='';
  if(bullish>=3&&a.orsCtx>=65) opType='⚡ Señal ORS de rebote — entrada en sobreventa con contexto alcista';
  else if(a.rsi>=58&&a.rsi<=68&&bullish>=2) opType='🚀 Oportunidad de Momentum — tendencia alcista con volumen institucional';
  else if(bullish>bearish) opType='👁 Vigilar — contexto mejorando, esperar señal ORS';
  else opType='🔭 Radar — sin señal clara, mantener en seguimiento';

  html+='<div style="background:var(--accent)08;border-radius:10px;padding:10px 12px;margin-top:10px">';
  html+='<div style="font-size:9px;color:var(--accent);letter-spacing:1.5px;margin-bottom:4px">OPERACIÓN ESPERADA</div>';
  html+='<div style="font-size:12px;font-weight:700;color:var(--text)">'+opType+'</div>';
  html+='</div>';
  html+='</div>';
  return html;
}

function setCTF(sym, tf) {
  if(!CHART_STATE[sym]) CHART_STATE[sym]={};
  CHART_STATE[sym].tf = tf;
  if(tf==='15M'||tf==='1H'){
    CHART_STATE[sym].range='1D';
    render(); // Show loading state immediately
    if(!INTRADAY[sym]||Date.now()-INTRADAY[sym].ts>180000){
      toast('⏳ Cargando datos '+tf+' de Alpaca...',3000);
      loadIntraday(sym); // Will call render() when done
    }
  } else {
    if(!CHART_STATE[sym].range||CHART_STATE[sym].range==='1D') CHART_STATE[sym].range='3M';
    render();
  }
}
function setCRange(sym, rng) {
  if(!CHART_STATE[sym]) CHART_STATE[sym]={};
  CHART_STATE[sym].range = rng;
  render();
}

// ── SVG CANDLESTICK CHART v2 — Full indicators ────────
function renderCandleChart(prices, tf, levels, trades) {
  var n = prices.length;
  if (n < 2) return '<div class="empty">Sin datos</div>';
  var isDark = !document.body.classList.contains('light');
  var colBull = isDark ? '#00e5a0' : '#00a870';
  var colBear = isDark ? '#ff4560' : '#e02040';
  var colGrid = isDark ? 'rgba(30,45,69,.5)' : 'rgba(200,212,232,.6)';
  var colText = isDark ? '#2a3f5a' : '#8090a8';
  var colBg   = isDark ? '#0b0f1a' : '#f8fafc';

  // More candles for better context
  var maxC = tf==='15M'?130:tf==='1H'?80:Math.min(n,100);
  var display = prices.slice(-maxC);
  var nd = display.length;

  // Price range with padding
  var highs = display.map(function(p){return p.high||p.close;});
  var lows  = display.map(function(p){return p.low||p.close;});
  var hi = Math.max.apply(null,highs);
  var lo = Math.min.apply(null,lows);
  var pad = (hi-lo)*0.08;
  hi+=pad; lo-=pad;
  var rng = hi-lo||1;

  var W=420, H=220, padL=4, padR=56, padT=14, padB=28;
  var cw=W-padL-padR, ch=H-padT-padB;
  var cw2=cw/nd, bodyW=Math.max(1,cw2*0.72);

  function xOf(i){return padL+(i+0.5)*cw2;}
  function yOf(v){return padT+(1-(v-lo)/rng)*ch;}

  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;background:'+colBg+';border-radius:10px;overflow:visible" xmlns="http://www.w3.org/2000/svg">';

  // Grid lines
  for(var gi=0;gi<=4;gi++){
    var gy=padT+gi*(ch/4);
    var gv=(hi-(gi/4)*rng).toFixed(2);
    svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="'+colGrid+'" stroke-width="0.7"/>';
    svg+='<text x="'+(W-padR+3)+'" y="'+(gy+3.5)+'" font-size="7.5" fill="'+colText+'" font-family="monospace">$'+gv+'</text>';
  }

  // ── MOVING AVERAGES ────────────────────────────────
  function drawMA(period, color, dashArr) {
    var maLine = '';
    for(var mi=period-1;mi<nd;mi++){
      var sum=0;
      for(var mj=0;mj<period;mj++) sum+=display[mi-mj].close;
      var yv=yOf(sum/period);
      var xv=xOf(mi);
      maLine+=(mi===period-1?'M':'L')+xv+' '+yv+' ';
    }
    if(maLine) svg+='<path d="'+maLine+'" stroke="'+color+'" stroke-width="1.2" fill="none" opacity="0.8"'+(dashArr?' stroke-dasharray="'+dashArr+'"':'')+'/>';
  }

  if(nd>=9)  drawMA(9,  '#f0c040');        // EMA9  — gold
  if(nd>=20) drawMA(20, '#4a9eff');        // EMA20 — blue
  if(nd>=50) drawMA(50, '#b060ff','4,2');  // EMA50 — purple dashed
  if(nd>=200)drawMA(200,'#ff8c00','2,4'); // SMA200 — orange dotted

  // ── ICHIMOKU ─────────────────────────────────────
  // Only draw if user enabled it (DB.showIchimoku) and enough data
  if(DB.showIchimoku && nd >= 52){
    // Tenkan-Sen (9 periods)
    function ichHLMid(arr, period, idx){
      var sl=arr.slice(Math.max(0,idx-period+1),idx+1);
      var hi=Math.max.apply(null,sl.map(function(p){return p.high||p.close;}));
      var lo2=Math.min.apply(null,sl.map(function(p){return p.low||p.close;}));
      return (hi+lo2)/2;
    }
    var tenkan=[],kijun=[],senkouA=[],senkouB=[];
    for(var ic=0;ic<nd;ic++){
      tenkan.push(ichHLMid(display,9,ic));
      kijun.push(ichHLMid(display,26,ic));
      senkouA.push((tenkan[ic]+kijun[ic])/2);
      senkouB.push(ichHLMid(display,52,ic));
    }

    // Draw Kumo (cloud) — filled area between SenkouA and SenkouB
    // Build two paths and fill between them
    var kumoPath='';
    var topPath='', botPath='';
    for(var ic=0;ic<nd;ic++){
      var xic=xOf(ic);
      var yA=yOf(senkouA[ic]);
      var yB=yOf(senkouB[ic]);
      if(ic===0){
        topPath='M'+xic+' '+yA+' ';
        botPath='M'+xic+' '+yB+' ';
      } else {
        topPath+='L'+xic+' '+yA+' ';
        botPath+='L'+xic+' '+yB+' ';
      }
    }
    // Build closed polygon: top path forward, bottom path backward
    var botReverse='';
    for(var ic=nd-1;ic>=0;ic--){
      botReverse+='L'+xOf(ic)+' '+yOf(senkouB[ic])+' ';
    }
    // Determine if bullish (A>B avg) or bearish cloud
    var avgA=senkouA.reduce(function(s,v){return s+v;},0)/senkouA.length;
    var avgB=senkouB.reduce(function(s,v){return s+v;},0)/senkouB.length;
    var kumoCol=avgA>avgB?'rgba(22,163,74,0.12)':'rgba(220,38,38,0.12)';
    var kumoBorder=avgA>avgB?'rgba(22,163,74,0.4)':'rgba(220,38,38,0.4)';
    kumoPath=topPath+botReverse+'Z';
    svg+='<path d="'+kumoPath+'" fill="'+kumoCol+'" stroke="none"/>';

    // SenkouA line (green dashed)
    svg+='<path d="'+topPath+'" stroke="rgba(22,163,74,0.7)" stroke-width="1" fill="none" stroke-dasharray="4,3"/>';
    // SenkouB line (red dashed)
    svg+='<path d="'+botPath+'" stroke="rgba(220,38,38,0.7)" stroke-width="1" fill="none" stroke-dasharray="4,3"/>';

    // Tenkan-Sen (orange thin)
    var tLine='';
    for(var ic=0;ic<nd;ic++){
      tLine+=(ic===0?'M':'L')+xOf(ic)+' '+yOf(tenkan[ic])+' ';
    }
    svg+='<path d="'+tLine+'" stroke="#f97316" stroke-width="1" fill="none" opacity="0.9"/>';

    // Kijun-Sen (blue medium) — Target T2
    var kLine='';
    for(var ic=0;ic<nd;ic++){
      kLine+=(ic===0?'M':'L')+xOf(ic)+' '+yOf(kijun[ic])+' ';
    }
    svg+='<path d="'+kLine+'" stroke="#0891b2" stroke-width="1.5" fill="none" opacity="0.9"/>';

    // Kijun label at end
    var kijunLast=kijun[nd-1];
    if(kijunLast>lo&&kijunLast<hi){
      svg+='<text x="'+(W-padR+3)+'" y="'+(yOf(kijunLast)+3)+'" font-size="7" fill="#0891b2" font-family="sans-serif" font-weight="bold">K</text>';
    }
    var tenkanLast=tenkan[nd-1];
    if(tenkanLast>lo&&tenkanLast<hi){
      svg+='<text x="'+(W-padR+3)+'" y="'+(yOf(tenkanLast)+3)+'" font-size="7" fill="#f97316" font-family="sans-serif">T</text>';
    }

    // TK Cross detection — mark last cross
    for(var ic=nd-1;ic>0;ic--){
      var crossed=((tenkan[ic]>kijun[ic])&&(tenkan[ic-1]<=kijun[ic-1])) ||
                  ((tenkan[ic]<kijun[ic])&&(tenkan[ic-1]>=kijun[ic-1]));
      if(crossed){
        var bullCross=tenkan[ic]>kijun[ic];
        var xCross=xOf(ic);
        var yCross=yOf((tenkan[ic]+kijun[ic])/2);
        svg+='<circle cx="'+xCross+'" cy="'+yCross+'" r="4" fill="'+(bullCross?'#16a34a':'#dc2626')+'" opacity="0.8"/>';
        svg+='<text x="'+xCross+'" y="'+(yCross-(bullCross?8:-2))+'" font-size="7" fill="'+(bullCross?'#16a34a':'#dc2626')+'" font-family="sans-serif" text-anchor="middle">'+(bullCross?'TK↑':'TK↓')+'</text>';
        break;
      }
    }
  }

  // ── SR LEVELS ─────────────────────────────────────
  if(levels){
    (levels.supports||[]).slice(0,3).forEach(function(s){
      if(s.price>lo&&s.price<hi){
        var y=yOf(s.price);
        svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#00e5a0" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>';
        svg+='<text x="'+(W-padR+3)+'" y="'+(y-1.5)+'" font-size="7" fill="#00e5a0" font-family="monospace">S</text>';
      }
    });
    (levels.resistances||[]).slice(0,3).forEach(function(r){
      if(r.price>lo&&r.price<hi){
        var y=yOf(r.price);
        svg+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#ff4560" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>';
        svg+='<text x="'+(W-padR+3)+'" y="'+(y-1.5)+'" font-size="7" fill="#ff4560" font-family="monospace">R</text>';
      }
    });
  }

  // ── VOLUME PROFILE (right side histogram) ────────
  var vp=calcVolumeProfile(display);
  if(vp){
    var vpW=18; // width of VP histogram on right
    var vpX=W-padR-vpW-2;
    // Draw histogram bars
    var nbuckets=vp.vol.length;
    for(var vbi=0;vbi<nbuckets;vbi++){
      var bprice=vp.lo+vbi*vp.bucketSize+vp.bucketSize/2;
      if(bprice<lo||bprice>hi) continue;
      var by=yOf(bprice);
      var bh=Math.max(1,(ch/nbuckets)*0.8);
      var bw=Math.round((vp.vol[vbi]/vp.maxVol)*vpW);
      var isPOC=Math.abs(bprice-vp.poc)<vp.bucketSize;
      var isVA=bprice>=vp.val&&bprice<=vp.vah;
      var bCol=isPOC?'#f0c040':isVA?'rgba(74,158,255,.7)':'rgba(74,158,255,.35)';
      svg+='<rect x="'+(vpX+vpW-bw)+'" y="'+(by-bh/2)+'" width="'+bw+'" height="'+bh+'" fill="'+bCol+'" rx="1"/>';
    }
    // POC line
    if(vp.poc>lo&&vp.poc<hi){
      var yp=yOf(vp.poc);
      svg+='<line x1="'+padL+'" y1="'+yp+'" x2="'+vpX+'" y2="'+yp+'" stroke="#f0c040" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.9"/>';
      svg+='<text x="'+(vpX+2)+'" y="'+(yp-2)+'" font-size="7" fill="#f0c040" font-family="monospace">POC</text>';
    }
    // VAH line
    if(vp.vah>lo&&vp.vah<hi){
      var yvah=yOf(vp.vah);
      svg+='<line x1="'+padL+'" y1="'+yvah+'" x2="'+vpX+'" y2="'+yvah+'" stroke="#4a9eff" stroke-width="1" stroke-dasharray="3,4" opacity="0.7"/>';
      svg+='<text x="'+(padL+2)+'" y="'+(yvah-2)+'" font-size="6.5" fill="#4a9eff" font-family="monospace">VAH</text>';
    }
    // VAL line
    if(vp.val>lo&&vp.val<hi){
      var yval=yOf(vp.val);
      svg+='<line x1="'+padL+'" y1="'+yval+'" x2="'+vpX+'" y2="'+yval+'" stroke="#4a9eff" stroke-width="1" stroke-dasharray="3,4" opacity="0.7"/>';
      svg+='<text x="'+(padL+2)+'" y="'+(yval+8)+'" font-size="6.5" fill="#4a9eff" font-family="monospace">VAL</text>';
    }
  }

  // ── FIBONACCI LEVELS ──────────────────────────────
  var fibv=calcFibLevels(prices);
  if(fibv){
    var fibDefs=[
      {v:fibv.r236,c:'#b060ff',l:'23.6%'},
      {v:fibv.r382,c:'#9050ee',l:'38.2%'},
      {v:fibv.r500,c:'#7040dd',l:'50%'},
      {v:fibv.r618,c:'#5030cc',l:'61.8%'},
    ];
    fibDefs.forEach(function(fd){
      if(fd.v>lo&&fd.v<hi){
        var yf=yOf(fd.v);
        svg+='<line x1="'+padL+'" y1="'+yf+'" x2="'+(W-padR)+'" y2="'+yf+'" stroke="'+fd.c+'" stroke-width="0.8" stroke-dasharray="3,5" opacity="0.65"/>';
        svg+='<text x="'+(W-padR+3)+'" y="'+(yf+3)+'" font-size="6.5" fill="'+fd.c+'" font-family="monospace">'+fd.l+'</text>';
      }
    });
  }

  // ── TREND LINE ────────────────────────────────────
  // Simple linear regression over last 20 candles
  if(nd>=20){
    var tLen=Math.min(20,nd);
    var tSlice=display.slice(-tLen);
    var sx=0,sy=0,sxy=0,sxx=0;
    tSlice.forEach(function(p,i){sx+=i;sy+=p.close;sxy+=i*p.close;sxx+=i*i;});
    var slope=(tLen*sxy-sx*sy)/(tLen*sxx-sx*sx);
    var intercept=(sy-slope*sx)/tLen;
    var x0=nd-tLen, x1=nd-1;
    var y0=yOf(intercept+slope*0);
    var y1=yOf(intercept+slope*(tLen-1));
    var tCol=slope>0?colBull:colBear;
    svg+='<line x1="'+xOf(x0)+'" y1="'+y0+'" x2="'+xOf(x1)+'" y2="'+y1+'" stroke="'+tCol+'" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>';
    // Trend label
    var tLbl=slope>0?'↗ Tendencia alcista':'↘ Tendencia bajista';
    svg+='<text x="'+(xOf(x0)+4)+'" y="'+(Math.min(y0,y1)-4)+'" font-size="8" fill="'+tCol+'" opacity="0.8">'+tLbl+'</text>';
  }

  // ── CANDLES ───────────────────────────────────────
  display.forEach(function(candle,i){
    var prevClose=i>0?display[i-1].close:candle.close;
    var o=candle.open!=null&&candle.open>0?candle.open:prevClose;
    var c=candle.close;
    var h=candle.high!=null&&candle.high>0?candle.high:Math.max(o,c)*1.001;
    var l=candle.low!=null&&candle.low>0?candle.low:Math.min(o,c)*0.999;
    var isBull=c>=o;
    var col=isBull?colBull:colBear;
    var cx=xOf(i);
    var bodyTop=yOf(Math.max(o,c));
    var bodyBot=yOf(Math.min(o,c));
    var bodyH=Math.max(1.5,bodyBot-bodyTop);
    svg+='<line x1="'+cx+'" y1="'+yOf(h)+'" x2="'+cx+'" y2="'+yOf(l)+'" stroke="'+col+'" stroke-width="1" opacity="0.85"/>';
    svg+='<rect x="'+(cx-bodyW/2)+'" y="'+bodyTop+'" width="'+bodyW+'" height="'+bodyH+'" fill="'+col+'" rx="1" opacity="0.9"/>';
  });

  // ── TRADE ENTRIES ─────────────────────────────────
  if(trades){
    trades.forEach(function(t){
      if(t.entry&&t.entry>lo&&t.entry<hi){
        var y=yOf(t.entry);var col2=t.result==='WIN'||t.result==='OPEN'?colBull:colBear;
        svg+='<polygon points="'+padL+','+(y-5)+' '+padL+','+(y+5)+' '+(padL+8)+','+y+'" fill="'+col2+'" opacity="0.9"/>';
      }
    });
  }

  // ── VOLUME BARS (bottom 15%) ───────────────────────
  var maxVol=Math.max.apply(null,display.map(function(p){return p.volume||0;}));
  if(maxVol>0){
    var vH=ch*0.12, vY=padT+ch-vH;
    display.forEach(function(candle,i){
      var vol=candle.volume||0;
      var vh=Math.max(1,(vol/maxVol)*vH);
      var prevClose=i>0?display[i-1].close:candle.close;
      var o=candle.open!=null&&candle.open>0?candle.open:prevClose;
      var isBull=candle.close>=o;
      svg+='<rect x="'+(xOf(i)-bodyW/2)+'" y="'+(vY+vH-vh)+'" width="'+bodyW+'" height="'+vh+'" fill="'+(isBull?colBull:colBear)+'" opacity="0.3" rx="1"/>';
    });
  }

  // ── DATE LABELS ───────────────────────────────────
  var step=Math.max(1,Math.floor(nd/7));
  for(var di=0;di<nd;di+=step){
    var lbl=display[di].date?display[di].date.slice(5):'';
    svg+='<text x="'+xOf(di)+'" y="'+(H-10)+'" text-anchor="middle" font-size="7" fill="'+colText+'" font-family="monospace">'+lbl+'</text>';
  }

  // Last price line
  var lastC=display[nd-1].close;
  var lastY=yOf(lastC);
  svg+='<line x1="'+padL+'" y1="'+lastY+'" x2="'+(W-padR)+'" y2="'+lastY+'" stroke="'+colBull+'" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.5"/>';

  svg+='</svg>';

  // ── LEGEND ────────────────────────────────────────
  var legend='<div style="display:flex;gap:10px;font-size:9px;color:var(--muted);margin-top:6px;flex-wrap:wrap">';
  legend+='<span style="color:#f0c040">— EMA9</span>';
  legend+='<span style="color:#4a9eff">— EMA20</span>';
  legend+='<span style="color:#b060ff">- - EMA50</span>';
    if(DB.showIchimoku){
      legend+=' &nbsp;<span style="color:#0891b2">— Kijun</span>';
      legend+=' <span style="color:#f97316">— Tenkan</span>';
      legend+=' <span style="color:rgba(22,163,74,0.7)">▓ Kumo</span>';
    }
  if(nd>=200) legend+='<span style="color:#ff8c00">··· SMA200</span>';
  legend+='<span style="color:#5030cc">— Fib</span>';
  legend+='<span style="color:#f0c040">— POC</span><span style="color:#4a9eff">▪ VAH/VAL</span>';
  legend+='<span style="color:'+colBull+'">— Soporte</span>';
  legend+='<span style="color:'+colBear+'">— Resist.</span>';
  legend+='</div>';

  return svg+legend;
}


// ── CANDLE READER — AI-style market narrative ─────────
function renderCandleReader(prices, sym) {
  if(!prices||prices.length<5) return '';
  var n=prices.length;
  var last=prices[n-1];
  var prev=prices[n-2];
  var prev2=prices[n-3];
  var o=last.open||last.close*0.999;
  var h=last.high||last.close*1.002;
  var l=last.low||last.close*0.998;
  var c=last.close;
  var body=Math.abs(c-o);
  var range=h-l||0.001;
  var isBull=c>=o;
  var bodyPct=Math.round(body/range*100);
  var upperWick=h-Math.max(c,o);
  var lowerWick=Math.min(c,o)-l;
  var upperPct=Math.round(upperWick/range*100);
  var lowerPct=Math.round(lowerWick/range*100);
  var chg=prev.close?((c-prev.close)/prev.close*100):0;
  var prevBull=prev.close>=(prev.open||prev.close);
  var prevChg=prev2.close?((prev.close-prev2.close)/prev2.close*100):0;

  // Pattern detection
  var pattern='';var patternCol='var(--sub)';var patternEmoji='📊';
  var signal='';var signalCol='var(--sub)';

  // Doji
  if(bodyPct<8){
    pattern='Doji'; patternEmoji='🔄'; patternCol='var(--watch)';
    signal='Indecisión total entre compradores y vendedores. La siguiente vela decide la dirección. Volumen es clave.';
  }
  // Hammer
  else if(lowerPct>45&&bodyPct<30&&isBull){
    pattern='Hammer (Martillo)'; patternEmoji='🔨'; patternCol='var(--signal)';
    signal='Los vendedores intentaron bajar el precio fuerte pero los compradores rechazaron la caída. Señal alcista si aparece en soporte.';
  }
  // Inverted Hammer
  else if(upperPct>45&&bodyPct<30&&isBull){
    pattern='Hammer Invertido'; patternEmoji='⬇️'; patternCol='var(--watch)';
    signal='Los compradores intentaron subir pero encontraron resistencia. Puede ser inicio de reversión. Confirmar con la siguiente vela.';
  }
  // Shooting Star
  else if(upperPct>45&&bodyPct<30&&!isBull){
    pattern='Shooting Star'; patternEmoji='⭐'; patternCol='var(--bear)';
    signal='Los compradores fallaron al intentar subir — los vendedores tomaron el control. Señal bajista si aparece en resistencia. Vigilar exit signal.';
  }
  // Marubozu alcista
  else if(isBull&&bodyPct>85){
    pattern='Marubozu Alcista'; patternEmoji='💚'; patternCol='var(--signal)';
    signal='Dominio comprador absoluto. Sin rechazo. El dinero institucional está comprando con convicción. Momentum muy fuerte.';
  }
  // Marubozu bajista
  else if(!isBull&&bodyPct>85){
    pattern='Marubozu Bajista'; patternEmoji='🔴'; patternCol='var(--bear)';
    signal='Dominio vendedor total. Sin rebote. Presión de venta institucional. Esperar soporte claro antes de entrar.';
  }
  // Bullish Engulfing
  else if(isBull&&!prevBull&&c>prev.open&&o<prev.close){
    pattern='Engulfing Alcista'; patternEmoji='🟢'; patternCol='var(--signal)';
    signal='La vela alcista devora completamente la vela bajista anterior. Cambio de momentum muy fiable. Compatible con entrada ORS si OBV alcista.';
  }
  // Bearish Engulfing
  else if(!isBull&&prevBull&&c<prev.open&&o>prev.close){
    pattern='Engulfing Bajista'; patternEmoji='🔴'; patternCol='var(--bear)';
    signal='La vela bajista engulle a la alcista anterior. Señal de techo. Considerar salida si tienes posición abierta.';
  }
  // Spinning top
  else if(bodyPct<30&&upperPct>20&&lowerPct>20){
    pattern='Spinning Top'; patternEmoji='🌀'; patternCol='var(--watch)';
    signal='Lucha equilibrada entre compradores y vendedores. El mercado está en transición. Esperar confirmación de dirección.';
  }
  // Normal bull/bear
  else if(isBull){
    pattern='Vela Alcista'; patternEmoji='📈'; patternCol='var(--signal)';
    signal=bodyPct>60?'Vela alcista sólida. El momentum comprador es claro.':'Vela alcista moderada. Compradores en ligero control.';
  } else {
    pattern='Vela Bajista'; patternEmoji='📉'; patternCol='var(--bear)';
    signal=bodyPct>60?'Vela bajista sólida. El momentum vendedor domina.':'Corrección moderada. Esperar soporte.';
  }

  // Market narrative (last 3 candles context)
  var narrative='';
  var bullCount=[prices[n-1],prices[n-2],prices[n-3]].filter(function(p){return p.close>=(p.open||p.close);}).length;
  if(bullCount===3) narrative='📈 3 velas alcistas consecutivas — tendencia compradora en marcha. Cuidado con sobrecompra a corto plazo.';
  else if(bullCount===0) narrative='📉 3 velas bajistas consecutivas — presión vendedora sostenida. Esperar señal de agotamiento bajista antes de entrar.';
  else if(bullCount===2&&!isBull) narrative='⚠️ Dos velas alcistas seguidas de una bajista — posible pausa o corrección. Vigilar si el soporte aguanta.';
  else if(bullCount===1&&isBull) narrative='🔄 Recuperación tras presión bajista — el rebote está en marcha. OBV confirmará si es real.';

  html+='<div style="background:var(--card2);border-left:3px solid '+patternCol.replace("var(","").replace(")","")+"60"+';border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:10px">';

  return html;

function drawChart(id,prices,levels,trades,h){
  h=h||200;
  setTimeout(function(){
    var canvas=document.getElementById(id);if(!canvas||prices.length<2)return;
    var dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||300;
    canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+'px';
    var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    var cls=prices.map(function(p){return p.close;});
    var mn=Math.min.apply(null,cls)*0.997,mx=Math.max.apply(null,cls)*1.003,rng=mx-mn;
    var pd={t:12,r:58,b:8,l:4},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b;
    function xOf(i){return pd.l+(i/(cls.length-1))*cw;}
    function yOf(v){return pd.t+(1-(v-mn)/rng)*ch;}
    // Grid
    ctx.strokeStyle='rgba(30,45,69,0.5)';ctx.lineWidth=1;ctx.setLineDash([]);
    [0,.33,.66,1].forEach(function(p){
      var y=pd.t+p*ch;ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(w-pd.r,y);ctx.stroke();
      ctx.fillStyle='#2a3f5a';ctx.font='9px monospace';
      ctx.fillText('$'+(mn+(1-p)*rng).toFixed(0),w-pd.r+2,y+3);
    });
    // Short term SR highlighted
    if(levels){
      (levels.supports||[]).forEach(function(s){
        ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(0,229,160,0.5)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(pd.l,yOf(s.price));ctx.lineTo(w-pd.r,yOf(s.price));ctx.stroke();
        ctx.fillStyle='#00e5a0';ctx.font='bold 9px monospace';ctx.fillText('S$'+s.price,w-pd.r+2,yOf(s.price)+3);
      });
      (levels.resistances||[]).forEach(function(r){
        ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(255,69,96,0.5)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(pd.l,yOf(r.price));ctx.lineTo(w-pd.r,yOf(r.price));ctx.stroke();
        ctx.fillStyle='#ff4560';ctx.font='bold 9px monospace';ctx.fillText('R$'+r.price,w-pd.r+2,yOf(r.price)+3);
      });
    }
    // Trade entries
    if(trades)trades.forEach(function(t){
      if(t.entry>mn&&t.entry<mx){
        ctx.setLineDash([2,5]);
        ctx.strokeStyle=(t.result==='WIN'||t.result==='OPEN'?'#00e5a0':'#ff4560')+'60';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(pd.l,yOf(t.entry));ctx.lineTo(w-pd.r,yOf(t.entry));ctx.stroke();
      }
    });
    // Area fill
    ctx.setLineDash([]);
    var grad=ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,'rgba(240,192,64,0.15)');grad.addColorStop(1,'rgba(240,192,64,0)');
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(cls[0]));
    for(var i=1;i<cls.length;i++)ctx.lineTo(xOf(i),yOf(cls[i]));
    ctx.lineTo(xOf(cls.length-1),ch+pd.t);ctx.lineTo(xOf(0),ch+pd.t);
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // Price line
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(cls[0]));
    for(var j=1;j<cls.length;j++)ctx.lineTo(xOf(j),yOf(cls[j]));
    ctx.strokeStyle='#f0c040';ctx.lineWidth=2;ctx.stroke();
  },80);
}
function drawMini(id,prices,color){
  color=color||'#f0c040';
  setTimeout(function(){
    var canvas=document.getElementById(id);if(!canvas||prices.length<2)return;
    var dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||200;
    canvas.width=w*dpr;canvas.height=44*dpr;
    var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    var end=prices.slice(-80),cls=end.map(function(p){return p.close;});
    var mn=Math.min.apply(null,cls),mx=Math.max.apply(null,cls),rng=mx-mn||1;
    // Fill
    var grad=ctx.createLinearGradient(0,0,0,44);
    grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'00');
    ctx.beginPath();ctx.moveTo(0,44-(cls[0]-mn)/rng*40);
    for(var i=1;i<cls.length;i++)ctx.lineTo(i/(cls.length-1)*w,44-(cls[i]-mn)/rng*40);
    ctx.lineTo(w,44);ctx.lineTo(0,44);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // Line
    ctx.beginPath();ctx.moveTo(0,44-(cls[0]-mn)/rng*40);
    for(var j=1;j<cls.length;j++)ctx.lineTo(j/(cls.length-1)*w,44-(cls[j]-mn)/rng*40);
    ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.stroke();
  },80);
}

// SVG Score Ring
function scoreRing(score,color,size){
  size=size||80;
  var r=(size/2)-8,circ=2*Math.PI*r,dash=circ*score/100,gap=circ-dash;
  var col=color||'#f0c040';
  return '<svg width="'+size+'" height="'+size+'" style="display:block">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#1e2d45" stroke-width="5"/>'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="5" stroke-dasharray="'+dash+' '+gap+'" stroke-linecap="round" transform="rotate(-90 '+size/2+' '+size/2+')" style="transition:stroke-dasharray .5s"/>'
    +'</svg>';
}

// RSI Gauge (arc)
function rsiGauge(rsi){
  if(rsi===null)return'';
  var zones=[{from:0,to:20,col:'#ff4560',lbl:'Extremo'},{from:20,to:35,col:'#00e5a0',lbl:'ORS'},{from:35,to:50,col:'#f0c040',lbl:'Bueno'},{from:50,to:65,col:'#4a9eff',lbl:'Neutral'},{from:65,to:80,col:'#f0804040',lbl:'Cuidado'},{from:80,to:100,col:'#ff4560',lbl:'OB'}];
  var w=200,h=110,cx=w/2,cy=h-10,r=85;
  var svg='<svg width="100%" viewBox="0 0 '+w+' '+h+'" style="display:block">';
  // Arc zones
  zones.forEach(function(z){
    var a1=(z.from/100)*Math.PI,a2=(z.to/100)*Math.PI;
    var x1=cx-r*Math.cos(a1),y1=cy-r*Math.sin(a1);
    var x2=cx-r*Math.cos(a2),y2=cy-r*Math.sin(a2);
    var ir=68,x3=cx-ir*Math.cos(a2),y3=cy-ir*Math.sin(a2),x4=cx-ir*Math.cos(a1),y4=cy-ir*Math.sin(a1);
    svg+='<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 0 1 '+x2+' '+y2+' L '+x3+' '+y3+' A '+ir+' '+ir+' 0 0 0 '+x4+' '+y4+' Z" fill="'+z.col+'" opacity="0.7"/>';
  });
  // Needle
  var ang=(rsi/100)*Math.PI;
  var nx=cx-80*Math.cos(ang),ny=cy-80*Math.sin(ang);
  svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+nx+'" y2="'+ny+'" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round"/>';
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#f0c040"/>';
  // Labels
  svg+='<text x="8" y="'+h+'" fill="#ff4560" font-size="9" font-family="monospace">0</text>';
  svg+='<text x="'+(w/2-8)+'" y="18" fill="#00e5a0" font-size="9" font-family="monospace">50</text>';
  svg+='<text x="'+(w-16)+'" y="'+h+'" fill="#ff4560" font-size="9" font-family="monospace">100</text>';
  // RSI value
  svg+='<text x="'+cx+'" y="'+(cy-12)+'" fill="#f0c040" font-size="18" font-weight="bold" font-family="monospace" text-anchor="middle">'+rsi.toFixed(1)+'</text>';
  svg+='</svg>';
  return svg;
}

  fetch(PROXY + '/sector/run', {
    method: 'POST',

  .then(function(r) { return r.json(); })
  .then(function(d) {

      toast('Error al generar informe: ' + (d.message || 'desconocido'), 4000);

    // El servidor puede no tener el endpoint /sector/run todavia
    // En ese caso intentar cargar datos existentes
    toast('Servidor no disponible — mostrando datos existentes', 3000);
    loadSectorData(true);
  });

        desc:'Dos suelos al mismo nivel + OBV alcista + ruptura neckline con volumen.'
      },
      {
        name:'Ascending Triangle △', type:'CONTINUACIÓN', wr:'75%', col:'var(--signal)',
        svg:'<svg viewBox="0 0 80 60" width="80" height="60"><rect width="80" height="60" fill="#0a1018" rx="4"/><!-- resistencia horizontal --><line x1="10" y1="20" x2="60" y2="20" stroke="#ff3a55" stroke-width="1.5"/><!-- soportes ascendentes --><line x1="10" y1="48" x2="60" y2="20" stroke="#00dda0" stroke-width="1.5"/><!-- velas pequeñas --><line x1="20" y1="20" x2="20" y2="38" stroke="#4a6a8a" stroke-width="1"/><line x1="30" y1="20" x2="30" y2="32" stroke="#4a6a8a" stroke-width="1"/><line x1="40" y1="20" x2="40" y2="27" stroke="#4a6a8a" stroke-width="1"/><!-- ruptura --><line x1="60" y1="20" x2="75" y2="8" stroke="#00dda0" stroke-width="2.5" stroke-dasharray="3,2"/><polygon points="75,8 69,11 71,16" fill="#00dda0"/><!-- label --><text x="8" y="58" font-size="7" fill="#ff3a55">RESIST.</text><text x="35" y="55" font-size="7" fill="#00dda0">SOPORTE ↗</text></svg>',
        desc:'Resistencia plana + soportes subiendo. Compradores ganan terreno. RSI 58-68.'
      },
      {

        svg:'<svg viewBox="0 0 80 60" width="80" height="60"><rect width="80" height="60" fill="#0a1018" rx="4"/><!-- taza en U --><path d="M8,12 Q10,42 24,50 Q38,58 52,50 Q66,42 68,12" fill="none" stroke="#f0a800" stroke-width="2"/><!-- asa --><path d="M68,12 Q72,20 70,26 Q68,32 63,28" fill="none" stroke="#f0a800" stroke-width="1.5"/><!-- ruptura --><line x1="63" y1="12" x2="75" y2="5" stroke="#00dda0" stroke-width="2" stroke-dasharray="3,2"/><polygon points="75,5 69,8 71,13" fill="#00dda0"/><!-- labels --><text x="30" y="57" font-size="7" fill="#f0a800">TAZA (U)</text><text x="60" y="40" font-size="7" fill="#f0a800">ASA</text></svg>',

    } else {
      [].concat(trds).reverse().forEach(function(t){
        var p=t.exit?pnlPct(t.entry,t.exit):null;
        var isOpen=t.status==='open'||t.result==='OPEN';
        var liveP=isOpen&&MKT[t.ticker]?MKT[t.ticker].price:null;
        var livePnl=liveP?pnlPct(t.entry,liveP):null;

        html+='<div class="trade-row" style="border-color:'+bc+';margin-bottom:8px">';

        html+='<div style="display:flex;gap:6px;align-items:center">';
        if(isOpen&&livePnl!==null)html+='<span style="font-size:14px;font-weight:700;color:'+(livePnl>=0?'var(--bull)':'var(--bear)')+'">'+(livePnl>=0?'+':'')+livePnl+'% LIVE</span>';
        else if(p!==null)html+='<span style="font-size:14px;font-weight:700;color:'+(p>=0?'var(--bull)':'var(--bear)')+'">'+(p>=0?'+':'')+p+'%</span>';
        if(isOpen)html+=mkPill('ABIERTA','var(--watch)');
        else html+=mkPill(t.result,bc);
        html+=mkPill('ORS '+orsScore(t.conditions)+'/5',orsScore(t.conditions)>=4&&t.conditions.obvAlcista?'var(--signal)':'var(--bear)');

        html+='<div style="font-size:12px;color:var(--sub)">$'+t.entry+(t.qty?' × '+t.qty:'')+(t.exit?' → $'+t.exit:'')+(isOpen&&liveP?' (Live $'+liveP.toFixed(2)+')':'')+'</div>';
        if(t.stop){html+='<div style="font-size:11px;color:var(--bear);margin-top:3px">SL: $'+t.stop;if(isOpen&&liveP){var distToStop=((liveP-t.stop)/t.stop*100).toFixed(1);html+=' · '+distToStop+'% sobre SL';}html+='</div>';}
        if(isOpen&&liveP&&livePnl>3)html+='<div style="font-size:11px;color:var(--signal);margin-top:3px">💡 Trailing stop sugerido: $'+(liveP*0.97).toFixed(2)+'</div>';
        if(t.error)html+='<div style="font-size:11px;color:var(--bear);margin-top:3px">⚠️ '+t.error+'</div>';
        if(t.notes)html+='<div style="font-size:11px;color:var(--muted);margin-top:2px">'+t.notes+'</div>';
        html+='</div>';
      });
    }
  }

  html+='</div>';
  return html;
}

  var sigCol=signal==='ÓPTIMA'?'var(--signal)':signal==='SEÑAL'?'var(--watch)':'var(--bear)';
  var q=MKT[f.ticker]||null;

function renderTradeDynamic(){
  var f=TRADE_FORM;
  var html='';
  var entry=parseFloat(f.entry)||0;
  var qty=parseFloat(f.qty)||0;
  var stop=parseFloat(f.stop)||0;

  // Capital
  if(entry&&qty){
    html+='<div class="card" style="background:var(--signal)10;border-color:var(--signal)30;padding:10px 14px">';
    html+='<div style="font-size:12px;color:var(--sub)">Capital invertido</div>';
    html+='<div style="font-size:16px;font-weight:700;color:var(--signal)">$'+(entry*qty).toFixed(2)+'</div></div>';
  }

  // Stop input + info
  html+='<div><div class="sec-hdr">STOP LOSS $</div>';
  html+='<input class="inp" id="tf-stop" type="number" step="0.01" value="'+(f.stop||'')+'" onblur="tradeFieldUpdate()" placeholder="386.00"/>';
  if(entry&&stop){
    var slPct=((entry-stop)/entry*100).toFixed(2);
    var slEur=qty?(entry-stop)*qty*0.92:0;
    html+='<div style="display:flex;gap:12px;margin-top:6px">';
    html+='<span style="font-size:11px;color:var(--bear)">-'+slPct+'%</span>';
    html+='<span style="font-size:11px;color:var(--sub)">~€'+slEur.toFixed(0)+' de riesgo</span>';
    html+='</div>';
  }

  // Stop suggestions
  if(entry&&f.ticker&&DB.tickers[f.ticker]){
    var stops=calcStops(f.ticker,entry,qty);
    if(stops.length){
      html+='<div style="margin-top:10px"><div class="sec-hdr" style="color:var(--accent)">💡 STOPS SUGERIDOS — pulsa para aplicar</div>';
      stops.forEach(function(s){
        html+='<button onclick="applyStop('+s.stop+')" style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:left;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">';
        html+='<div><div style="font-size:11px;color:var(--accent);font-weight:700">'+s.label+'</div>';
        html+='<div style="font-size:10px;color:var(--sub)">'+s.reason+'</div></div>';
        html+='<div style="text-align:right"><div style="font-size:15px;font-weight:700;color:var(--bear)">$'+s.stop+'</div>';
        html+='<div style="font-size:10px;color:var(--sub)">-'+s.pct+'%</div></div>';
        html+='</button>';
      });
      html+='</div>';
    }
  }
  html+='</div>';

  // Targets
  if(entry&&stop){
    var targets=calcTargets(entry,stop);
    html+='<div class="card" style="border-color:var(--signal)30"><div class="sec-hdr" style="color:var(--signal)">🎯 OBJETIVOS Y GESTIÓN</div>';
    targets.forEach(function(t){
      html+='<div class="metric-row"><div><div style="font-size:12px;font-weight:600">'+t.label+'</div><div style="font-size:10px;color:var(--sub)">→ '+t.action+'</div></div><div style="font-size:15px;font-weight:700;color:var(--signal)">$'+t.price+'</div></div>';
    });
    html+='</div>';
  }

  return html;
}

function renderORSChecklist(){
  var f=TRADE_FORM;
  var score=orsScore(f.conditions),signal=orsSignal(f.conditions);
  var sigCol=signal==='ÓPTIMA'?'var(--signal)':signal==='SEÑAL'?'var(--watch)':'var(--bear)';
  var html='<div class="ors-grid">';
  ORS_KEYS.forEach(function(k){
    var a=f.conditions[k],mand=k==='obvAlcista';
    var col=a?(mand?'var(--accent)':'var(--signal)'):'var(--muted)';
    html+='<button class="ors-btn" onclick="toggleORS(\''+k+'\')" style="border:1px solid '+(a?col:'var(--border)')+';background:'+(a?col.replace('var(','').replace(')','')+'18':'transparent')+';color:'+col+'">'+(mand?'★ ':'')+ORS_LBL[k]+'</button>';

  return html;
}

var JOURNAL_AI_NOTES = JSON.parse(localStorage.getItem('ors5_diary_notes')||'{}');
var JOURNAL_SERVER_DATA = null; // trades del servidor
var JOURNAL_LOADING = false;

function saveJournalAiNotes(){

}

function analyzeTradeWithAI(trade, callback){
  var tradeId = trade.id || (trade.sym+'_'+trade.date);
  if(JOURNAL_AI_NOTES[tradeId]){callback(JOURNAL_AI_NOTES[tradeId]);return;}

  var conds = trade.conditions || {};
  var prompt = 'Eres un analista de trading cuantitativo. Analiza esta operación del sistema MOM/ORS y genera una anotación estructurada en español.\n\n'+
    'OPERACIÓN:\n'+
    'Ticker: '+trade.sym+'\n'+
    'Sistema: '+(trade.system||'MOM')+'\n'+
    'Entrada: $'+(trade.entry||'-')+'\n'+
    'Salida: $'+(trade.exitPrice||'-')+'\n'+
    'Stop: $'+(trade.stop||'-')+'\n'+
    'P&L: '+(trade.pnlEur!==null&&trade.pnlEur!==undefined?'€'+trade.pnlEur:'abierto')+'\n'+
    'Resultado: '+(trade.result||'ABIERTO')+'\n'+
    'Razón salida: '+(trade.exitReason||'-')+'\n'+
    'Días en posición: '+(trade.daysHeld||'-')+'\n\n'+
    'CONDICIONES AL ENTRAR:\n'+
    'RSI: '+(conds.rsi||'-')+'\n'+
    'OBV: '+(conds.obv!==null&&conds.obv!==undefined?(conds.obv?'ALCISTA ✅':'BAJISTA ❌'):'no registrado')+'\n'+
    'MACD: '+(conds.macd!==null&&conds.macd!==undefined?(conds.macd?'ALCISTA ✅':'BAJISTA ❌'):'no registrado')+'\n'+
    'Ichimoku: '+(conds.ichimoku!==null&&conds.ichimoku!==undefined?(conds.ichimoku?'SOBRE KUMO ✅':'BAJO KUMO ❌'):'no registrado')+'\n'+
    'RVOL: '+(conds.rvol||'-')+'\n'+
    'SPY Tendencia: '+(conds.spyTrend||'-')+'\n'+
    'Sobre SMA200: '+(conds.aboveSMA!==null&&conds.aboveSMA!==undefined?(conds.aboveSMA?'SÍ ✅':'NO ❌'):'no registrado')+'\n'+
    'Score: '+(conds.score||'-')+'\n\n'+
    'Genera UNA anotación concisa (máx 120 palabras) con este formato exacto:\n'+
    '📋 SETUP: [qué condiciones cumplía y cuáles faltaban, 1-2 frases]\n'+
    '🎯 EJECUCIÓN: [cómo se desarrolló el trade, 1 frase]\n'+
    '💡 APRENDIZAJE: [qué mejorar o qué confirmó el sistema, 1 frase]\n'+
    '⭐ CALIDAD: [A/B/C/D — A=setup perfecto, D=setup débil]';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{role:'user', content: prompt}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    var text = data.content && data.content[0] ? data.content[0].text : 'Sin análisis disponible.';
    JOURNAL_AI_NOTES[tradeId] = text;
    saveJournalAiNotes();
    callback(text);
    // Re-render solo si seguimos en journal
    if(VIEW==='journal') render();
  })
  .catch(function(){
    JOURNAL_AI_NOTES[tradeId] = '⚠️ Error al generar análisis. Reintenta más tarde.';
    saveJournalAiNotes();
    callback(JOURNAL_AI_NOTES[tradeId]);
  });
}

function loadJournalFromServer(){
  if(JOURNAL_LOADING) return;
  JOURNAL_LOADING = true;
  fetch(PROXY+'/trades/decisions?limit=200')
    .then(function(r){return r.json();})
    .then(function(data){
      JOURNAL_LOADING = false;
      if(data && data.decisions && data.decisions.length){
        JOURNAL_SERVER_DATA = data.decisions;
      } else {
        JOURNAL_SERVER_DATA = [];
      }
      if(VIEW==='journal') render();
    })
    .catch(function(){
      JOURNAL_LOADING = false;
      JOURNAL_SERVER_DATA = [];
      if(VIEW==='journal') render();
    });
}

function renderJournalTrade(t, isServerTrade){
  var tradeId = t.id || (t.sym+'_'+(t.date||''));
  var sym = isServerTrade ? t.sym : t.ticker;
  var entryPrice = isServerTrade ? t.entry : t.entry;
  var exitPrice = isServerTrade ? t.exitPrice : t.exit;
  var tradeDate = isServerTrade ? (t.date||'').slice(0,10) : (t.date||'');
  var result = isServerTrade ? (t.result||'ABIERTO') : (t.result||'OPEN');
  var isOpen = !exitPrice || result==='ABIERTO' || result==='OPEN';
  var pnlEur = isServerTrade ? t.pnlEur : null;
  var pnlP = (!isOpen && entryPrice && exitPrice) ? pnlPct(entryPrice, exitPrice) : null;
  var livePrice = MKT[sym] ? MKT[sym].price : null;
  var livePnl = (isOpen && livePrice && entryPrice) ? pnlPct(entryPrice, livePrice) : null;

  var bc = isOpen ? 'var(--watch)' : result==='WIN' ? 'var(--bull)' : result==='LOSS' ? 'var(--bear)' : 'var(--sub)';
  var aiNote = JOURNAL_AI_NOTES[tradeId];
  var showAI = !!document.getElementById && false; // se gestiona con DOM después

  var html = '<div class="trade-row" id="trow_'+tradeId+'" style="border-color:'+bc+';display:flex;flex-direction:column;margin-bottom:10px">';
  // Fila principal
  html += '<div style="display:flex;align-items:center;gap:8px" onclick="toggleTradeDetail(\''+tradeId+'\')">'; 
  html += '<div style="flex:0 0 46px;font-size:11px;color:var(--sub)">'+(tradeDate?tradeDate.slice(5):'')+'</div>';
  html += '<div style="flex:0 0 54px;font-weight:800;color:var(--accent);font-size:14px">'+sym+'</div>';
  html += '<div style="flex:0 0 44px;font-size:9px;background:var(--card2);border-radius:6px;padding:2px 5px;text-align:center;color:var(--sub)">'+(isServerTrade?'LIVE':'LOCAL')+'</div>';
  html += '<div style="flex:1;font-size:11px;color:var(--sub)">$'+entryPrice+(t.qty?' ×'+t.qty:'')+(exitPrice?' → $'+exitPrice:'')+'</div>';
  if(isOpen && livePnl!==null) html += '<div style="font-weight:700;font-size:12px;color:'+(livePnl>=0?'var(--bull)':'var(--bear)')+'">'+(livePnl>=0?'+':'')+livePnl+'%</div>';
  else if(pnlEur!==null) html += '<div style="font-weight:700;font-size:12px;color:'+(pnlEur>=0?'var(--bull)':'var(--bear)')+'">'+(pnlEur>=0?'+':'')+pnlEur+'€</div>';
  else if(pnlP!==null) html += '<div style="font-weight:700;font-size:12px;color:'+(pnlP>=0?'var(--bull)':'var(--bear)')+'">'+(pnlP>=0?'+':'')+pnlP+'%</div>';
  html += mkPill(isOpen?'LIVE':result, bc);
  html += '<span style="font-size:10px;color:var(--muted)">▾</span>';
  html += '</div>';

  // Detalle expandible — siempre en DOM, display:none por defecto
  html += '<div id="detail_'+tradeId+'" style="display:none;padding-top:10px;border-top:1px solid var(--border);margin-top:8px">';

  // Condiciones técnicas
  var conds = t.conditions || {};
  if(Object.keys(conds).length){
    html += '<div style="font-size:10px;font-weight:700;color:var(--sub);letter-spacing:1px;margin-bottom:6px">CONDICIONES AL ENTRAR</div>';
    html += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">';
    if(conds.rsi!==null&&conds.rsi!==undefined) html += mkPill('RSI '+conds.rsi, conds.rsi>50?'var(--bull)':'var(--watch)');
    if(conds.obv!==null&&conds.obv!==undefined) html += mkPill('OBV '+(conds.obv?'✅':'❌'), conds.obv?'var(--bull)':'var(--bear)');
    if(conds.macd!==null&&conds.macd!==undefined) html += mkPill('MACD '+(conds.macd?'✅':'❌'), conds.macd?'var(--bull)':'var(--bear)');
    if(conds.ichimoku!==null&&conds.ichimoku!==undefined) html += mkPill('Ichi '+(conds.ichimoku?'✅':'❌'), conds.ichimoku?'var(--bull)':'var(--bear)');
    if(conds.rvol!==null&&conds.rvol!==undefined) html += mkPill('RVOL '+conds.rvol+'x', conds.rvol>=1.5?'var(--bull)':'var(--sub)');
    if(conds.aboveSMA!==null&&conds.aboveSMA!==undefined) html += mkPill('SMA200 '+(conds.aboveSMA?'✅':'❌'), conds.aboveSMA?'var(--bull)':'var(--bear)');
    if(conds.score!==null&&conds.score!==undefined) html += mkPill('Score '+conds.score, 'var(--accent)');
    if(conds.spyTrend) html += mkPill('SPY '+conds.spyTrend, 'var(--blue)');
    html += '</div>';
  }
  if(t.exitReason) html += '<div style="font-size:10px;color:var(--sub);margin-bottom:6px">📤 Salida: <b style="color:var(--text)">'+t.exitReason+'</b>'+(t.daysHeld?' · '+t.daysHeld+'d':'')+'</div>';

  // Análisis IA
  html += '<div id="ai_'+tradeId+'">';
  if(aiNote){
    html += '<div style="background:var(--card2);border-radius:10px;padding:10px 12px;border:1px solid var(--accent)30;font-size:11px;line-height:1.7;color:var(--text);white-space:pre-wrap">'+aiNote+'</div>';

  html += '</div>';

  html += '</div>'; // detalle
  html += '</div>'; // trade-row
  return html;
}

window.generateAI = function(tradeId, trade){

  analyzeTradeWithAI(trade, function(note){
    var el = document.getElementById('ai_'+tradeId);
    if(el) el.innerHTML = '<div style="background:var(--card2);border-radius:10px;padding:10px 12px;border:1px solid var(--accent)30;font-size:11px;line-height:1.7;color:var(--text);white-space:pre-wrap">'+note+'</div>';

window.analyzeAllTrades = function(){
  var trades = JOURNAL_SERVER_DATA || [];
  var pending = trades.filter(function(t){
    var id = t.id || (t.sym+'_'+(t.date||''));
    return !JOURNAL_AI_NOTES[id];
  });
  if(!pending.length){toast('✅ Todos los trades ya tienen análisis IA',3000);return;}
  toast('🧠 Analizando '+pending.length+' trades... puede tardar unos minutos', 5000);
  var idx = 0;
  function next(){
    if(idx>=pending.length) return;
    var t = pending[idx++];
    analyzeTradeWithAI(t, function(){ setTimeout(next, 1200); });
  }
  next();
};

function renderJournal(){
  // Si no hemos cargado datos del servidor, cargarlos
  if(JOURNAL_SERVER_DATA === null && !JOURNAL_LOADING){
    loadJournalFromServer();
  }

  // Combinar server + local, server primero
  var serverTrades = JOURNAL_SERVER_DATA || [];
  var localTrades = DB.journal || [];

  // Normalizar server trades para mKey
  var allTrades = [];
  serverTrades.forEach(function(t){
    allTrades.push({_src:'server', _t:t, date:(t.date||'').slice(0,10)});
  });
  // Local trades que NO estén duplicados por sym+date en server
  var serverKeys = {};
  serverTrades.forEach(function(t){serverKeys[(t.sym||'')+'_'+(t.date||'').slice(0,10)]=1;});
  localTrades.forEach(function(t){
    var k=(t.ticker||'')+'_'+(t.date||'');
    if(!serverKeys[k]) allTrades.push({_src:'local', _t:t, date:t.date||''});
  });

  var byMonth={};
  // Aplicar filtro por estrategia
  var _jf = window._journalFilter || 'ALL';
  var filteredTrades = _jf === 'ALL' ? allTrades : allTrades.filter(function(w){
    var sys = (w._src==='server' ? (w._t.system||'') : (w._t.strategy||'')).toUpperCase();
    return sys === _jf;
  });
  filteredTrades.forEach(function(w){var k=mKey(w.date);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(w);});
  var months=Object.keys(byMonth).sort().reverse();

  var extraBtns = '<div style="display:flex;gap:6px">';
  extraBtns += '<button class="btn btn-signal" onclick="newTrade()" style="padding:7px 13px;font-size:12px">+ Trade</button>';
  extraBtns += '<button onclick="loadJournalFromServer()" style="padding:7px 10px;font-size:11px;background:var(--radar)15;border:1px solid var(--radar)40;color:var(--radar);border-radius:10px">'+(JOURNAL_LOADING?'⏳':'🔄')+'</button>';
  extraBtns += '<button onclick="analyzeAllTrades()" style="padding:7px 10px;font-size:11px;background:var(--accent)15;border:1px solid var(--accent)40;color:var(--accent);border-radius:10px">🧠 All</button>';
  extraBtns += '</div>';

  var html=hdr('📒 Diario','Trades reales · Análisis IA','', extraBtns);
  html+='<div class="wrap fade">';

  // Stats del servidor — desglose por estrategia
  if(serverTrades.length){
    var sWins=serverTrades.filter(function(t){return t.result==='WIN';}).length;
    var sLosses=serverTrades.filter(function(t){return t.result==='LOSS';}).length;
    var sPnl=serverTrades.reduce(function(s,t){return s+(t.pnlEur||0);},0);
    var sWR=serverTrades.length?Math.round(sWins/serverTrades.length*100):0;

    // Desglose por sistema
    var momT=serverTrades.filter(function(t){return (t.system||'').toUpperCase()==='MOM';});
    var orsT=serverTrades.filter(function(t){return (t.system||'').toUpperCase()==='ORS';});
    function sysStats(arr){
      var w=arr.filter(function(t){return t.result==='WIN';}).length;
      var l=arr.filter(function(t){return t.result==='LOSS';}).length;
      var pnl=arr.reduce(function(s,t){return s+(t.pnlEur||0);},0);
      var wr=arr.length?Math.round(w/arr.length*100):0;
      var gW=arr.filter(function(t){return t.result==='WIN';}).reduce(function(s,t){return s+(t.pnlEur||0);},0);
      var gL=Math.abs(arr.filter(function(t){return t.result==='LOSS';}).reduce(function(s,t){return s+(t.pnlEur||0);},0));
      var pf=gL>0?(gW/gL).toFixed(2):'∞';
      return {n:arr.length,w:w,l:l,pnl:Math.round(pnl),wr:wr,pf:pf};
    }
    var mS=sysStats(momT), oS=sysStats(orsT);

    // Card global
    html+='<div style="background:linear-gradient(135deg,var(--card),var(--signal)08);border:1px solid var(--signal)30;border-radius:14px;padding:12px 14px;margin-bottom:10px">';
