<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="MOM Trader"/>
<title>MOM Trader</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#070d14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<!-- iOS icons -->
<link rel="apple-touch-icon" href="icon-180.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<style>
:root {
  /* ── Core backgrounds — deeper terminal feel */
  --bg:     #030609;
  --bg2:    #070d14;
  --card:   #0a1018;
  --card2:  #0e1622;
  --border: #162030;
  --border2:#1c2a3e;

  /* ── Typography */
  --text:   #c8daf0;
  --sub:    #4a6a8a;
  --muted:  #223040;

  /* ── Brand accent — gold */
  --accent:  #e8b830;
  --accent2: #ffd060;

  /* ── Signal colors */
  --signal:  #00dda0;
  --signal2: #00ff99;
  --watch:   #f0a800;
  --radar:   #3a8fff;
  --no:      #2a3a4a;

  /* ── Market colors */
  --bull:    #00dda0;
  --bear:    #ff3a55;
  --blue:    #3a8fff;
  --purple:  #a050ff;
  --copper:  #e07040; /* momentum color */
  --cyan:    #00c8e0;

  /* ── Glow values (for box-shadow) */
  --glow-signal: 0 0 20px rgba(0,221,160,.15), 0 0 40px rgba(0,221,160,.06);
  --glow-watch:  0 0 20px rgba(240,168,0,.12),  0 0 40px rgba(240,168,0,.05);
  --glow-bear:   0 0 20px rgba(255,58,85,.12),  0 0 40px rgba(255,58,85,.05);
  --glow-accent: 0 0 20px rgba(232,184,48,.15), 0 0 40px rgba(232,184,48,.06);
}

/* ── LIGHT MODE ──────────────────────────────── */
body.light {
  --bg:     #f0f4f8;
  --bg2:    #ffffff;
  --card:   #ffffff;
  --card2:  #f5f8fc;
  --border: #dde4ef;
  --border2:#c8d4e8;
  --text:   #0d1f35;
  --sub:    #6b82a0;
  --muted:  #b0c0d4;
  --accent:  #c8960a;
  --accent2: #e0a800;
  --signal:  #00a870;
  --signal2: #00c880;
  --watch:   #c8960a;
  --radar:   #2070d0;
  --no:      #a0b0c4;
  --bull:    #00a870;
  --bear:    #e02040;
  --blue:    #2070d0;
  --purple:  #8040d0;
  --copper:  #c05820;
  --cyan:    #0090a8;
  --glow-signal: none;
  --glow-watch:  none;
  --glow-bear:   none;
  --glow-accent: none;
}
/* ── BASE RESET ───────────────────────────────────── */
.theme-toggle {
  width:36px;height:36px;border-radius:50%;
  background:var(--card2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;transition:all .2s;flex-shrink:0;
}
.theme-toggle:active{transform:scale(0.9);}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,'SF Pro Display','Inter',system-ui,monospace;
  min-height:100vh;
  font-size:14px;
  transition:background .25s,color .25s;
}
body.light { background:var(--bg); color:var(--text); }
button,input,select,textarea { font-family:inherit; font-size:13px; color:var(--text); }
button { cursor:pointer; border:none; background:none; }

/* ── LAYOUT ───────────────────────────────────────── */
#root { min-height:100vh; padding-bottom:80px; }
.wrap { padding:14px 16px; max-width:720px; margin:0 auto; }

/* ── HEADER — glassmorphism terminal ─────────────── */
.hdr {
  background:rgba(7,13,20,.85);
  border-bottom:1px solid var(--border);
  padding:12px 18px;
  display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.hdr::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--signal) 70%, transparent 100%);
  opacity:.35;
}
.hdr { position:relative; }
.htitle {
  font-size:15px; font-weight:800;
  color:var(--accent); flex:1;
  letter-spacing:-.4px;
  background:linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hsub { font-size:9px; color:var(--sub); letter-spacing:2.5px; margin-top:2px; text-transform:uppercase; }

/* ── CARDS ────────────────────────────────────────── */
.card {
  background:linear-gradient(145deg, var(--card), var(--card2));
  border-radius:16px; padding:16px;
  border:1px solid var(--border);
  margin-bottom:12px;
  box-shadow:0 4px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.03);
  transition:border-color .2s, box-shadow .2s;
}
body.light .card { box-shadow:0 2px 12px rgba(0,0,0,.08); background:var(--card); }
.card-glow-signal { border-color:var(--signal); box-shadow:var(--glow-signal); }
.card-glow-watch  { border-color:var(--watch);  box-shadow:var(--glow-watch); }
.card-glow-bear   { border-color:var(--bear);   box-shadow:var(--glow-bear); }

/* ── INPUTS ───────────────────────────────────────── */
.inp {
  width:100%;
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:10px;
  color:var(--text);
  padding:11px 14px;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.inp:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,184,48,.1); }
textarea.inp { resize:vertical; }

/* ── BUTTONS ──────────────────────────────────────── */
.btn { border-radius:10px; padding:9px 14px; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; }
.btn:active { transform:scale(.96); }
.btn-signal { background:rgba(0,221,160,.12); border:1px solid rgba(0,221,160,.4); color:var(--signal); }
.btn-signal:active { background:rgba(0,221,160,.22); }
.btn-watch  { background:rgba(240,168,0,.12);  border:1px solid rgba(240,168,0,.4);  color:var(--watch); }
.btn-blue   { background:rgba(58,143,255,.12);  border:1px solid rgba(58,143,255,.4); color:var(--blue); }
.btn-bear   { background:rgba(255,58,85,.10);   border:1px solid rgba(255,58,85,.3);  color:var(--bear); }
.btn-big { width:100%; padding:14px; font-size:13px; border-radius:14px; font-weight:700; }
.btn-save {
  width:100%;
  background:linear-gradient(135deg, var(--signal), #00b880);
  color:#000; border:none; border-radius:12px;
  padding:14px; font-size:14px; font-weight:800; margin-top:6px;
  box-shadow:0 4px 16px rgba(0,221,160,.25);
}
.btn-save:active { transform:scale(.98); }

/* ── NAV BOTTOM — premium ─────────────────────────── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(7,13,20,.92);
  border-top:1px solid var(--border);
  display:flex; z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.nav-btn {
  flex:1; padding:9px 4px 11px;
  font-size:9px; color:var(--muted);
  text-align:center; cursor:pointer;
  border:none; background:none;
  letter-spacing:.5px;
  transition:color .15s;
  position:relative;
}
.nav-btn.on { color:var(--accent); }
.nav-btn.on::before {
  content:'';
  position:absolute; top:0; left:25%; right:25%; height:2px;
  background:linear-gradient(90deg, var(--accent), var(--signal));
  border-radius:0 0 3px 3px;
}
.nav-icon { font-size:21px; display:block; margin-bottom:2px; }
/* pill */
.pill { font-weight:700; letter-spacing:.3px; }
.stat-val2 { font-size:20px; font-weight:800; margin:2px 0; letter-spacing:-.5px; }

/* ── TABS ─────────────────────────────────────────── */
.tabs {
  display:flex;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex:1; background:none; border:none;
  border-bottom:2px solid transparent;
  color:var(--sub); padding:11px 4px;
  font-size:11px; cursor:pointer; font-weight:700;
  transition:all .15s; white-space:nowrap; min-width:60px;
  letter-spacing:.3px;
}
.tab.on { border-bottom-color:var(--accent); color:var(--accent); }

/* ── PILLS ────────────────────────────────────────── */
.pill {
  display:inline-flex; align-items:center; gap:3px;
  border-radius:20px; padding:3px 9px;
  font-size:10px; font-weight:700;
  letter-spacing:.2px;
}

/* ── ORS TOGGLES ──────────────────────────────────── */
.ors-grid { display:flex; flex-wrap:wrap; gap:8px; }
.ors-btn { padding:8px 13px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; }

/* ── PROGRESS BARS ────────────────────────────────── */
.bar-track {
  flex:1; height:5px;
  background:var(--border); border-radius:3px; overflow:hidden;
}
.bar-fill { height:100%; border-radius:3px; transition:width .5s cubic-bezier(.4,0,.2,1); }

/* ── PHASE BADGES — premium glow ─────────────────── */
.phase-badge {
  display:inline-flex; align-items:center; gap:5px;
  border-radius:20px; padding:5px 13px;
  font-size:10px; font-weight:800; letter-spacing:.8px;
  text-transform:uppercase;
}
.phase-signal {
  background:rgba(0,221,160,.15);
  border:1.5px solid var(--signal);
  color:var(--signal);
  box-shadow:0 0 10px rgba(0,221,160,.2);
}
.phase-watch {
  background:rgba(240,168,0,.15);
  border:1.5px solid var(--watch);
  color:var(--watch);
  box-shadow:0 0 10px rgba(240,168,0,.15);
}
.phase-radar {
  background:rgba(58,143,255,.12);
  border:1.5px solid var(--radar);
  color:var(--blue);
}
.phase-no {
  background:rgba(42,58,74,.3);
  border:1.5px solid var(--no);
  color:var(--sub);
}

/* Tooltip modal */
.tooltip-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease;}
.tooltip-modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:700px;border-top:1px solid var(--border2);animation:slideUp .2s ease;}
.tooltip-close{float:right;font-size:22px;color:var(--sub);background:none;border:none;cursor:pointer;padding:0 4px;}
.tooltip-title{font-size:16px;font-weight:800;color:var(--accent);margin-bottom:14px;padding-right:30px;}
.tooltip-section{margin-bottom:12px;}
.tooltip-lbl{font-size:9px;color:var(--sub);letter-spacing:2px;font-weight:700;margin-bottom:4px;}
.tooltip-text{font-size:13px;color:var(--text);line-height:1.7;}
.tooltip-seek{background:var(--signal)12;border-left:3px solid var(--signal);border-radius:0 8px 8px 0;padding:8px 12px;}
.tooltip-avoid{background:var(--bear)10;border-left:3px solid var(--bear);border-radius:0 8px 8px 0;padding:8px 12px;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0;}to{transform:none;opacity:1;}}

/* Chart patterns visual */
.pattern-card { border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid; }

/* Live dot */
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--signal); display: inline-block; animation: pulse 2s infinite; margin-right: 4px; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* ── STAT BOXES ───────────────────────────────────── */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.stat-box2 {
  background:linear-gradient(145deg, var(--card), var(--card2));
  border-radius:14px; padding:13px 12px;
  border:1px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.stat-val2 { font-size:20px; font-weight:800; margin:3px 0; letter-spacing:-.5px; font-variant-numeric:tabular-nums; }
.stat-lbl2 { font-size:8px; color:var(--sub); letter-spacing:2px; text-transform:uppercase; }

/* ── RANKING CARDS — premium left border ──────────── */
.rank-card {
  background:linear-gradient(145deg, var(--card), rgba(14,22,34,.8));
  border-radius:16px; padding:14px;
  margin-bottom:10px;
  border:1px solid var(--border);
  border-left:3px solid var(--border);
  position:relative; cursor:pointer;
  transition:border-color .2s, box-shadow .2s, transform .1s;
  box-shadow:0 2px 16px rgba(0,0,0,.3);
}
.rank-card:active { transform:scale(.99); }
.rank-card.phase-signal-card { border-left-color:var(--signal); }
.rank-card.phase-watch-card  { border-left-color:var(--watch); }
.rank-card.phase-radar-card  { border-left-color:var(--radar); }

/* ── ORS CHECKLIST ────────────────────────────────── */
.ors-check { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.ors-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; font-size:12px; }
.ors-item.on   { background:rgba(0,221,160,.1);  border:1px solid rgba(0,221,160,.3); }
.ors-item.off  { background:rgba(255,58,85,.05); border:1px solid var(--muted); color:var(--sub); }
.ors-item.mand.on  { background:rgba(232,184,48,.1); border:1px solid rgba(232,184,48,.4); color:var(--accent); }
.ors-item.mand.off { background:rgba(255,58,85,.12); border:1px solid rgba(255,58,85,.4); color:var(--bear); }

/* ── TRADE ROWS ───────────────────────────────────── */
.trade-row {
  background:linear-gradient(145deg, var(--card), var(--card2));
  border-radius:12px; padding:12px 14px;
  margin-bottom:8px;
  border:1px solid var(--border);
  border-left:3px solid;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}

/* ── ALERT BANNER ─────────────────────────────────── */
.alert-banner {
  background:linear-gradient(135deg, rgba(255,58,85,.06), rgba(255,58,85,.14));
  border:1px solid rgba(255,58,85,.35);
  border-radius:14px; padding:13px 16px; margin-bottom:14px;
}

/* ── METRIC ROWS ──────────────────────────────────── */
.metric-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.metric-row:last-child { border-bottom:none; }

/* ── FADE ANIMATION ───────────────────────────────── */
.fade { animation:fd .2s ease; }
@keyframes fd { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:none;} }

/* ── TOAST ────────────────────────────────────────── */
.toast {
  position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
  background:rgba(14,22,34,.95);
  border:1px solid var(--border2);
  border-radius:12px; padding:10px 22px;
  font-size:12px; font-weight:600;
  z-index:999; pointer-events:none;
  white-space:nowrap;
  transition:opacity .3s;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}

/* ── SECTION HEADER ───────────────────────────────── */
.sec-hdr {
  font-size:9px; color:var(--sub);
  letter-spacing:2.5px; margin-bottom:10px;
  font-weight:700; text-transform:uppercase;
}

/* ── DIVIDER ──────────────────────────────────────── */
.divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:14px 0; }

/* ── EMPTY STATE ──────────────────────────────────── */
.empty { text-align:center; padding:50px 20px; color:var(--muted); font-size:13px; }

/* ── SCORE RING ───────────────────────────────────── */
.score-ring { position:relative; width:80px; height:80px; flex-shrink:0; }
.score-ring svg { transform:rotate(-90deg); }
.score-ring-val { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-ring-num { font-size:20px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
.score-ring-lbl { font-size:8px; color:var(--sub); letter-spacing:1px; margin-top:1px; }

/* ── MOMENTUM ARROW ───────────────────────────────── */
.mom-arrow { font-size:18px; }

/* ── SIGNAL PULSE ─────────────────────────────────── */
@keyframes signalPulse {
  0%,100%{ box-shadow:0 0 0 0 rgba(0,221,160,0); }
  50%{ box-shadow:0 0 0 8px rgba(0,221,160,.1); }
}
.card-signal-pulse { animation:signalPulse 3s infinite; }

/* ── RING ANIMATION ───────────────────────────────── */
@keyframes ringFill { from{stroke-dashoffset:283;} }
.ring-animated { animation:ringFill .9s cubic-bezier(.4,0,.2,1) forwards; }

/* ── XP BADGE ─────────────────────────────────────── */
.xp-badge {
  display:inline-flex; align-items:center; gap:5px;
  background:linear-gradient(135deg,rgba(160,80,255,.2),rgba(58,143,255,.2));
  border:1px solid rgba(160,80,255,.4);
  border-radius:20px; padding:3px 10px;
  font-size:10px; font-weight:700; color:var(--purple);
}

/* ── TIP CARD ─────────────────────────────────────── */
.tip-card {
  background:linear-gradient(135deg,rgba(58,143,255,.07),rgba(160,80,255,.07));
  border:1px solid rgba(58,143,255,.2);
  border-radius:14px; padding:13px 15px; margin-bottom:12px;
}
.tip-icon { font-size:20px; margin-right:8px; }

/* ── EDU PILL ─────────────────────────────────────── */
.edu-pill { background:var(--card2); border:1px solid var(--border2); border-radius:8px; padding:6px 10px; font-size:11px; color:var(--text); line-height:1.5; }

/* ── STRIPED PROGRESS ─────────────────────────────── */
@keyframes stripes { from{background-position:0 0;} to{background-position:30px 0;} }
.bar-fill-active {
  background-image:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(255,255,255,.08) 5px,rgba(255,255,255,.08) 10px);
  background-size:30px 100%; animation:stripes 1s linear infinite;
}

/* ── LEARNING CARD ────────────────────────────────── */
.learn-card { border-radius:14px; padding:14px 16px; margin-bottom:10px; border:1px solid var(--border); background:var(--card); }
.learn-card-hdr { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.learn-card-icon { font-size:24px; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:var(--card2); flex-shrink:0; }

/* ── ORS CONDITION ITEMS ──────────────────────────── */
.ors-cond { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; margin-bottom:6px; border:1px solid; transition:all .2s; }
.ors-cond.ok { background:rgba(0,221,160,.08); border-color:rgba(0,221,160,.25); }
.ors-cond.fail { background:var(--card2); border-color:var(--border); }
.ors-cond.mandatory.ok { background:rgba(232,184,48,.1); border-color:rgba(232,184,48,.4); }
.ors-cond.mandatory.fail { background:rgba(255,58,85,.07); border-color:rgba(255,58,85,.25); }
.ors-cond-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.ors-cond-body { flex:1; }
.ors-cond-name { font-size:12px; font-weight:700; }
.ors-cond-detail { font-size:10px; color:var(--sub); margin-top:1px; }
.ors-cond-why { font-size:10px; color:var(--text); margin-top:4px; padding:4px 8px; background:var(--card2); border-radius:6px; line-height:1.5; }

/* ── QUIZ OPTIONS ─────────────────────────────────── */
.quiz-opt { width:100%; text-align:left; padding:11px 14px; border-radius:10px; border:1px solid var(--border); background:var(--card2); color:var(--text); margin-bottom:6px; font-size:12px; cursor:pointer; transition:all .15s; }
.quiz-opt:active { border-color:var(--accent); background:rgba(232,184,48,.08); }
.quiz-opt.correct { background:rgba(0,221,160,.15); border-color:var(--signal); color:var(--signal); font-weight:700; }
.quiz-opt.wrong { background:rgba(255,58,85,.1); border-color:var(--bear); color:var(--bear); }

/* ── ACHIEVEMENT TOAST ────────────────────────────── */
@keyframes achieveIn { from{opacity:0;transform:translateY(-20px) scale(.9);} to{opacity:1;transform:none;} }
.achieve-toast {
  position:fixed; top:70px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:#fff; border-radius:14px; padding:10px 20px;
  font-size:12px; font-weight:700; z-index:9999;
  pointer-events:none; animation:achieveIn .3s ease;
  box-shadow:0 8px 32px rgba(160,80,255,.35);
}

/* ── GAUGE ────────────────────────────────────────── */
.gauge-wrap { position:relative; width:80px; height:40px; overflow:hidden; }
.gauge-bg { position:absolute; bottom:0; left:0; right:0; height:80px; border-radius:40px 40px 0 0; border:5px solid var(--border); border-bottom:none; }

function calcATR(prices,period){
  if(!prices||prices.length<period+1)return null;
  var trs=[];
  for(var i=1;i<prices.length;i++){
    var h=prices[i].high||prices[i].close,l=prices[i].low||prices[i].close,p=prices[i-1].close;
    trs.push(Math.max(h-l,Math.abs(h-p),Math.abs(l-p)));
  }
  var sum=0;for(var j=trs.length-period;j<trs.length;j++)sum+=trs[j];
  return sum/period;
}
function calcSMA(prices, period) {
  if(!prices||prices.length<period) return null;
  var sum=0;
  for(var i=prices.length-period;i<prices.length;i++) sum+=prices[i].close;
  return parseFloat((sum/period).toFixed(2));
}

function calcEMAValue(prices, period) {
  if(!prices||prices.length<period) return null;
  var k=2/(period+1), ema=prices[0].close;
  for(var i=1;i<prices.length;i++) ema=prices[i].close*k+ema*(1-k);
  return parseFloat(ema.toFixed(2));
}

// ── VOLUME PROFILE ANCHORED ───────────────────────────
function calcVolumeProfile(prices, anchorIdx) {
  // anchorIdx: start from this index (default: last 60 days)
  if(!prices||prices.length<10) return null;
  var start = anchorIdx!=null ? anchorIdx : Math.max(0, prices.length-60);
  var slice = prices.slice(start);
  if(slice.length<5) return null;

  // Build price buckets (20 levels)
  var hi=Math.max.apply(null,slice.map(function(p){return p.high||p.close;}));
  var lo=Math.min.apply(null,slice.map(function(p){return p.low||p.close;}));
  var rng=hi-lo; if(rng<0.01) return null;
  var BUCKETS=20;
  var bucketSize=rng/BUCKETS;
  var vol=[];
  for(var i=0;i<BUCKETS;i++) vol.push(0);

  slice.forEach(function(p){
    var v=p.volume||1;
    var cIdx=Math.min(BUCKETS-1,Math.floor(((p.close-lo)/rng)*BUCKETS));
    var hIdx=Math.min(BUCKETS-1,Math.floor(((( p.high||p.close)-lo)/rng)*BUCKETS));
    var lIdx=Math.max(0,Math.floor((((p.low||p.close)-lo)/rng)*BUCKETS));
    // Distribute volume across candle range
    for(var b=lIdx;b<=hIdx;b++) vol[b]+=v/(hIdx-lIdx+1);
  });

  // Find POC (highest volume bucket)
  var maxVol=0, pocIdx=0;
  vol.forEach(function(v,i){if(v>maxVol){maxVol=v;pocIdx=i;}});
  var poc=lo+pocIdx*bucketSize+bucketSize/2;

  // Value Area (70% of total volume)
  var totalVol=vol.reduce(function(a,b){return a+b;},0);
  var target=totalVol*0.70;
  var accum=vol[pocIdx];
  var vahIdx=pocIdx, valIdx=pocIdx;
  while(accum<target&&(vahIdx<BUCKETS-1||valIdx>0)){
    var upVol=vahIdx<BUCKETS-1?vol[vahIdx+1]:0;
    var dnVol=valIdx>0?vol[valIdx-1]:0;
    if(upVol>=dnVol&&vahIdx<BUCKETS-1){vahIdx++;accum+=upVol;}
    else if(valIdx>0){valIdx--;accum+=dnVol;}
    else break;
  }

  return {
    poc: parseFloat(poc.toFixed(2)),
    vah: parseFloat((lo+vahIdx*bucketSize+bucketSize).toFixed(2)),
    val: parseFloat((lo+valIdx*bucketSize).toFixed(2)),
    hi:  parseFloat(hi.toFixed(2)),
    lo:  parseFloat(lo.toFixed(2)),
    vol: vol, bucketSize: bucketSize,
    maxVol: maxVol,
  };
}

function detectRange(prices) {
  // Detects if market is in a sideways range (last 20 days)
  if(!prices||prices.length<20) return null;
  var slice=prices.slice(-20);
  var highs=slice.map(function(p){return p.high||p.close;});
  var lows=slice.map(function(p){return p.low||p.close;});
  var hi=Math.max.apply(null,highs);
  var lo=Math.min.apply(null,lows);
  var last=prices[prices.length-1].close;
  var rngPct=(hi-lo)/lo*100;
  var isRange=rngPct<8; // Less than 8% range = sideways
  var midPct=(last-lo)/(hi-lo); // Where in range is price now (0=bottom, 1=top)
  return {
    isRange: isRange,
    hi: parseFloat(hi.toFixed(2)),
    lo: parseFloat(lo.toFixed(2)),
    rangePct: parseFloat(rngPct.toFixed(1)),
    midPct: parseFloat(midPct.toFixed(2)),
    target: parseFloat(hi.toFixed(2)),  // Range target = top of range
    inBuyZone: midPct<0.3,             // Bottom 30% = buy zone
    inSellZone: midPct>0.7,            // Top 30% = sell zone
  };
}

function detectSLIT(prices) {
  // SLIT — false breakout detection (Tipo 1, 2, 3)
  if(!prices||prices.length<10) return null;
  var n=prices.length;
  var last=prices[n-1];
  var prev=prices[n-2];
  var prev2=prices[n-3];
  var prev3=prices[n-4];

  var results=[];

  // SLIT Tipo 1 — Price breaks below recent low then reverses
  var recentLow=Math.min.apply(null,prices.slice(-10,-1).map(function(p){return p.low||p.close;}));
  var brokeDown=(prev.low||prev.close)<recentLow;
  var reversed=last.close>(prev.close+(Math.abs(prev.close-recentLow)*0.5));
  if(brokeDown&&reversed&&last.close>prev.close){
    results.push({type:1,strength:70,
      desc:'SLIT Tipo 1 — Falso rompimiento bajo mínimo reciente. Stops cazados, precio revierte al alza.',
      signal:'Entrada de alta probabilidad — el mercado ha cazado stops y ahora sube libre de presión vendedora.'});
  }

  // SLIT Tipo 3 — False break + strong reversal candle
  var hasReversal=(last.close-last.low)/(( last.high-last.low)||0.001)>0.7; // Strong bull close
  var hadFalseBreak=prev.close<prices[n-5]?.close*0.99&&last.close>prev.close*1.02;
  if(hadFalseBreak&&hasReversal){
    results.push({type:3,strength:85,
      desc:'SLIT Tipo 3 — Falso rompimiento con vela de reversión fuerte. Máximo setup institucional.',
      signal:'Señal de muy alta convicción. Los institucionales han cazado stops y aceleran al alza.'});
  }

  return results.length?{detected:true,patterns:results,strongest:results.reduce(function(a,b){return b.strength>a.strength?b:a;})}:null;
}

function calcFibLevels(prices) {
  // Find swing high and low in last 60 days
  if(!prices||prices.length<20) return null;
  var n=prices.length;
  var slice=prices.slice(Math.max(0,n-60));
  var hi=slice[0].high||slice[0].close, lo=slice[0].low||slice[0].close;
  var hiIdx=0, loIdx=0;
  for(var i=1;i<slice.length;i++){
    var h=slice[i].high||slice[i].close;
    var l=slice[i].low||slice[i].close;
    if(h>hi){hi=h;hiIdx=i;}
    if(l<lo){lo=l;loIdx=i;}
  }
  var rng=hi-lo;
  // Determine if retracing from high or from low
  var isRetrace=loIdx<hiIdx; // low came before high = price went up then retracing
  return {
    hi:hi, lo:lo,
    r236: parseFloat((hi-rng*0.236).toFixed(2)),
    r382: parseFloat((hi-rng*0.382).toFixed(2)),
    r500: parseFloat((hi-rng*0.500).toFixed(2)),
    r618: parseFloat((hi-rng*0.618).toFixed(2)),
    r786: parseFloat((hi-rng*0.786).toFixed(2)),
    isRetrace: isRetrace,
  };
}

function calcPositionSize(capital, riskPct, atr, multiplier, fxRate) {
  // Turtle-ORS: shares = (capital * riskPct) / (multiplier * ATR * fxRate)
  riskPct = riskPct || 0.02;
  multiplier = multiplier || 1.5;
  fxRate = fxRate || 1.08; // EUR to USD approx
  if(!atr||atr<=0) return null;
  var riskEur = capital * riskPct;
  var riskUsd = riskEur * fxRate;
  var shares = Math.floor(riskUsd / (multiplier * atr));
  return {
    shares: shares,
    riskEur: parseFloat(riskEur.toFixed(0)),
    riskUsd: parseFloat(riskUsd.toFixed(0)),
    stopDist: parseFloat((multiplier * atr).toFixed(2)),
    atr: parseFloat(atr.toFixed(2)),
  };
}

function calcRSI(prices,period){
  // Wilder smoothing — identico a TradingView Pine Script
  if(!prices||prices.length<period+2)return null;
  var gains=[], losses=[], i, d;
  for(i=1;i<prices.length;i++){
    d=prices[i].close-prices[i-1].close;
    gains.push(d>0?d:0);
    losses.push(d<0?-d:0);
  }
  if(gains.length<period)return null;
  // Primera media simple (seed)
  var avgG=0, avgL=0;
  for(i=0;i<period;i++){ avgG+=gains[i]; avgL+=losses[i]; }
  avgG/=period; avgL/=period;
  // Wilder smoothing para el resto
  for(i=period;i<gains.length;i++){
    avgG=(avgG*(period-1)+gains[i])/period;
    avgL=(avgL*(period-1)+losses[i])/period;
  }
  if(avgL===0)return 100;
  var rs=avgG/avgL;
  return parseFloat((100-(100/(1+rs))).toFixed(2));
}
function calcEMA(prices,period){
  if(!prices||prices.length<period)return null;
  var k=2/(period+1),ema=prices[prices.length-period].close;
  for(var i=prices.length-period+1;i<prices.length;i++)ema=prices[i].close*k+ema*(1-k);
  return ema;
}
function calcMomentum(prices){
  if(!prices||prices.length<61)return{m5:0,m20:0,m60:0};
  var last=prices[prices.length-1].close;
  return{
    m5:  prices.length>5  ? parseFloat(((last-prices[prices.length-6].close)/prices[prices.length-6].close*100).toFixed(2)):0,
    m20: parseFloat(((last-prices[prices.length-21].close)/prices[prices.length-21].close*100).toFixed(2)),
    m60: parseFloat(((last-prices[prices.length-61].close)/prices[prices.length-61].close*100).toFixed(2)),
  };
}

// ═══════════════════════════════════════════════════════
// MACD — Moving Average Convergence Divergence
// ═══════════════════════════════════════════════════════
function calcMACD(prices, fast, slow, signal) {
  fast=fast||12; slow=slow||26; signal=signal||9;
  if(!prices||prices.length<slow+signal+1) return null;
  var kf=2/(fast+1), ks=2/(slow+1), i;
  // EMA rapida — arranca desde vela 0
  var emaFast=prices[0].close;
  var emaFastArr=[];
  for(i=1;i<prices.length;i++){
    emaFast=prices[i].close*kf+emaFast*(1-kf);
    emaFastArr.push(emaFast);
  }
  // EMA lenta — arranca desde vela 0
  var emaSlow=prices[0].close;
  var emaSlowArr=[];
  for(i=1;i<prices.length;i++){
    emaSlow=prices[i].close*ks+emaSlow*(1-ks);
    emaSlowArr.push(emaSlow);
  }
  // Linea MACD = EMA rapida - EMA lenta
  var macdLine=[];
  for(i=slow-2;i<emaFastArr.length;i++){
    macdLine.push(emaFastArr[i]-emaSlowArr[i]);
  }
  if(macdLine.length<signal) return null;
  // Signal line — EMA de 9 periodos sobre MACD
  var ks2=2/(signal+1);
  var sigVal=macdLine[0];
  var sigArr=[sigVal];
  for(i=1;i<macdLine.length;i++){
    sigVal=macdLine[i]*ks2+sigVal*(1-ks2);
    sigArr.push(sigVal);
  }
  var lastMACD=macdLine[macdLine.length-1];
  var lastSig=sigArr[sigArr.length-1];
  var prevMACD=macdLine[macdLine.length-2];
  var prevSig=sigArr[sigArr.length-2];
  var hist=lastMACD-lastSig;
  var prevHist=prevMACD-prevSig;
  var bullCross=prevMACD<=prevSig&&lastMACD>lastSig;
  var bearCross=prevMACD>=prevSig&&lastMACD<lastSig;
  var bullish=lastMACD>lastSig;
  return{
    macd:+lastMACD.toFixed(4), signal:+lastSig.toFixed(4),
    hist:+hist.toFixed(4), prevHist:+prevHist.toFixed(4),
    bullCross:bullCross, bearCross:bearCross,
    bullish:bullish,
    increasing:hist>prevHist,
    color:bullish?'var(--signal)':'var(--bear)',
  };
}

// ═══════════════════════════════════════════════════════
// WILLIAMS %R — confirma sobreventa mejor que RSI
// ═══════════════════════════════════════════════════════
function calcWilliamsR(prices, period) {
  period=period||14;
  if(!prices||prices.length<period) return null;
  var slice=prices.slice(-period);
  var highs=slice.map(function(p){return p.high||p.close;});
  var lows =slice.map(function(p){return p.low ||p.close;});
  var hh=Math.max.apply(null,highs);
  var ll=Math.min.apply(null,lows);
  var last=prices[prices.length-1].close;
  if(hh===ll) return -50;
  var wr=((hh-last)/(hh-ll))*-100;
  return +wr.toFixed(2);
}

// ═══════════════════════════════════════════════════════
// OBV — On Balance Volume (calculado con datos reales)
// ═══════════════════════════════════════════════════════
// ── MONEY FLOW INDEX ──────────────────────────────────
function calcMFI(prices, period) {
  period = period || 14;
  if(!prices||prices.length<period+1) return null;
  var posFlow=0, negFlow=0;
  for(var i=prices.length-period;i<prices.length;i++){
    var tp=(( prices[i].high||prices[i].close)+(prices[i].low||prices[i].close)+prices[i].close)/3;
    var tpPrev=((prices[i-1].high||prices[i-1].close)+(prices[i-1].low||prices[i-1].close)+prices[i-1].close)/3;
    var vol=prices[i].volume||1;
    var mf=tp*vol;
    if(tp>tpPrev) posFlow+=mf;
    else negFlow+=mf;
  }
  if(negFlow===0) return 100;
  var mfr=posFlow/negFlow;
  var mfi=parseFloat((100-(100/(1+mfr))).toFixed(2));
  return {
    value: mfi,
    bullish: mfi<40,   // oversold = bullish signal
    overbought: mfi>80,
    color: mfi<40?'var(--signal)':mfi>80?'var(--bear)':'var(--sub)',
  };
}

function calcOBV(prices) {
  if(!prices||prices.length<10) return null;
  var hasVol=prices.some(function(p){return p.volume&&p.volume>0;});
  if(!hasVol) return null;

  // Build OBV series (same formula as TradingView)
  var obv=0, obvSeries=[];
  for(var i=1;i<prices.length;i++){
    var vol=prices[i].volume||0;
    if(prices[i].close>prices[i-1].close) obv+=vol;
    else if(prices[i].close<prices[i-1].close) obv-=vol;
    obvSeries.push(obv);
  }
  var n=obvSeries.length;

  // ── TradingView-compatible OBV trend detection ──
  // Instead of comparing absolute OBV to its average (which depends on history length),
  // we look at the SLOPE of OBV over recent bars — same as TradingView
  var period=14; // match TradingView default
  var recentBars=Math.min(period, n);
  var recent=obvSeries.slice(-recentBars);

  // Linear regression slope on recent OBV bars
  var sumX=0,sumY=0,sumXY=0,sumX2=0,nb=recent.length;
  for(var j=0;j<nb;j++){
    sumX+=j; sumY+=recent[j]; sumXY+=j*recent[j]; sumX2+=j*j;
  }
  var slope=(nb*sumXY-sumX*sumY)/(nb*sumX2-sumX*sumX||1);

  // OBV is bullish if slope is positive (rising) over last 14 bars
  var bullish=slope>0;

  // Also check: OBV last 3 bars rising (short-term momentum)
  var rising=n>=3&&obvSeries[n-1]>obvSeries[n-3];

  // Trend over last 20 bars as percentage
  var trend20=n>=20?(obvSeries[n-1]-obvSeries[n-20])/Math.abs(obvSeries[n-20]||1)*100:slope*100;

  return{
    value:obvSeries[n-1],
    avg10:obvSeries.slice(-10).reduce(function(a,b){return a+b;},0)/10,
    bullish:bullish,       // TradingView-compatible: slope-based
    rising:rising,         // Short term: last 3 bars rising
    slope:+slope.toFixed(0),
    trend20:+trend20.toFixed(1),
  };
}

// ═══════════════════════════════════════════════════════
// BACKTESTING ENGINE
// Simula señales ORS en histórico de 2 años
// ═══════════════════════════════════════════════════════
function runBacktest(sym) {
  var tk=DB.tickers[sym];
  if(!tk||!tk.prices||tk.prices.length<50) return null;
  var prices=tk.prices;
  var results=[], wins=0, losses=0, totalPnl=0;
  var holdDays=3; // swing 1-3 días — usamos 3 como promedio

  // Simulate ORS signals across history
  for(var i=30;i<prices.length-holdDays-1;i++){
    var slice=prices.slice(0,i+1);
    var rsi=calcRSI(slice,14);
    var ema=calcEMA(slice,20);
    var last=slice[slice.length-1].close;
    var prev=slice[slice.length-2]?slice[slice.length-2].close:last;
    var macd=calcMACD(slice);
    var wr=calcWilliamsR(slice,14);

    // Simulate ORS-v2 conditions:
    // RSI cruz.30 (was below 30, now above)
    var rsiPrev=calcRSI(slice.slice(0,-1),14);
    var rsiCruz=rsiPrev&&rsiPrev<30&&rsi&&rsi>30;
    var bajoVwap=ema&&last<ema;
    var macdBullish=macd&&macd.bullish;
    var rsiOk=rsi&&rsi>30&&rsi<45;
    var wrOversold=wr&&wr<-70;

    // Score: 4+ conditions = simulated signal
    var condCount=0;
    if(rsiCruz) condCount++;
    if(bajoVwap) condCount++;
    if(macdBullish) condCount++;
    if(rsiOk) condCount++;
    if(wrOversold) condCount++;

    if(condCount>=4&&rsiCruz) { // Must have RSI cruz
      var entryPrice=prices[i+1]?prices[i+1].close:last;
      var exitIdx=Math.min(i+holdDays,prices.length-1);
      var exitPrice=prices[exitIdx].close;
      var pnl=+((exitPrice-entryPrice)/entryPrice*100).toFixed(2);
      var win=pnl>0;
      if(win) wins++; else losses++;
      totalPnl+=pnl;
      results.push({
        date:prices[i].date, entry:+entryPrice.toFixed(2),
        exit:+exitPrice.toFixed(2), pnl:pnl, win:win,
        rsi:rsi?+rsi.toFixed(1):null, conditions:condCount,
      });
    }
  }

  if(!results.length) return null;
  var total=results.length;
  var wr2=Math.round(wins/total*100);
  var avgPnl=+(totalPnl/total).toFixed(2);
  var avgWin=results.filter(function(r){return r.win;}).reduce(function(s,r){return s+r.pnl;},0)/(wins||1);
  var avgLoss=results.filter(function(r){return !r.win;}).reduce(function(s,r){return s+r.pnl;},0)/((total-wins)||1);
  var profitFactor=avgLoss!==0?+(Math.abs(avgWin/avgLoss)).toFixed(2):999;
  var maxDD=0,peak=0,cumPnl=0;
  results.forEach(function(r){
    cumPnl+=r.pnl;
    if(cumPnl>peak)peak=cumPnl;
    var dd=peak-cumPnl;
    if(dd>maxDD)maxDD=dd;
  });

  return{
    total:total, wins:wins, losses:total-wins,
    winRate:wr2, avgPnl:avgPnl,
    avgWin:+avgWin.toFixed(2), avgLoss:+avgLoss.toFixed(2),
    profitFactor:profitFactor,
    maxDrawdown:+maxDD.toFixed(2),
    totalPnl:+totalPnl.toFixed(2),
    recentResults:results.slice(-10),
    allResults:results,
  };
}

// ═══════════════════════════════════════════════════════
// SIGNAL QUALITY SCORE — 0 to 100
// Combina TODOS los indicadores en un único número de confianza
// ═══════════════════════════════════════════════════════
function calcSignalQuality(sym) {
  var tk=DB.tickers[sym];
  if(!tk||!tk.prices||tk.prices.length<30) return null;
  var prices=tk.prices;
  var q=MKT[sym];
  var last=q?q.price:prices[prices.length-1].close;
  var score=0, max=0, factors=[];

  function add(label, val, weight, good) {
    max+=weight;
    if(good){score+=weight;factors.push({label:label,ok:true,detail:val});}
    else factors.push({label:label,ok:false,detail:val});
  }

  var rsi=calcRSI(prices,14);
  var stoch=calcStochRSI(prices);
  var macd=calcMACD(prices);
  var bb=calcBollinger(prices);
  var wr=calcWilliamsR(prices,14);
  var obv=calcOBV(prices);
  var mfi=calcMFI(prices,14);
  var ema20=calcEMA(prices,20);
  var ema50val=calcEMAValue(prices,50);
  var sma200val=calcSMA(prices,200);
  var fibLvl=calcFibLevels(prices);
  var atr=calcATR(prices,14);
  var rangeData=detectRange(prices);
  var div=detectRSIDivergence(prices);
  var allLvl=detectAllLevels(prices);
  var candles=detectCandlePatterns(prices);
  var slit=detectSLIT(prices);
  var vol=calcVolumeScore(prices);
  // Derived filters
  var last2=prices[prices.length-1].close;
  var aboveSMA200=sma200val&&last2>sma200val;
  var sma200Dist=sma200val?parseFloat(((last2-sma200val)/sma200val*100).toFixed(1)):null;
  var fibProximity=null;
  if(fibLvl){
    var fibPoints=[{l:fibLvl.r618,n:'61.8%'},{l:fibLvl.r500,n:'50%'},{l:fibLvl.r382,n:'38.2%'},{l:fibLvl.r236,n:'23.6%'}];
    for(var fi=0;fi<fibPoints.length;fi++){
      var fdist=Math.abs(last2-fibPoints[fi].l)/last2*100;
      if(fdist<2.0){fibProximity={level:fibPoints[fi].n,price:fibPoints[fi].l,dist:parseFloat(fdist.toFixed(1))};break;}
    }
  }

  // 1. RSI en zona óptima (peso 20)
  var rsiGood=rsi!==null&&rsi>=20&&rsi<=40;
  add('RSI en zona ORS (20-40)', rsi!==null?rsi.toFixed(1):'N/A', 20, rsiGood);

  // 2. Stochastic RSI cruce alcista (peso 18)
  var stochGood=stoch&&(stoch.bullCross||stoch.oversold);
  add('Stoch RSI alcista', stoch?'K:'+stoch.k+' D:'+stoch.d:'N/A', 18, stochGood);

  // 3. MACD alcista (peso 15)
  var macdGood=macd&&macd.bullish&&macd.increasing;
  add('MACD alcista e incrementando', macd?'hist:'+macd.hist:'N/A', 15, macdGood);

  // 4. Precio bajo Bollinger o EMA (peso 12)
  var bollGood=bb&&(bb.nearLower||bb.pct<0.4);
  add('Precio zona baja Bollinger', bb?bb.position:'N/A', 12, bollGood);

  // 5. Williams %R sobreventa (peso 10)
  var wrGood=wr!==null&&wr<=-70;
  add('Williams %R sobreventa', wr!==null?wr:'N/A', 10, wrGood);

  // 6. OBV alcista con volumen (peso 10)
  var obvGood=obv&&obv.bullish&&obv.rising;
  add('OBV alcista', obv?'trend:'+obv.trend20+'%':'Sin vol.', 10, obvGood);

  // 7. Soporte cercano (peso 8)
  var supGood=false;
  var allSups=[];
  ['week','short'].forEach(function(tf){if(allLvl[tf])allLvl[tf].supports.forEach(function(s){allSups.push(s);});});
  var nearSup=allSups.filter(function(s){return s.price<last;}).sort(function(a,b){return b.price-a.price;})[0];
  if(nearSup){var d=(last-nearSup.price)/nearSup.price*100;supGood=d<3;}
  add('Soporte inmediato <3%', nearSup?'$'+nearSup.price:'N/A', 8, supGood);

  // 8. Divergencia alcista RSI (peso 8)
  var divGood=div&&div.type==='ALCISTA';
  add('Divergencia RSI alcista', div?div.type:'Sin divergencia', 8, divGood);

  // 9. Vela alcista de reversión (peso 7)
  var bullCandles=candles.filter(function(c){return c.type==='ALCISTA'&&c.strength>=70;});
  add('Vela alcista fuerte', bullCandles.length?bullCandles[0].name:'Sin vela', 7, bullCandles.length>0);

  // 10. Volumen confirmador (peso 7)
  var volGood=vol.ratio>=1.2;
  add('Volumen sobre media', '×'+vol.ratio, 7, volGood);

  // 11. Contexto mercado no bajista (peso 5)
  var mktGood=MARKET_CTX.trend!=='BEAR';
  add('Mercado general favorable', MARKET_CTX.trend, 5, mktGood);

  var qualityScore=max>0?Math.round(score/max*100):0;
  var grade=qualityScore>=80?'A':qualityScore>=65?'B':qualityScore>=50?'C':qualityScore>=35?'D':'F';
  var gradeColor=qualityScore>=80?'var(--signal)':qualityScore>=65?'var(--watch)':qualityScore>=50?'var(--blue)':'var(--bear)';
  var label=qualityScore>=80?'SEÑAL EXCELENTE':qualityScore>=65?'SEÑAL BUENA':qualityScore>=50?'SEÑAL ACEPTABLE':qualityScore>=35?'SEÑAL DÉBIL':'NO OPERAR';

  return{score:qualityScore, grade:grade, gradeColor:gradeColor, label:label, factors:factors, bullFactors:score/10, totalFactors:max/10};
}


// Más sensible que RSI clásico — perfecciona el timing
// ═══════════════════════════════════════════════════════
function calcStochRSI(prices, rsiPeriod, stochPeriod, smoothK, smoothD) {
  rsiPeriod  = rsiPeriod  || 14;
  stochPeriod= stochPeriod|| 14;
  smoothK    = smoothK    || 3;
  smoothD    = smoothD    || 3;
  if(!prices || prices.length < rsiPeriod + stochPeriod + smoothK + smoothD) return null;

  // Build RSI series
  var rsiSeries = [];
  for(var i = rsiPeriod; i < prices.length; i++) {
    var slice = prices.slice(i - rsiPeriod, i + 1);
    var rsiVal = calcRSI(slice, rsiPeriod);
    if(rsiVal !== null) rsiSeries.push(rsiVal);
  }
  if(rsiSeries.length < stochPeriod) return null;

  // Stochastic of RSI
  var stochK = [];
  for(var j = stochPeriod - 1; j < rsiSeries.length; j++) {
    var window = rsiSeries.slice(j - stochPeriod + 1, j + 1);
    var hi = Math.max.apply(null, window);
    var lo = Math.min.apply(null, window);
    var k  = hi === lo ? 50 : (rsiSeries[j] - lo) / (hi - lo) * 100;
    stochK.push(k);
  }

  // Smooth K (SMA)
  var smoothedK = [];
  for(var sk = smoothK - 1; sk < stochK.length; sk++) {
    var sum = 0;
    for(var si = 0; si < smoothK; si++) sum += stochK[sk - si];
    smoothedK.push(sum / smoothK);
  }

  // D = SMA of smoothed K
  var smoothedD = [];
  for(var sd = smoothD - 1; sd < smoothedK.length; sd++) {
    var sum2 = 0;
    for(var di = 0; di < smoothD; di++) sum2 += smoothedK[sd - di];
    smoothedD.push(sum2 / smoothD);
  }

  if(!smoothedK.length || !smoothedD.length) return null;

  var kVal = smoothedK[smoothedK.length - 1];
  var dVal = smoothedD[smoothedD.length - 1];
  var kPrev = smoothedK.length > 1 ? smoothedK[smoothedK.length - 2] : kVal;
  var dPrev = smoothedD.length > 1 ? smoothedD[smoothedD.length - 2] : dVal;

  // Cross detection
  var bullCross = kPrev <= dPrev && kVal > dVal && kVal < 20; // K crosses above D in oversold
  var bearCross = kPrev >= dPrev && kVal < dVal && kVal > 80; // K crosses below D in overbought

  return {
    k:         +kVal.toFixed(2),
    d:         +dVal.toFixed(2),
    bullCross: bullCross,   // ★ señal de entrada
    bearCross: bearCross,   // ★ señal de salida
    oversold:  kVal < 20,
    overbought:kVal > 80,
    zone: kVal < 20 ? 'SOBREVENTA' : kVal > 80 ? 'SOBRECOMPRA' : kVal < 50 ? 'NEUTRAL-BAJO' : 'NEUTRAL-ALTO',
    color: kVal < 20 ? 'var(--signal)' : kVal > 80 ? 'var(--bear)' : 'var(--sub)',
  };
}

// ═══════════════════════════════════════════════════════
// BOLLINGER BANDS
// Soporte/resistencia dinámica — confirma entradas ORS
// ═══════════════════════════════════════════════════════
function calcBollinger(prices, period, stdDev) {
  period = period || 20;
  stdDev = stdDev || 2;
  if(!prices || prices.length < period) return null;

  var slice = prices.slice(-period);
  var cls   = slice.map(function(p){ return p.close; });
  var mean  = cls.reduce(function(a,b){ return a+b; },0) / period;
  var variance = cls.reduce(function(s,v){ return s + Math.pow(v-mean,2); },0) / period;
  var std   = Math.sqrt(variance);

  var upper = +(mean + stdDev * std).toFixed(2);
  var lower = +(mean - stdDev * std).toFixed(2);
  var mid   = +mean.toFixed(2);
  var last  = prices[prices.length-1].close;
  var bandwidth = +((upper - lower) / mid * 100).toFixed(2); // % width
  var pct   = upper === lower ? 0.5 : +((last - lower) / (upper - lower)).toFixed(3); // 0=lower, 1=upper

  // Position interpretation
  var position, posColor;
  if(last <= lower * 1.005) {
    position = 'BANDA INFERIOR'; posColor = 'var(--signal)'; // Zona de compra
  } else if(last >= upper * 0.995) {
    position = 'BANDA SUPERIOR'; posColor = 'var(--bear)';   // Zona de venta
  } else if(pct < 0.35) {
    position = 'ZONA BAJA';      posColor = 'var(--watch)';
  } else if(pct > 0.65) {
    position = 'ZONA ALTA';      posColor = 'var(--watch)';
  } else {
    position = 'ZONA MEDIA';     posColor = 'var(--sub)';
  }

  // Squeeze detection (volatility contraction = breakout incoming)
  var squeeze = bandwidth < 5; // Tight bands = big move coming

  return {
    upper:upper, mid:mid, lower:lower,
    bandwidth:bandwidth, pct:pct,
    position:position, posColor:posColor,
    squeeze:squeeze,
    nearLower: last <= lower * 1.015, // Within 1.5% of lower band
    nearUpper: last >= upper * 0.985, // Within 1.5% of upper band
  };
}

// CANDLESTICK PATTERN DETECTION
// Últimas 3 velas — confirmadores de reversión
// ═══════════════════════════════════════════════════════
function detectCandlePatterns(prices) {
  if(!prices || prices.length < 3) return [];
  var candles = [];
  var n = prices.length;
  var p = prices[n-1]; // última vela
  var p2 = prices[n-2];
  var p3 = prices[n-3];

  // Necesitamos high/low para velas japonesas
  // Si no hay OHLC usamos aproximación con close
  function getHL(candle) {
    return {
      o: candle.open  || candle.close * 0.998,
      h: candle.high  || candle.close * 1.005,
      l: candle.low   || candle.close * 0.995,
      c: candle.close,
    };
  }
  var c1 = getHL(p),  c2 = getHL(p2), c3 = getHL(p3);
  var body1 = Math.abs(c1.c - c1.o);
  var body2 = Math.abs(c2.c - c2.o);
  var range1 = c1.h - c1.l || 0.001;
  var range2 = c2.h - c2.l || 0.001;
  var upperWick1 = c1.h - Math.max(c1.c, c1.o);
  var lowerWick1 = Math.min(c1.c, c1.o) - c1.l;
  var isBull1 = c1.c > c1.o;
  var isBear1 = c1.c < c1.o;
  var isBull2 = c2.c > c2.o;
  var isBear2 = c2.c < c2.o;

  // ── HAMMER (alcista — cola larga abajo, cuerpo pequeño arriba) ──
  if(lowerWick1 > body1 * 2 && upperWick1 < body1 * 0.5 && lowerWick1 > range1 * 0.5) {
    candles.push({
      name:'Hammer', emoji:'🔨', type:'ALCISTA',
      color:'var(--signal)', date:p.date,
      desc:'Cuerpo pequeño con cola inferior larga — los vendedores intentaron bajar pero los compradores recuperaron el precio',
      signal:'Posible reversión alcista. Confirmar con volumen y señal ORS.',
      strength: 75,
    });
  }

  // ── SHOOTING STAR (bajista — cola larga arriba, cuerpo pequeño abajo) ──
  if(upperWick1 > body1 * 2 && lowerWick1 < body1 * 0.5 && upperWick1 > range1 * 0.5) {
    candles.push({
      name:'Shooting Star', emoji:'⭐', type:'BAJISTA',
      color:'var(--bear)', date:p.date,
      desc:'Cuerpo pequeño con cola superior larga — los compradores empujaron arriba pero los vendedores dominaron',
      signal:'Señal de techo. Vigilar señal de salida y ajustar stop.',
      strength: 75,
    });
  }

  // ── DOJI (indecisión) ──
  if(body1 < range1 * 0.1 && range1 > 0) {
    candles.push({
      name:'Doji', emoji:'✚', type:'NEUTRO',
      color:'var(--watch)', date:p.date,
      desc:'Apertura y cierre casi iguales — indecisión total entre compradores y vendedores',
      signal:'Momento de pausa. La siguiente vela con volumen marcará la dirección.',
      strength: 60,
    });
  }

  // ── BULLISH ENGULFING ──
  if(isBear2 && isBull1 && c1.o < c2.c && c1.c > c2.o) {
    candles.push({
      name:'Engulfing Alcista', emoji:'🕯️', type:'ALCISTA',
      color:'var(--signal)', date:p.date,
      desc:'Vela alcista que envuelve completamente la bajista anterior — inversión fuerte del control',
      signal:'Uno de los patrones de reversión más fiables. Señal de entrada si hay volumen.',
      strength: 85,
    });
  }

  // ── BEARISH ENGULFING ──
  if(isBull2 && isBear1 && c1.o > c2.c && c1.c < c2.o) {
    candles.push({
      name:'Engulfing Bajista', emoji:'🕯️', type:'BAJISTA',
      color:'var(--bear)', date:p.date,
      desc:'Vela bajista que envuelve completamente la alcista anterior — los vendedores tomaron control',
      signal:'Señal de distribución. Vigilar salida o ajustar stop inmediatamente.',
      strength: 85,
    });
  }

  // ── MORNING STAR (3 velas — reversión alcista fuerte) ──
  var c3body = Math.abs(c3.c - c3.o);
  var c3bear = c3.c < c3.o;
  if(c3bear && body2 < c3body * 0.4 && isBull1 && c1.c > (c3.o + c3.c) / 2) {
    candles.push({
      name:'Morning Star', emoji:'🌅', type:'ALCISTA',
      color:'var(--signal)', date:p3.date + ' → ' + p.date,
      desc:'Patrón de 3 velas: gran bajista + vela pequeña de indecisión + gran alcista',
      signal:'Patrón de reversión muy fiable. Alta probabilidad de rebote sostenido.',
      strength: 90,
    });
  }

  // ── EVENING STAR (3 velas — reversión bajista fuerte) ──
  var c3bull = c3.c > c3.o;
  if(c3bull && body2 < c3body * 0.4 && isBear1 && c1.c < (c3.o + c3.c) / 2) {
    candles.push({
      name:'Evening Star', emoji:'🌆', type:'BAJISTA',
      color:'var(--bear)', date:p3.date + ' → ' + p.date,
      desc:'Patrón de 3 velas: gran alcista + vela pequeña de indecisión + gran bajista',
      signal:'Señal de techo importante. Considerar salida parcial.',
      strength: 90,
    });
  }

  // ── MARUBOZU ALCISTA (sin mechas — convicción total) ──
  if(isBull1 && body1 > range1 * 0.9 && body1 > 0) {
    candles.push({
      name:'Marubozu Alcista', emoji:'📊', type:'ALCISTA',
      color:'var(--signal)', date:p.date,
      desc:'Vela alcista sin mechas — los compradores dominaron todo el día sin retroceso',
      signal:'Fuerte convicción compradora. Momento de momentum favorable.',
      strength: 70,
    });
  }

  return candles;
}

function checkEarningsRisk(sym) {
  var dates = EARNINGS_CALENDAR[sym] || [];
  if(!dates.length) return {risk:false, daysAway:null, date:null};
  var today2 = new Date();
  for(var i=0; i<dates.length; i++) {
    var eDate = new Date(dates[i]);

    if(diff >= 0 && diff <= 5) {
      return {risk:true, daysAway:diff, date:dates[i]};

function detectLvlsForPeriod(prices,w){
  if(prices.length<w*2+1)return{supports:[],resistances:[]};
  var cls=[],i,j;
  for(i=0;i<prices.length;i++)cls.push(prices[i].close);
  var raw=[];
  for(i=w;i<cls.length-w;i++){
    var sl=cls.slice(i-w,i+w+1),mn=Math.min.apply(null,sl),mx=Math.max.apply(null,sl);
    if(cls[i]===mn)raw.push({price:cls[i],type:'support'});
    if(cls[i]===mx)raw.push({price:cls[i],type:'resistance'});
  }
  var used=[],merged=[];
  for(i=0;i<raw.length;i++){
    if(used.indexOf(i)>=0)continue;
    var grp=[raw[i]];
    for(j=i+1;j<raw.length;j++){
      if(used.indexOf(j)<0&&Math.abs(raw[j].price-raw[i].price)/raw[i].price<0.025){grp.push(raw[j]);used.push(j);}
    }
    var avg=0;for(var g=0;g<grp.length;g++)avg+=grp[g].price;
    merged.push({price:parseFloat((avg/grp.length).toFixed(2)),type:raw[i].type,strength:grp.length});
  }
  var sup=[],res=[];
  for(i=0;i<merged.length;i++){if(merged[i].type==='support')sup.push(merged[i]);else res.push(merged[i]);}
  sup.sort(function(a,b){return b.strength-a.strength;});
  res.sort(function(a,b){return b.strength-a.strength;});
  return{supports:sup.slice(0,4),resistances:res.slice(0,4)};
}
function detectAllLevels(prices){
  return{
    week:   detectLvlsForPeriod(prices.slice(-7),   2),
    short:  detectLvlsForPeriod(prices.slice(-20),  3),
    mid:    detectLvlsForPeriod(prices.slice(-60),  5),
    long:   detectLvlsForPeriod(prices.slice(-120), 8),
  };
}
function detectLevels(prices){return detectLvlsForPeriod(prices,8);}
function detectRanges(prices){
  if(prices.length<20)return[];
  var ranges=[],w=15,i;
  for(i=0;i<prices.length-w;i++){
    var sl=prices.slice(i,i+w),cls=sl.map(function(p){return p.close;});
    var hi=Math.max.apply(null,cls),lo=Math.min.apply(null,cls);
    if((hi-lo)/lo*100<8)ranges.push({start:prices[i].date,end:prices[i+w-1].date,hi:+hi.toFixed(2),lo:+lo.toFixed(2)});
  }
  return ranges.slice(0,5);
}

// MOMENTUM EXHAUSTION METER
// Mide cuánto "combustible" queda en la subida actual
// ═══════════════════════════════════════════════════════
function calcMomentumExhaustion(sym) {
  var tk = DB.tickers[sym];
  if (!tk || !tk.prices || tk.prices.length < 30) return null;
  var prices = tk.prices;
  var q = MKT[sym];
  var last = q ? q.price : prices[prices.length-1].close;
  var rsi = calcRSI(prices, 14);
  var stoch = calcStochRSI(prices);
  var bb = calcBollinger(prices);
  var ema20 = calcEMA(prices, 20);
  var macd = calcMACD(prices);
  var vol = calcVolumeScore(prices);
  var mom = calcMomentum(prices);
  var div = detectRSIDivergence(prices);

  var exhaustion = 0; // 0=fresh, 100=exhausted
  var signals = [];
  var fuel = 100; // remaining upside fuel

  // 1. RSI sobrecompra (peso 25)
  if (rsi !== null) {
    if (rsi > 80)      { exhaustion += 25; signals.push({label:'RSI extremo ('+rsi.toFixed(1)+')', weight:25, type:'bear'}); }
    else if (rsi > 70) { exhaustion += 18; signals.push({label:'RSI sobrecomprado ('+rsi.toFixed(1)+')', weight:18, type:'bear'}); }
    else if (rsi > 60) { exhaustion += 8;  signals.push({label:'RSI alto ('+rsi.toFixed(1)+')', weight:8, type:'warn'}); }
    else if (rsi < 40) { exhaustion -= 10; } // still room to go up
  }

  // 2. Stochastic RSI overbought (peso 20)
  if (stoch) {
    if (stoch.bearCross)       { exhaustion += 22; signals.push({label:'Stoch RSI cruce bajista', weight:22, type:'bear'}); }
    else if (stoch.overbought) { exhaustion += 15; signals.push({label:'Stoch RSI sobrecomprado (K:'+stoch.k+')', weight:15, type:'bear'}); }
  }

  // 3. Precio cerca banda superior Bollinger (peso 20)
  if (bb) {
    if (bb.nearUpper)    { exhaustion += 20; signals.push({label:'Precio en banda superior BB ($'+bb.upper+')', weight:20, type:'bear'}); }
    else if (bb.pct > 0.75) { exhaustion += 10; signals.push({label:'Precio zona alta Bollinger ('+Math.round(bb.pct*100)+'%)', weight:10, type:'warn'}); }
  }

  // 4. Extensión sobre EMA20 (peso 15)
  if (ema20 && last) {
    var extPct = (last - ema20) / ema20 * 100;
    if (extPct > 12)     { exhaustion += 15; signals.push({label:'Extendido '+extPct.toFixed(1)+'% sobre EMA20', weight:15, type:'bear'}); }
    else if (extPct > 7) { exhaustion += 8;  signals.push({label:'Extendido '+extPct.toFixed(1)+'% sobre EMA20', weight:8, type:'warn'}); }
    else if (extPct < 0) { exhaustion -= 8; } // below EMA, room to go
  }

  // 5. Volumen decreciente en subida (peso 10)
  if (vol && mom.m5 > 0 && vol.ratio < 0.8) {
    exhaustion += 12;
    signals.push({label:'Subida con volumen bajo (×'+vol.ratio+')', weight:12, type:'warn'});
  }

  // 6. MACD histograma decreciente (peso 10)
  if (macd && macd.bullish && !macd.increasing) {
    exhaustion += 10;
    signals.push({label:'MACD histograma decrece — impulso pierde fuerza', weight:10, type:'warn'});
  }

  // 7. Divergencia bajista RSI (peso 15)
  if (div && div.type === 'BAJISTA') {
    exhaustion += 15;
    signals.push({label:'Divergencia RSI bajista detectada', weight:15, type:'bear'});
  }

  exhaustion = Math.max(0, Math.min(100, exhaustion));
  fuel = 100 - exhaustion;

  // Verdict
  var verdict, verdictColor, action;
  if (exhaustion >= 70) {
    verdict = '🔴 SUBIDA AGOTADA'; verdictColor = 'var(--bear)';
    action = 'Considerar venta o ajuste de stop. Riesgo de corrección alto.';
  } else if (exhaustion >= 45) {
    verdict = '🟡 SEÑALES DE CANSANCIO'; verdictColor = 'var(--watch)';
    action = 'Subir stop loss al break-even o a último soporte. Vigilar vela de reversión.';
  } else if (exhaustion >= 25) {
    verdict = '🟠 MOMENTUM REDUCIENDO'; verdictColor = '#f0804a';
    action = 'Posición segura por ahora. Preparar stop trailing.';
  } else {
    verdict = '🟢 MOMENTUM ACTIVO'; verdictColor = 'var(--signal)';
    action = 'Subida con fuerza. Mantener posición y dejar correr.';
  }

  return {
    exhaustion: exhaustion, fuel: fuel,
    verdict: verdict, verdictColor: verdictColor,
    action: action, signals: signals,
  };
}

function detectPatterns(prices){
  if(!prices||prices.length<30)return[];
  var cls=prices.map(function(p){return p.close;}),dates=prices.map(function(p){return p.date;}),n=cls.length,lastPrice=cls[n-1],patterns=[];
  // Rango lateral
  if(n>=25){
    var rs=cls.slice(n-25,n-3),rdates=dates.slice(n-25,n-3);
    var hi=Math.max.apply(null,rs),lo=Math.min.apply(null,rs),rng=(hi-lo)/lo*100;
    if(rng<8){
      if(lastPrice>hi*1.015) patterns.push({type:'RUPTURA ALCISTA',emoji:'⚡',color:'var(--signal)',isActive:true,dateStart:rdates[0],dateEnd:dates[n-1],desc:'Precio superó rango $'+lo.toFixed(2)+'–$'+hi.toFixed(2)+' al alza',implication:'Continuación alcista — ORS confirma entrada'});
      else if(lastPrice<lo*0.985) patterns.push({type:'RUPTURA BAJISTA',emoji:'⚠️',color:'var(--bear)',isActive:true,dateStart:rdates[0],dateEnd:dates[n-1],desc:'Precio rompió soporte $'+lo.toFixed(2),implication:'Esperar estabilización antes de entrar'});
      else patterns.push({type:'RANGO LATERAL',emoji:'↔️',color:'var(--blue)',isActive:true,dateStart:rdates[0],dateEnd:dates[n-1],desc:'Consolidación $'+lo.toFixed(2)+'–$'+hi.toFixed(2)+' ('+rng.toFixed(1)+'%)',implication:'Entrar en soporte $'+lo.toFixed(2)+', objetivo $'+hi.toFixed(2),rangeHi:hi,rangeLo:lo});
    }
  }
  // Doble suelo
  (function(){
    var w=Math.min(60,n),sl=cls.slice(n-w),sd=dates.slice(n-w),vs=[];
    for(var i=2;i<sl.length-2;i++) if(sl[i]<sl[i-1]&&sl[i]<sl[i-2]&&sl[i]<sl[i+1]&&sl[i]<sl[i+2]) vs.push({idx:i,price:sl[i],date:sd[i]});
    for(var v=0;v<vs.length-1;v++){
      var v1=vs[v],v2=vs[v+1],diff=Math.abs(v1.price-v2.price)/v1.price,gap=v2.idx-v1.idx;
      if(diff<0.03&&gap>=5&&gap<=30){
        var nk=Math.max.apply(null,sl.slice(v1.idx,v2.idx));
        var active=lastPrice>nk*0.99&&lastPrice<nk*1.04;
        patterns.push({type:'DOBLE SUELO',emoji:'🔼',color:'var(--signal)',isActive:active,dateStart:v1.date,dateEnd:v2.date,desc:'Mínimos $'+v1.price.toFixed(2)+' ('+v1.date+') y $'+v2.price.toFixed(2)+' ('+v2.date+')',implication:active?'⚡ En zona de rotura $'+nk.toFixed(2):'Entrada si supera $'+nk.toFixed(2),neckline:+nk.toFixed(2)});
      }
    }
  })();
  // Doble techo
  (function(){
    var w=Math.min(60,n),sl=cls.slice(n-w),sd=dates.slice(n-w),ps2=[];
    for(var i=2;i<sl.length-2;i++) if(sl[i]>sl[i-1]&&sl[i]>sl[i-2]&&sl[i]>sl[i+1]&&sl[i]>sl[i+2]) ps2.push({idx:i,price:sl[i],date:sd[i]});
    for(var p=0;p<ps2.length-1;p++){
      var p1=ps2[p],p2=ps2[p+1],diff=Math.abs(p1.price-p2.price)/p1.price,gap=p2.idx-p1.idx;
      if(diff<0.03&&gap>=5&&gap<=30){
        var nk=Math.min.apply(null,sl.slice(p1.idx,p2.idx));
        var active=lastPrice<nk*1.01&&lastPrice>nk*0.97;
        patterns.push({type:'DOBLE TECHO',emoji:'🔻',color:'var(--bear)',isActive:active,dateStart:p1.date,dateEnd:p2.date,desc:'Máximos $'+p1.price.toFixed(2)+' ('+p1.date+') y $'+p2.price.toFixed(2)+' ('+p2.date+')',implication:active?'⚠️ Posible rotura bajista $'+nk.toFixed(2):'Vigilar soporte $'+nk.toFixed(2),neckline:+nk.toFixed(2)});
      }
    }
  })();
  // Bandera
  if(n>=25){
    var imp=cls.slice(n-25,n-8),con=cls.slice(n-8);
    var impMove=(imp[imp.length-1]-imp[0])/imp[0]*100;
    var conRng=(Math.max.apply(null,con)-Math.min.apply(null,con))/con[0]*100;
    if(impMove>8&&conRng<4) patterns.push({type:'BANDERA ALCISTA',emoji:'🚩',color:'var(--signal)',isActive:true,dateStart:dates[n-25],dateEnd:dates[n-1],desc:'Impulso +'+impMove.toFixed(1)+'% + consolidación ('+conRng.toFixed(1)+'%)',implication:'Posible continuación — ORS en la rotura'});
    if(impMove<-8&&conRng<4) patterns.push({type:'BANDERA BAJISTA',emoji:'🚩',color:'var(--bear)',isActive:true,dateStart:dates[n-25],dateEnd:dates[n-1],desc:'Caída '+impMove.toFixed(1)+'% + consolidación',implication:'Esperar estabilización'});
  }
  // Triángulo
  if(n>=20){
    var sl20=cls.slice(n-20),sd20=dates.slice(n-20),hs=[],ls=[];
    for(var i=1;i<sl20.length-1;i++){
      if(sl20[i]>sl20[i-1]&&sl20[i]>sl20[i+1])hs.push(sl20[i]);
      if(sl20[i]<sl20[i-1]&&sl20[i]<sl20[i+1])ls.push(sl20[i]);
    }
    if(hs.length>=2&&ls.length>=2){
      var ht=hs[hs.length-1]-hs[0],lt=ls[ls.length-1]-ls[0];
      if(ht<-0.5&&lt>0.5) patterns.push({type:'TRIÁNGULO SIMÉTRICO',emoji:'📐',color:'var(--watch)',isActive:true,dateStart:sd20[0],dateEnd:dates[n-1],desc:'Compresión desde '+sd20[0],implication:'Rotura inminente — esperar dirección con ORS'});
      else if(Math.abs(ht)<0.3&&lt>0.5) patterns.push({type:'TRIÁNGULO ASCENDENTE',emoji:'📈',color:'var(--signal)',isActive:true,dateStart:sd20[0],dateEnd:dates[n-1],desc:'Mínimos subiendo desde '+sd20[0],implication:'Presión alcista — buena zona para ORS'});
      else if(ht<-0.5&&Math.abs(lt)<0.3) patterns.push({type:'TRIÁNGULO DESCENDENTE',emoji:'📉',color:'var(--bear)',isActive:true,dateStart:sd20[0],dateEnd:dates[n-1],desc:'Máximos bajando desde '+sd20[0],implication:'Presión bajista — esperar señal ORS muy clara'});
    }
  }
  patterns.sort(function(a,b){return(b.isActive?1:0)-(a.isActive?1:0);});
  return patterns;
}


var MARKET_CTX = {loaded:false, trend:'NEUTRAL', spy_mom20:0, spy_rsi:null, filter:1.0};

function loadMarketContext(){
  fetchYahoo('SPY','60d',function(prices,q){
    if(!prices||!prices.length)return;
    var rsi=calcRSI(prices,14);
    var mom=calcMomentum(prices);
    var ema20=calcEMA(prices,20);
    var last=prices[prices.length-1].close;
    var trend='NEUTRAL', filter=1.0;
    if(rsi&&rsi>55&&mom.m20>3&&last>ema20){trend='BULL';filter=1.15;}
    else if(rsi&&rsi<45&&mom.m20<-3&&last<ema20){trend='BEAR';filter=0.70;}
    else if(rsi&&rsi>50){trend='BULL_WEAK';filter=1.0;}
    else{trend='BEAR_WEAK';filter=0.85;}
    MARKET_CTX={loaded:true,trend:trend,spy_mom20:mom.m20,spy_rsi:rsi?+rsi.toFixed(1):null,spy_last:last,filter:filter};
    render();
  });
}

function calcVolumeScore(prices){
  if(!prices||prices.length<21)return{score:50,ratio:1,label:'Sin datos'};
  var vols=prices.map(function(p){return p.volume||0;});
  var avg20=vols.slice(-21,-1).reduce(function(a,b){return a+b;},0)/20;
  var lastVol=vols[vols.length-1];
  if(!avg20||!lastVol)return{score:50,ratio:1,label:'Sin datos de volumen'};
  var ratio=+(lastVol/avg20).toFixed(2);
  var score=ratio>=2?90:ratio>=1.5?75:ratio>=1?55:ratio>=0.7?40:25;
  var label=ratio>=2?'Muy alto (×'+ratio+')':ratio>=1.5?'Alto (×'+ratio+')':ratio>=1?'Normal (×'+ratio+')':'Bajo (×'+ratio+')';
  return{score:score,ratio:ratio,label:label};
}

// RSI DIVERGENCE — for entries
// ═══════════════════════════════════════════════════════
function detectRSIDivergence(prices){
  if(!prices||prices.length<20)return null;
  var n=prices.length;
  // Look at last 15 candles for bullish divergence
  var slice=prices.slice(n-15);
  var cls=slice.map(function(p){return p.close;});
  // Find two recent lows
  var lows=[];
  for(var i=1;i<cls.length-1;i++){
    if(cls[i]<cls[i-1]&&cls[i]<cls[i+1])lows.push({idx:i,price:cls[i]});
  }
  if(lows.length<2)return null;
  var l1=lows[lows.length-2],l2=lows[lows.length-1];
  // Price made lower low but RSI made higher low = bullish divergence
  var rsi1=calcRSI(prices.slice(0,n-15+l1.idx+1),14);
  var rsi2=calcRSI(prices.slice(0,n-15+l2.idx+1),14);
  if(!rsi1||!rsi2)return null;
  if(l2.price<l1.price&&rsi2>rsi1+2){
    return{type:'ALCISTA',desc:'Precio hizo mínimo más bajo pero RSI más alto — señal de agotamiento bajista y posible rebote',strength:Math.min(100,Math.round((rsi2-rsi1)*10))};
  }
  // Bearish divergence
  var highs=[];
  for(var j=1;j<cls.length-1;j++){
    if(cls[j]>cls[j-1]&&cls[j]>cls[j+1])highs.push({idx:j,price:cls[j]});
  }
  if(highs.length<2)return null;
  var h1=highs[highs.length-2],h2=highs[highs.length-1];
  var rsiH1=calcRSI(prices.slice(0,n-15+h1.idx+1),14);
  var rsiH2=calcRSI(prices.slice(0,n-15+h2.idx+1),14);
  if(!rsiH1||!rsiH2)return null;
  if(h2.price>h1.price&&rsiH2<rsiH1-2){
    return{type:'BAJISTA',desc:'Precio hizo máximo más alto pero RSI más bajo — señal de agotamiento alcista',strength:Math.min(100,Math.round((rsiH1-rsiH2)*10))};
  }
  return null;
}

function buildScenarios(sym){
  var tk=DB.tickers[sym];
  if(!tk||!tk.prices||tk.prices.length<20)return[];
  var prices=tk.prices,n=prices.length;
  var last=MKT[sym]?MKT[sym].price:prices[n-1].close;
  var a=analyzeSymbol(sym);
  var patterns=detectPatterns(prices);
  var allLvl=detectAllLevels(prices);
  var divergence=detectRSIDivergence(prices);
  var atr=calcATR(prices,14)||last*0.015;
  var scenarios=[];

  // Helper: find nearest S/R levels
  var allSups=[],allRes=[];
  ['week','short','mid','long'].forEach(function(tf){
    if(allLvl[tf]){
      allLvl[tf].supports.forEach(function(s){allSups.push(s);});
      allLvl[tf].resistances.forEach(function(r){allRes.push(r);});
    }
  });
  var nearRes=allRes.filter(function(r){return r.price>last;}).sort(function(a,b){return a.price-b.price;});
  var nearSup=allSups.filter(function(s){return s.price<last;}).sort(function(a,b){return b.price-a.price;});
  var tgt1=nearRes[0]?nearRes[0].price:+(last*1.05).toFixed(2);
  var tgt2=nearRes[1]?nearRes[1].price:+(last*1.10).toFixed(2);
  var sup1=nearSup[0]?nearSup[0].price:+(last*0.96).toFixed(2);
  var sup2=nearSup[1]?nearSup[1].price:+(last*0.92).toFixed(2);

  // Active patterns influence scenarios
  var activeBull=patterns.filter(function(p){return p.isActive&&['DOBLE SUELO','BANDERA ALCISTA','TRIÁNGULO ASCENDENTE','RUPTURA ALCISTA','RANGO LATERAL'].indexOf(p.type)>=0;});
  var activeBear=patterns.filter(function(p){return p.isActive&&['DOBLE TECHO','BANDERA BAJISTA','TRIÁNGULO DESCENDENTE','RUPTURA BAJISTA'].indexOf(p.type)>=0;});
  var hasRange=patterns.find(function(p){return p.isActive&&p.type==='RANGO LATERAL';});
  var hasBullBreak=patterns.find(function(p){return p.isActive&&p.type==='RUPTURA ALCISTA';});
  var hasBearBreak=patterns.find(function(p){return p.isActive&&p.type==='RUPTURA BAJISTA';});

  // Probability weights based on context
  var bullProb=50,bearProb=30,sideProb=20;
  if(a.orsCtx>=60)bullProb+=15;
  if(a.ctx>=65)bullProb+=10;
  if(activeBull.length)bullProb+=15;
  if(activeBear.length){bearProb+=20;bullProb-=15;}
  if(MARKET_CTX.trend==='BULL')bullProb+=10;
  if(MARKET_CTX.trend==='BEAR'){bearProb+=15;bullProb-=15;}
  if(divergence&&divergence.type==='ALCISTA')bullProb+=12;
  if(divergence&&divergence.type==='BAJISTA')bearProb+=12;
  // Normalize
  var total=bullProb+bearProb+sideProb;
  bullProb=Math.round(bullProb/total*100);
  bearProb=Math.round(bearProb/total*100);
  sideProb=100-bullProb-bearProb;

  // ── ESCENARIO 1: ALCISTA ─────────────────────────────
  var bullDesc='';
  var shortTarget=+(tgt1).toFixed(2);
  var medTarget=+(tgt2).toFixed(2);
  var upPct1=+((shortTarget-last)/last*100).toFixed(1);
  var upPct2=+((medTarget-last)/last*100).toFixed(1);

  if(hasBullBreak){
    bullDesc='La ruptura alcista del rango está confirmada. Si el volumen acompaña, el precio tiene recorrido hasta la siguiente resistencia en $'+shortTarget+' (+'+upPct1+'%) a corto plazo. Un pullback al nivel roto ($'+(hasBullBreak.rangeHi||shortTarget)+')'+(hasBullBreak?' sería una segunda oportunidad de entrada':'')+'.';}
  else if(activeBull.length&&activeBull[0].type==='DOBLE SUELO'){
    bullDesc='El doble suelo es uno de los patrones de reversión más fiables. Si el precio supera el neckline en $'+activeBull[0].neckline+', el objetivo técnico proyectado es $'+shortTarget+' (+'+upPct1+'%). A medio plazo, si el mercado general acompaña, podría alcanzar $'+medTarget+' (+'+upPct2+'%).';}
  else if(divergence&&divergence.type==='ALCISTA'){
    bullDesc='La divergencia alcista en RSI sugiere que los vendedores están agotándose aunque el precio siga bajo. Un catalizador menor podría desencadenar un rebote hacia $'+shortTarget+' (+'+upPct1+'%). Medio plazo: $'+medTarget+' si supera resistencias intermedias.';}
  else if(a.rsi&&a.rsi<=35){
    bullDesc='Con RSI en zona de sobreventa ('+a.rsi+'), la media reversión es la dinámica más probable. El precio tiende a rebotar hacia la EMA20 ($'+(a.ema20||shortTarget)+'). Si el rebote tiene volumen, siguiente objetivo: $'+shortTarget+' (+'+upPct1+'%). Medio plazo: $'+medTarget+'.';}
  else{
    bullDesc='Si el contexto técnico mejora y aparece señal ORS válida, el precio podría dirigirse a la resistencia más cercana en $'+shortTarget+' (+'+upPct1+'%). Un escenario más optimista situaría el precio en $'+medTarget+' (+'+upPct2+'%) en 2-4 semanas si el mercado general acompaña.';}

  scenarios.push({
    type:'ALCISTA', emoji:'📈', color:'var(--signal)',
    prob:bullProb, timeframe:'1-5 días / 2-4 semanas',
    shortTgt:shortTarget, medTgt:medTarget,
    shortPct:upPct1, medPct:upPct2,
    desc:bullDesc,
    triggers:['Señal ORS 4/5 o 5/5 en TradingView 15min','Volumen por encima de la media','Precio sobre EMA20','Mercado general estable o alcista'],
    invalidates:'Ruptura bajista del soporte $'+sup1+' con volumen'
  });

  // ── ESCENARIO 2: BAJISTA ─────────────────────────────
  var bearDesc='';
  var downPct1=+((last-sup1)/last*100).toFixed(1);
  var downPct2=+((last-sup2)/last*100).toFixed(1);

  if(hasBearBreak){
    bearDesc='La ruptura bajista del soporte es una señal de debilidad importante. El siguiente nivel de soporte está en $'+sup1+' (-'+downPct1+'%). Si no aguanta, el precio podría extenderse hasta $'+sup2+' (-'+downPct2+'%). Evitar entradas largas hasta estabilización.';}
  else if(activeBear.length&&activeBear[0].type==='DOBLE TECHO'){
    bearDesc='El doble techo es un patrón de distribución. Si el precio rompe el neckline en $'+activeBear[0].neckline+', el objetivo bajista proyectado es $'+sup1+' (-'+downPct1+'%). A medio plazo podría buscar $'+sup2+' (-'+downPct2+'%) si el soporte cede.';}
  else if(divergence&&divergence.type==='BAJISTA'){
    bearDesc='La divergencia bajista en RSI es una señal de alerta aunque el precio aún suba. El momentum se está debilitando. Si el precio gira, el primer soporte importante está en $'+sup1+' (-'+downPct1+'%). Considerar reducir posición o ajustar stop.';}
  else{
    bearDesc='En el escenario adverso, si el precio pierde el soporte de $'+sup1+' (-'+downPct1+'%), podría acelerar la caída hasta $'+sup2+' (-'+downPct2+'%) en función del volumen vendedor y el estado del mercado general.';}

  scenarios.push({
    type:'BAJISTA', emoji:'📉', color:'var(--bear)',
    prob:bearProb, timeframe:'1-5 días / 2-4 semanas',
    shortTgt:sup1, medTgt:sup2,
    shortPct:-downPct1, medPct:-downPct2,
    desc:bearDesc,
    triggers:['Ruptura del soporte $'+sup1+' con volumen','RSI >70 y girando','Mercado general bajista','Catalizador negativo (earnings, macro)'],
    invalidates:'Recuperación sobre $'+(+(last*1.02).toFixed(2))+' con volumen en las siguientes sesiones'
  });

  // ── ESCENARIO 3: LATERAL ─────────────────────────────
  var sideDesc='';
  if(hasRange){
    sideDesc='El rango lateral activo ($'+hasRange.rangeLo+'–$'+hasRange.rangeHi+') puede continuar varias sesiones más. Estrategia: comprar cerca de $'+hasRange.rangeLo+' con señal ORS, vender cerca de $'+hasRange.rangeHi+'. El rango se romperá en algún momento — el volumen indicará la dirección.';}
  else{
    sideDesc='El precio podría consolidar entre $'+sup1+' y $'+tgt1+' mientras el mercado define dirección. Esta fase lateral puede durar días o semanas. Es una zona de acumulación o distribución — el OBV y el volumen dirán cuál.';}

  scenarios.push({
    type:'LATERAL', emoji:'↔️', color:'var(--blue)',
    prob:sideProb, timeframe:'Días a semanas',
    shortTgt:tgt1, medTgt:sup1,
    shortPct:upPct1, medPct:-downPct1,
    desc:sideDesc,
    triggers:['Ausencia de catalizadores','Volumen bajo','Mercado general indeciso'],
    invalidates:'Ruptura con volumen en cualquier dirección'
  });

  // Sort by probability
  scenarios.sort(function(a,b){return b.prob-a.prob;});
  return scenarios;
}
