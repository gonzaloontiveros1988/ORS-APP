    html+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--accent)">'+serverTrades.length+'</div><div style="font-size:9px;color:var(--sub)">TRADES</div></div>';
    html+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:'+wColor(sWR)+'">'+sWR+'%</div><div style="font-size:9px;color:var(--sub)">WIN RATE</div></div>';
    html+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:'+(sPnl>=0?'var(--bull)':'var(--bear)')+'">'+(sPnl>=0?'+':'')+Math.round(sPnl)+'€</div><div style="font-size:9px;color:var(--sub)">P&L</div></div>';
    html+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:var(--sub)">'+sWins+'/'+sLosses+'</div><div style="font-size:9px;color:var(--sub)">W/L</div></div>';
    html+='</div></div>';

    // Cards por estrategia
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">';

    // MOM card
    html+='<div style="background:var(--card);border:1.5px solid var(--accent)40;border-radius:12px;padding:10px 12px">';
    html+='<div style="font-size:9px;color:var(--accent);font-weight:800;letter-spacing:1px;margin-bottom:6px">🚀 MOM · '+mS.n+' trades</div>';
    html+='<div style="font-size:22px;font-weight:900;color:'+wColor(mS.wr)+'">'+mS.wr+'%</div>';
    html+='<div style="font-size:9px;color:var(--sub);margin-bottom:4px">WIN RATE</div>';
    html+='<div style="display:flex;justify-content:space-between;font-size:10px">';
    html+='<span style="color:var(--bull)">PF '+mS.pf+'</span>';
    html+='<span style="color:'+(mS.pnl>=0?'var(--bull)':'var(--bear)')+'">'+(mS.pnl>=0?'+':'')+mS.pnl+'€</span>';
    html+='</div>';
    html+='<div style="font-size:9px;color:var(--sub);margin-top:3px">'+mS.w+'W / '+mS.l+'L</div>';
    html+='</div>';

    // ORS card
    html+='<div style="background:var(--card);border:1.5px solid var(--signal)40;border-radius:12px;padding:10px 12px">';
    html+='<div style="font-size:9px;color:var(--signal);font-weight:800;letter-spacing:1px;margin-bottom:6px">⚡ ORS · '+oS.n+' trades</div>';
    html+='<div style="font-size:22px;font-weight:900;color:'+wColor(oS.wr)+'">'+oS.wr+'%</div>';
    html+='<div style="font-size:9px;color:var(--sub);margin-bottom:4px">WIN RATE</div>';
    html+='<div style="display:flex;justify-content:space-between;font-size:10px">';
    html+='<span style="color:var(--bull)">PF '+oS.pf+'</span>';
    html+='<span style="color:'+(oS.pnl>=0?'var(--bull)':'var(--bear)')+'">'+(oS.pnl>=0?'+':'')+oS.pnl+'€</span>';
    html+='</div>';
    html+='<div style="font-size:9px;color:var(--sub);margin-top:3px">'+oS.w+'W / '+oS.l+'L</div>';
    html+='</div>';

    html+='</div>';

    // Filtro por estrategia
    var activeFilter = window._journalFilter || 'ALL';
    html+='<div style="display:flex;gap:6px;margin-bottom:12px">';
    var filters=[['ALL','📋 Todos'],['MOM','🚀 MOM'],['ORS','⚡ ORS']];
    filters.forEach(function(f){
      var isActive=activeFilter===f[0];
      html+='<button onclick="window._journalFilter=\''+f[0]+'\';render()" style="flex:1;padding:6px;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid '+(isActive?'var(--accent)':'var(--border)')+';background:'+(isActive?'var(--accent)15':'transparent')+';color:'+(isActive?'var(--accent)':'var(--sub)')+'">'+f[1]+'</button>';
    });
    html+='</div>';
  }

  if(JOURNAL_LOADING && !serverTrades.length){
    html+='<div style="text-align:center;padding:30px;color:var(--sub)"><div style="font-size:28px;margin-bottom:10px">⏳</div>Cargando trades del servidor...</div>';

    html+='<div class="empty"><div style="font-size:40px;margin-bottom:10px">📒</div>';

    html+='<div style="font-size:12px;color:var(--sub)">Los trades del sistema MOM/ORS aparecerán aquí automáticamente cuando el proxy ejecute órdenes.</div>';
    html+='</div>';
  } else {
    months.forEach(function(mk){
      var mWraps=byMonth[mk];
      var mTrades=mWraps.map(function(w){return w._t;});
      var mServerTrades=mWraps.filter(function(w){return w._src==='server';}).map(function(w){return w._t;});
      var mW=mServerTrades.filter(function(t){return t.result==='WIN';}).length;
      var mWR=mServerTrades.length?Math.round(mW/mServerTrades.length*100):0;
      var mPnl=mServerTrades.reduce(function(s,t){return s+(t.pnlEur||0);},0);
      var mOpen=mServerTrades.filter(function(t){return !t.result||t.result==='ABIERTO';}).length;

      html+='<div style="margin-bottom:20px">';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">';

      html+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
      html+=mkPill(mWraps.length+' ops','var(--muted)');
      if(mServerTrades.length) html+=mkPill(mWR+'% WR',wColor(mWR));
      if(mServerTrades.length) html+=mkPill((mPnl>=0?'+':'')+Math.round(mPnl)+'€',pColor(mPnl>0?1:-1));
      if(mOpen) html+=mkPill(mOpen+' abiert'+(mOpen>1?'as':'a'),'var(--watch)');

      html+='</div></div>';

      var revWraps=[].concat(mWraps).reverse();
      revWraps.forEach(function(w){
        html+=renderJournalTrade(w._t, w._src==='server');
      });
      html+='</div>';
    });
  }
  html+='</div>'+nav();
  return html;
}

var NEWS_CACHE = {data:[], ts:0, sym:''};

function selectNewsSym(sym){
  DB.newsSym=sym;

// Colores por sentimiento
function sentimentColor(s){
  if(s==='very_positive') return 'var(--signal)';
  if(s==='positive')      return 'var(--signal)';
  if(s==='very_negative') return 'var(--bear)';
  if(s==='negative')      return 'var(--bear)';
  if(s==='earnings_risk') return '#F97316';
  return 'var(--sub)';
}

function scoreImpactBadge(impact){
  if(!impact) return '';
  var col = impact > 0 ? 'var(--signal)' : (impact < 0 ? 'var(--bear)' : 'var(--sub)');
  var sign = impact > 0 ? '+' : '';
  return '<span style="font-size:10px;font-weight:800;color:'+col+';background:'+col+'18;border-radius:6px;padding:2px 7px;margin-left:6px">'+sign+impact+' ORS</span>';
}

  } else {

      var ago=n.created_at?timeAgo(n.created_at):'';

      html+='<div class="card" style="margin-bottom:10px;border-left:3px solid '+sentCol+'">';

      html+='</div>';
      html+='</div>';
      html+='</div>';
      // Summary
      if(n.summary)html+='<div style="font-size:11px;color:var(--sub);line-height:1.6;margin-bottom:6px">'+n.summary.slice(0,220)+(n.summary.length>220?'...':'')+'</div>';

      html+='<div style="display:flex;justify-content:space-between;align-items:center">';

      });

    });
  } else {

var NEWS_LOADING = false;

function _newsUpdatePanels(items){
  NEWS_CACHE={data:items,ts:Date.now()};
  items.forEach(function(n){
    if(n.symbols)n.symbols.forEach(function(s){
      if(!NEWS_IMPACT_CACHE[s])NEWS_IMPACT_CACHE[s]={scoreImpact:0,topNews:[],ts:0};
      var age=Date.now()-new Date(n.created_at).getTime();
      if(age<86400000){
        NEWS_IMPACT_CACHE[s].scoreImpact=Math.max(-20,Math.min(20,(NEWS_IMPACT_CACHE[s].scoreImpact||0)+(n.scoreImpact||0)));
        NEWS_IMPACT_CACHE[s].ts=Date.now();
      }
    });
  });
  var p1=document.getElementById('news-panel');
  if(p1)p1.innerHTML=items.length?renderNewsItems(items):'<div style="text-align:center;padding:20px;color:var(--sub)">Sin noticias disponibles</div>';
  var p2=document.getElementById('home-news-panel');
  if(p2){
    var btnMore=items.length>5?'<button onclick="goTo(\'news\')" style="width:100%;padding:9px;border-radius:10px;background:var(--card2);border:1px solid var(--border);color:var(--sub);font-size:11px;font-weight:700;margin-top:4px">Ver todas ('+items.length+') →</button>':'';
    p2.innerHTML=items.length?renderNewsItems(items.slice(0,5))+btnMore:'<div style="text-align:center;padding:12px;color:var(--sub);font-size:11px">Sin noticias disponibles</div>';
  }
  if(!p1&&!p2)render();
}

function _newsShowError(msg){
  NEWS_LOADING=false;
  var errHtml='<div style="text-align:center;padding:20px"><div style="font-size:24px">⚠️</div><div style="color:var(--sub);font-size:11px;margin-top:6px">'+msg+'</div><button onclick="loadNews(\'ALL\')" style="margin-top:10px;padding:6px 14px;border-radius:8px;background:var(--accent)15;border:1px solid var(--accent)40;color:var(--accent);font-size:11px">🔄 Reintentar</button></div>';
  var p1=document.getElementById('news-panel');if(p1)p1.innerHTML=errHtml;
  var p2=document.getElementById('home-news-panel');if(p2)p2.innerHTML=errHtml;
}

function loadNews(sym){
  if(NEWS_LOADING)return;
  NEWS_LOADING=true;
  // Usar los candidatos MOM si existen, o watchlist, o defaults
  var momData=JSON.parse(localStorage.getItem('mom_scan_data')||'null');
  var symsArr=[];
  if(sym&&sym!=='ALL'){
    symsArr=[sym];
  } else if(momData&&momData.length){
    symsArr=momData.slice(0,12).map(function(x){return x.sym;});
  } else {
    var wlKeys=Object.keys(DB.tickers).slice(0,10);
    symsArr=wlKeys.length?wlKeys:['NVDA','AMD','MSFT','AVGO','TSLA','META','AAPL','GOOGL','TSM','HCA'];
  }
  var syms=symsArr.join(',');
  var loadingHtml='<div style="text-align:center;padding:20px;color:var(--sub)"><div style="font-size:24px;margin-bottom:8px">📡</div><div style="font-size:12px">Cargando noticias...</div></div>';
  var p1=document.getElementById('news-panel');if(p1)p1.innerHTML=loadingHtml;
  var p2=document.getElementById('home-news-panel');if(p2)p2.innerHTML=loadingHtml;

  // Intentar Alpaca news primero
  fetch(PROXY+'/alpaca/news?syms='+encodeURIComponent(syms)+'&limit=30')
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){
      NEWS_LOADING=false;
      var items=Array.isArray(d)?d:(d.news||d.items||[]);
      if(!items.length)throw new Error('empty');
      _newsUpdatePanels(items);
    })
    .catch(function(e){
      // Fallback: intentar endpoint alternativo /news/headlines
      fetch(PROXY+'/news/headlines?syms='+encodeURIComponent(syms))
        .then(function(r2){return r2.json();})
        .then(function(d2){
          NEWS_LOADING=false;
          var items=Array.isArray(d2)?d2:(d2.news||d2.items||[]);
          if(items.length){_newsUpdatePanels(items);}
          else {_newsShowError('Sin noticias disponibles ahora. El mercado puede estar cerrado.');}
        })
        .catch(function(){
          NEWS_LOADING=false;
          _newsShowError('Proxy no disponible. Verifica que Render está activo en ors-proxy-jet6.onrender.com');
        });
    });
}

function timeAgo(dateStr){
  var d=new Date(dateStr);var now=Date.now();
  var diff=Math.floor((now-d)/1000);
  if(diff<60)return diff+'s';
  if(diff<3600)return Math.floor(diff/60)+'min';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
}

};

function loadDuoState(){
  try{ var s=JSON.parse(localStorage.getItem('ors_duo')||'{}');
    if(s.xp!==undefined) DUOLINGO_STATE=s; }catch(e){}
  // Update streak
  var today=new Date().toDateString();
  if(DUOLINGO_STATE.lastDate&&DUOLINGO_STATE.lastDate!==today){
    var yesterday=new Date(Date.now()-86400000).toDateString();
    if(DUOLINGO_STATE.lastDate!==yesterday) DUOLINGO_STATE.streak=0;
  }
}
function saveDuoState(){
  DUOLINGO_STATE.lastDate=new Date().toDateString();
  localStorage.setItem('ors_duo',JSON.stringify(DUOLINGO_STATE));
}

function renderDuoQuiz(){
  var mod=DUO_MODULES.filter(function(m){return m.id===DUO_QUIZ_STATE.module;})[0];
  if(!mod)return'';
  var idx=DUO_QUIZ_STATE.lessonIdx;
  if(idx>=mod.lessons.length){
    // Module complete
    return renderModuleComplete(mod);
  }
  var lesson=mod.lessons[idx];
  var col=mod.color.replace('var(','').replace(')','');
  var html='';
  // Progress bar
  html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">';
  html+='<button onclick="DUO_QUIZ_STATE.module=null;render()" style="font-size:20px;color:var(--sub);padding:0 6px">✕</button>';
  html+='<div style="flex:1;height:8px;background:var(--border);border-radius:4px"><div style="width:'+Math.round(idx/mod.lessons.length*100)+'%;height:100%;background:'+col+';border-radius:4px;transition:width .4s"></div></div>';
  html+='<span style="font-size:11px;color:var(--sub)">'+idx+'/'+mod.lessons.length+'</span>';
  html+='</div>';
  // Question
  html+='<div class="card" style="margin-bottom:14px;border-top:4px solid '+col+'">';
  html+='<div style="font-size:9px;color:var(--sub);letter-spacing:1.5px;margin-bottom:8px">'+mod.icon+' '+mod.title.toUpperCase()+'</div>';
  html+='<div style="font-size:15px;font-weight:700;color:var(--text);line-height:1.5">'+lesson.q+'</div>';
  html+='</div>';
  // Options
  lesson.opts.forEach(function(opt,i){
    var isSelected=DUO_QUIZ_STATE.selectedOpt===i;
    var isCorrect=i===lesson.ans;
    var bgCol='var(--card2)';var borderCol='var(--border)';var textCol='var(--text)';
    if(DUO_QUIZ_STATE.answered){
      if(isCorrect){bgCol='rgba(0,229,160,.15)';borderCol='var(--signal)';textCol='var(--signal)';}
      else if(isSelected){bgCol='rgba(255,69,96,.12)';borderCol='var(--bear)';textCol='var(--bear)';}
    } else if(isSelected){
      bgCol='rgba(240,192,64,.12)';borderCol='var(--accent)';textCol='var(--accent)';
    }
    html+='<button onclick="selectDuoAnswer('+i+')" style="width:100%;text-align:left;padding:12px 14px;border-radius:12px;border:2px solid '+borderCol+';background:'+bgCol+';color:'+textCol+';margin-bottom:8px;font-size:13px;font-weight:'+(DUO_QUIZ_STATE.answered&&isCorrect?700:500)+';transition:all .2s;cursor:'+(DUO_QUIZ_STATE.answered?'default':'pointer')+'">';
    html+=(DUO_QUIZ_STATE.answered?( isCorrect?'✅ ':( isSelected?'❌ ':'')):( String.fromCharCode(65+i)+'. '));
    html+=opt+'</button>';
  });
  // Explanation
  if(DUO_QUIZ_STATE.answered){
    var correct=DUO_QUIZ_STATE.selectedOpt===lesson.ans;
    html+='<div style="background:'+(correct?'rgba(0,229,160,.1)':'rgba(255,69,96,.08)')+';border-left:3px solid '+(correct?'var(--signal)':'var(--bear)')+';border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:14px">';
    html+='<div style="font-size:11px;font-weight:700;color:'+(correct?'var(--signal)':'var(--bear)')+';margin-bottom:4px">'+(correct?'✅ ¡Correcto! +10 XP':'❌ Incorrecto -1 ❤️')+'</div>';
    html+='<div style="font-size:12px;color:var(--text);line-height:1.6">'+lesson.exp+'</div>';
    html+='</div>';
    html+='<button onclick="nextDuoLesson()" style="width:100%;padding:14px;border-radius:14px;background:'+col+';color:#fff;font-size:14px;font-weight:800;border:none">Continuar →</button>';
  }
  return html;
}

  return '<div style="text-align:center;padding:30px 20px">'
    +'<div style="font-size:64px;margin-bottom:14px">'+mod.icon+'</div>'
    +'<div style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px">¡Módulo completado!</div>'
    +'<div style="font-size:14px;color:var(--sub);margin-bottom:20px">'+mod.title+'</div>'
    +'<div style="background:'+col+'15;border:2px solid '+col+'40;border-radius:14px;padding:16px;margin-bottom:20px">'
    +'<div style="font-size:28px;font-weight:900;color:'+col+'">+'+( mod.lessons.length*10)+' XP</div>'
    +'<div style="font-size:12px;color:var(--sub);margin-top:4px">Módulo completado · Sigue aprendiendo</div>'
    +'</div>'
    +'<button onclick="DUO_QUIZ_STATE.module=null;render()" style="width:100%;padding:14px;border-radius:14px;background:'+col+';color:#fff;font-size:14px;font-weight:800;border:none">🎓 Volver a módulos</button>'
    +'</div>';

function startModule(modId){
  loadDuoState();
  var done=DUOLINGO_STATE.completed[modId]||0;
  var mod=DUO_MODULES.filter(function(m){return m.id===modId;})[0];
  if(!mod)return;
  DUO_QUIZ_STATE={module:modId,lessonIdx:done>=mod.lessons.length?0:done,answered:false,selectedOpt:null};
  render();
}

function selectDuoAnswer(optIdx){
  if(DUO_QUIZ_STATE.answered)return;
  loadDuoState();
  DUO_QUIZ_STATE.selectedOpt=optIdx;
  DUO_QUIZ_STATE.answered=true;
  var mod=DUO_MODULES.filter(function(m){return m.id===DUO_QUIZ_STATE.module;})[0];
  var lesson=mod.lessons[DUO_QUIZ_STATE.lessonIdx];
  var correct=optIdx===lesson.ans;
  if(correct){
    DUOLINGO_STATE.xp+=10;
    // Check trophies
    if(DUOLINGO_STATE.xp>=10&&DUOLINGO_STATE.trophies.indexOf('first_lesson')<0){
      DUOLINGO_STATE.trophies.push('first_lesson');
      setTimeout(function(){showAchievement({icon:'🥇',name:'Primera lección',desc:'Completaste tu primera pregunta'});},500);
    }
    if(DUOLINGO_STATE.xp>=500&&DUOLINGO_STATE.trophies.indexOf('xp_500')<0){
      DUOLINGO_STATE.trophies.push('xp_500');
      setTimeout(function(){showAchievement({icon:'💎',name:'500 XP',desc:'¡Experto en formación!'});},500);
    }
  } else {
    DUOLINGO_STATE.hearts=Math.max(0,DUOLINGO_STATE.hearts-1);
  }
  saveDuoState();
  render();
}

function nextDuoLesson(){
  loadDuoState();
  var mod=DUO_MODULES.filter(function(m){return m.id===DUO_QUIZ_STATE.module;})[0];
  if(!mod)return;
  DUO_QUIZ_STATE.lessonIdx++;
  DUO_QUIZ_STATE.answered=false;
  DUO_QUIZ_STATE.selectedOpt=null;
  // Update completed count
  if(!DUOLINGO_STATE.completed[mod.id]||DUOLINGO_STATE.completed[mod.id]<DUO_QUIZ_STATE.lessonIdx){
    DUOLINGO_STATE.completed[mod.id]=DUO_QUIZ_STATE.lessonIdx;
  }
  // Module complete?
  if(DUO_QUIZ_STATE.lessonIdx>=mod.lessons.length){
    DUOLINGO_STATE.xp+=mod.lessons.length*10;
    if(DUOLINGO_STATE.trophies.indexOf('first_module')<0){
      DUOLINGO_STATE.trophies.push('first_module');
      showAchievement({icon:'🏅',name:'Primer módulo',desc:'Completaste tu primer módulo'});
    }
    var allDone=DUO_MODULES.every(function(m){return (DUOLINGO_STATE.completed[m.id]||0)>=m.lessons.length;});
    if(allDone&&DUOLINGO_STATE.trophies.indexOf('all_modules')<0){
      DUOLINGO_STATE.trophies.push('all_modules');
      showAchievement({icon:'👑',name:'Maestro ORS',desc:'¡Completaste todos los módulos!'});
    }
  }
  // Update streak
  DUOLINGO_STATE.streak=Math.max(1,DUOLINGO_STATE.streak);
  if(DUOLINGO_STATE.streak>=3&&DUOLINGO_STATE.trophies.indexOf('streak_3')<0){
    DUOLINGO_STATE.trophies.push('streak_3');
    showAchievement({icon:'🔥',name:'En racha',desc:'3 días seguidos estudiando'});
  }
  saveDuoState();
  render();
}

        if(item.aboveSMA) html+=mkPill('SMA200 ✅','var(--bull)');
        html+='</div>';
        html+='</div>';
        html+='<div style="text-align:right">';
        if(lp) html+='<div style="font-size:13px;font-weight:700">$'+lp+'</div>';
        html+='<div style="font-size:10px;font-weight:700;color:'+phColor+'">'+item.score+'pts</div>';
        html+='</div>';
        html+='</div>';
      });
    }
    html+='</div>'+nav();
    return html;
  }

  var tickers=Object.keys(DB.tickers);
  if(!tickers.length){
    html+='<div class="empty">Añade tickers para comparar</div>';
    html+='</div>'+nav();
    return html;
  }

  var analyses=tickers.map(function(sym){return analyzeSymbol(sym);}).filter(Boolean);

  if(cTab==='unified'){
    // UNIFIED RANKING: ORS×60% + CTX×40% + Momentum bonus
    analyses.sort(function(a,b){return (b.unifiedScore||b.oppScore)-(a.unifiedScore||a.oppScore);});
    html+='<div style="font-size:10px;color:var(--sub);margin-bottom:8px">Score combinado: ORS×60% + CTX×40% · Ordenado por mayor oportunidad total</div>';
    analyses.forEach(function(a,rank){
      if(!a)return;
      var lp=MKT[a.sym]?MKT[a.sym].price:null;
      var score=a.unifiedScore||a.oppScore||0;
      var scoreCol=score>=70?'var(--signal)':score>=50?'var(--watch)':'var(--sub)';
      html+='<div class="card" data-ticker="'+a.sym+'" style="margin-bottom:8px;cursor:pointer" onclick="openTicker(\''+a.sym+'\')">';
      html+='<div style="display:flex;align-items:center;gap:10px">';
      html+='<div style="width:28px;height:28px;border-radius:50%;background:'+scoreCol.replace('var(','').replace(')','')+'20;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:'+scoreCol+'">'+(rank+1)+'</div>';
      html+='<canvas id="mini-'+a.sym+'" width="40" height="28" style="flex-shrink:0"></canvas>';
      html+='<div style="flex:1">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">';
      html+='<span style="font-weight:800;font-size:14px">'+a.sym+'</span>';
      html+=phaseBadge(a.phase);
      if(a&&a.slit&&a.slit.detected) html+='<span style="font-size:9px;background:var(--accent)15;color:var(--accent);border-radius:6px;padding:2px 6px">⚡SLIT</span>';
      html+='</div>';
      html+='<div style="display:flex;gap:8px;align-items:center">';
      html+='<div style="font-size:11px;font-weight:800;color:'+scoreCol+'">'+score+'/100</div>';
      html+='<div style="flex:1;height:4px;background:var(--border);border-radius:2px"><div style="width:'+Math.min(100,score)+'%;height:100%;background:'+scoreCol+';border-radius:2px"></div></div>';
      if(lp)html+='<span style="font-size:11px;color:var(--sub)">$'+lp.toFixed(2)+'</span>';
      html+='</div></div>';
      html+='<div style="text-align:right"><div style="font-size:9px;color:var(--sub)">ORS '+( a.orsCtx||0)+'</div><div style="font-size:9px;color:var(--sub)">CTX '+(a.ctx||0)+'</div></div>';
      html+='</div></div>';
    });

  } else if(cTab==='ors'){
    // ORS RANKING: Pure ORS score (rebote/sobreventa)
    analyses.sort(function(a,b){return (b.orsCtx||0)-(a.orsCtx||0);});
    html+='<div style="font-size:10px;color:var(--sub);margin-bottom:8px">Score ORS-v2 puro · RSI+OBV+MACD+VWAP · Mejores oportunidades de rebote</div>';
    analyses.forEach(function(a,rank){
      if(!a)return;
      var lp=MKT[a.sym]?MKT[a.sym].price:null;
      var score=a.orsCtx||0;
      var scoreCol=score>=65?'var(--signal)':score>=45?'var(--watch)':'var(--sub)';
      html+='<div class="card" data-ticker="'+a.sym+'" style="margin-bottom:8px;cursor:pointer" onclick="openTicker(\''+a.sym+'\')">';
      html+='<div style="display:flex;align-items:center;gap:10px">';
      html+='<div style="width:28px;height:28px;border-radius:50%;background:'+scoreCol.replace('var(','').replace(')','')+'20;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:'+scoreCol+'">'+(rank+1)+'</div>';
      html+='<canvas id="mini-'+a.sym+'" width="40" height="28" style="flex-shrink:0"></canvas>';
      html+='<div style="flex:1">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">';
      html+='<span style="font-weight:800;font-size:14px">'+a.sym+'</span>';
      html+=phaseBadge(a.phase);
      html+='</div>';
      html+='<div style="display:flex;gap:8px;align-items:center">';
      html+='<div style="font-size:11px;font-weight:800;color:'+scoreCol+'">'+score+'/100</div>';
      html+='<div style="flex:1;height:4px;background:var(--border);border-radius:2px"><div style="width:'+Math.min(100,score)+'%;height:100%;background:'+scoreCol+';border-radius:2px"></div></div>';
      if(lp)html+='<span style="font-size:11px;color:var(--sub)">$'+lp.toFixed(2)+'</span>';
      html+='</div>';
      if(a.rsi)html+='<div style="font-size:9px;color:var(--sub)">RSI '+a.rsi+' · '+a.phase.label+'</div>';
      html+='</div></div></div>';
    });

  } else {
    // MOMENTUM RANKING: Tickers with RSI 58-68, OBV rising, high volume
    var momAnalyses=analyses.map(function(a){
      if(!a) return null;
      var lp=MKT[a.sym]?MKT[a.sym].price:null;
      var rsi=a.rsi;
      // Quick momentum score
      var momScore=0;
      if(rsi>=58&&rsi<=68) momScore+=30;
      else if(rsi>=50&&rsi<=75) momScore+=15;
      else if(rsi>75||rsi<50) momScore-=20;
      if(a.obv&&a.obv.bullish) momScore+=25;
      if(a.aboveSMA200) momScore+=15;
      if(a.macd&&a.macd.bullish) momScore+=10;
      if(a.mfi&&a.mfi.value>55&&a.mfi.value<80) momScore+=10;
      momScore=Math.max(0,Math.min(100,momScore));
      return {a:a, momScore:momScore, lp:lp};
    }).filter(function(x){return x&&x.momScore>20;});
    momAnalyses.sort(function(x,y){return y.momScore-x.momScore;});

    html+='<div style="font-size:10px;color:var(--sub);margin-bottom:8px">Score Momentum · RSI 58-68 + OBV + SMA200 · Tendencias alcistas en curso</div>';
    if(!momAnalyses.length){
      html+='<div class="tip-card" style="text-align:center;padding:24px">';
      html+='<div style="font-size:28px;margin-bottom:8px">🚀</div>';
      html+='<div style="font-size:13px;font-weight:700;margin-bottom:4px">Sin momentum activo</div>';
      html+='<div style="font-size:11px;color:var(--sub)">Ningún ticker está en zona RSI 58-68 con OBV alcista actualmente</div>';
      html+='</div>';
    } else {
      momAnalyses.forEach(function(item,rank){
        var a=item.a; var score=item.momScore; var lp=item.lp;
        var scoreCol=score>=65?'var(--blue)':score>=45?'var(--watch)':'var(--sub)';
        html+='<div class="card" style="margin-bottom:8px;cursor:pointer;border-color:var(--blue)20" onclick="openTicker(\''+a.sym+'\')">';
        html+='<div style="display:flex;align-items:center;gap:10px">';
        html+='<div style="width:28px;height:28px;border-radius:50%;background:var(--blue)20;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--blue)">'+(rank+1)+'</div>';
        html+='<canvas id="mini-'+a.sym+'" width="40" height="28" style="flex-shrink:0"></canvas>';
        html+='<div style="flex:1">';
        html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">';
        html+='<span style="font-weight:800;font-size:14px">'+a.sym+'</span>';
        html+='<span style="font-size:9px;background:var(--blue)15;color:var(--blue);border-radius:6px;padding:2px 6px;font-weight:700">🚀 MOMENTUM</span>';
        if(a.aboveSMA200) html+='<span style="font-size:9px;color:var(--signal)">↑ SMA200</span>';
        html+='</div>';
        html+='<div style="display:flex;gap:8px;align-items:center">';
        html+='<div style="font-size:11px;font-weight:800;color:'+scoreCol+'">'+score+'/100</div>';
        html+='<div style="flex:1;height:4px;background:var(--border);border-radius:2px"><div style="width:'+Math.min(100,score)+'%;height:100%;background:var(--blue);border-radius:2px"></div></div>';
        if(lp)html+='<span style="font-size:11px;color:var(--sub)">$'+lp.toFixed(2)+'</span>';
        html+='</div>';
        if(a.rsi)html+='<div style="font-size:9px;color:var(--sub)">RSI '+a.rsi+(a.mfi?' · MFI '+a.mfi.value:'')+(a.aboveSMA200?' · ✅ SMA200':'')+'</div>';
        html+='</div></div></div>';
      });
    }
  }

  html+='</div>'+nav();
  return html;
}

function renderReport(){
  var mk=MONTH;
  var trades=DB.journal.filter(function(t){return mKey(t.date)===mk;});
  var wins=trades.filter(function(t){return t.result==='WIN';}),losses=trades.filter(function(t){return t.result==='LOSS';});
  var pnls=trades.filter(function(t){return t.exit;}).map(function(t){return pnlPct(t.entry,t.exit);});
  var tPnl=pnls.reduce(function(a,b){return a+b;},0).toFixed(2);
  var aPnl=pnls.length?(pnls.reduce(function(a,b){return a+b;},0)/pnls.length).toFixed(2):0;
  var wr=trades.length?Math.round(wins.length/trades.length*100):0;
  var best=trades.filter(function(t){return t.exit;}).sort(function(a,b){return pnlPct(b.entry,b.exit)-pnlPct(a.entry,a.exit);})[0];
  var worst=trades.filter(function(t){return t.exit;}).sort(function(a,b){return pnlPct(a.entry,a.exit)-pnlPct(b.entry,b.exit);})[0];
  var noObv=losses.filter(function(t){return !t.conditions.obvAlcista;}).length;
  var rep=REP_TEXT||DB.reports[mk];

  var extra='<button class="btn btn-watch" onclick="runReportAI()" style="padding:7px 12px;font-size:11px">'+(REP_LOADING?'⏳':'⚡')+' IA</button>';
  if(rep)extra+='<button class="btn btn-blue" onclick="exportPDF()" style="padding:7px 12px;font-size:11px;margin-left:6px">📄 PDF</button>';

  var html=hdr('📋 '+mLabel(mk),'','journal',extra);
  html+='<div class="wrap fade">';

  // KPI grid
  html+='<div class="stat-grid">';
  html+='<div class="stat-box2"><div class="stat-lbl2">WIN RATE</div><div class="stat-val2" style="color:'+wColor(wr)+'">'+wr+'%</div><div style="font-size:10px;color:var(--sub)">'+wins.length+'W/'+losses.length+'L</div></div>';
  html+='<div class="stat-box2"><div class="stat-lbl2">P&L TOTAL</div><div class="stat-val2" style="color:'+pColor(+tPnl)+';font-size:17px">'+(+tPnl>=0?'+':'')+tPnl+'%</div></div>';
  html+='<div class="stat-box2"><div class="stat-lbl2">PROMEDIO</div><div class="stat-val2" style="color:'+pColor(+aPnl)+';font-size:17px">'+(+aPnl>=0?'+':'')+aPnl+'%</div></div>';
  html+='</div>';

  // Best/worst
  if(best||worst){

// ═══════════════════════════════════════════════════════

var BT_STATE = {
  running: false,
  results: null,
  progress: 0,
  total: 0,
  startDate: null,
  capital0: 11480,
  riskPct: 0.02,
  mode: 'week'  // 'week' | 'compound'

// Motor de backtest completo con los 4 niveles de auto-exit
function runFullBacktest(prices, capital, riskPct, entryDate) {
  if(!prices || prices.length < 60) return null;
  var results = [], equity = capital;
  var maxPositions = 4;

  for(var i = 50; i < prices.length - 5; i++) {
    var slice = prices.slice(0, i+1);
    var rsi = calcRSI(slice, 14);
    var rsiPrev = calcRSI(slice.slice(0,-1), 14);
    var ema = calcEMA(slice, 20);
    var macd = calcMACD(slice);
    var obv = calcOBV(slice);
    var atr = calcATR(slice, 14);
    var sma200 = calcSMA(slice, 200);
    var last = slice[slice.length-1].close;

    // Filtro de fecha si se especifica
    if(entryDate && prices[i].date < entryDate) continue;

    // ORS-v2 condiciones reales (igual que TradingView)
    var rsiCruz  = rsiPrev !== null && rsiPrev < 30 && rsi !== null && rsi >= 30;
    var rsiOk    = rsi !== null && rsi >= 20 && rsi <= 45;
    var bajoVwap = ema && last < ema;
    var obvOk    = obv && obv.bullish && obv.rising;  // OBLIGATORIO
    var macdBull = macd && macd.bullish;

    var condCount = (rsiOk?1:0) + (rsiCruz?1:0) + (bajoVwap?1:0) + (macdBull?1:0) + (obvOk?1:0);
    var validSignal = condCount >= 4 && obvOk && rsiCruz;

    if(!validSignal) continue;
    // Evitar señales muy seguidas (min 5 días entre entradas)
    if(results.length && prices[i].date <= results[results.length-1].exitDate) continue;

    // Position sizing: ATR×1.5 stop, 2% riesgo
    var entryPrice = prices[i+1] ? prices[i+1].close : last;
    if(!atr || !entryPrice) continue;
    var stopPrice  = parseFloat((entryPrice - atr * 1.5).toFixed(2));
    var riskPerShare = entryPrice - stopPrice;
    if(riskPerShare <= 0) continue;
    var riskUSD    = equity * riskPct * 1.08;  // USD desde EUR
    var qty        = Math.max(1, Math.floor(riskUSD / riskPerShare));

    // SMA200 filter: reducir qty 50% si bajo SMA200
    var aboveSMA200 = sma200 && entryPrice > sma200;
    if(!aboveSMA200) qty = Math.max(1, Math.floor(qty * 0.5));

    // Target R:R 2:1
    var target = parseFloat((entryPrice + riskPerShare * 2).toFixed(2));

    // Simular los 4 niveles de auto-exit barra a barra
    var exitPrice = null, exitReason = '', partialDone = false;
    var maxPrice = entryPrice, partialPnl = 0;

    for(var j = i+1; j < Math.min(i+20, prices.length); j++) {
      var bar    = prices[j];
      var hiBar  = bar.high  || bar.close;
      var loBar  = bar.low   || bar.close;
      var clBar  = bar.close;

      // Actualizar máximo
      if(hiBar > maxPrice) maxPrice = hiBar;

      // NIVEL 1: Stop loss
      if(loBar <= stopPrice) {
        if(!partialDone) {
          exitPrice  = stopPrice;
          exitReason = 'N1 Stop $'+stopPrice;
        } else {
          // 50% ya vendido en target, el resto golpea stop (breakeven)
          exitPrice  = stopPrice;
          exitReason = 'N1+N2 Stop BE';
        }
        break;
      }

      // NIVEL 2: Target → venta 50%
      if(!partialDone && hiBar >= target) {
        partialDone = true;
        partialPnl  = (target - entryPrice) * Math.floor(qty*0.5);
        // Stop sube a breakeven
        stopPrice   = parseFloat((entryPrice * 1.002).toFixed(2));
        exitReason  = 'N2 Target 50%';
        // Seguir simulando el 50% restante
        continue;
      }

      // NIVEL 3: OBV + MACD bajista (solo después de venta parcial)
      if(partialDone && j >= i+3) {
        var sl3  = prices.slice(0, j+1);
        var o3   = calcOBV(sl3);
        var m3   = calcMACD(sl3);
        var r3   = calcRSI(sl3, 14);
        var bearCount = (o3&&!o3.bullish?1:0) + (m3&&m3.bearCross?1:0) + (r3&&r3>68?1:0);
        if(bearCount >= 2) {
          exitPrice  = clBar;
          exitReason = 'N3 OBV+MACD bajista';
          break;
        }
      }

      // NIVEL 4: Trailing stop 4% desde máximo
      if(partialDone) {
        var trail = parseFloat((maxPrice * 0.96).toFixed(2));
        if(loBar <= trail) {
          exitPrice  = trail;
          exitReason = 'N4 Trailing 4%';
          break;
        }
      }

      // Salida por tiempo máximo (10 días)
      if(j === Math.min(i+10, prices.length-1)) {
        exitPrice  = clBar;
        exitReason = 'Tiempo máx';
        break;
      }
    }

    if(!exitPrice) continue;

    // Calcular P&L total
    var remainQty = partialDone ? Math.ceil(qty*0.5) : qty;
    var totalPnlUSD = partialPnl + (exitPrice - entryPrice) * remainQty;
    var totalPnlPct = parseFloat(((exitPrice - entryPrice) / entryPrice * 100).toFixed(2));
    var totalPnlEur = parseFloat((totalPnlUSD / 1.08).toFixed(0));
    var win = totalPnlUSD > 0;

    // Actualizar capital compuesto
    equity = parseFloat((equity + totalPnlEur).toFixed(2));

    results.push({
      date:       prices[i].date,
      exitDate:   prices[Math.min(i+10, prices.length-1)].date,
      entry:      +entryPrice.toFixed(2),
      exit:       +exitPrice.toFixed(2),
      stop:       +stopPrice.toFixed(2),
      target:     +target.toFixed(2),
      qty:        qty,
      pnlPct:     totalPnlPct,
      pnlEur:     totalPnlEur,
      win:        win,
      reason:     exitReason,
      partial:    partialDone,
      score:      condCount,
      aboveSMA200:aboveSMA200,
      capitalAfter: equity,
    });
  }
  return results;
}

// Backtest multi-ticker usando scanner de probabilidad
var BT_MULTI_RESULTS = null;
var BT_MULTI_RUNNING = false;
var BT_MULTI_PROGRESS = 0;

function runMultiBacktest(mode) {
  if(BT_MULTI_RUNNING) return;
  BT_MULTI_RUNNING = true;
  BT_MULTI_PROGRESS = 0;
  BT_MULTI_RESULTS = null;
  render();

  // Usar tickers del watchlist + SP500_POOL top 20
  var tickers = Object.keys(DB.tickers);
  // Añadir SP500_POOL que no estén ya
  SP500_POOL.slice(0,20).forEach(function(s){ if(tickers.indexOf(s)<0) tickers.push(s); });

  var capital0 = (DB.settings && DB.settings.capital) ? parseFloat(DB.settings.capital) : 11480;
  var riskPct  = (DB.settings && DB.settings.riskPct) ? parseFloat(DB.settings.riskPct)/100 : 0.02;

  // Fecha inicio según modo
  var startDate = null;
  if(mode === 'week') {
    var d = new Date(); d.setDate(d.getDate()-14);
    startDate = d.toISOString().slice(0,10);
  } else {
    // Desde mayo 2024
    startDate = '2024-05-01';
  }

  var allTrades = [], tickerStats = [], done = 0;
  var total = tickers.length;

  function processNext(idx) {
    if(idx >= tickers.length) {
      // Ordenar por fecha y calcular capital compuesto global
      allTrades.sort(function(a,b){ return a.date < b.date ? -1 : 1; });
      var capitalEvo = [capital0];
      var runningCapital = capital0;
      allTrades.forEach(function(t){
        runningCapital = parseFloat((runningCapital + t.pnlEur).toFixed(2));
        t.capitalAfter = runningCapital;
        capitalEvo.push(runningCapital);
      });

      var wins = allTrades.filter(function(t){return t.win;}).length;
      var losses = allTrades.length - wins;
      var totalEur = parseFloat((runningCapital - capital0).toFixed(0));
      var winRate = allTrades.length ? Math.round(wins/allTrades.length*100) : 0;
      var avgWin = wins ? allTrades.filter(function(t){return t.win;}).reduce(function(s,t){return s+t.pnlEur;},0)/wins : 0;
      var avgLoss = losses ? allTrades.filter(function(t){return !t.win;}).reduce(function(s,t){return s+t.pnlEur;},0)/losses : 0;
      var pf = avgLoss !== 0 ? Math.abs(avgWin/avgLoss) : 999;

      // Max drawdown en EUR
      var peak = capital0, maxDD = 0;
      capitalEvo.forEach(function(c){ if(c>peak)peak=c; var dd=peak-c; if(dd>maxDD)maxDD=dd; });

      // Stats por ticker
      var byTicker = {};
      allTrades.forEach(function(t){
        if(!byTicker[t.sym]) byTicker[t.sym]={sym:t.sym,trades:0,wins:0,pnlEur:0};
        byTicker[t.sym].trades++;
        if(t.win) byTicker[t.sym].wins++;
        byTicker[t.sym].pnlEur += t.pnlEur;
      });
      var tickerArr = Object.values(byTicker).sort(function(a,b){return b.pnlEur-a.pnlEur;});

      BT_MULTI_RESULTS = {
        mode: mode,
        startDate: startDate,
        capital0: capital0,
        capitalFinal: runningCapital,
        totalEur: totalEur,
        totalPct: parseFloat(((runningCapital-capital0)/capital0*100).toFixed(1)),
        trades: allTrades.length,
        wins: wins, losses: losses,
        winRate: winRate,
        avgWin: parseFloat(avgWin.toFixed(0)),
        avgLoss: parseFloat(avgLoss.toFixed(0)),
        profitFactor: parseFloat(pf.toFixed(2)),
        maxDD: parseFloat(maxDD.toFixed(0)),
        capitalEvo: capitalEvo,
        allTrades: allTrades,
        byTicker: tickerArr,
      };
      BT_MULTI_RUNNING = false;
      render();
      return;
    }

    var sym = tickers[idx];
    BT_MULTI_PROGRESS = Math.round(idx/total*100);
    if(idx % 5 === 0) render(); // Update progress every 5 tickers

    // Usar datos ya cargados en DB si existen
    var tk = DB.tickers[sym];
    if(tk && tk.prices && tk.prices.length >= 60) {
      var trades = runFullBacktest(tk.prices, capital0, riskPct, startDate);
      if(trades && trades.length) {
        trades.forEach(function(t){ t.sym = sym; allTrades.push(t); });
      }
      setTimeout(function(){ processNext(idx+1); }, 0);
    } else {
      // Fetch datos del proxy
      fetch(PROXY+'/alpaca/bars/daily?sym='+sym+'&limit=504')
        .then(function(r){return r.json();})
        .then(function(d){
          if(d && d.prices && d.prices.length >= 60) {
            var trades = runFullBacktest(d.prices, capital0, riskPct, startDate);
            if(trades && trades.length) {
              trades.forEach(function(t){ t.sym = sym; allTrades.push(t); });
            }
          }
          setTimeout(function(){ processNext(idx+1); }, 50);
        })
        .catch(function(){ setTimeout(function(){ processNext(idx+1); }, 50); });
    }
  }
  processNext(0);
}

    ctx2.closePath(); ctx2.fillStyle=grad2; ctx2.fill();
    // Line
    ctx2.beginPath(); ctx2.moveTo(xOf2(0),yOf2(data[0]));
    for(var k2=1;k2<data.length;k2++) ctx2.lineTo(xOf2(k2),yOf2(data[k2]));

        ctx3.beginPath(); ctx3.moveTo(xO(0),yO(pts[0]));
        for(var m=1;m<pts.length;m++) ctx3.lineTo(xO(m),yO(pts[m]));
        ctx3.strokeStyle=pts[pts.length-1]>=0?'#00e5a0':'#ff4560'; ctx3.lineWidth=1.5; ctx3.stroke();

// ── AUTO-JOURNAL — Registro automático desde Alpaca ──
function autoJournalEntry(params) {
  // params: {type, ticker, price, qty, stop, notes, orderId, conditions}
  // type: 'BUY' | 'SELL' | 'STOP_HIT' | 'STOP_MOVED' | 'TARGET_HIT'
  var db = loadDB();
  if (!db.journal) db.journal = [];
  var now = new Date();
  var dateStr = now.getFullYear() + '-' + ('0'+(now.getMonth()+1)).slice(-2) + '-' + ('0'+now.getDate()).slice(-2);
  var timeStr = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);

  if (params.type === 'BUY') {
    var trade = {
      id:         'ALP_' + Date.now(),
      ticker:     params.ticker,
      date:       dateStr + ' ' + timeStr,
      entry:      params.price,
      qty:        params.qty,
      stop:       params.stop || null,
      result:     'OPEN',
      status:     'open',
      source:     'alpaca_auto',
      orderId:    params.orderId || null,
      notes:      '🤖 Auto-entrada Alpaca · ' + (params.notes || ''),
      conditions: params.conditions || {rsi30:false,rsiCruz:false,bajoVwap:false,obvAlcista:false,macdAlcista:false},
    };
    db.journal.push(trade);
    saveDB(db);
    toast('📒 Trade registrado en Diario: COMPRA ' + params.ticker, 4000);
    return trade.id;
  }

  if (params.type === 'SELL' || params.type === 'STOP_HIT' || params.type === 'TARGET_HIT') {
    // Find open trade for this ticker
    var openIdx = -1;
    for (var i = db.journal.length - 1; i >= 0; i--) {
      if (db.journal[i].ticker === params.ticker && (db.journal[i].status === 'open' || db.journal[i].result === 'OPEN')) {
        openIdx = i; break;
      }
    }
    if (openIdx >= 0) {
      var t = db.journal[openIdx];
      t.exit    = params.price;
      t.status  = 'closed';
      t.dateExit = dateStr + ' ' + timeStr;
      var pnl = t.entry ? ((params.price - t.entry) / t.entry * 100) : 0;
      t.result  = pnl >= 0 ? 'WIN' : 'LOSS';
      t.notes   = (t.notes || '') + ' | 🤖 Auto-cierre: ' + params.type + ' @ $' + params.price;
      db.journal[openIdx] = t;
      saveDB(db);
      var emoji = params.type === 'STOP_HIT' ? '🛡' : params.type === 'TARGET_HIT' ? '🎯' : '📤';
      toast(emoji + ' Diario actualizado: ' + params.type + ' ' + params.ticker + ' ' + (pnl>=0?'+':'') + pnl.toFixed(2) + '%', 5000);
      checkAchievements();
    }
    return openIdx >= 0 ? db.journal[openIdx].id : null;
  }

  if (params.type === 'STOP_MOVED') {
    var openIdx2 = -1;
    for (var j = db.journal.length - 1; j >= 0; j--) {
      if (db.journal[j].ticker === params.ticker && (db.journal[j].status === 'open' || db.journal[j].result === 'OPEN')) {
        openIdx2 = j; break;
      }
    }
    if (openIdx2 >= 0) {
      var prevStop = db.journal[openIdx2].stop;
      db.journal[openIdx2].stop = params.price;
      db.journal[openIdx2].notes = (db.journal[openIdx2].notes || '') + ' | 🔼 Stop movido: $' + prevStop + '→$' + params.price + ' @ ' + timeStr;
      saveDB(db);
      toast('🔼 Stop actualizado en Diario: ' + params.ticker + ' $' + prevStop + '→$' + params.price, 4000);
    }
  }
}

// Sync Alpaca positions to journal on startup
function syncAlpacaToJournal() {
  fetch(PROXY + '/alpaca/positions')
    .then(function(r) { return r.json(); })
    .then(function(positions) {
      if (!Array.isArray(positions)) return;
      var db = loadDB();
      if (!db.journal) db.journal = [];
      positions.forEach(function(p) {
        var sym = p.symbol;
        var alreadyOpen = db.journal.some(function(t) {
          return t.ticker === sym && (t.status === 'open' || t.result === 'OPEN');
        });
        if (!alreadyOpen && p.qty && parseFloat(p.qty) > 0) {
          var entry = parseFloat(p.avg_entry_price);
          var trade = {
            id:      'SYNC_' + sym + '_' + Date.now(),
            ticker:  sym,
            date:    new Date().toISOString().slice(0,10),
            entry:   entry,
            qty:     parseFloat(p.qty),
            result:  'OPEN',
            status:  'open',
            source:  'alpaca_sync',
            notes:   '🔄 Sincronizado desde Alpaca',
            conditions: {rsi30:false,rsiCruz:false,bajoVwap:false,obvAlcista:true,macdAlcista:false},
          };
          db.journal.push(trade);
          console.log('Synced from Alpaca:', sym);
        }
      });
      saveDB(db);
    })
    .catch(function() {});
}

function syncRTPrices(){
  var syms=Object.keys(DB.tickers);
  if(!syms.length) return;

  fetch(PROXY+'/alpaca/snapshots?syms='+encodeURIComponent(batch))
    .then(function(r){return r.json();})
    .then(function(data){
      Object.keys(data).forEach(function(sym){
        var s=data[sym];
        if(s&&s.price){
          MKT[sym]={
            price:s.price, changePct:s.changePct,
            high:s.high, low:s.low, open:s.open,
            volume:s.volume, vwap:s.vwap,
            ts:Date.now()
          };
        }
      });
      // Re-render home if on that view
      if(VIEW==='home'||VIEW==='compare') render();
    })
    .catch(function(e){console.log('RT price sync error:',e.message);});
}

function loadAll15min(){
  var syms=Object.keys(DB.tickers);
  if(!syms.length){ setTimeout(loadAll15min, 3000); return; } // Wait for tickers
  // Check if any ticker actually has daily prices loaded
  var hasData=syms.some(function(s){ return DB.tickers[s]&&DB.tickers[s].prices&&DB.tickers[s].prices.length>5; });
  if(!hasData){ setTimeout(loadAll15min, 3000); return; } // Wait for data
  var i=0;
  function next(){
    if(i>=syms.length) return;
    var sym=syms[i++];
    var existing=INTRADAY[sym];
    var needsLoad=!existing||Date.now()-existing.ts>300000||(existing.prices15&&existing.prices15.length<30);
    if(needsLoad){
      fetchIntraday(sym,function(prices15){
        if(prices15&&prices15.length){
          INTRADAY[sym]={prices15:prices15,ts:Date.now(),source:'alpaca'};
        }
        setTimeout(next, 300); // stagger requests - 300ms between tickers
      });
    } else {
      setTimeout(next, 30);
    }
  }

// AUTO-EXIT ENGINE — 4 NIVELES
// Nivel 1: Stop loss fijo
// Nivel 2: Venta parcial en target + mover stop a breakeven
// Nivel 3: Salida por señal ORS inversa (OBV bajista + MACD cruce)
// Nivel 4: Trailing stop de seguridad desde máximo
// ═══════════════════════════════════════════════════════
var EXIT_CHECKING = {};

function setExitRule(sym, rule) {
  if(!DB.exitRules) DB.exitRules = {};
  if(!DB.exitRules[sym]) DB.exitRules[sym] = {};
  DB.exitRules[sym] = {
    stop: rule.stop || null,
    target: rule.target || null,
    trailingPct: rule.trailingPct || 4,
    partialDone: rule.partialDone || false,
    maxPrice: rule.maxPrice || rule.entryPrice || null,
    entryPrice: rule.entryPrice || null,
    qty: rule.qty || null,
    active: true
  };
  persist();
}

function executeAutoSell(sym, qty, reason, isPartial) {
  if(!qty || qty <= 0) return;
  var label = isPartial ? 'VENTA PARCIAL' : 'VENTA TOTAL';
  fetch(PROXY+'/alpaca/order', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({symbol: sym, qty: qty, side: 'sell', type: 'market', tif: 'day'})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.id){
      var msg = '🤖 AUTO-EXIT '+label+'\n'
        +'📊 '+sym+' — '+qty+' acciones\n'
        +'📋 Motivo: '+reason+'\n'
        +'🆔 Orden: '+d.id.slice(0,8);
      sendTG(msg);
      toast('🤖 '+label+' '+sym+' ('+reason+')', 8000);
      autoJournalEntry({type:'SELL', ticker:sym, price:MKT[sym]?MKT[sym].price:0, qty:qty, orderId:d.id, notes:'Auto-exit: '+reason});
    } else {
      sendTG('⚠️ Auto-exit FALLIDO — '+sym+'\nError: '+(d.message||'desconocido'));
      toast('❌ Auto-exit fallido: '+(d.message||'error'), 6000);
    }
  })
  .catch(function(e){
    sendTG('⚠️ Auto-exit ERROR — '+sym+'\n'+e.message);
  });
}

function checkExitLevels(sym, currentPrice, prices15) {
  if(EXIT_CHECKING[sym]) return;
  var rule = DB.exitRules && DB.exitRules[sym];
  if(!rule || !rule.active) return;
  EXIT_CHECKING[sym] = true;

  try {
    var qty = rule.qty || 0;
    if(!qty) { EXIT_CHECKING[sym]=false; return; }

    // Actualizar precio máximo para trailing stop
    if(currentPrice && (!rule.maxPrice || currentPrice > rule.maxPrice)) {
      rule.maxPrice = currentPrice;
      DB.exitRules[sym].maxPrice = currentPrice;
      persist();
    }

    // ── NIVEL 1: Stop loss fijo ──────────────────────────
    if(rule.stop && currentPrice <= rule.stop) {
      var stopQty = rule.partialDone ? Math.ceil(qty * 0.5) : qty;
      executeAutoSell(sym, stopQty, 'Stop loss $'+rule.stop, false);
      DB.exitRules[sym].active = false;
      persist();
      EXIT_CHECKING[sym]=false;
      return;
    }

    // ── NIVEL 2: Venta parcial en target ────────────────
    if(rule.target && !rule.partialDone && currentPrice >= rule.target) {
      var partialQty = Math.floor(qty * 0.5);
      if(partialQty >= 1) {
        executeAutoSell(sym, partialQty, 'Target alcanzado $'+rule.target+' — venta 50%', true);
        DB.exitRules[sym].partialDone = true;
        // Mover stop a breakeven
        DB.exitRules[sym].stop = rule.entryPrice;
        persist();
        sendTG('🛡 Stop movido a breakeven $'+rule.entryPrice+' en '+sym);
        toast('✅ 50% vendido en target. Stop → breakeven $'+rule.entryPrice, 7000);
      }
      EXIT_CHECKING[sym]=false;
      return;
    }

    // ── NIVEL 3: Señal ORS inversa (solo si hay 50% restante) ──
    if(rule.partialDone && prices15 && prices15.length >= 30) {
      var exitObv = calcOBV(prices15);
      var exitMacd = calcMACD(prices15);
      var exitRsi = calcRSI(prices15, 14);
      var obvBear = exitObv && !exitObv.bullish;
      var macdBear = exitMacd && exitMacd.bearCross;
      var rsiBear = exitRsi && exitRsi > 68;
      var bearSignals = (obvBear ? 1 : 0) + (macdBear ? 1 : 0) + (rsiBear ? 1 : 0);
      if(bearSignals >= 2) {
        var remainQty = Math.ceil(qty * 0.5);
        var reasons = [];
        if(obvBear) reasons.push('OBV bajista');
        if(macdBear) reasons.push('MACD cruce bajista');
        if(rsiBear) reasons.push('RSI sobrecomprado');
        executeAutoSell(sym, remainQty, reasons.join(' + '), false);
        DB.exitRules[sym].active = false;
        persist();
        EXIT_CHECKING[sym]=false;
        return;
      }
    }

    // ── NIVEL 4: Trailing stop desde máximo ─────────────
    if(rule.maxPrice && rule.partialDone) {
      var trailPct = rule.trailingPct || 4;
      var trailStop = rule.maxPrice * (1 - trailPct / 100);
      if(currentPrice <= trailStop) {
        var trailQty = Math.ceil(qty * 0.5);
        executeAutoSell(sym, trailQty, 'Trailing stop '+trailPct+'% desde máximo $'+rule.maxPrice.toFixed(2), false);
        DB.exitRules[sym].active = false;
        persist();
        EXIT_CHECKING[sym]=false;
        return;
      }
    }

  } catch(e) {
    console.log('Exit check error '+sym+': '+e.message);
  }
  EXIT_CHECKING[sym] = false;
}

function runWeeklyScan(){
  toast('🔭 Escaneando '+SP500_POOL.length+' tickers... (~30 seg)', 5000);
  var results=[];
  var done=0;
  var total=Math.min(SP500_POOL.length, 80);
  var pool=SP500_POOL.slice(0,total);

  // Batch fetch snapshots (all at once via Alpaca)
  var symStr=pool.join(',');
  fetch(PROXY+'/alpaca/snapshots?syms='+symStr)
    .then(function(r){return r.json();})
    .then(function(snapshots){
      // For each ticker with snapshot, do quick ORS analysis
      var symsWithData=Object.keys(snapshots);
      var batchDone=0;
      symsWithData.forEach(function(sym){
        // Quick score from snapshot data only (price change + momentum)
        var snap=snapshots[sym];
        var chg=snap.changePct||0;
        var vol=snap.volume||0;
        // Quick score heuristic (without full price history)
        var quickScore=50;
        if(chg<-3&&chg>-12) quickScore+=20; // RSI likely oversold
        if(chg<-1&&chg>-5) quickScore+=10;  // Mild pullback
        if(chg>5) quickScore-=15;            // Already ran — less likely to rebuy
        // Check if already in watchlist
        var inWL=!!DB.tickers[sym];
        var phase=quickScore>=65?'SIGNAL':quickScore>=50?'WATCH':'RADAR';
        results.push({sym:sym, score:quickScore, phase:phase, chg:chg, inWL:inWL, price:snap.price});
      });

      // Sort by score
      results.sort(function(a,b){return b.score-a.score;});
      var top30=results.slice(0,30);

      // Save to localStorage
      localStorage.setItem('ors_weekly_scan', JSON.stringify(top30));
      var dateStr=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
      localStorage.setItem('ors_scan_date', 'Scan '+dateStr);

      toast('✅ Top 30 encontrados · '+top30.filter(function(t){return t.phase==='SIGNAL';}).length+' señales activas', 4000);
      render();
    })
    .catch(function(e){
      toast('❌ Error en scan: '+e.message, 4000);
      // Fallback — use watchlist analysis
      var wlResults=Object.keys(DB.tickers).map(function(sym){
        var a=analyzeSymbol(sym);
        return a?{sym:sym,score:a.unifiedScore||a.oppScore,phase:a.phase.key,chg:0,inWL:true}:null;
      }).filter(Boolean);
      wlResults.sort(function(a,b){return b.score-a.score;});
      localStorage.setItem('ors_weekly_scan', JSON.stringify(wlResults));
      localStorage.setItem('ors_scan_date', 'Watchlist');
      render();
    });
}

function renderAIText(txt){
  if(!txt) return '';
  var out='';
  var lines=txt.split('\n');
  for(var li=0;li<lines.length;li++){
    var line=lines[li];
    if(!line.trim()) continue;
    var isVeredicto=line.indexOf('🎯')>=0;
    var isPotencial=line.indexOf('📊')>=0;
    var isBull=line.indexOf('🟢')>=0;
    var isNeutral=line.indexOf('🟡')>=0;
    var isBear=line.indexOf('🔴')>=0;
    var isBullet=line.charAt(0)==='•'||line.charAt(0)==='-';
    var isHeader=line.charAt(0)==='💡'||line.charAt(0)==='✅'||line.charAt(0)==='⚠️'||line.charAt(0)==='📐'||line.charAt(0)==='🏆'||line.charAt(0)==='💼';
    if(isVeredicto||isPotencial){
      out+='<div style="background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;font-weight:800;color:var(--accent)">'+line+'</div>';
    } else if(isBull||isNeutral||isBear){
      var col=isBull?'var(--signal)':(isBear?'var(--bear)':'var(--watch)');
      out+='<div style="background:var(--card);border-radius:10px;padding:8px 12px;margin-bottom:4px;border-left:3px solid '+col+';font-size:12px;font-weight:700;color:var(--text)">'+line+'</div>';
    } else if(isHeader){
      out+='<div style="font-size:11px;font-weight:700;color:var(--text);margin:8px 0 4px">'+line+'</div>';
    } else if(isBullet){
      out+='<div style="font-size:11px;color:var(--sub);padding-left:8px;margin-bottom:2px">'+line+'</div>';
    } else {
      out+='<div style="font-size:11px;color:var(--text);margin-bottom:3px">'+line+'</div>';
    }
  }
  return out;
}

function drawEquityCurve(canvasId, trades){
  setTimeout(function(){
    var canvas = document.getElementById(canvasId);
    if(!canvas) return;
    var dpr = window.devicePixelRatio||1;
    var W = canvas.offsetWidth||340, H = 160;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.height = H+'px';
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Build equity curve
    var equity = [0], cumPnl = 0;
    var closed = trades.filter(function(t){return t.pnlEur!=null;});
    closed.forEach(function(t){ cumPnl += (t.pnlEur||0); equity.push(cumPnl); });
    if(equity.length < 2){ ctx.fillStyle='rgba(74,106,138,.3)'; ctx.font='12px -apple-system'; ctx.fillText('Sin trades cerrados aún',W/2-70,H/2); return; }

    var mn=Math.min.apply(null,equity), mx=Math.max.apply(null,equity), rng=mx-mn||1;
    var pd={t:16,r:12,b:24,l:52};
    var cw=W-pd.l-pd.r, ch=H-pd.t-pd.b;
    function xOf(i){return pd.l+(i/(equity.length-1))*cw;}
    function yOf(v){return pd.t+(1-(v-mn)/rng)*ch;}

    // Grid lines
    ctx.strokeStyle='rgba(22,32,48,.8)'; ctx.lineWidth=1; ctx.setLineDash([2,4]);
    [0,.25,.5,.75,1].forEach(function(f){
      var y=pd.t+f*ch;
      ctx.beginPath(); ctx.moveTo(pd.l,y); ctx.lineTo(W-pd.r,y); ctx.stroke();
      var val=mx-f*(mx-mn);
      ctx.fillStyle='rgba(74,106,138,.7)'; ctx.font='9px -apple-system';
      ctx.textAlign='right'; ctx.fillText((val>=0?'+':'')+Math.round(val)+'€',pd.l-4,y+3);
    });
    ctx.setLineDash([]);

    // Zero line
    if(mn<0&&mx>0){
      ctx.strokeStyle='rgba(200,218,240,.15)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pd.l,yOf(0)); ctx.lineTo(W-pd.r,yOf(0)); ctx.stroke();
    }

    // Area fill
    var finalPnl=equity[equity.length-1];
    var grad=ctx.createLinearGradient(0,0,0,H);
    if(finalPnl>=0){
      grad.addColorStop(0,'rgba(0,221,160,.3)'); grad.addColorStop(1,'rgba(0,221,160,.02)');
    } else {
      grad.addColorStop(0,'rgba(255,58,85,.02)'); grad.addColorStop(1,'rgba(255,58,85,.3)');
    }
    ctx.beginPath(); ctx.moveTo(xOf(0),yOf(equity[0]));
    for(var i=1;i<equity.length;i++) ctx.lineTo(xOf(i),yOf(equity[i]));
    ctx.lineTo(xOf(equity.length-1),H-pd.b+pd.t); ctx.lineTo(xOf(0),H-pd.b+pd.t);
    ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

    // Line
    ctx.beginPath(); ctx.moveTo(xOf(0),yOf(equity[0]));
    for(var j=1;j<equity.length;j++) ctx.lineTo(xOf(j),yOf(equity[j]));
    ctx.strokeStyle=finalPnl>=0?'#00dda0':'#ff3a55'; ctx.lineWidth=2.5; ctx.stroke();

    // Last point dot
    var lx=xOf(equity.length-1), ly=yOf(equity[equity.length-1]);
    ctx.beginPath(); ctx.arc(lx,ly,4,0,Math.PI*2);
    ctx.fillStyle=finalPnl>=0?'#00dda0':'#ff3a55'; ctx.fill();
    ctx.strokeStyle=finalPnl>=0?'rgba(0,221,160,.3)':'rgba(255,58,85,.3)';
    ctx.lineWidth=6; ctx.stroke();

    // X axis labels
    ctx.fillStyle='rgba(74,106,138,.7)'; ctx.font='9px -apple-system'; ctx.textAlign='center';
    var step=Math.max(1,Math.floor(equity.length/5));
    for(var k=0;k<equity.length;k+=step){
      ctx.fillText('#'+(k+1),xOf(k),H-4);
    }
  }, 80);
}

function renderDashboard(){
  var trades = DASH_DATA || [];
  var closed = trades.filter(function(t){return t.result==='WIN'||t.result==='LOSS';});
  var wins   = closed.filter(function(t){return t.result==='WIN';});
  var losses = closed.filter(function(t){return t.result==='LOSS';});
  var open   = trades.filter(function(t){return !t.result||t.result==='ABIERTO';});
  var totalPnl = closed.reduce(function(s,t){return s+(t.pnlEur||0);},0);
  var wr = closed.length ? Math.round(wins.length/closed.length*100) : 0;
  var avgWin = wins.length ? Math.round(wins.reduce(function(s,t){return s+(t.pnlEur||0);},0)/wins.length) : 0;
  var avgLoss = losses.length ? Math.round(losses.reduce(function(s,t){return s+(t.pnlEur||0);},0)/losses.length) : 0;
  var capital = (DB.settings&&DB.settings.capital)||11480;
  var capitalNow = capital + totalPnl;

  // Max drawdown
  var equity=[0], cum=0;
  closed.forEach(function(t){cum+=(t.pnlEur||0);equity.push(cum);});
  var peak=0, maxDD=0;
  equity.forEach(function(v){if(v>peak)peak=v;var dd=peak-v;if(dd>maxDD)maxDD=dd;});

  // Best/worst
  var sortedPnl=closed.slice().sort(function(a,b){return (b.pnlEur||0)-(a.pnlEur||0);});

  html+='<div style="font-size:13px;font-weight:700;color:'+(capChg>=0?'var(--signal)':'var(--bear)')+'">'+(capChg>=0?'+':'')+Math.round(capChg)+'€</div>';
  html+='<div style="font-size:10px;color:var(--sub)">'+(capChg>=0?'+':'')+capChgPct+'% total</div>';

  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;margin-bottom:10px">';

  // ── EQUITY CURVE ─────────────────────────────────
  html+='<div class="dash-card">';
  html+='<div style="font-size:9px;color:var(--sub);letter-spacing:2px;margin-bottom:10px">CURVA DE EQUITY — EVOLUCIÓN P&L</div>';

  // ── MOM vs ORS ────────────────────────────────────
  html+='<div class="dash-card">';
  html+='<div style="font-size:9px;color:var(--sub);letter-spacing:2px;margin-bottom:12px">RENDIMIENTO POR SISTEMA</div>';
  html+='<div style="display:flex;gap:10px">';
  // MOM
  html+='<div style="flex:1;background:rgba(0,221,160,.08);border:1px solid rgba(0,221,160,.2);border-radius:12px;padding:12px">';
  html+='<div style="font-size:12px;font-weight:800;color:var(--signal);margin-bottom:8px">🚀 MOM</div>';
  html+='<div style="font-size:24px;font-weight:900;color:'+(momWR>=70?'var(--signal)':'var(--watch)');'">'+momWR+'%</div>';
  html+='<div style="font-size:9px;color:var(--sub)">Win Rate · '+byMOM.length+' trades</div>';
  var momPnl=byMOM.reduce(function(s,t){return s+(t.pnlEur||0);},0);
  html+='<div style="font-size:11px;font-weight:700;color:'+(momPnl>=0?'var(--signal)':'var(--bear)')+';margin-top:4px">'+(momPnl>=0?'+':'')+Math.round(momPnl)+'€</div>';
  html+='</div>';
  // ORS
  html+='<div style="flex:1;background:rgba(58,143,255,.08);border:1px solid rgba(58,143,255,.2);border-radius:12px;padding:12px">';
  html+='<div style="font-size:12px;font-weight:800;color:var(--blue);margin-bottom:8px">⚡ ORS</div>';

  html+='<div style="font-size:9px;color:var(--sub)">Win Rate · '+byORS.length+' trades</div>';
  var orsPnl=byORS.reduce(function(s,t){return s+(t.pnlEur||0);},0);
  html+='<div style="font-size:11px;font-weight:700;color:'+(orsPnl>=0?'var(--signal)':'var(--bear)')+';margin-top:4px">'+(orsPnl>=0?'+':'')+Math.round(orsPnl)+'€</div>';
  html+='</div>';
  html+='</div></div>';

  // ── BEST / WORST ──────────────────────────────────
  if(best||worst){
    html+='<div class="dash-card">';
    html+='<div style="font-size:9px;color:var(--sub);letter-spacing:2px;margin-bottom:10px">MEJOR Y PEOR OPERACIÓN</div>';
    html+='<div style="display:flex;gap:8px">';

      html+='<div style="font-size:18px;font-weight:900;color:var(--bear)">€'+(worst.pnlEur||0)+'</div>';
      if(worst.date)html+='<div style="font-size:9px;color:var(--sub)">'+(worst.date||'').slice(0,10)+'</div>';
      html+='</div>';
    }
    html+='</div></div>';
  }

  // ── HEATMAP MOM SCAN ──────────────────────────────
  if(momScan&&momScan.length){
    html+='<div class="dash-card">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    html+='<div style="font-size:9px;color:var(--sub);letter-spacing:2px">HEATMAP MOM — TOP '+Math.min(momScan.length,30)+'</div>';
    html+='<button onclick="runMomScan()" style="font-size:9px;padding:3px 9px;border-radius:7px;background:var(--signal)15;border:1px solid var(--signal)30;color:var(--signal)">🔄</button>';
    html+='</div>';
    html+='<div class="heatmap-grid">';
    momScan.slice(0,30).forEach(function(item){
      var isOpt=item.phase==='ÓPTIMA', isSig=item.phase==='SEÑAL';
      var bg=isOpt?'rgba(0,221,160,.25)':isSig?'rgba(240,168,0,.2)':'rgba(58,143,255,.1)';
      var border=isOpt?'rgba(0,221,160,.6)':isSig?'rgba(240,168,0,.5)':'rgba(58,143,255,.3)';
      var tc=isOpt?'#00dda0':isSig?'#f0a800':'#3a8fff';
      html+='<div class="heatmap-cell" onclick="openTicker(\''+item.sym+'\')" style="background:'+bg+';border:1px solid '+border+';color:'+tc+'" title="'+item.sym+' · '+item.phase+' · RSI '+item.rsi+'">';
      html+=item.sym;
      html+='</div>';
    });
    html+='</div>';
    // Legend
    html+='<div style="display:flex;gap:10px;margin-top:8px">';
    html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:rgba(0,221,160,.25);border:1px solid rgba(0,221,160,.6)"></div><span style="font-size:9px;color:var(--sub)">ÓPTIMA</span></div>';
    html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:rgba(240,168,0,.2);border:1px solid rgba(240,168,0,.5)"></div><span style="font-size:9px;color:var(--sub)">SEÑAL</span></div>';
    html+='<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:3px;background:rgba(58,143,255,.1);border:1px solid rgba(58,143,255,.3)"></div><span style="font-size:9px;color:var(--sub)">WATCH</span></div>';
    html+='</div>';
    html+='</div>';
  }

  // ── ÚLTIMOS TRADES ────────────────────────────────
  if(closed.length){
    html+='<div class="dash-card">';
    html+='<div style="font-size:9px;color:var(--sub);letter-spacing:2px;margin-bottom:10px">ÚLTIMAS OPERACIONES</div>';
    closed.slice().reverse().slice(0,8).forEach(function(t){
      var isWin=t.result==='WIN';
      var bc=isWin?'var(--signal)':'var(--bear)';
      html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">';
      html+='<div style="width:6px;height:30px;border-radius:3px;background:'+(isWin?'var(--signal)':'var(--bear)')+';flex-shrink:0"></div>';
      html+='<div style="flex:0 0 44px;font-weight:800;color:var(--accent);font-size:13px">'+(t.sym||'?')+'</div>';
      html+='<div style="flex:0 0 40px;font-size:9px;padding:2px 6px;border-radius:6px;text-align:center;font-weight:700;background:'+(isWin?'rgba(0,221,160,.15)':'rgba(255,58,85,.12)')+';color:'+bc+'">'+(isWin?'WIN':'LOSS')+'</div>';
      html+='<div style="flex:1;font-size:9px;color:var(--sub)">'+(t.system||'MOM')+' · '+(t.date||'').slice(0,10)+'</div>';
      html+='<div style="font-size:13px;font-weight:800;color:'+bc+'">'+(t.pnlEur>=0?'+':'')+Math.round(t.pnlEur||0)+'€</div>';
      html+='</div>';
    });
    html+='</div>';
  }

  // Sin datos
  if(!trades.length){
    html+='<div style="text-align:center;padding:40px 20px">';
    html+='<div style="font-size:40px;margin-bottom:12px">📊</div>';
    html+='<div style="font-size:15px;font-weight:700;margin-bottom:6px">Sin datos del servidor</div>';
    html+='<div style="font-size:12px;color:var(--sub);margin-bottom:16px">Conectando con paper2...</div>';
    html+='<button onclick="loadDashboardData()" style="padding:12px 24px;border-radius:10px;background:var(--signal)18;border:1.5px solid var(--signal)40;color:var(--signal);font-size:13px;font-weight:700">🔄 Cargar datos</button>';
    html+='</div>';
  }

  html+='</div>'+nav();
  return html;
}

// ═══════════════════════════════════════════════════════
// LIGHTWEIGHT CHARTS — Interactive TradingView-style
// ═══════════════════════════════════════════════════════
var _lwcInstance = null; // singleton chart

function _lwcEMA(data, period){
  var k=2/(period+1), out=[], prev=null;
  for(var i=0;i<data.length;i++){
    if(i<period-1){out.push(null);continue;}
    if(prev===null){var s=0;for(var j=i-period+1;j<=i;j++)s+=data[j].close;prev=s/period;}
    else{prev=data[i].close*k+prev*(1-k);}
    out.push(prev);
  }
  return out;
}

function initLWChart(container, tk, levels, trades, sym, showIchi){
  if(_lwcInstance){try{_lwcInstance.remove();}catch(e){}_lwcInstance=null;}
  container.innerHTML='';

  // Always dark terminal background like professional platforms
  var bg='#040810';
  var gridCol='rgba(18,28,44,.9)';
  var textCol='#4a6a8a';
  var borderC='#0e1a28';

  var chart=LightweightCharts.createChart(container,{
    width:container.clientWidth||350,
    height:360,
    layout:{background:{type:'Solid',color:bg},textColor:textCol,fontSize:10,fontFamily:'-apple-system,SF Pro,Inter,monospace'},
    grid:{vertLines:{color:gridCol,style:1},horzLines:{color:gridCol,style:1}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'rgba(200,218,240,.3)',labelBackgroundColor:'#0e1a28'},horzLine:{color:'rgba(200,218,240,.3)',labelBackgroundColor:'#0e1a28'}},
    rightPriceScale:{
      borderColor:borderC,
      textColor:textCol,
      scaleMargins:{top:0.06,bottom:0.22},
      minimumWidth:60,
    },
    leftPriceScale:{visible:false},
    timeScale:{borderColor:borderC,timeVisible:true,secondsVisible:false,barSpacing:6,fixLeftEdge:false,fixRightEdge:false},
    handleScroll:true,
    handleScale:true,
    localization:{priceFormatter:function(p){return '$'+p.toFixed(2);}},
  });
  _lwcInstance=chart;

  var resizeObs=new ResizeObserver(function(entries){
    if(_lwcInstance&&entries[0]){var w=entries[0].contentRect.width;if(w>0)_lwcInstance.applyOptions({width:w});}
  });
  resizeObs.observe(container);

  // ── Candlestick series ─────────────────────────────
  var candles=chart.addCandlestickSeries({
    upColor:'#00dda0',downColor:'#ff3a55',
    borderUpColor:'#00dda0',borderDownColor:'#ff3a55',
    wickUpColor:'#00cc90',wickDownColor:'#ee2244',
  });

  var prices=tk.prices||[];
  // CRITICAL FIX: use (p.open != null && p.open > 0) not p.open||p.close which breaks when open=0
  var data=prices.map(function(p){
    var t=p.date?Math.floor(new Date(p.date).getTime()/1000):0;
    var o=(p.open!=null&&p.open>0)?+p.open:+p.close;
    var h=(p.high!=null&&p.high>0)?+p.high:Math.max(o,+p.close);
    var l=(p.low!=null&&p.low>0)?+p.low:Math.min(o,+p.close);
    var c=+p.close;
    return{time:t,open:o,high:h,low:l,close:c};
  }).filter(function(d){return d.time>0&&d.close>0;});
  data.sort(function(a,b){return a.time-b.time;});
  var seen={};data=data.filter(function(d){if(seen[d.time])return false;seen[d.time]=1;return true;});
  if(!data.length)return;
  candles.setData(data);

  // ── Volume ─────────────────────────────────────────
  var volS=chart.addHistogramSeries({
    color:'rgba(58,143,255,.15)',
    priceFormat:{type:'volume'},
    priceScaleId:'vol',
    scaleMargins:{top:0.82,bottom:0},
  });
  var volData=data.map(function(d,i){
    var col=i>0&&d.close>=data[i-1].close?'rgba(0,221,160,.2)':'rgba(255,58,85,.18)';
    return{time:d.time,value:prices[i]?prices[i].volume||0:0,color:col};
  });
  volS.setData(volData);

  // ── EMA50 (blue) ───────────────────────────────────
  var ema50vals=_lwcEMA(data,50);
  if(ema50vals.some(function(v){return v!==null;})){
    var e50s=chart.addLineSeries({color:'#3a8fff',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
    e50s.setData(data.map(function(d,i){return ema50vals[i]!==null?{time:d.time,value:ema50vals[i]}:null;}).filter(Boolean));
  }

  // ── SMA200 (gold dashed) ───────────────────────────
  if(data.length>=200){
    var s200s=chart.addLineSeries({color:'#e8b830',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:false});
    var s200d=[];
    for(var si=199;si<data.length;si++){
      var sum=0;for(var sj=si-199;sj<=si;sj++)sum+=data[sj].close;
      s200d.push({time:data[si].time,value:sum/200});
    }
    s200s.setData(s200d);
  }

  // ── Fibonacci levels ───────────────────────────────
  if(data.length>20){
    // Calculate fib from last 60 bars swing high/low
    var fibWindow=data.slice(-60);
    var fibHigh=Math.max.apply(null,fibWindow.map(function(d){return d.high;}));
    var fibLow=Math.min.apply(null,fibWindow.map(function(d){return d.low;}));
    var fibRange=fibHigh-fibLow;
    if(fibRange>0){
      var fibLevels=[
        {r:0.236,color:'rgba(160,80,255,.5)',lbl:'Fib 23.6%'},
        {r:0.382,color:'rgba(58,143,255,.5)',lbl:'Fib 38.2%'},
        {r:0.5,  color:'rgba(200,218,240,.35)',lbl:'Fib 50%'},
        {r:0.618,color:'rgba(232,184,48,.6)',lbl:'Fib 61.8% ★'},
        {r:0.786,color:'rgba(0,221,160,.4)',lbl:'Fib 78.6%'},
      ];
      fibLevels.forEach(function(fl){
        var price=fibHigh-(fibRange*fl.r);
        try{
          candles.createPriceLine({
            price:price,
            color:fl.color,
            lineWidth:1,
            lineStyle:LightweightCharts.LineStyle.Dotted,
            axisLabelVisible:false,
            title:'',
          });
        }catch(e){}
      });
    }
  }

  // ── Support/Resistance ────────────────────────────
  if(levels){
    (levels.supports||[]).slice(0,3).forEach(function(s){
      try{candles.createPriceLine({price:+s.price,color:'rgba(0,221,160,.5)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:false,title:''});}catch(e){}
    });
    (levels.resistances||[]).slice(0,3).forEach(function(r){
      try{candles.createPriceLine({price:+r.price,color:'rgba(255,58,85,.5)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:false,title:''});}catch(e){}
    });
  }

  // ── Trade entry markers ───────────────────────────
  if(trades&&trades.length){
    var markers=[];
    trades.forEach(function(t){
      var et=t.date?Math.floor(new Date(t.date).getTime()/1000):0;
      if(et>0&&t.entry){
        markers.push({time:et,position:'belowBar',color:'#3a8fff',shape:'arrowUp',text:'▶ $'+t.entry});
        if(t.exit){
          var xt=Math.floor(new Date(t.date).getTime()/1000)+86400;
          markers.push({time:xt,position:'aboveBar',color:t.result==='WIN'?'#00dda0':'#ff3a55',shape:'arrowDown',text:'◀ $'+t.exit});
        }
      }
    });
    if(markers.length){markers.sort(function(a,b){return a.time-b.time;});candles.setMarkers(markers);}
  }

  // ── Ichimoku Cloud (si está activado) ────────────────
  if(showIchi && data.length >= 52){
    function lwcHLMid(arr, period, idx){
      var sl=arr.slice(Math.max(0,idx-period+1),idx+1);
      var hi=Math.max.apply(null,sl.map(function(d){return d.high;}));
      var lo=Math.min.apply(null,sl.map(function(d){return d.low;}));
      return (hi+lo)/2;
    }
    var tenkanS=[], kijunS=[], senkouAS=[], senkouBS=[];
    for(var ic=0;ic<data.length;ic++){
      tenkanS.push(lwcHLMid(data,9,ic));
      kijunS.push(lwcHLMid(data,26,ic));
      senkouAS.push((tenkanS[ic]+kijunS[ic])/2);
      senkouBS.push(lwcHLMid(data,52,ic));
    }
    // Tenkan (conversion line) - cyan
    var tenkanLine=chart.addLineSeries({color:'rgba(0,200,224,.8)',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
    tenkanLine.setData(data.map(function(d,i){return{time:d.time,value:tenkanS[i]};}));
    // Kijun (base line) - red/pink
    var kijunLine=chart.addLineSeries({color:'rgba(255,80,100,.8)',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false});
    kijunLine.setData(data.map(function(d,i){return{time:d.time,value:kijunS[i]};}));
    // ── NUBE RELLENA — Kumo ───────────────────────────
    // Senkou A — borde superior/inferior verde
    var senkouALine=chart.addLineSeries({
      color:'rgba(0,221,160,.6)',lineWidth:1,
      priceLineVisible:false,lastValueVisible:false,
    });
    senkouALine.setData(data.map(function(d,i){return{time:d.time,value:senkouAS[i]};}));
    // Senkou B — borde naranja
    var senkouBLine=chart.addLineSeries({
      color:'rgba(240,168,0,.6)',lineWidth:1,
      priceLineVisible:false,lastValueVisible:false,
    });
    senkouBLine.setData(data.map(function(d,i){return{time:d.time,value:senkouBS[i]};}));
    // Nube rellena usando histogram series — apilada entre A y B
    // Truco: usar dos histogram series con colores distintos según A>B o B>A
    var kumoData=data.map(function(d,i){
      var a=senkouAS[i], b=senkouBS[i];
      var bullish=a>=b; // nube alcista (verde) si A sobre B
      return{
        time:d.time,
        value:Math.max(a,b),  // altura máxima
        color:bullish?'rgba(0,221,160,.15)':'rgba(255,58,85,.12)',
      };
    });
    // Nube inferior
    var kumoBase=data.map(function(d,i){
      var a=senkouAS[i], b=senkouBS[i];
      var bullish=a>=b;
      return{
        time:d.time,
        value:Math.min(a,b),
        color:bullish?'rgba(0,221,160,.15)':'rgba(255,58,85,.12)',
      };
    });
    var kumoTop=chart.addHistogramSeries({
      priceScaleId:'right',
      priceLineVisible:false,lastValueVisible:false,
      overlay:true,
    });
    kumoTop.setData(kumoData);
    // Chikou span (precio actual desplazado 26 barras atrás) - gris
    var chikouData=[];
    for(var ci=26;ci<data.length;ci++){
      chikouData.push({time:data[ci-26].time,value:data[ci].close});
    }
    var chikouLine=chart.addLineSeries({color:'rgba(180,200,220,.45)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,lineStyle:LightweightCharts.LineStyle.Dotted});
    chikouLine.setData(chikouData);
  }

  // ── Patrón chartista activo — marcador en el gráfico ──────────────────
  if(sym && typeof analyzeSymbol === 'function'){
    try {
      var anlz = analyzeSymbol(sym);
      if(anlz && anlz.patterns){
        var activePat = anlz.patterns.filter(function(p){return p.isActive;})[0];
        if(activePat && data.length > 5){
          // Buscar la vela más reciente donde empezó el patrón
          var patTime = data[data.length-1].time;
          // Intentar usar dateStart del patrón si disponible
          if(activePat.dateStart){
            var ps = new Date(activePat.dateStart);
            if(!isNaN(ps.getTime())) patTime = Math.floor(ps.getTime()/1000);
          }
          var patColor = activePat.type && activePat.type.indexOf('bajist')>=0 ? '#ff3a55' : '#00dda0';
          var patEmoji = activePat.emoji || '📐';
          var patName  = activePat.type  || 'Patrón';
          try {
            candles.setMarkers((candles.markers ? candles.markers() : []).concat([{
              time: patTime,
              position: 'aboveBar',
              color: patColor,
              shape: 'circle',
              text: patEmoji + ' ' + patName,
            }]));
          } catch(me) {
            // Si falla setMarkers encadenado, usar forma directa
            candles.setMarkers([{
              time: patTime,
              position: 'aboveBar',
              color: patColor,
              shape: 'circle',
              text: patEmoji + ' ' + patName,
            }]);
          }
        }
      }
    } catch(pe){}
  }

  chart.timeScale().fitContent();

  // ── OHLC Tooltip ─────────────────────────────────
  var tooltip=document.createElement('div');
  tooltip.style.cssText='position:absolute;top:6px;left:8px;z-index:20;background:rgba(4,8,16,.92);border:1px solid #0e1a28;border-radius:8px;padding:7px 11px;font-size:11px;font-family:-apple-system,monospace;pointer-events:none;backdrop-filter:blur(16px);min-width:180px;display:none;';
  container.style.position='relative';
  container.appendChild(tooltip);

  chart.subscribeCrosshairMove(function(param){
    if(!param||!param.time){tooltip.style.display='none';return;}
    var d=param.seriesData.get(candles);
    if(!d){tooltip.style.display='none';return;}
    tooltip.style.display='block';
    var chg=d.open?((d.close-d.open)/d.open*100).toFixed(2):0;
    var col=d.close>=d.open?'#00dda0':'#ff3a55';
    var chgPct=d.open?Math.abs((d.high-d.low)/d.open*100).toFixed(1):0;
    var dt=new Date(param.time*1000);
    var ds=dt.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'});
    tooltip.innerHTML=
      '<div style="color:#4a6a8a;font-size:9px;margin-bottom:5px;letter-spacing:1px">'+ds+'  <span style="color:'+col+';font-weight:700">'+(chg>=0?'+':'')+chg+'%</span>  <span style="color:#223040">Range '+chgPct+'%</span></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px">'
      +'<div><div style="font-size:8px;color:#4a6a8a;margin-bottom:1px">OPEN</div><div style="font-weight:700;font-size:12px">$'+d.open.toFixed(2)+'</div></div>'
      +'<div><div style="font-size:8px;color:#00dda0;margin-bottom:1px">HIGH</div><div style="font-weight:700;font-size:12px;color:#00dda0">$'+d.high.toFixed(2)+'</div></div>'
      +'<div><div style="font-size:8px;color:#ff3a55;margin-bottom:1px">LOW</div><div style="font-weight:700;font-size:12px;color:#ff3a55">$'+d.low.toFixed(2)+'</div></div>'
      +'<div><div style="font-size:8px;color:'+col+';margin-bottom:1px">CLOSE</div><div style="font-weight:700;font-size:12px;color:'+col+'">$'+d.close.toFixed(2)+'</div></div>'
      +'</div>';
  });
}
